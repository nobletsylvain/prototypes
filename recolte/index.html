<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Récolte</title>
<style>
  /* --- Plein ecran, pense mobile (pas de scroll, pas de zoom) --- */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; touch-action:none;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 120% at 50% 0%, #14361f 0%, #0c2114 55%, #07140c 100%); }
  #app { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  /* --- HUD (overlay HTML par dessus la scene 3D) --- */
  .hud { position:fixed; pointer-events:none; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  #cash { top:max(12px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-weight:800; font-size:19px; color:#9be37d; }
  #debt { top:calc(max(12px,env(safe-area-inset-top)) + 26px); left:50%; transform:translateX(-50%);
    font-weight:700; font-size:12px; color:#ff9f6b; }
  #repwrap { top:max(12px,env(safe-area-inset-top)); left:14px; display:flex; flex-direction:column; gap:3px; }
  #replbl { font-size:11px; font-weight:800; color:#bdf0a3; letter-spacing:.3px; }
  #repbar { width:104px; height:7px; background:rgba(255,255,255,.14); border-radius:999px; overflow:hidden; }
  #repfill { height:100%; width:55%; background:linear-gradient(90deg,#ff6b6b,#ffd166 55%,#7ad17a); transition:width .3s; }
  #xpwrap { top:max(12px,env(safe-area-inset-top)); right:64px; display:flex; align-items:center; gap:6px; }
  #level { background:rgba(155,227,125,.18); border:1px solid rgba(155,227,125,.55); color:#bdf0a3;
    font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  #xpbar { width:76px; height:7px; background:rgba(255,255,255,.14); border-radius:999px; overflow:hidden; }
  #xpfill { height:100%; width:0%; background:linear-gradient(90deg,#7ad17a,#bdf0a3); border-radius:999px; transition:width .25s; }

  /* --- Stepper : les 5 etapes du core loop --- */
  #stepper { top:calc(max(12px,env(safe-area-inset-top)) + 46px); left:50%; transform:translateX(-50%);
    display:flex; gap:4px; }
  .step { font-size:9.5px; font-weight:800; letter-spacing:.2px; padding:3px 7px; border-radius:999px;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); color:rgba(255,255,255,.5); white-space:nowrap; }
  .step.on { background:rgba(155,227,125,.22); border-color:rgba(155,227,125,.6); color:#d6f7c2; }
  .step.done { color:rgba(155,227,125,.75); }

  #hint { position:fixed; left:0; right:0; bottom:max(168px,calc(env(safe-area-inset-bottom) + 162px));
    text-align:center; font-size:13px; color:rgba(255,255,255,.72); padding:0 24px; transition:opacity .4s;
    pointer-events:none; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  #toast { position:fixed; left:0; right:0; top:40%; text-align:center; font-size:24px; font-weight:800; opacity:0;
    transition:opacity .25s, transform .25s; transform:translateY(8px); pointer-events:none;
    color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.6); padding:0 20px; }
  #toast.show { opacity:1; transform:translateY(0); }

  #labels { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
  .blabel { position:absolute; transform:translate(-50%,-50%); white-space:nowrap;
    font-weight:800; font-size:12px; padding:2px 7px; border-radius:8px;
    background:rgba(0,0,0,.5); text-shadow:0 1px 3px rgba(0,0,0,.6); }
  .blabel .qd { font-size:10px; opacity:.85; }

  /* --- Barre d'action basse commune aux phases --- */
  .panel { position:fixed; left:0; right:0; bottom:0; display:none; flex-direction:column; align-items:center;
    gap:9px; padding:12px 14px max(14px,calc(env(safe-area-inset-bottom) + 10px)); pointer-events:none; }
  .panel.show { display:flex; }
  .card { pointer-events:none; background:rgba(8,20,12,.62); border:1px solid rgba(255,255,255,.12);
    border-radius:14px; padding:9px 14px; color:#fff; font-size:13px; font-weight:600; text-align:center;
    backdrop-filter:blur(6px); max-width:440px; line-height:1.5; }
  .card b { color:#bdf0a3; }
  .card .q { color:#ffd166; }
  .btn { pointer-events:auto; border:none; border-radius:13px; font-weight:800; font-size:15px;
    padding:11px 18px; color:#10210f; background:#7ad17a; box-shadow:0 4px 14px rgba(122,209,122,.35); }
  .btn:active { transform:scale(.98); }
  .btn.alt { background:rgba(255,255,255,.14); color:#fff; border:1px solid rgba(255,255,255,.25); box-shadow:none; }
  .btn.warn { background:#ff7a3c; color:#fff; box-shadow:0 4px 14px rgba(255,122,60,.35); }
  .btn:disabled { background:rgba(255,255,255,.1); color:rgba(255,255,255,.35); box-shadow:none; }
  .row { display:flex; gap:9px; align-items:center; justify-content:center; flex-wrap:wrap; pointer-events:none; }
  .row .btn, .row .toggle { pointer-events:auto; }

  /* --- Jauge de timing reutilisable (scan, negoce, scellage) --- */
  .gauge { position:relative; width:74%; max-width:340px; height:22px; background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18); border-radius:999px; overflow:hidden; box-shadow:0 4px 14px rgba(0,0,0,.4);
    pointer-events:none; }
  .sweet { position:absolute; top:0; bottom:0; background:linear-gradient(90deg,rgba(155,227,125,.25),rgba(155,227,125,.65),rgba(155,227,125,.25)); }
  .cursor { position:absolute; top:-2px; bottom:-2px; width:5px; margin-left:-2.5px; background:#fff;
    border-radius:3px; box-shadow:0 0 8px rgba(255,255,255,.9); }

  /* --- Tri : grille des bacs de variete (boutons de routage) --- */
  #trigrid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; width:96%; max-width:460px; pointer-events:auto; }
  .vbtn { pointer-events:auto; background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.16);
    border-radius:12px; padding:8px 3px; color:#fff; text-align:center; transition:transform .05s, border-color .12s; }
  .vbtn:active { transform:scale(.95); }
  .vbtn .ve { font-size:20px; line-height:1.1; }
  .vbtn .vn { font-size:10px; font-weight:800; margin-top:1px; }
  .vbtn .vg { font-size:10px; color:rgba(255,255,255,.6); margin-top:1px; }
  #triactive { display:flex; align-items:center; justify-content:center; gap:9px; pointer-events:none;
    font-size:13px; font-weight:800; }
  #triswatch { width:26px; height:26px; border-radius:8px; box-shadow:0 0 12px rgba(0,0,0,.4); border:2px solid rgba(255,255,255,.55); }

  /* --- Selecteurs (toggle) --- */
  .toggle { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    font-weight:700; font-size:13px; padding:8px 12px; border-radius:11px; }
  .toggle.on { background:#7aa0ff; border-color:#7aa0ff; color:#0c142a; }

  /* --- Choix de la quantite de branchage (250/500/750/1000 g) --- */
  #qtyrow .qbtn { pointer-events:auto; background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2);
    color:#fff; font-weight:800; font-size:13px; padding:7px 11px; border-radius:11px; }
  #qtyrow .qbtn.on { background:rgba(155,227,125,.22); border-color:#7ad17a; color:#d6f7c2; }
  #qtyrow .qbtn:active { transform:scale(.96); }

  /* --- Mix : chips de selection de variete --- */
  #mixchips { display:flex; gap:7px; flex-wrap:wrap; justify-content:center; width:96%; max-width:460px; pointer-events:auto; }
  .chip { pointer-events:auto; background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.18);
    border-radius:11px; padding:7px 11px; color:#fff; font-weight:700; font-size:12.5px; }
  .chip.on { background:rgba(122,209,122,.22); border-color:#7ad17a; }
  .chip:disabled { opacity:.35; }

  /* --- Mix : curseur de dilution --- */
  #dtrack { position:relative; width:80%; max-width:360px; height:30px; pointer-events:auto;
    display:flex; align-items:center; }
  #dtrail { position:absolute; left:0; right:0; height:10px; border-radius:999px;
    background:linear-gradient(90deg,#7ad17a,#ffd166 55%,#ff6b6b); opacity:.85; }
  #dknob { position:absolute; width:24px; height:24px; border-radius:50%; background:#fff; left:0; margin-left:-12px;
    box-shadow:0 2px 8px rgba(0,0,0,.5); border:2px solid #1a2c18; }

  /* --- Pots : grille de formats --- */
  #potgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; width:94%; max-width:440px; pointer-events:auto; }
  .fmt { pointer-events:auto; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16);
    border-radius:12px; padding:8px 5px; color:#fff; text-align:center; }
  .fmt:active { background:rgba(255,255,255,.16); }
  .fmt:disabled { opacity:.4; }
  .fmt .fn { font-weight:800; font-size:13px; }
  .fmt .fp { font-size:11px; color:#9be37d; margin-top:2px; }

  /* --- Boutique --- */
  #shopbtn { position:fixed; right:14px; top:max(10px,env(safe-area-inset-top)); pointer-events:auto;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff; font-size:18px;
    width:44px; height:40px; border-radius:12px; }
  #shopbtn:active { background:rgba(255,255,255,.25); }
  #shop { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.5); z-index:6; }
  #shop.show { display:flex; }
  #shopinner { width:88%; max-width:400px; max-height:76vh; overflow:auto; background:#10271a;
    border:1px solid rgba(255,255,255,.15); border-radius:16px; padding:16px; color:#fff; }
  #shophead { font-weight:800; font-size:18px; margin-bottom:12px; display:flex; justify-content:space-between; }
  #shopcash { color:#9be37d; }
  .shopitem { display:flex; align-items:center; gap:10px; padding:10px; margin-bottom:10px;
    border:1px solid rgba(255,255,255,.12); border-radius:12px; background:rgba(255,255,255,.04); }
  .shopitem .ic { font-size:24px; }
  .shopitem .info { flex:1; }
  .shopitem .nm { font-weight:700; }
  .shopitem .ds { font-size:12px; color:rgba(255,255,255,.6); }
  .shopitem button { background:#3a6b3a; border:none; color:#fff; font-weight:700; padding:9px 12px; border-radius:10px; min-width:64px; }
  .shopitem button:disabled { background:rgba(255,255,255,.12); color:rgba(255,255,255,.4); }
  #shopclose { width:100%; background:rgba(255,255,255,.12); border:none; color:#fff; font-weight:700; padding:11px; border-radius:12px; }
</style>

<!-- Three.js charge en module depuis un CDN (import map). Supporte par Safari iOS 16.4+ -->
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<body>
<div id="app"></div>

<!-- HUD haut -->
<div class="hud" id="cash">💶 0 €</div>
<div class="hud" id="debt">🧾 dette 0 €</div>
<div class="hud" id="repwrap"><span id="replbl">⭐ Réput. 55</span><div id="repbar"><div id="repfill"></div></div></div>
<div class="hud" id="xpwrap"><span id="level">Niv. 1</span><div id="xpbar"><div id="xpfill"></div></div></div>
<div class="hud" id="stepper">
  <span class="step" data-step="effeuille">1·Effeuille</span>
  <span class="step" data-step="tri">2·Tri</span>
  <span class="step" data-step="mix">3·Coupe</span>
  <span class="step" data-step="pots">4·Pots</span>
  <span class="step" data-step="stock">5·Stock</span>
</div>
<button id="shopbtn">🛒</button>

<div class="hud" id="hint"></div>
<div id="toast"></div>
<div id="labels"></div>

<!-- Phase 1 : Effeuillage -->
<div class="panel" id="effui">
  <div class="card" id="effcard"></div>
  <div class="row" id="qtyrow">
    <span style="color:rgba(255,255,255,.55);font-size:12px;font-weight:700;pointer-events:none">Branchage</span>
    <button class="qbtn" data-q="250">250 g</button>
    <button class="qbtn" data-q="500">500 g</button>
    <button class="qbtn" data-q="750">750 g</button>
    <button class="qbtn" data-q="1000">1 kg</button>
  </div>
  <div style="text-align:center;font-size:12.5px;font-weight:800;color:rgba(173,224,140,.85);padding:3px 0 2px;pointer-events:none" id="effswipe">👆 Glisse le long des colas pour détacher les têtes</div>
  <div class="row">
    <button class="btn" id="effNext">Trier ▸</button>
  </div>
</div>

<!-- Phase 2 : Tri par variete -->
<div class="panel" id="triui">
  <div class="card" id="tricard"></div>
  <div id="triactive"><span id="triswatch"></span><span id="trilbl">—</span></div>
  <div id="trigrid"></div>
  <div class="row"><button class="btn" id="triNext">Mélanger ▸</button></div>
</div>

<!-- Phase 3 : Mix / Dilution -->
<div class="panel" id="mixui">
  <div class="card" id="mixcard"></div>
  <div id="mixchips"></div>
  <div id="dtrack"><div id="dtrail"></div><div id="dknob"></div></div>
  <div class="row">
    <button class="toggle" id="mixBlend">🧬 Blend maison</button>
    <button class="btn" id="mixPrep">Préparer le pot ▸</button>
  </div>
</div>

<!-- Phase 4 : Conditionnement en pots -->
<div class="panel" id="potsui">
  <div class="card" id="potcard"></div>
  <div class="gauge" id="sealgauge" style="display:none"><div class="sweet" id="sealsweet"></div><div class="cursor" id="sealcursor"></div></div>
  <div id="potgrid"></div>
  <div class="row">
    <button class="toggle" id="optHygro" title="Pochon hygro (curing)">💧 Hygro</button>
    <button class="btn" id="potDone">Terminer ▸</button>
  </div>
</div>

<!-- Phase 5 : Stockage / Vente -->
<div class="panel" id="stockui">
  <div class="card" id="stockcard"></div>
  <div class="row">
    <button class="btn" id="stockSell">💶 Vendre le stock</button>
    <button class="btn alt" id="stockNew">Nouvelle récolte ▸</button>
  </div>
</div>

<!-- Boutique -->
<div id="shop">
  <div id="shopinner">
    <div id="shophead"><span>🛒 Boutique</span><span id="shopcash"></span></div>
    <div id="shopitems"></div>
    <button id="shopclose">Fermer</button>
  </div>
</div>

<script type="module">
"use strict";
import * as THREE from "three";

/* =========================================================================
   RECOLTE — core loop de transfo multi-varietes (proto mobile 3D)
   -------------------------------------------------------------------------
   On prend une RECOLTE a credit (plusieurs varietes sur branches), puis :
     1) Effeuillage : on FROTTE les branches -> les tetes tombent dans un
        TAS FRAIS mele (toutes varietes) + des feuilles partent en DECHET.
     2) Tri         : on route chaque poignee du tas frais vers le bon BAC
        de variete (Skunk / White Widow / Lemon / Purple) ou le bac Dechet.
        Se tromper de bac CONTAMINE le bac (qualite/purete en baisse).
     3) Mix         : on choisit une variete (pure) OU un "Blend maison"
        (plusieurs varietes), et on peut DILUER au dechet vegetal (volume up,
        qualite down) -> c'est l'arbitrage cupidite/prudence.
     4) Pots        : on conditionne en POTS en verre etiquetes VARIETE + QUALITE,
        scellage au timing pour un bonus.
     5) Stock       : les pots s'empilent sur l'etagere ; "Vendre le stock"
        rembourse d'abord la DETTE, le surplus tombe en cash.
   Reputation = qualite moyenne vendue. Persistance localStorage prefixe "rc_".
   Tout est commente en francais, brique par brique. (Fork de green-front.)
   ========================================================================= */

/* -------------------------------------------------------------------------
   0) VARIETES + ECONOMIE (constantes de jeu)
   ------------------------------------------------------------------------- */
// Varietes triables. col = couleur 3D, tint = pastille d'indice a l'ecran.
const STRAINS = {
  skunk:  { name: "Skunk",        emoji: "🦨", col: [111,154,72],  tint: "#9bd06a", lbl: "#bdf0a3" },
  widow:  { name: "White Widow",  emoji: "❄️", col: [176,202,184], tint: "#dff3e4", lbl: "#e6f6ec" },
  lemon:  { name: "Lemon Haze",   emoji: "🍋", col: [200,193,74],  tint: "#e8e27a", lbl: "#ece887" },
  purple: { name: "Purple Kush",  emoji: "🍇", col: [129,97,166],  tint: "#c4a3e8", lbl: "#cba8ec" },
};
const STR_IDS = ["skunk", "widow", "lemon", "purple"];

// Recoltes prises a credit. €/g de gros baisse avec le volume. nbVar = nb de
// varietes presentes dans la recolte. (La quantite est choisie a la main, cf. QUANTITIES.)

// Formats de pots : petite quantite = €/g plus eleve (retail).
const JARS = [
  { id: "j35", g: 3.5, eur: 11, name: "3.5 g", emoji: "🫙" },
  { id: "j7",  g: 7,   eur: 10, name: "7 g",   emoji: "🫙" },
  { id: "j14", g: 14,  eur: 9,  name: "14 g",  emoji: "🫙" },
  { id: "j28", g: 28,  eur: 8,  name: "28 g",  emoji: "🏺" },
];

const WASTE_Q = 0.08;   // qualite "intrinseque" du dechet vegetal (pour la dilution)

/* -------------------------------------------------------------------------
   1) SCENE, CAMERA, RENDU
   ------------------------------------------------------------------------- */
const app = document.getElementById("app");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 200);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setClearColor(0x000000, 0);            // fond transparent -> degrade CSS visible
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

// Deux cadrages : "work" (3/4 plongeant sur le plan + bacs) pour tri/coupe/pots/
// stock, et "eff" (frontal, plus bas) pour l'effeuillage des colas suspendues.
const VIEWS = {
  work: { target: new THREE.Vector3(0, 0.15, 0.0), dir: new THREE.Vector3(0.02, 0.64, 0.77).normalize(), radius: Math.hypot(3.9, 0.9, 3.0) },
  eff:  { target: new THREE.Vector3(0, 1.45, 0.0), dir: new THREE.Vector3(0, 0.20, 1).normalize(),        radius: Math.hypot(2.4, 1.1, 0.4) },
};
let curView = VIEWS.work;
const VIEW_TARGET = new THREE.Vector3();   // cible courante (utilisee par la boucle)
const baseCamPos  = new THREE.Vector3();
let zoom = +(localStorage.getItem("rc_zoom")) || 1;
zoom = Math.max(0.6, Math.min(2.4, zoom));

function fitView() {
  const vFov = camera.fov * Math.PI / 180;
  const hFov = 2 * Math.atan(Math.tan(vFov / 2) * camera.aspect);
  const fov = Math.min(vFov, hFov);
  const dist = (curView.radius / Math.sin(fov / 2)) * 1.05 / zoom;
  VIEW_TARGET.copy(curView.target);
  baseCamPos.copy(VIEW_TARGET).addScaledVector(curView.dir, dist);
  camera.position.copy(baseCamPos);
  camera.lookAt(VIEW_TARGET);
}
function setView(name) { curView = VIEWS[name] || VIEWS.work; fitView(); }
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  fitView();
}
window.addEventListener("resize", resize);

/* -------------------------------------------------------------------------
   2) LUMIERES
   ------------------------------------------------------------------------- */
scene.add(new THREE.HemisphereLight(0xeafff0, 0x16281a, 0.62));
const sun = new THREE.DirectionalLight(0xffffe8, 1.4);
sun.position.set(5, 11, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.bias = -0.0004;
const sc = sun.shadow.camera;
sc.left = -8; sc.right = 8; sc.top = 8; sc.bottom = -8; sc.near = 1; sc.far = 28;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xbce0ff, 0.32);
fill.position.set(-4, 3, 6);
scene.add(fill);

/* -------------------------------------------------------------------------
   3) TEXTURES PROCEDURALES (grain) — aucun fichier externe
   ------------------------------------------------------------------------- */
function grainTex(r, g, b, contrast, spots) {
  const c = document.createElement("canvas"); c.width = c.height = 96;
  const x = c.getContext("2d");
  const img = x.createImageData(96, 96);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * contrast;
    img.data[i]   = Math.max(0, Math.min(255, r + n));
    img.data[i+1] = Math.max(0, Math.min(255, g + n));
    img.data[i+2] = Math.max(0, Math.min(255, b + n));
    img.data[i+3] = 255;
  }
  x.putImageData(img, 0, 0);
  for (let k = 0; k < spots; k++) {
    x.fillStyle = "rgba(40,24,52," + (Math.random() * 0.22) + ")";       // petits pistils
    x.fillRect(Math.random() * 96, Math.random() * 96, Math.random() * 2 + 1, Math.random() * 2 + 1);
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(2, 2);
  return t;
}
// Un materiau "nug" par variete + le dechet vegetal.
const matStrain = {};
for (const id of STR_IDS) {
  const [r, g, b] = STRAINS[id].col;
  matStrain[id] = new THREE.MeshStandardMaterial({ map: grainTex(r, g, b, 40, 90), roughness: 0.88 });
}
const matLeaf  = new THREE.MeshStandardMaterial({ map: grainTex(96, 116, 64, 30, 30), roughness: 0.96 }); // feuilles/dechet
const matBranch = new THREE.MeshStandardMaterial({ color: 0x5a4327, roughness: 0.9 });

/* -------------------------------------------------------------------------
   4) PLAN DE TRAVAIL
   ------------------------------------------------------------------------- */
const board = new THREE.Mesh(
  new THREE.BoxGeometry(8.6, 0.3, 6.4),

/* -------------------------------------------------------------------------
   5) NUGS (tetes) : icosaedres deformes + materiau passe en parametre
   ------------------------------------------------------------------------- */
function makeNugGeo(r) {
  const g = new THREE.IcosahedronGeometry(r, 1);
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    const f = 0.74 + Math.random() * 0.5;     // bosselage
    p.setXYZ(i, p.getX(i) * f, p.getY(i) * f, p.getZ(i) * f);
  }
  g.computeVertexNormals();
  return g;
}
const nugGeoBig = makeNugGeo(0.16);
const nugGeoSm  = makeNugGeo(0.1);
function makeNug(mat, small) {
  const m = new THREE.Mesh(small ? nugGeoSm : nugGeoBig, mat);
  m.castShadow = true;
  m.rotation.set(Math.random() * 6, Math.random() * 6, Math.random() * 6);
  return m;
}

const _sp = new THREE.Vector3();
function toScreen(obj) {
  obj.getWorldPosition(_sp); _sp.project(camera);
  return { x: (_sp.x * 0.5 + 0.5) * window.innerWidth, y: (-_sp.y * 0.5 + 0.5) * window.innerHeight, z: _sp.z };
}
// Distance d'un point a un segment (en px) — reprise telle quelle de green-front-v2.
function distSeg(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay, l2 = dx * dx + dy * dy;
  let t = l2 > 0 ? ((px - ax) * dx + (py - ay) * dy) / l2 : 0;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

function makeBin(pos, col, mat2) {

  const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.7, metalness: 0.1, side: THREE.DoubleSide });

  const wLR = (x) => { const m = new THREE.Mesh(new THREE.BoxGeometry(th, h, d), mat); m.position.set(x, h / 2, 0); grp.add(m); };
  const wFB = (z) => { const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, th), mat); m.position.set(0, h / 2, z); grp.add(m); };
  wLR(-w / 2); wLR(w / 2); wFB(-d / 2); wFB(d / 2);
  scene.add(grp);
  // Pile de nugs (visibilite pilotee par le poids du bac).

// Une cola = tige + ~10 tetes + feuilles deco. Pool reutilisable : la variete
// (couleur des tetes) est (re)assignee a chaque recolte. On en montre 3 a 8.
function buildCola() {
  const grp = new THREE.Group();
  const len = COLA_TOP - COLA_BOT, midY = (COLA_TOP + COLA_BOT) / 2;
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.028, 0.05, len, 6), matBranch);
  stem.position.y = midY; stem.castShadow = true; grp.add(stem);
  const hook = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.016, 6, 10),
    new THREE.MeshStandardMaterial({ color: 0x8a8f95, metalness: 0.5, roughness: 0.5 }));
  hook.position.y = COLA_TOP; hook.rotation.x = Math.PI / 2; grp.add(hook);
  const buds = [], n = 10;
  for (let i = 0; i < n; i++) {
    const u = i / (n - 1);
    const y = COLA_TOP - 0.16 - u * (len - 0.26);
    const side = i % 2 ? 1 : -1;
    const m = makeNug(matStrain.skunk, i % 3 === 0);
    m.position.set(side * (0.05 + Math.random() * 0.1), y, (Math.random() - 0.5) * 0.12);
    grp.add(m);
    buds.push({ mesh: m, mass: 0, leafFrac: 0, on: true });
  }
  const leaves = [];
  for (let i = 0; i < 5; i++) {
    const u = (i + 0.5) / 5, y = COLA_TOP - 0.2 - u * (len - 0.3), side = i % 2 ? 1 : -1;
    const lf = makeLeaf();
    lf.position.set(side * 0.12, y, 0.04);
    lf.rotation.z = side > 0 ? -1.1 : 1.1; lf.rotation.x = 0.4;
    grp.add(lf); leaves.push(lf);
  }
  grp.visible = false;
  colasGrp.add(grp);
  return { grp, variety: null, buds, leaves };
}

/* -------------------------------------------------------------------------
   8) SECOUSSE / AUDIO (juice synthetise, zero fichier) + nugs volants
   ------------------------------------------------------------------------- */
let shake = 0;
function addShake(a) { shake = Math.min(0.6, shake + a); }

let actx = null;
function ensureAudio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === "suspended") actx.resume();
  return actx;
}
function beep(freq, t0, dur, vol, type) {
  const ac = ensureAudio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || "square"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t0); o.stop(t0 + dur);
}
function noiseBurst(dur, f0, f1, vol, type, q) {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime, len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate), ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.5);
  const src = ac.createBufferSource(); src.buffer = buf;
  const filt = ac.createBiquadFilter(); filt.type = type || "bandpass"; filt.Q.value = q || 0.8;
  filt.frequency.setValueAtTime(f0, t);
  filt.frequency.exponentialRampToValueAtTime(Math.max(60, f1), t + dur);
  const g = ac.createGain(); g.gain.value = vol;
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(t); src.stop(t + dur);
}
function playSnip() { noiseBurst(0.07, 3200, 900, 0.2, "bandpass", 1.1); }       // froissement/effeuillage
function playSeal() { noiseBurst(0.22, 600, 1700, 0.22, "lowpass", 0.6); }       // bocal scelle
function playSale() { const ac = ensureAudio(); if (!ac) return; const t = ac.currentTime; beep(880, t, 0.12, 0.22); beep(1320, t + 0.08, 0.16, 0.2); }
function playThud() { noiseBurst(0.18, 240, 70, 0.3, "lowpass", 0.7); }          // chute des branches
function playGood() { const ac = ensureAudio(); if (!ac) return; beep(740, ac.currentTime, 0.07, 0.16, "sine"); }
function playBad()  { beep(170, (ensureAudio() || {}).currentTime || 0, 0.12, 0.18, "sawtooth"); }

const flyers = [];

  while (flyers.length > 40) { const f = flyers.shift(); scene.remove(f.mesh); }
}
// Flyer partant d'une position monde precise (effeuillage : la tete part de la cola).
function flyNugFrom(mat, from, target, small) {
  const m = makeNug(mat, small !== false);
  m.position.copy(from);
  scene.add(m);
  flyers.push({ mesh: m, target: target.clone(), t: 0 });
  while (flyers.length > 40) { const f = flyers.shift(); scene.remove(f.mesh); }
}
function updateFlyers(dt) {
  for (let i = flyers.length - 1; i >= 0; i--) {
    const f = flyers[i];
    f.t += dt; f.mesh.rotation.x += dt * 8; f.mesh.rotation.y += dt * 6;
    f.mesh.position.lerp(f.target, Math.min(1, dt * 6));
    if (f.mesh.position.distanceTo(f.target) < 0.12 || f.t > 1.2) {
      scene.remove(f.mesh); flyers.splice(i, 1);
    }
  }
}

// TETES QUI TOMBENT (effeuillage) : vraie gravite + rebond dans le panier, pour
// "sentir les buds tomber". Une tete detachee chute, derive vers le panier, rebondit
// une fois puis se pose ; un petit "toc" sourd a l'atterrissage (throttle).
const fallers = [];
const FALL_FLOOR = 0.46;       // hauteur monde du dessus du panier
let landCd = 0;
function playDrop() { noiseBurst(0.06, 360, 110, 0.13, "lowpass", 0.8); }
function dropBud(mat, from) {
  const m = makeNug(mat, true);
  m.position.copy(from); scene.add(m);
  fallers.push({
    mesh: m, vy: 0.2 + Math.random() * 0.4,
    tx: (Math.random() - 0.5) * 2.4, tz: 0.55 + (Math.random() - 0.5) * 0.5,
    spin: (Math.random() - 0.5) * 12, t: 0, bounced: false, rest: 0,
  });
  while (fallers.length > 70) { const f = fallers.shift(); scene.remove(f.mesh); }
}
function updateFallers(dt) {
  if (landCd > 0) landCd = Math.max(0, landCd - dt);
  for (let i = fallers.length - 1; i >= 0; i--) {
    const f = fallers[i], p = f.mesh.position;
    f.t += dt;
    if (f.rest > 0) { f.rest -= dt; if (f.rest <= 0) { scene.remove(f.mesh); fallers.splice(i, 1); } continue; }
    f.vy += -8.2 * dt;                                  // gravite
    p.y += f.vy * dt;
    p.x += (f.tx - p.x) * Math.min(1, dt * 1.4);        // derive vers le panier
    p.z += (f.tz - p.z) * Math.min(1, dt * 1.4);
    f.mesh.rotation.x += f.spin * dt; f.mesh.rotation.z += f.spin * 0.7 * dt;
    if (p.y <= FALL_FLOOR) {
      p.y = FALL_FLOOR;
      if (!f.bounced && f.vy < -1.2) { f.bounced = true; f.vy = -f.vy * 0.34; if (landCd <= 0) { playDrop(); landCd = 0.04; addShake(0.012); } }
      else { f.rest = 0.5 + Math.random() * 0.4; f.vy = 0; }   // se pose puis fond
    }
    if (f.t > 3) { scene.remove(f.mesh); fallers.splice(i, 1); }
  }
}

// Le revenu rembourse d'abord la DETTE, le surplus tombe en cash.
function applyRevenue(rev) {
  rev = Math.max(0, rev);
  if (debt > 0) {
    const pay = Math.min(debt, rev);
    const before = debt;
    setDebt(debt - pay); rev -= pay;
    if (before > 0 && debt === 0) setRep(rep + 2);   // recolte remboursee -> confiance du fournisseur
  }
  if (rev > 0) setCash(cash + rev);
}

}

/* -------------------------------------------------------------------------
   12) PHASE 1 — EFFEUILLAGE (prise de recolte a credit + frottage)
   ------------------------------------------------------------------------- */
// Effeuillage au GLISSE (feel green-front-v2) : on passe le doigt sur une cola,
// toute tete croisee (test en pixels ecran) se detache et tombe MELEE dans le
// panier. Pas de timing/skill — geste libre. Le tri par variete vient apres.
const eff = { dragging: false, prev: null, flash: 0 };

function maxDebt() { return 800 + rep * 24 + level * 200; }

// Quantite de branchage brut "achetee" (g). Dans le vrai jeu elle vient du proto
// d'appro (branchage brut -30%) ; ici on la choisit a la main pour TESTER l'affichage.
const QUANTITIES = [250, 500, 750, 1000];
let qtyChoice = +(localStorage.getItem("rc_qty") || 500);
// Parametres derives de la quantite : €/g de gros (gros volume = moins cher),
// nb de varietes presentes, part de feuille.
function qtyParams(g) {
  const wholesale = g >= 1000 ? 1.7 : g >= 750 ? 1.9 : g >= 500 ? 2.1 : 2.4;
  const nbVar = g >= 1000 ? 4 : g >= 500 ? 3 : 2;
  return { wholesale, nbVar, leaf: 0.26 };
}
// Nb de colas affichees ~ 1 pour 85 g (3 / 6 / 9 / 12 pour 250 / 500 / 750 / 1000 g).
function colaCount(g) { return Math.max(2, Math.min(COLA_POOL, Math.round(g / 85))); }

// Compose une nouvelle recolte de `grams` g : varietes + parts. Pas de dette ici
// (on credite seulement au passage au tri) pour pouvoir re-tester l'affichage.
function newHarvest(grams) {
  const p = qtyParams(grams);
  const pool = STR_IDS.slice().sort(() => Math.random() - 0.5).slice(0, p.nbVar);
  const fr = {}; let s = 0;
  for (const id of pool) { const w = 0.5 + Math.random(); fr[id] = w; s += w; }
  for (const id of pool) fr[id] /= s;                  // normalise a 1
  harvest = {
    raw: grams, total: grams,
    wholesale: +(p.wholesale * (1 - rep / 600)).toFixed(2),
    fr, leafFr: p.leaf, varieties: pool, credited: false,
  };
}
// Prepare les colas : on en montre PLUSIEURS (3 a 8 selon la recolte), reparties
// entre les varietes au prorata de la recolte. Plus de branches a effeuiller =
// plus de tetes a faire tomber.
// Calcule la position (x,z) de chaque cola : 1 rangee jusqu'a 7, sinon 2 rangees
// (avant/arriere, decalees) pour un effet "full feuillage" sans trop serrer.
function colaLayout(n) {
  const pos = [];
  if (n <= 7) {
    const span = n <= 1 ? 0 : Math.min(2.8, 0.45 * (n - 1));
    for (let i = 0; i < n; i++) pos.push({ x: n === 1 ? 0 : -span + 2 * span * (i / (n - 1)), z: (i % 2) * 0.16 - 0.08 });
    return { pos, radius: Math.hypot(span + 0.9, 1.15, 0.45), targetZ: 0 };
  }
  const back = Math.ceil(n / 2), front = n - back;
  const spanB = Math.min(3.2, 0.52 * (back - 1)), spanF = Math.min(3.2, 0.52 * (front - 1));
  for (let i = 0; i < back; i++)  pos.push({ x: back === 1 ? 0 : -spanB + 2 * spanB * (i / (back - 1)), z: -0.5 });
  for (let i = 0; i < front; i++) pos.push({ x: (front === 1 ? 0 : -spanF + 2 * spanF * (i / (front - 1))) + 0.26, z: 0.4 });
  return { pos, radius: Math.hypot(Math.max(spanB, spanF) + 1.0, 1.4, 1.0), targetZ: -0.05 };
}
function setupColas() {
  for (const c of colaPool) c.grp.visible = false;
  activeColas = [];
  const vs = harvest.varieties;
  const nCol = colaCount(harvest.total);
  // Sécateur (boutique) : reduit la part de feuille arrachee.
  const leafFr = Math.max(0.04, harvest.leafFr - owned.secateur * 0.02);
  // Nb de colas par variete ~ proportionnel a sa part (au moins 1), ajuste a nCol.
  const counts = {}; let assigned = 0;
  for (const v of vs) { counts[v] = Math.max(1, Math.round(harvest.fr[v] * nCol)); assigned += counts[v]; }
  while (assigned > nCol) { const v = vs.reduce((a, b) => (counts[b] > counts[a] ? b : a), vs[0]); if (counts[v] > 1) { counts[v]--; assigned--; } else break; }
  while (assigned < nCol) { const v = vs.reduce((a, b) => (counts[b] < counts[a] ? b : a), vs[0]); counts[v]++; assigned++; }
  // Liste des varietes, cola par cola (groupees par variete).
  const list = []; for (const v of vs) for (let k = 0; k < counts[v]; k++) list.push(v);
  const layout = colaLayout(list.length);
  list.forEach((v, i) => {
    const c = colaPool[i]; c.grp.visible = true;
    setColaVariety(c, v);
    c.grp.position.x = layout.pos[i].x;
    c.grp.position.z = layout.pos[i].z;
    const per = (harvest.total * harvest.fr[v]) / counts[v] / c.buds.length;
    for (const b of c.buds) { b.on = true; b.mesh.visible = true; b.mass = per; b.leafFrac = leafFr * (0.7 + Math.random() * 0.6); }
    for (const lf of c.leaves) { lf.visible = true; lf.material = matLeafSolid; }
    activeColas.push(c);
  });
  // Adapte le cadrage frontal a la largeur / profondeur des colas.
  VIEWS.eff.radius = layout.radius;
  VIEWS.eff.target.z = layout.targetZ;
  if (phase === "effeuille") fitView();
}
function gotoEffeuille() {
  setPhase("effeuille");
  newHarvest(qtyChoice);
  fresh = { skunk: 0, widow: 0, lemon: 0, purple: 0, leaf: 0 };
  eff.dragging = false; eff.prev = null; eff.flash = 0;
  setupColas();
  refreshBasket(0, harvest.total);
  setQtyUI();
  refreshEffCard();
  setHint("Choisis la quantité de branchage, puis glisse le long des colas pour détacher les têtes.");
}
// Rejoue une recolte a la quantite choisie (boutons 250/500/750/1000) — affichage seul.
function chooseQty(g) {
  qtyChoice = g; localStorage.setItem("rc_qty", String(g));
  newHarvest(g);
  fresh = { skunk: 0, widow: 0, lemon: 0, purple: 0, leaf: 0 };
  setupColas();
  refreshBasket(0, harvest.total);
  setQtyUI();
  refreshEffCard();
}
function setQtyUI() {
  document.querySelectorAll(".qbtn").forEach(b => b.classList.toggle("on", +b.dataset.q === qtyChoice));
}
function freshBud() { return STR_IDS.reduce((s, id) => s + fresh[id], 0); }
function colaBudsLeft() {
  let n = 0;
  for (const c of activeColas) for (const b of c.buds) if (b.on) n++;
  return n;
}
function refreshEffCard() {
  const names = harvest.varieties.map(id => STRAINS[id].emoji + " " + STRAINS[id].name.split(" ")[0]).join(" · ");
  ui.effcard.innerHTML =
    "🌿 Branchage brut : <b>" + harvest.total + " g</b> · " + activeColas.length + " colas · crédit " +
    Math.round(harvest.total * harvest.wholesale) + " €<br>" + names +
    "<br>Panier : <b>" + Math.round(freshBud()) + " g</b> têtes · " + Math.round(fresh.leaf) + " g feuilles";
}
// Détache toute tete croisee par le segment de glisse (a->b en pixels ecran).
function effStripSeg(a, b) {
  if (phase !== "effeuille") return;
  let any = false;
  const _from = new THREE.Vector3();
  for (const c of activeColas) {
    const id = c.variety;
    for (const bd of c.buds) {
      if (!bd.on) continue;
      const s = toScreen(bd.mesh);
      if (s.z > 1) continue;
      if (distSeg(s.x, s.y, a.x, a.y, b.x, b.y) < 38) {
        bd.on = false; bd.mesh.visible = false;
        fresh[id] += bd.mass;
        fresh.leaf += bd.mass * bd.leafFrac;
        bd.mesh.getWorldPosition(_from);
        dropBud(matStrain[id], _from);                 // la tete TOMBE dans le panier
        if (Math.random() < 0.4) flyNugFrom(matLeaf, _from, new THREE.Vector3(_bw.x + 1.3, 0.42, _bw.z), true);
        any = true;
      }
    }
    // Les feuilles deco disparaissent au fil de l'effeuillage de leur cola.
    const left = c.buds.filter(x => x.on).length, vis = Math.ceil(left / c.buds.length * c.leaves.length);
    for (let i = 0; i < c.leaves.length; i++) c.leaves[i].visible = c.grp.visible && i < vis;
  }
  if (any) {
    eff.flash = 0.16; addShake(0.04); playSnip();
    refreshBasket(freshBud() + fresh.leaf, harvest.total);
    refreshEffCard();
    if (colaBudsLeft() === 0 && !harvest._done) {
      harvest._done = true;
      setHint("Colas effeuillées ! Passe au tri par variété ▸");
      showToast("Effeuillage fini 🌿", "#9be37d");
    }
  }
}

/* -------------------------------------------------------------------------
   13) PHASE 2 — TRI PAR VARIETE
   ------------------------------------------------------------------------- */
function gotoTri() {
  // On valide la quantite choisie -> le branchage est pris a credit (une seule fois).
  if (harvest && !harvest.credited) {
    harvest.credited = true;
    setDebt(debt + Math.round(harvest.total * harvest.wholesale));
    showToast("Branchage pris à crédit", "#bdf0a3");
  }
  setPhase("tri");
  triStreak = 0;
  // Effeuillage incomplet : on bascule les tetes encore sur les colas dans le tas frais.
  for (const c of activeColas) {
    for (const b of c.buds) {
      if (b.on) { b.on = false; b.mesh.visible = false; fresh[c.variety] += b.mass; fresh.leaf += b.mass * b.leafFrac; }
    }
  }
  fresh._total = freshBud() + fresh.leaf;
  pickActive();
  refreshTriCard();
  renderTriGrid();
  updateBinsUI();
  setHint("Route chaque poignée vers le bon bac de variété. Erreur = contamination (qualité du bac en baisse). 🍂 = bac déchet.");
}
function freshTotal() { return freshBud() + fresh.leaf; }
// Pioche la prochaine tete active dans le tas frais (ponderee par les g restants).
function pickActive() {
  const total = freshTotal();
  if (total <= 0.5) { active = null; return; }
  let r = Math.random() * total;
  if (r < fresh.leaf) {
    const g = Math.min(fresh.leaf, 8 + Math.random() * 5);
    active = { kind: "leaf", g };
  } else {
    r -= fresh.leaf;
    let chosen = STR_IDS[0];
    for (const id of STR_IDS) { if (r < fresh[id]) { chosen = id; break; } r -= fresh[id]; }
    const g = Math.min(fresh[chosen], 11 + Math.random() * 6);
    active = { kind: chosen, g };
  }
  // Rendu de la tete active (couleur = variete reelle).
  activeNug.material = active.kind === "leaf" ? matLeaf : matStrain[active.kind];
  const sw = active.kind === "leaf" ? "#7e8a4f" : STRAINS[active.kind].tint;
  ui.triswatch.style.background = sw;
  ui.trilbl.textContent = active.kind === "leaf" ? "🍂 Feuille / déchet ?" : "Quelle variété ?";
}
function refreshTriCard() {
  ui.tricard.innerHTML =
    "🌿 Tas frais : <b>" + Math.round(freshTotal()) + " g</b> à trier" +
    (triStreak >= 3 ? " · 🔥 série ×" + triStreak : "") +
    "<br>Bacs — " + STR_IDS.map(id => STRAINS[id].emoji + " " + Math.round(bins[id].g)).join(" · ") +
    " · 🍂 " + Math.round(waste) + " g";
}
// Route la tete active vers un bac (id de variete) ou "waste".
function routeTo(target) {
  if (!active) return;
  const k = active.kind, g = active.g;
  // Retire du tas frais.
  if (k === "leaf") fresh.leaf = Math.max(0, fresh.leaf - g);
  else fresh[k] = Math.max(0, fresh[k] - g);

  const qBase = Math.min(1, 0.9 + Math.min(triStreak, 6) * 0.017);   // serie propre -> petit bonus
  if (target === "waste") {
    waste += g;
    if (k === "leaf") { triStreak++; addXP(1); playGood(); flyNug(matLeaf, 0.85, BIN_POS.waste, true); }
    else { triStreak = 0; setRep(rep - 0.3); playBad(); showToast("Tête jetée 😖", "#ff9f6b"); }   // bonne tete gachee
  } else {
    bins[target].g += g;
    if (k === target) {                                  // bon bac
      bins[target].qs += g * qBase;
      triStreak++; addXP(1); playGood();
      if (triStreak > 0 && triStreak % 5 === 0) addShake(0.1);
      flyNug(matStrain[target], 0.85, BIN_POS[target], true);
    } else if (k === "leaf") {                            // feuille dans une variete
      bins[target].qs += g * (0.12 + owned.loupe * 0.03);
      triStreak = 0; playBad(); showToast("Feuille dans le bac 😕", "#ff9f6b");
      flyNug(matLeaf, 0.85, BIN_POS[target], true);
    } else {                                              // mauvaise variete -> contamination
      bins[target].qs += g * (0.4 + owned.loupe * 0.06);
      triStreak = 0; playBad(); showToast("Contamination ⚠", "#ff6b6b");
      flyNug(matStrain[k], 0.85, BIN_POS[target], true);
    }
  }
  saveBins(); updateBinsUI();
  pickActive(); refreshTriCard(); renderTriGrid();
  if (!active) {
    setHint("Tas trié ! Passe au mélange ▸");
    showToast("Tri terminé 🌿", "#9be37d");
  }
}
function renderTriGrid() {
  ui.trigrid.innerHTML = "";
  const cells = STR_IDS.concat(["waste"]);
  for (const id of cells) {
    const b = document.createElement("button"); b.className = "vbtn"; b.dataset.bin = id;
    const isW = id === "waste";
    b.style.borderColor = isW ? "rgba(202,161,95,.5)" : "rgba(" + STRAINS[id].col.join(",") + ",.85)";
    b.innerHTML = '<div class="ve">' + (isW ? "🍂" : STRAINS[id].emoji) + '</div>' +
      '<div class="vn">' + (isW ? "Déchet" : STRAINS[id].name.split(" ")[0]) + '</div>' +
      '<div class="vg">' + Math.round(isW ? waste : bins[id].g) + " g</div>";
    b.addEventListener("click", () => routeTo(id));
    ui.trigrid.appendChild(b);
  }
}

/* -------------------------------------------------------------------------
   14) PHASE 3 — MIX / DILUTION
   ------------------------------------------------------------------------- */
let dilute = 0;                 // 0..0.4 : part de dechet vegetal ajoutee
const DILUTE_MAX = 0.4;
function gotoMix() {
  setPhase("mix");
  mixSel = {}; mixBlend = false; dilute = 0;
  ui.mixBlend.classList.remove("on");
  // Selection par defaut : la variete la plus fournie.
  let best = null, bg = 0;
  for (const id of STR_IDS) if (bins[id].g > bg) { bg = bins[id].g; best = id; }
  if (best) mixSel[best] = true;
  setBowlByMix();
  setDKnob(); renderMixChips(); refreshMixCard();
  setHint("Choisis une variété (pure) ou active 🧬 Blend pour en mêler plusieurs. Le curseur dilue au déchet (volume +, qualité −).");
}
function selectedIds() { return STR_IDS.filter(id => mixSel[id] && bins[id].g > 0.5); }
// Projette le lot sans rien consommer.
function projectMix() {
  const ids = selectedIds();
  let g = 0, qs = 0;
  for (const id of ids) { g += bins[id].g; qs += bins[id].qs; }
  const qFlower = g > 0.01 ? qs / g : 0;
  // Dilution : ajoute du dechet (plafonne par le stock dispo).
  let add = dilute > 0 ? g * dilute / (1 - dilute) : 0;
  add = Math.min(add, waste);
  const outG = g + add;
  const outQ = outG > 0.01 ? (g * qFlower + add * WASTE_Q) / outG : 0;
  const effDil = outG > 0.01 ? add / outG : 0;
  return { ids, g, qFlower, add, outG, outQ, effDil };
}
function setBowlByMix() {
  const ids = selectedIds();
  setBowlMat(ids.length ? matStrain[ids[0]] : matLeaf);
}
function refreshMixCard() {
  const p = projectMix();
  if (p.g < 1) { ui.mixcard.innerHTML = "Sélectionne au moins une variété triée."; return; }
  const name = p.ids.length > 1 ? "Blend maison (" + p.ids.length + " var.)" : STRAINS[p.ids[0]].name;
  ui.mixcard.innerHTML =
    "⚗️ <b>" + name + "</b><br>" +
    "Fleur " + Math.round(p.g) + " g + Déchet " + Math.round(p.add) + " g ➜ <b>" + Math.round(p.outG) + " g</b><br>" +
    "Qualité <b>" + gradeOf(p.outQ) + "</b> (" + Math.round(p.outQ * 100) + " %)" +
    (p.effDil > 0.25 ? " · <span class=\"q\">⚠ très coupé</span>" : "");
}
function setDKnob() { ui.dknob.style.left = (dilute / DILUTE_MAX * 100) + "%"; }
function renderMixChips() {
  ui.mixchips.innerHTML = "";
  for (const id of STR_IDS) {
    const b = document.createElement("button"); b.className = "chip" + (mixSel[id] ? " on" : "");
    b.disabled = bins[id].g < 0.5;
    b.innerHTML = STRAINS[id].emoji + " " + STRAINS[id].name.split(" ")[0] + " <span style=\"opacity:.7\">" + Math.round(bins[id].g) + "g</span>";
    b.addEventListener("click", () => toggleMix(id));
    ui.mixchips.appendChild(b);
  }
}
function toggleMix(id) {
  if (bins[id].g < 0.5) return;
  if (mixBlend) { mixSel[id] = !mixSel[id]; }
  else { mixSel = {}; mixSel[id] = true; }   // mode pur : une seule variete
  setBowlByMix(); renderMixChips(); refreshMixCard();
}
function setMixBlend(on) {
  mixBlend = on; ui.mixBlend.classList.toggle("on", on);
  if (!on) {                                   // repasse en pur : garde une seule selection
    const ids = selectedIds();
    mixSel = {}; if (ids.length) mixSel[ids[0]] = true;
  }
  renderMixChips(); refreshMixCard();
}
function prepBatch() {
  const p = projectMix();
  if (p.g < 1) { showToast("Rien à mélanger", "#caa15f"); return; }
  // Consomme les bacs selectionnes + le dechet utilise.
  for (const id of p.ids) { bins[id] = { g: 0, qs: 0 }; }
  waste = Math.max(0, waste - p.add);
  const name = p.ids.length > 1 ? "Blend maison" : STRAINS[p.ids[0]].name;
  const strain = p.ids.length > 1 ? "blend" : p.ids[0];
  let q = p.outQ;
  if (owned.hygro && optHygro) q = Math.min(1, q + 0.05);   // curing -> petit bonus applique au pot
  batch = { strain, name, g: p.outG, q };
  saveBins(); updateBinsUI();
  addShake(0.16); playSeal();
  gotoPots();
}

/* -------------------------------------------------------------------------
   15) PHASE 4 — CONDITIONNEMENT EN POTS (etiquetes variete + qualite)
   ------------------------------------------------------------------------- */
const seal = { active: false, fmt: null, cursor: 0, dir: 1 };
function sealSweet() { return 0.1 + owned.sealer * 0.03; }
function qualMult(q) { return 0.6 + q * 0.9; }   // qualite -> multiplicateur de prix

function gotoPots() {
  setPhase("pots");
  ui.optHygro.classList.toggle("on", optHygro);
  renderPotFormats();
  refreshPotCard();
  setHint("Empote ta variété : chaque pot porte son étiquette (variété + qualité). Scelle dans le vert pour un bonus.");
}
function refreshPotCard() {
  ui.potcard.innerHTML =
    "🫙 Lot : <b>" + batch.name + "</b> — " + Math.round(batch.g) + " g<br>" +
    "Étiquette : <b>" + batch.name + " · " + gradeOf(batch.q) + "</b> (" + Math.round(batch.q * 100) + " %)";
  const fill = jar.userData.fill;
  fill.material = batch.strain === "blend" ? matStrain[selectedIds()[0] || "skunk"] : matStrain[batch.strain] || matStrain.skunk;
  const k = Math.max(0.04, Math.min(1, batch.g / 200));
  fill.scale.y = k; fill.position.y = 0.05 + 0.45 * k;
}
function potUnit(f) { return Math.round(f.g * f.eur * qualMult(batch.q) * repMult() * levelMult()); }
function renderPotFormats() {
  ui.potgrid.innerHTML = "";
  for (const f of JARS) {
    const b = document.createElement("button");
    b.className = "fmt"; b.dataset.fmt = f.id;
    b.disabled = !batch || batch.g < f.g;
    b.innerHTML = '<div class="fn">' + f.emoji + " " + f.name + '</div><div class="fp">~' + potUnit(f) + " €</div>";
    b.addEventListener("click", () => startSeal(f.id));
    ui.potgrid.appendChild(b);
  }
}
function startSeal(fid) {
  if (seal.active) return;
  const f = JARS.find(x => x.id === fid);
  if (!batch || batch.g < f.g) { showToast("Pas assez pour ce pot", "#caa15f"); return; }
  if (storage.length >= jarSlots.length) { showToast("Étagère pleine — vends ton stock", "#caa15f"); return; }
  seal.active = true; seal.fmt = f; seal.cursor = 0; seal.dir = 1;
  ui.sealgauge.style.display = "block";
  const sw = sealSweet();
  ui.sealsweet.style.left = (50 - sw * 100) + "%";
  ui.sealsweet.style.width = (sw * 200) + "%";
  setHint("Tape dans le vert pour sceller bien serré (" + f.name + ").");
}
function resolveSeal() {
  if (!seal.active) return;
  const f = seal.fmt; seal.active = false;
  ui.sealgauge.style.display = "none";
  if (!batch || batch.g < f.g) { showToast("Plus assez", "#caa15f"); return; }
  if (storage.length >= jarSlots.length) { showToast("Étagère pleine", "#caa15f"); return; }

  const err = Math.abs(seal.cursor - 0.5);
  const tight = err <= sealSweet() ? 1.12 : err <= sealSweet() * 2.4 ? 1.0 : 0.9;
  batch.g -= f.g;
  let price = f.g * f.eur * qualMult(batch.q) * repMult() * levelMult() * tight;
  if (optHygro && owned.hygro) price *= 1.08;        // hygro : fraicheur -> +valeur
  // Pot SCELLE -> stockage (vendu en phase Stock).
  storage.push({ strain: batch.strain, name: batch.name, grade: gradeOf(batch.q), q: batch.q, g: f.g, price: Math.round(price) });
  saveStorage();
  showPotJuice();
  showToast("Pot " + f.name + " · " + batch.name, STRAINS[batch.strain] ? STRAINS[batch.strain].lbl : "#bdf0a3");
  renderPotFormats(); refreshPotCard();
  if (batch.g < JARS[0].g) { setHint("Lot empoté. Termine pour stocker ▸"); }
}
function showPotJuice() { playSeal(); addShake(0.1); }

/* -------------------------------------------------------------------------
   16) PHASE 5 — STOCKAGE / VENTE
   ------------------------------------------------------------------------- */
function binsLeft() { return STR_IDS.some(id => bins[id].g > 0.5); }
function gotoStock() {
  setPhase("stock");
  refreshShelf();
  refreshStockCard();
  setHint("Tes pots sont en stock. Vends pour rembourser la dette puis encaisser, ou repars sur une récolte.");
}
function stockValue() { return storage.reduce((s, j) => s + j.price, 0); }
function refreshStockCard() {
  if (!storage.length) {
    ui.stockcard.innerHTML = "Étagère vide. Lance une nouvelle récolte ▸";
    return;
  }
  // Regroupe par etiquette (variete + grade).
  const groups = {};
  for (const j of storage) { const k = j.name + " · " + j.grade; (groups[k] = groups[k] || { n: 0, g: 0 }); groups[k].n++; groups[k].g += j.g; }
  const lines = Object.entries(groups).map(([k, v]) => "• <b>" + k + "</b> ×" + v.n + " (" + Math.round(v.g) + " g)").join("<br>");
  ui.stockcard.innerHTML = "📦 Stock : <b>" + storage.length + " pots</b> · valeur ≈ <b>" + stockValue() + " €</b><br>" + lines;
}
function sellStock() {
  if (!storage.length) { showToast("Rien à vendre", "#caa15f"); return; }
  const total = stockValue();
  // Reputation : qualite moyenne vendue (et curing).
  let qSum = 0, gSum = 0;
  for (const j of storage) { qSum += j.q * j.g; gSum += j.g; }
  const avgQ = gSum > 0 ? qSum / gSum : 0;
  applyRevenue(total);
  addXP(Math.max(2, Math.round(total * 0.04)));
  const dRep = (avgQ - 0.55) * 14 + (optHygro && owned.hygro ? 1 : 0);
  setRep(rep + dRep);
  if (avgQ < 0.42) showToast("Clients déçus 😠", "#ff6b6b");
  else showToast("+" + total + " € · stock écoulé", "#9be37d");
  playSale(); addShake(0.2);
  storage = []; saveStorage(); refreshShelf(); refreshStockCard();
}

/* -------------------------------------------------------------------------
   17) AUTO-TRIEUSE (tri passif idle) — employe achetable
   ------------------------------------------------------------------------- */
let autoSortTimer = 0;
function updateAutoSort(dt) {
  if (!owned.autosort || phase !== "tri" || !active) return;
  autoSortTimer += dt;
  if (autoSortTimer >= 2.2) {
    autoSortTimer = 0;
    // Trie une poignee correctement toute seule (qualite correcte, pas parfaite).
    const k = active.kind, g = active.g;
    if (k === "leaf") { fresh.leaf = Math.max(0, fresh.leaf - g); waste += g; }
    else { fresh[k] = Math.max(0, fresh[k] - g); bins[k].g += g; bins[k].qs += g * 0.82; }
    saveBins(); updateBinsUI();
    pickActive(); refreshTriCard(); renderTriGrid();
    if (!active) { setHint("Tas trié ! Passe au mélange ▸"); }
  }
}

/* -------------------------------------------------------------------------
   18) BOUTIQUE (data-driven)
   ------------------------------------------------------------------------- */
const SHOP = [
  { id: "secateur", icon: "✂️", name: "Sécateur pro",
    desc: () => "Moins de feuille/déchet à l'effeuillage (+" + ((owned.secateur + 1) * 1.5).toFixed(1) + "%).",
    cost: () => Math.round(280 * Math.pow(1.6, owned.secateur)),
    can: () => owned.secateur < 5, maxed: () => owned.secateur >= 5,
    buy: () => { owned.secateur++; } },
  { id: "loupe", icon: "🔬", name: "Loupe / lampe UV",
    desc: () => "Une erreur de tri contamine moins (+" + ((owned.loupe + 1) * 6) + "% rattrapé).",
    cost: () => Math.round(340 * Math.pow(1.6, owned.loupe)),
    can: () => owned.loupe < 5, maxed: () => owned.loupe >= 5,
    buy: () => { owned.loupe++; } },
  { id: "hygro", icon: "💧", name: "Pochons hygro (curing)",
    desc: () => "Débloque l'option Hygro : +qualité au pot, +réput.",
    cost: () => 600, can: () => owned.hygro < 1, maxed: () => owned.hygro >= 1,
    buy: () => { owned.hygro = 1; } },
  { id: "sealer", icon: "🛡️", name: "Scelleuse à pots",
    desc: () => "Élargit la zone verte de scellage.",
    cost: () => Math.round(500 * Math.pow(1.7, owned.sealer)),
    can: () => owned.sealer < 4, maxed: () => owned.sealer >= 4,
    buy: () => { owned.sealer++; } },
  { id: "network", icon: "📇", name: "Réseau revendeurs",
    desc: () => "+4 % prix de vente par niveau.",
    cost: () => Math.round(700 * Math.pow(1.6, owned.network)),
    can: () => owned.network < 6, maxed: () => owned.network >= 6,
    buy: () => { owned.network++; } },
  { id: "autosort", icon: "🤖", name: "Auto-trieuse",
    desc: () => "Trie le tas frais toute seule, en fond.",
    cost: () => 2600, can: () => owned.autosort < 1, maxed: () => owned.autosort >= 1,
    buy: () => { owned.autosort = 1; } },
];
function renderShop() {
  ui.shopcash.textContent = "💶 " + cash + " €";
  ui.shopitems.innerHTML = "";
  for (const it of SHOP) {
    const cost = it.cost(), maxed = it.maxed(), can = !maxed && it.can() && cash >= cost;
    const row = document.createElement("div"); row.className = "shopitem";
    row.innerHTML = '<div class="ic">' + it.icon + '</div><div class="info"><div class="nm">' +
      it.name + '</div><div class="ds">' + it.desc() + '</div></div>';
    const b = document.createElement("button");
    b.textContent = maxed ? "✓" : (cost + " €");
    b.disabled = !can;
    b.addEventListener("click", () => buyItem(it));
    row.appendChild(b);
    ui.shopitems.appendChild(row);
  }
}
function buyItem(it) {
  const cost = it.cost();
  if (it.maxed() || !it.can() || cash < cost) return;
  setCash(cash - cost); it.buy(); saveShop();
  const ac = ensureAudio(); if (ac) { const t = ac.currentTime; beep(660, t, 0.1, 0.2); beep(990, t + 0.07, 0.14, 0.2); }
  renderShop();
  if (phase === "pots") { renderPotFormats(); refreshPotCard(); }
}

/* -------------------------------------------------------------------------
   19) ENTREES (pointer) : tap selon la phase + pinch zoom
   ------------------------------------------------------------------------- */
const el = renderer.domElement;
const pointers = new Map();
let pinching = false, pinchStartDist = 0, pinchStartZoom = 1;
function pinchDist() { const a = [...pointers.values()]; return Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y); }

// Curseur de dilution (slider).
let sliderDrag = false;
function setDiluteFromX(clientX) {
  const r = ui.dtrack.getBoundingClientRect();
  dilute = Math.max(0, Math.min(DILUTE_MAX, ((clientX - r.left) / r.width) * DILUTE_MAX));
  setDKnob(); refreshMixCard();
}
ui.dtrack.addEventListener("pointerdown", (e) => { e.stopPropagation(); sliderDrag = true; setDiluteFromX(e.clientX); });
window.addEventListener("pointermove", (e) => { if (sliderDrag) setDiluteFromX(e.clientX); });
window.addEventListener("pointerup", () => { sliderDrag = false; });

el.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size >= 2) { pinching = true; pinchStartDist = pinchDist() || 1; pinchStartZoom = zoom; return; }
  ensureAudio();
  if (phase === "effeuille") {
    eff.dragging = true;
    eff.prev = { x: e.clientX, y: e.clientY };
    effStripSeg(eff.prev, eff.prev);             // un simple tap detache la tete touchee
  } else if (phase === "pots") { if (seal.active) resolveSeal(); }
}, { passive: false });

el.addEventListener("pointermove", (e) => {
  if (pointers.has(e.pointerId)) pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pinching && pointers.size >= 2) {
    e.preventDefault();
    zoom = Math.max(0.6, Math.min(2.4, pinchStartZoom * (pinchDist() / pinchStartDist)));
    localStorage.setItem("rc_zoom", zoom.toFixed(3));
    fitView();
  } else if (phase === "effeuille" && eff.dragging && eff.prev && pointers.size < 2) {
    // Effeuillage au glisse : on detache toute tete croisee par le segment.
    e.preventDefault();
    const cur = { x: e.clientX, y: e.clientY };
    effStripSeg(eff.prev, cur);
    eff.prev = cur;
  }
}, { passive: false });
function onUp(e) {
  pointers.delete(e.pointerId);
  if (pinching && pointers.size < 2) pinching = false;
  if (pointers.size === 0) { eff.dragging = false; eff.prev = null; }
}
el.addEventListener("pointerup", onUp, { passive: false });
el.addEventListener("pointercancel", onUp, { passive: false });

// Boutons des overlays.
ui.effNext.addEventListener("click", () => { gotoTri(); });   // le restant non effeuillé bascule dans le tas frais
document.querySelectorAll(".qbtn").forEach(b => b.addEventListener("click", () => chooseQty(+b.dataset.q)));
ui.triNext.addEventListener("click", () => {
  if (STR_IDS.every(id => bins[id].g < 1)) { showToast("Trie d'abord de la fleur", "#caa15f"); return; }
  // Restant non trie -> dechet.
  if (active || freshTotal() > 0.5) { waste += freshTotal(); fresh = { skunk: 0, widow: 0, lemon: 0, purple: 0, leaf: 0 }; active = null; saveBins(); updateBinsUI(); }
  gotoMix();
});
ui.mixBlend.addEventListener("click", () => setMixBlend(!mixBlend));
ui.mixPrep.addEventListener("click", prepBatch);
ui.optHygro.addEventListener("click", () => {
  if (!owned.hygro) { showToast("Achète les pochons hygro 🛒", "#caa15f"); return; }
  optHygro = !optHygro; ui.optHygro.classList.toggle("on", optHygro);
});
ui.potDone.addEventListener("click", () => {
  if (binsLeft()) { showToast("Reste des variétés à empoter", "#caa15f"); gotoMix(); }
  else gotoStock();
});
ui.stockSell.addEventListener("click", sellStock);
ui.stockNew.addEventListener("click", () => {
  if (debt > maxDebt() * 0.98) { showToast("Paie ta dette avant une nouvelle récolte", "#ff6b6b"); return; }
  gotoEffeuille();
});
document.getElementById("shopbtn").addEventListener("click", () => { renderShop(); ui.shop.classList.add("show"); });
document.getElementById("shopclose").addEventListener("click", () => ui.shop.classList.remove("show"));
ui.shop.addEventListener("click", (e) => { if (e.target === ui.shop) ui.shop.classList.remove("show"); });

/* -------------------------------------------------------------------------
   20) BOUCLE PRINCIPALE
   ------------------------------------------------------------------------- */
function updateGauges(dt) {
  if (phase === "effeuille") {
    if (ui.effswipe) ui.effswipe.style.color = "rgba(173,224,140," + (0.6 + eff.flash * 2).toFixed(2) + ")";
  }
  if (phase === "pots" && seal.active) {
    seal.cursor += seal.dir * (1.25 - owned.sealer * 0.08) * dt;
    if (seal.cursor >= 1) { seal.cursor = 1; seal.dir = -1; }
    if (seal.cursor <= 0) { seal.cursor = 0; seal.dir = 1; }
    ui.sealcursor.style.left = (seal.cursor * 100) + "%";
  }
}

let last = 0;
function loop(t) {
  const dt = Math.min((t - last) / 1000 || 0, 0.05);
  last = t;

  // Colas qui se balancent doucement au fil de sechage.
  if (phase === "effeuille") {
    for (const c of activeColas) {
      c.grp.rotation.z = Math.sin(t * 0.0011 + c.grp.position.x) * 0.045;
    }
    if (eff.flash > 0) eff.flash = Math.max(0, eff.flash - dt);
  }
  // Tete active qui flotte + tourne pendant le tri.
  if (phase === "tri" && active) {
    activeNug.position.y = 0.85 + Math.sin(t * 0.004) * 0.05;
    activeNug.rotation.y += dt * 1.2;
  }
  if (phase === "mix") bowlFill.rotation.y += dt * 0.8;
  if (phase === "pots") jar.rotation.y += dt * 0.4;

  updateGauges(dt);
  updateFlyers(dt);
  updateFallers(dt);
  updateAutoSort(dt);

  if (shake > 0) { shake *= Math.pow(0.0009, dt); if (shake < 0.002) shake = 0; }
  camera.position.copy(baseCamPos);
  if (shake > 0) {
    camera.position.x += (Math.random() - 0.5) * shake;
    camera.position.y += (Math.random() - 0.5) * shake;
    camera.position.z += (Math.random() - 0.5) * shake;
  }
  camera.lookAt(VIEW_TARGET);

  // Etiquettes des bacs (visibles seulement quand les bacs le sont : tri / coupe).
  const showBins = (phase === "tri" || phase === "mix");
  for (const id of STR_IDS) { binLabels[id].style.display = showBins ? "block" : "none"; if (showBins) placeLabel(binLabels[id], BIN_POS[id], 0.6); }
  binLabels.waste.style.display = showBins ? "block" : "none"; if (showBins) placeLabel(binLabels.waste, BIN_POS.waste, 0.6);

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

/* -------------------------------------------------------------------------
   21) INIT
   ------------------------------------------------------------------------- */
resize();
setCash(cash); setDebt(debt); setRep(rep); updateXpUI();
updateBinsUI();
// On reprend a l'effeuillage (bins/storage/dette conserves).
gotoEffeuille();
requestAnimationFrame(loop);
</script>
</body>
