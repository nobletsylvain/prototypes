<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>La Loupe — hash 3D</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  :root{
    --bg:#120e0a; --card:#261e16; --line:rgba(255,220,160,.14);
    --muted:rgba(255,236,210,.55); --cash:#9be37d; --dirty:#e8c96a;
    --heat:#ff8a6a; --accent:#ffb454; --ok:#7ddea0; --bad:#ff7a7a;
  }
  html,body{width:100%;height:100%;overflow:hidden;font-family:"Segoe UI",system-ui,sans-serif;color:#f4ebe0;
    background:#0c0907}
  #phone{position:fixed;inset:0;max-width:440px;margin:0 auto;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#1a1410,#100c09);border-left:1px solid var(--line);border-right:1px solid var(--line)}
  #top{padding:max(10px,env(safe-area-inset-top)) 14px 8px;display:grid;gap:6px;background:rgba(0,0,0,.55);
    border-bottom:1px solid var(--line);z-index:20}
  .row{display:flex;gap:8px;align-items:center;justify-content:space-between}
  .pill{font-size:12px;font-weight:800;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.06);
    border:1px solid var(--line);white-space:nowrap}
  .pill.cash{color:var(--cash)}.pill.dirty{color:var(--dirty)}.pill.heat{color:var(--heat)}.pill.rep{color:#9ec9ff}
  #toast{position:fixed;left:50%;top:22%;transform:translate(-50%,8px);opacity:0;transition:.2s;z-index:60;
    background:rgba(0,0,0,.78);border:1px solid var(--line);padding:10px 14px;border-radius:14px;font-weight:800;
    text-align:center;max-width:86%;pointer-events:none}
  #toast.show{opacity:1;transform:translate(-50%,0)}
  #main{flex:1;position:relative;min-height:0;display:flex;flex-direction:column}
  #stage{flex:1;overflow:auto;padding:12px; -webkit-overflow-scrolling:touch;z-index:2}
  #stage.behind{visibility:hidden;pointer-events:none;position:absolute;inset:0}
  #view3d{display:none;position:absolute;inset:0;z-index:3;touch-action:none;background:#14101b}
  #view3d.on{display:block}
  #view3d canvas{width:100%!important;height:100%!important;display:block;touch-action:none}
  #hud3d{position:absolute;inset:0;z-index:4;pointer-events:none}
  #hint3d{position:absolute;left:0;right:0;bottom:max(72px,env(safe-area-inset-bottom) + 58px);
    text-align:center;font-size:12px;font-weight:700;color:rgba(255,255,255,.55);text-shadow:0 2px 8px #000;padding:0 12px}
  #presslbl,#wraptext{position:absolute;left:50%;transform:translateX(-50%);
    bottom:max(118px,env(safe-area-inset-bottom) + 104px);font-size:13px;font-weight:800;color:#fff;
    text-shadow:0 2px 8px #000;display:none;white-space:nowrap}
  #presslbl.show,#wraptext.show{display:block}
  #pressbar,#wrapbar{position:absolute;left:50%;transform:translateX(-50%);width:66%;max-width:300px;height:18px;
    bottom:max(92px,env(safe-area-inset-bottom) + 78px);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
    border-radius:999px;overflow:hidden;display:none}
  #pressbar.show,#wrapbar.show{display:block}
  #pressfill{height:100%;width:0;background:linear-gradient(90deg,#ff9f6b,#ff5e1a)}
  #wrapfill{height:100%;width:0;background:linear-gradient(90deg,#7df9ff,#9be37d)}
  #seal{position:absolute;left:50%;transform:translateX(-50%);bottom:max(88px,env(safe-area-inset-bottom) + 74px);
    display:none;pointer-events:auto;background:#ff7a3c;border:none;color:#fff;font-weight:800;font-size:16px;
    padding:12px 24px;border-radius:14px;z-index:5}
  #seal.show{display:block}
  #buyOverlay{position:absolute;left:10px;right:10px;bottom:max(70px,env(safe-area-inset-bottom)+56px);
    z-index:5;pointer-events:auto;display:none;max-height:42%;overflow:auto}
  #buyOverlay.on{display:block}
  #dock{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;padding:8px 8px max(10px,env(safe-area-inset-bottom));
    background:rgba(0,0,0,.55);border-top:1px solid var(--line);z-index:20}
  .tab{appearance:none;border:0;background:transparent;color:var(--muted);font-size:10px;font-weight:700;
    padding:8px 2px;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:3px}
  .tab .ic{font-size:18px;line-height:1}.tab.on{color:#fff;background:rgba(255,180,84,.16)}
  h2{font-size:18px;font-weight:900;margin-bottom:4px}
  .sub{color:var(--muted);font-size:12.5px;line-height:1.35;margin-bottom:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:10px}
  .card h3{font-size:14px;font-weight:800;margin-bottom:4px}
  .muted{color:var(--muted);font-size:12px;line-height:1.35}
  .btn{appearance:none;border:1px solid rgba(255,180,84,.45);background:linear-gradient(180deg,#3a2a16,#24180e);
    color:#ffe4b5;font-weight:800;font-size:13px;padding:11px 12px;border-radius:12px;width:100%;margin-top:8px}
  .btn:active{transform:scale(.98)}.btn:disabled{opacity:.4}
  .btn.ok{border-color:rgba(125,222,160,.45);background:linear-gradient(180deg,#1f3324,#132018);color:#c8f5d6}
  .btn.ghost{background:rgba(255,255,255,.04);border-color:var(--line);color:#f0e2cf}
  .btn.bad{border-color:rgba(255,122,122,.45);background:linear-gradient(180deg,#3a1818,#241010);color:#ffd0d0}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .seg{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
  .chip{padding:7px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);
    font-size:12px;font-weight:800;color:var(--muted)}.chip.on{color:#fff;border-color:rgba(255,180,84,.55);
    background:rgba(255,180,84,.16)}
  .stat{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px dashed rgba(255,255,255,.06);gap:8px}
  .stat b{font-weight:800;text-align:right}
  .bar{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin:8px 0 4px}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#7ddea0,#ffb454)}
  .list{display:flex;flex-direction:column;gap:8px}
  .msg{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;padding:10px}
  .msg .who{font-weight:900;font-size:13px}.msg .txt{color:var(--muted);font-size:12.5px;margin:4px 0 8px;line-height:1.35}
  .bills{display:flex;flex-wrap:wrap;gap:8px;min-height:70px;padding:8px;border-radius:14px;border:1px dashed var(--line);
    background:rgba(0,0,0,.2);margin-top:8px}
  .bill{padding:10px 12px;border-radius:10px;font-weight:900;font-size:13px;border:1px solid rgba(255,255,255,.18);
    background:linear-gradient(160deg,#2f5d3a,#1a3322);color:#d7ffdf}
  .bill.n20{background:linear-gradient(160deg,#3a4f7a,#1d2944)}.bill.n50{background:linear-gradient(160deg,#7a4f2f,#3a2414)}
  .bill.n100{background:linear-gradient(160deg,#5a3a6a,#2a1833)}.bill.n5{background:linear-gradient(160deg,#6a6a2f,#333318)}
  .bundle{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin-top:6px;
    border-radius:12px;border:1px solid rgba(125,222,160,.35);background:rgba(125,222,160,.08);font-size:12px;font-weight:800}
  .lock{opacity:.55;filter:grayscale(.35)}
  .tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:999px;border:1px solid var(--line);
    color:var(--accent);margin-left:6px}
  .cause{font-size:11px;color:rgba(255,220,160,.45);margin-top:6px;font-style:italic}
  .journal .item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px}
  .journal .item .c{color:rgba(255,220,160,.4);font-size:11px;margin-top:2px}
  .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .home-tile{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 12px;text-align:left}
  .home-tile .ic{font-size:22px}.home-tile .nm{font-weight:900;margin-top:6px;font-size:13px}
  .home-tile .ds{color:var(--muted);font-size:11px;margin-top:2px;line-height:1.3}
  .tier{font-size:11px;font-weight:800;color:var(--accent)}
  #fmtBar{position:absolute;top:10px;left:10px;right:10px;z-index:5;pointer-events:auto;display:none}
  #fmtBar.on{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  #fmtBar .chip{background:rgba(0,0,0,.55)}
</style>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body>
<div id="phone">
  <div id="top">
    <div class="row">
      <div class="pill">La Loupe 3D</div>
      <div class="pill" id="daypill">J1 · T0</div>
    </div>
    <div class="row">
      <div class="pill cash" id="hudCash">propre 0</div>
      <div class="pill dirty" id="hudDirty">liquide 0</div>
      <div class="pill heat" id="hudHeat">chaleur 0</div>
      <div class="pill rep" id="hudRep">standing 20</div>
    </div>
  </div>
  <div id="main">
    <div id="stage"></div>
    <div id="view3d">
      <div id="hud3d">
        <div id="hint3d"></div>
        <div id="presslbl">Maintiens pour couper</div>
        <div id="pressbar"><div id="pressfill"></div></div>
        <div id="wraptext">Glisse ⬆️ pour enrouler</div>
        <div id="wrapbar"><div id="wrapfill"></div></div>
        <button id="seal">🔥 Sceller</button>
        <div id="fmtBar"></div>
        <div id="buyOverlay" class="card"></div>
      </div>
    </div>
  </div>
  <div id="dock"></div>
</div>
<div id="toast"></div>

<script type="module">
import * as scene3d from "./scene3d.mjs";

const SAVE_VERSION = "3";
const LS_PREFIX = "loupe_";
const START_CASH = 220;
const START_REPUT = 20;
const PAIN_100 = { g: 100, price: 200, q: 52, label: "Pain 100", tip: "semi-gros" };
const PAIN_250 = { g: 250, price: 1700, q: 78, label: "Pain 250", tip: "gros · standing 40", reputGate: 40 };
const PAIN_500 = { g: 500, price: 3200, q: 70, label: "Lot 500", tip: "scale · standing 65", reputGate: 65 };
const DOSE_PRICE = { 2: 9.5, 5: 8.0, 8: 7.0 };
const WASTE_PRICE = 2.5;
const LIVREUR_FEE = 8;
const LIVREUR_TIME_S = 14;
const SEUIL_DISCRET_G = 52;
const HEAT_EXPO = 3;
const HEAT_BUST = 15;
const HEAT_CAP = 100;
const PLANQUE_CAP_BASE = 250;
const DIRTY_HOLD_SOFT = 180;
const DIRTY_HOLD_HARD = 450;
const BUNDLE_SIZE = 5;
const COUNTER_RATE = 40;
const UPG_GUIDE = { cost: 180, max: 2, title: "Gabarit", desc: "(réservé — coupe 3D = maintien)" };
const UPG_SCOOTER = { cost: 350, max: 3, title: "Scooter", desc: "+1 livreur" };
const UPG_PLANQUE = { cost: 400, max: 3, title: "Planque", desc: "+120 g" };
const UPG_COUNTER = { cost: 600, max: 1, title: "Compteur", desc: "liquide → propre auto" };
const UPG_BATCH = { cost: 280, max: 2, title: "Cadence", desc: "(UI) — le 3D reste au feeling" };

const CLIENTS = [
  { id: "karim", name: "Karim", vibe: "J'ai dix minutes. Tu livres ou j'appelle ailleurs." },
  { id: "ines", name: "Inès", vibe: "Du clean. Si c'est du pneu, je te ghost." },
  { id: "momo", name: "Momo", vibe: "Toujours le même créneau. Toujours pressé." },
  { id: "sofia", name: "Sofia", vibe: "Pas de surprise. J'achète la qualité, pas ton histoire." },
  { id: "yaz", name: "Yaz", vibe: "Je suis en bas. Tu bouges ou je m'en vais." },
  { id: "lina", name: "Lina", vibe: "Un sachet. Propre. Sans roman." },
  { id: "paul", name: "Paul", vibe: "Discret. Facture mentale payée cash." },
  { id: "nora", name: "Nora", vibe: "J'en prends trois si t'as le stock. Sinon une." },
];
const TABS = [
  { id: "home", ic: "⌂", lb: "Home" },
  { id: "buy", ic: "◎", lb: "Appro" },
  { id: "cut", ic: "✂", lb: "Coupe" },
  { id: "dose", ic: "⚖", lb: "Dose" },
  { id: "sell", ic: "✉", lb: "Vente" },
  { id: "run", ic: "🛵", lb: "Livreur" },
];

const store = {
  get: (k) => localStorage.getItem(LS_PREFIX + k),
  set: (k, v) => localStorage.setItem(LS_PREFIX + k, v),
};
function money(n) { return String(Math.round(n)); }
function defaultState() {
  return {
    cash: START_CASH, dirty: 0, heat: 0, reput: START_REPUT, day: 1, clock: 0,
    painG: 0, painQ: 0, barG: 0, barQ: 60, wasteG: 0,
    sachets: { 2: 0, 5: 0, 8: 0 }, sachetQ: 60,
    orders: [], runs: [], bills: [],
    bundles: { 5: 0, 20: 0, 50: 0, 100: 0 },
    upgrades: { guide: 0, scooter: 0, planque: 0, counter: 0, batch: 0 },
    journal: [], orderSeq: 1, soldDay: 0, doseFormat: 5,
    weedUnlocked: false, _lastSpawnSlot: -1, _dirtyAcc: 0, _pile: { 5: 0, 20: 0, 50: 0, 100: 0 },
  };
}

let S = defaultState();
if (store.get("ver") !== SAVE_VERSION) {
  Object.keys(localStorage).filter((k) => k.startsWith(LS_PREFIX)).forEach((k) => localStorage.removeItem(k));
  store.set("ver", SAVE_VERSION);
}
try {
  const raw = store.get("save");
  if (raw) S = { ...defaultState(), ...JSON.parse(raw) };
  if (!S.bundles) S.bundles = { 5: 0, 20: 0, 50: 0, 100: 0 };
  if (!S._pile) S._pile = { 5: 0, 20: 0, 50: 0, 100: 0 };
} catch {}

let tab = "home";
let toastT = 0;
const stage = document.getElementById("stage");
const dock = document.getElementById("dock");
const toastEl = document.getElementById("toast");
const view3d = document.getElementById("view3d");
const buyOverlay = document.getElementById("buyOverlay");
const fmtBar = document.getElementById("fmtBar");

function save() { store.set("save", JSON.stringify(S)); }
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(() => toastEl.classList.remove("show"), 1700);
}
function cause(txt, why) {
  S.journal.unshift({ t: Date.now(), txt, cause: why });
  if (S.journal.length > 40) S.journal.length = 40;
}
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function planqueCap() { return PLANQUE_CAP_BASE + S.upgrades.planque * 120; }
function livreurCount() { return 1 + S.upgrades.scooter; }
function finiG() {
  return S.barG + Object.entries(S.sachets).reduce((a, [f, n]) => a + n * +f, 0);
}
function avgMerge(oldG, oldQ, addG, addQ) {
  const t = oldG + addG;
  if (t <= 0) return 0;
  return (oldG * oldQ + addG * addQ) / t;
}
function tier() {
  if (S.reput >= 65 || S.soldDay >= 80 || S.upgrades.scooter >= 2) return 3;
  if (S.reput >= 40 || S.soldDay >= 35 || S.upgrades.batch >= 1) return 2;
  if (S.reput >= 25 || S.soldDay >= 12) return 1;
  return 0;
}
function tierLabel(t) {
  return ["Coin de table", "Petite cadence", "Machine à tourner", "Quasi-four"][t] || "—";
}
function maxOpenOrders() { return 2 + tier(); }
function spawnInterval() { return Math.max(5, 10 - tier() * 1.5); }
function fmtSachets() { return [2, 5, 8].map((f) => `${S.sachets[f]}×${f}g`).join(" · "); }

function hud() {
  document.getElementById("hudCash").textContent = `propre ${money(S.cash)}`;
  document.getElementById("hudDirty").textContent = `liquide ${money(S.dirty)}`;
  document.getElementById("hudHeat").textContent = `chaleur ${Math.round(S.heat)}`;
  document.getElementById("hudRep").textContent = `standing ${Math.round(S.reput)}`;
  document.getElementById("daypill").textContent = `J${S.day} · T${tier()}`;
}

function renderDock() {
  dock.innerHTML = TABS.map((t) =>
    `<button class="tab ${tab === t.id ? "on" : ""}" data-t="${t.id}"><span class="ic">${t.ic}</span>${t.lb}</button>`
  ).join("");
  dock.querySelectorAll(".tab").forEach((b) => { b.onclick = () => { tab = b.dataset.t; render(); }; });
}

function set3d(mode) {
  const on = mode !== "hidden";
  view3d.classList.toggle("on", on);
  stage.classList.toggle("behind", on);
  buyOverlay.classList.toggle("on", mode === "buy");
  fmtBar.classList.toggle("on", mode === "cond" || mode === "dose");
  scene3d.setMode(mode === "dose" ? "cond" : mode);
  if (mode === "dose" || mode === "cond") renderFmtBar();
  if (mode === "buy") renderBuyOverlay();
  scene3d.resize();
}

function renderFmtBar() {
  fmtBar.innerHTML = [2, 5, 8].map((x) =>
    `<button class="chip ${S.doseFormat === x ? "on" : ""}" data-f="${x}">${x} g · ${DOSE_PRICE[x]}/g</button>`
  ).join("");
  fmtBar.querySelectorAll("[data-f]").forEach((b) => {
    b.onclick = (e) => { e.stopPropagation(); S.doseFormat = +b.dataset.f; renderFmtBar(); save(); };
  });
}

scene3d.mount(view3d, {
  pressbar: document.getElementById("pressbar"),
  pressfill: document.getElementById("pressfill"),
  presslbl: document.getElementById("presslbl"),
  wrapbar: document.getElementById("wrapbar"),
  wrapfill: document.getElementById("wrapfill"),
  wraptext: document.getElementById("wraptext"),
  seal: document.getElementById("seal"),
  hint: document.getElementById("hint3d"),
}, {
  getPainG: () => S.painG,
  getBarG: () => S.barG,
  getDoseFormat: () => S.doseFormat,
  getSachetCount: () => Object.values(S.sachets).reduce((a, n) => a + n, 0),
  toast,
  onCut: (g) => {
    const take = Math.min(S.painG, g);
    S.painG -= take;
    S.barQ = avgMerge(S.barG, S.barQ, take, S.painQ || 60);
    S.barG += take;
    cause(`Coupe 3D ${take.toFixed(1)} g`, `Maintien lame · barrettes +${take.toFixed(1)} g`);
    save(); hud();
  },
  onTakeBar: (fmt) => {
    S.barG -= fmt;
    save(); hud();
  },
  onReturnBar: (fmt) => {
    S.barG += fmt;
    save(); hud();
  },
  onPack: (fmt) => {
    const stockG = Object.entries(S.sachets).reduce((a, [ff, nn]) => a + nn * +ff, 0);
    S.sachetQ = avgMerge(stockG, S.sachetQ, fmt, S.barQ);
    S.sachets[fmt]++;
    cause(`Sachet ${fmt} g scellé`, `Emballage 3D · stock retail +1`);
    save(); hud();
  },
});
window.addEventListener("resize", () => scene3d.resize());

function render() {
  hud();
  renderDock();
  if (tab === "cut") { set3d("cut"); stage.innerHTML = ""; return; }
  if (tab === "dose") { set3d("dose"); stage.innerHTML = ""; return; }
  if (tab === "buy") { set3d("buy"); stage.innerHTML = ""; return; }
  set3d("hidden");
  if (tab === "home") renderHome();
  else if (tab === "sell") renderSell();
  else if (tab === "run") renderRun();
}

function renderBuyOverlay() {
  const items = [PAIN_100, PAIN_250];
  if (tier() >= 2) items.push(PAIN_500);
  buyOverlay.innerHTML = `
    <h3 style="margin:0 0 6px">Appro hash · 3D</h3>
    <div class="muted" style="margin-bottom:8px">Cash propre seulement. Le liquide ne paie pas ici.</div>
    ${items.map((p) => {
      const locked = p.reputGate && S.reput < p.reputGate;
      return `<div class="stat"><span>${p.label}<br><span class="muted">${p.tip} · q${p.q}</span></span>
        <button class="btn ghost" style="width:auto;margin:0;padding:8px 10px" data-buy="${p.g}" ${locked || S.cash < p.price ? "disabled" : ""}>
          ${locked ? "Standing" : money(p.price)}
        </button></div>`;
    }).join("")}
    <div class="stat"><span>Pain / bar / sachets</span><b>${S.painG.toFixed(0)} · ${S.barG.toFixed(0)} · ${fmtSachets()}</b></div>
  `;
  buyOverlay.querySelectorAll("[data-buy]").forEach((b) => {
    b.onclick = () => {
      const g = +b.dataset.buy;
      buyPain([PAIN_100, PAIN_250, PAIN_500].find((p) => p.g === g));
      renderBuyOverlay();
      scene3d.syncFromState();
    };
  });
}

function buyPain(p) {
  if (!p) return;
  if (p.reputGate && S.reput < p.reputGate) { toast("Standing insuffisant."); return; }
  if (S.cash < p.price) { toast("Propre insuffisant."); return; }
  if (finiG() + S.painG + p.g > planqueCap()) { toast("Planque pleine."); return; }
  S.cash -= p.price;
  S.painQ = avgMerge(S.painG, S.painQ, p.g, p.q);
  S.painG += p.g;
  cause(`Achat ${p.label}`, `−${money(p.price)} propre · +${p.g} g`);
  toast("Pain reçu. Va couper.");
  save(); hud();
}

function renderHome() {
  const t = tier();
  stage.innerHTML = `
    <h2>La Loupe</h2>
    <div class="sub">Coupe + dosage en <b>3D</b> (geste atelier). Appro en visionneuse. Hash only — weed mid.</div>
    <div class="card">
      <div class="tier">PALIER T${t} — ${tierLabel(t)}</div>
      <div class="stat"><span>Écoulé aujourd'hui</span><b>${S.soldDay.toFixed(0)} g</b></div>
      <div class="bar"><i style="width:${clamp(S.soldDay, 0, 100)}%"></i></div>
    </div>
    <div class="home-grid">
      <button class="home-tile" data-go="buy"><div class="ic">◎</div><div class="nm">Appro 3D</div><div class="ds">pains & lots</div></button>
      <button class="home-tile" data-go="cut"><div class="ic">✂</div><div class="nm">Coupe 3D</div><div class="ds">maintien lame</div></button>
      <button class="home-tile" data-go="dose"><div class="ic">⚖</div><div class="nm">Dose 3D</div><div class="ds">enrouler + sceller</div></button>
      <button class="home-tile" data-go="sell"><div class="ic">✉</div><div class="nm">Clients</div><div class="ds">DM → commande</div></button>
      <button class="home-tile" data-go="run"><div class="ic">🛵</div><div class="nm">Livreurs</div><div class="ds">délègue</div></button>
      <button class="home-tile" data-go="cash"><div class="ic">▣</div><div class="nm">Liquide</div><div class="ds">liasses</div></button>
    </div>
    <div class="card lock"><h3>Weed <span class="tag">MID</span></h3><div class="muted">Verrouillé.</div></div>
    <div class="card">
      <h3>Réinvest</h3>
      ${shopRow("scooter", UPG_SCOOTER)}
      ${shopRow("planque", UPG_PLANQUE)}
      ${shopRow("counter", UPG_COUNTER)}
    </div>
    <div class="card journal">
      <h3>Karnet</h3>
      ${S.journal.slice(0, 6).map((j) => `<div class="item">${j.txt}<div class="c">↩ ${j.cause}</div></div>`).join("") ||
        `<div class="muted">Vide. Achète, coupe, emballe.</div>`}
    </div>
    <button class="btn ghost" id="btnCash">Ouvrir le liquide</button>
    <button class="btn bad" id="btnReset">Reset save</button>
  `;
  stage.querySelectorAll("[data-go]").forEach((b) => {
    b.onclick = () => {
      if (b.dataset.go === "cash") { renderCash(); return; }
      tab = b.dataset.go; render();
    };
  });
  stage.querySelectorAll("[data-up]").forEach((b) => { b.onclick = () => buyUpgrade(b.dataset.up); });
  document.getElementById("btnCash").onclick = () => renderCash();
  document.getElementById("btnReset").onclick = () => {
    Object.keys(localStorage).filter((k) => k.startsWith(LS_PREFIX)).forEach((k) => localStorage.removeItem(k));
    store.set("ver", SAVE_VERSION);
    S = defaultState(); save(); toast("Save effacée."); render();
  };
}

function shopRow(key, conf) {
  const lv = S.upgrades[key] || 0;
  const maxed = lv >= conf.max;
  const cost = conf.cost * (lv + 1);
  return `<div class="stat"><span>${conf.title} · ${lv}/${conf.max}<br><span class="muted">${conf.desc}</span></span>
    <button class="btn ghost" style="width:auto;margin:0;padding:8px 10px" data-up="${key}" ${maxed || S.cash < cost ? "disabled" : ""}>
      ${maxed ? "MAX" : money(cost)}
    </button></div>`;
}
function buyUpgrade(key) {
  const map = { scooter: UPG_SCOOTER, planque: UPG_PLANQUE, counter: UPG_COUNTER, guide: UPG_GUIDE, batch: UPG_BATCH };
  const conf = map[key]; if (!conf) return;
  const lv = S.upgrades[key] || 0;
  if (lv >= conf.max) return;
  const cost = conf.cost * (lv + 1);
  if (S.cash < cost) { toast("Propre insuffisant."); return; }
  S.cash -= cost; S.upgrades[key] = lv + 1;
  cause(`Upgrade ${conf.title}`, `−${money(cost)} propre`);
  toast("Ça scale."); save(); render();
}

function renderSell() {
  maybeSpawnOrders();
  const open = S.orders.filter((o) => o.status === "open");
  stage.innerHTML = `
    <h2>Clients</h2>
    <div class="sub">Tu valides le format. Le livreur fait le sale.</div>
    <div class="card">
      <div class="stat"><span>Stock</span><b>${fmtSachets()}</b></div>
      <button class="btn ghost" id="ping">Secouer le téléphone</button>
    </div>
    <div class="list">${open.map(orderCard).join("") || `<div class="card muted">Silence radio.</div>`}</div>
  `;
  document.getElementById("ping").onclick = () => { spawnOrder(true); renderSell(); };
  stage.querySelectorAll("[data-accept]").forEach((b) => { b.onclick = () => acceptOrder(b.dataset.accept); });
  stage.querySelectorAll("[data-refuse]").forEach((b) => { b.onclick = () => refuseOrder(b.dataset.refuse); });
}
function orderCard(o) {
  const need = o.qty || 1;
  const have = S.sachets[o.format] >= need;
  return `<div class="msg"><div class="who">${o.client}${need > 1 ? ` · ×${need}` : ""}</div>
    <div class="txt">« ${o.vibe} » — <b>${need}×${o.format} g</b> · ${money(o.price)}</div>
    <div class="grid2">
      <button class="btn ok" data-accept="${o.id}" ${have ? "" : "disabled"}>${have ? "Prendre" : "Stock KO"}</button>
      <button class="btn ghost" data-refuse="${o.id}">Ignorer</button>
    </div></div>`;
}
function maybeSpawnOrders() {
  const open = S.orders.filter((o) => o.status === "open").length;
  if (open >= maxOpenOrders()) return;
  const slot = Math.floor(S.clock / spawnInterval());
  if (S._lastSpawnSlot === slot) return;
  S._lastSpawnSlot = slot;
  if ((slot + Math.round(S.reput)) % 2 === 0) spawnOrder(false);
}
function spawnOrder(force) {
  const formats = [2, 5, 8];
  const idx = (S.orderSeq * 3 + Math.round(S.reput)) % CLIENTS.length;
  const c = CLIENTS[idx];
  const format = formats[(S.orderSeq + Math.floor(S.reput / 10)) % formats.length];
  let qty = 1;
  if (tier() >= 2 && (S.orderSeq % 3 === 0)) qty = 2;
  if (tier() >= 3 && (S.orderSeq % 4 === 0)) qty = 3;
  const qMul = S.sachetQ >= 75 ? 1.1 : S.sachetQ >= 55 ? 1.0 : 0.85;
  const price = Math.round(format * DOSE_PRICE[format] * qMul * qty);
  if (!force && S.orders.some((o) => o.status === "open" && o.client === c.name)) return;
  S.orders.push({ id: "o" + S.orderSeq++, client: c.name, vibe: c.vibe, format, qty, price, status: "open" });
  if (force) toast("Nouveau message.");
  save();
}
function acceptOrder(id) {
  const o = S.orders.find((x) => x.id === id);
  if (!o || o.status !== "open") return;
  const qty = o.qty || 1;
  if (S.sachets[o.format] < qty) { toast("Pas le stock."); return; }
  S.sachets[o.format] -= qty; o.status = "ready"; o.g = o.format * qty;
  cause(`Commande ${o.client}`, `${qty}×${o.format} g`);
  toast("Validé. Livreurs.");
  save(); tab = "run"; render();
}
function refuseOrder(id) {
  const o = S.orders.find((x) => x.id === id); if (!o) return;
  o.status = "refused"; S.reput = clamp(S.reput - 1, 0, 100);
  cause(`Refus ${o.client}`, `standing −1`); toast("Ignoré."); save(); renderSell();
}

function renderRun() {
  const ready = S.orders.filter((o) => o.status === "ready");
  const active = S.runs.filter((r) => r.left > 0);
  const doneWait = S.runs.filter((r) => r.left <= 0 && !r.collected);
  stage.innerHTML = `
    <h2>Livreurs</h2>
    <div class="sub">Retour en <b>liquide</b>. Cumul &gt; ${SEUIL_DISCRET_G} g = trop visible.</div>
    <div class="card">
      <div class="stat"><span>Scooters</span><b>${livreurCount()}</b></div>
      <div class="stat"><span>Chaleur</span><b>${Math.round(S.heat)}</b></div>
    </div>
    <div class="card"><h3>À dispatcher</h3>
      ${ready.map((o) => `<div class="stat"><span>${o.client} · ${o.g || o.format} g · ${money(o.price)}</span>
        <button class="btn ok" style="width:auto;margin:0;padding:8px 10px" data-go="${o.id}">Envoyer</button></div>`).join("") ||
        `<div class="muted">File vide.</div>`}
      ${ready.length >= 2 && tier() >= 2 ? `<button class="btn" id="batchGo">Envoyer tout</button>` : ""}
    </div>
    <div class="card"><h3>En route</h3>
      ${active.map((r) => `<div class="stat"><span>${r.client} · ${r.g} g</span><b>${Math.ceil(r.left)}s</b></div>
        <div class="bar"><i style="width:${(1 - r.left / r.total) * 100}%"></i></div>`).join("") || `<div class="muted">—</div>`}
    </div>
    <div class="card"><h3>Retour</h3>
      ${doneWait.map((r) => `<div class="stat"><span>${r.client} · ${money(r.pay)} ${r.busted ? "SAISI" : ""}</span>
        <button class="btn ${r.busted ? "bad" : "ok"}" style="width:auto;margin:0;padding:8px 10px" data-col="${r.id}">
          ${r.busted ? "Constater" : "Récupérer"}</button></div>`).join("") || `<div class="muted">—</div>`}
    </div>
    <button class="btn ghost" id="toCash">Liquide (${money(S.dirty)})</button>
  `;
  stage.querySelectorAll("[data-go]").forEach((b) => { b.onclick = () => dispatch(b.dataset.go); });
  stage.querySelectorAll("[data-col]").forEach((b) => { b.onclick = () => collectRun(b.dataset.col); });
  const bg = document.getElementById("batchGo");
  if (bg) bg.onclick = () => { ready.forEach((o) => dispatch(o.id)); };
  document.getElementById("toCash").onclick = () => renderCash();
}
function dispatch(orderId) {
  const o = S.orders.find((x) => x.id === orderId);
  if (!o || o.status !== "ready") return;
  if (S.runs.filter((r) => r.left > 0).length >= livreurCount()) { toast("Plus de scooter."); return; }
  if (S.cash < LIVREUR_FEE) { toast("Pas de fee."); return; }
  S.cash -= LIVREUR_FEE;
  const g = o.g || o.format;
  const time = Math.max(6, LIVREUR_TIME_S - S.upgrades.scooter * 2 - tier());
  const gramsOut = S.runs.filter((r) => r.left > 0).reduce((a, r) => a + r.g, 0) + g;
  const willBust = gramsOut > SEUIL_DISCRET_G || S.heat >= 92;
  S.runs.push({ id: "r" + o.id + "_" + Math.round(S.clock), orderId: o.id, client: o.client, g, pay: o.price,
    left: time, total: time, busted: willBust, collected: false });
  o.status = "assigned";
  S.heat = clamp(S.heat + HEAT_EXPO, 0, HEAT_CAP);
  cause(`Dispatch ${o.client}`, `−${money(LIVREUR_FEE)} fee`);
  toast(willBust ? "Trop chargé." : "Parti.");
  save(); if (tab === "run") renderRun();
}
function collectRun(id) {
  const r = S.runs.find((x) => x.id === id);
  if (!r || r.collected || r.left > 0) return;
  r.collected = true;
  if (r.busted) {
    S.heat = clamp(S.heat + HEAT_BUST, 0, HEAT_CAP);
    cause(`Saisie ${r.client}`, `+${HEAT_BUST} chaleur`); toast("Saisi.");
  } else {
    S.dirty += r.pay; pushBills(r.pay);
    S.reput = clamp(S.reput + 1 + (r.g >= 10 ? 1 : 0), 0, 100);
    S.soldDay += r.g;
    cause(`Retour liquide ${r.client}`, `+${money(r.pay)} liquide`);
    toast("Liquide reçu.");
  }
  save(); if (!r.busted) renderCash(); else renderRun();
}
function pushBills(amount) {
  let left = Math.round(amount);
  for (const d of [100, 50, 20, 5]) {
    while (left >= d) { S.bills.push({ id: "b" + S.bills.length + "_" + d + "_" + Math.round(S.clock * 10), v: d }); left -= d; }
  }
  if (left > 0) S.bills.push({ id: "bX" + Math.round(S.clock * 10), v: left < 5 ? 5 : left });
}

function renderCash() {
  tab = "home"; set3d("hidden"); hud(); renderDock();
  const bundleVal = Object.entries(S.bundles).reduce((a, [d, n]) => a + (+d) * BUNDLE_SIZE * n, 0);
  stage.innerHTML = `
    <h2>Liquide</h2>
    <div class="sub">${BUNDLE_SIZE} billets identiques = 1 liasse → propre. Trop de liquide chauffe.</div>
    <div class="card">
      <div class="stat"><span>Liquide</span><b>${money(S.dirty)}</b></div>
      <div class="stat"><span>Liasses</span><b>${money(bundleVal)}</b></div>
      <div class="bills">${S.bills.map((b) => `<button class="bill n${b.v >= 100 ? 100 : b.v}" data-b="${b.id}">${money(b.v)}</button>`).join("") ||
        `<span class="muted">Rien à classer.</span>`}</div>
      ${[5, 20, 50, 100].map((d) => {
        const n = S.bundles[d] || 0; const prog = (S._pile && S._pile[d]) || 0;
        return `<div class="bundle"><span>Liasse ${money(d)} ×${n}</span><span class="muted">${prog}/${BUNDLE_SIZE}</span></div>`;
      }).join("")}
      <button class="btn ok" id="bankBundles" ${bundleVal <= 0 ? "disabled" : ""}>Encaisser (+${money(bundleVal)})</button>
      <button class="btn ghost" id="back">↩ Home</button>
    </div>`;
  stage.querySelectorAll("[data-b]").forEach((btn) => { btn.onclick = () => { sortBill(btn.dataset.b); renderCash(); }; });
  document.getElementById("bankBundles").onclick = () => bankBundles();
  document.getElementById("back").onclick = () => { tab = "home"; render(); };
}
function sortBill(id) {
  const i = S.bills.findIndex((x) => x.id === id); if (i < 0) return;
  const [b] = S.bills.splice(i, 1);
  const d = b.v >= 100 ? 100 : b.v;
  if (![5, 20, 50, 100].includes(d)) { S.dirty = Math.max(0, S.dirty - b.v); save(); return; }
  if (!S._pile) S._pile = { 5: 0, 20: 0, 50: 0, 100: 0 };
  S._pile[d] = (S._pile[d] || 0) + 1;
  S.dirty = Math.max(0, S.dirty - d);
  if (S._pile[d] >= BUNDLE_SIZE) { S._pile[d] -= BUNDLE_SIZE; S.bundles[d] = (S.bundles[d] || 0) + 1; toast(`Liasse ${money(d)}.`); }
  save();
}
function bankBundles() {
  let got = 0;
  for (const d of [5, 20, 50, 100]) { const n = S.bundles[d] || 0; if (n > 0) { got += d * BUNDLE_SIZE * n; S.bundles[d] = 0; } }
  if (got <= 0) return;
  S.cash += got; cause(`Liasses encaissées`, `+${money(got)} propre`); toast(`+${money(got)} propre`); save(); renderCash();
}

let last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  S.clock += dt;
  if (S.clock > S.day * 90) { S.day++; S.heat = clamp(S.heat - 8, 0, HEAT_CAP); S.soldDay = 0; cause(`Jour ${S.day}`, `Chaleur −8`); }
  if (S.dirty > DIRTY_HOLD_SOFT) {
    S._dirtyAcc += dt;
    if (S._dirtyAcc >= 3) { S._dirtyAcc = 0; S.heat = clamp(S.heat + (S.dirty > DIRTY_HOLD_HARD ? 2 : 1), 0, HEAT_CAP); }
  }
  if (S.upgrades.counter > 0 && S.dirty > 0 && S.bills.length === 0) {
    const take = Math.min(S.dirty, COUNTER_RATE * dt); S.dirty -= take; S.cash += take;
  }
  let dirtyRun = false;
  for (const r of S.runs) {
    if (r.left > 0) { r.left -= dt; if (r.left <= 0) { r.left = 0; if (S.heat >= 92) r.busted = true; } dirtyRun = true; }
  }
  if (tab === "run" && dirtyRun) {
    if (!frame._acc) frame._acc = 0; frame._acc += dt;
    if (frame._acc > 0.35) { frame._acc = 0; renderRun(); }
  }
  scene3d.tick(dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
setInterval(() => save(), 2000);
render();
toast("3D en ligne — Appro / Coupe / Dose.");
</script>
</body>
</html>
