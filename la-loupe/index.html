<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>La Loupe — rêve</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{--line:rgba(255,220,160,.14);--muted:rgba(255,236,210,.55);--cash:#9be37d;--dirty:#e8c96a;--heat:#ff8a6a;--accent:#ffb454;--snap:#ff2d55;--beuher:#00c46a;--shelter:#6ec8ff}
html,body{width:100%;height:100%;overflow:hidden;font-family:"Segoe UI",system-ui,sans-serif;color:#f4ebe0;background:#07060a}
#phone{position:fixed;inset:0;max-width:440px;margin:0 auto;display:flex;flex-direction:column;
  background:radial-gradient(120% 80% at 50% -10%,#3a1830 0%,#141018 45%,#07060a 100%);
  border-left:1px solid var(--line);border-right:1px solid var(--line)}
#top{padding:max(10px,env(safe-area-inset-top)) 14px 8px;display:grid;gap:6px;background:rgba(0,0,0,.55);
  border-bottom:1px solid var(--line);z-index:30;backdrop-filter:blur(12px)}
.row{display:flex;gap:8px;align-items:center;justify-content:space-between}
.pill{font-size:11px;font-weight:800;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);white-space:nowrap}
.pill.cash{color:var(--cash)}.pill.dirty{color:var(--dirty)}.pill.heat{color:var(--heat)}.pill.rep{color:#9ec9ff}.pill.expo{color:#ff8ab8}
#toast{position:fixed;left:50%;top:20%;transform:translate(-50%,8px);opacity:0;transition:.2s;z-index:80;
  background:rgba(0,0,0,.82);border:1px solid var(--line);padding:11px 14px;border-radius:14px;font-weight:800;text-align:center;max-width:88%;pointer-events:none}
#toast.show{opacity:1;transform:translate(-50%,0)}
#main{flex:1;position:relative;min-height:0}
#stage{position:absolute;inset:0;overflow:auto;padding:12px;-webkit-overflow-scrolling:touch;z-index:2}
#stage.behind{visibility:hidden;pointer-events:none}
#view3d{display:none;position:absolute;inset:0;z-index:3;touch-action:none;background:#14101b}
#view3d.on{display:block}
#hud3d{position:absolute;inset:0;z-index:4;pointer-events:none}
#hint3d{position:absolute;left:0;right:0;bottom:max(72px, env(safe-area-inset-bottom) + 58px);text-align:center;font-size:12px;font-weight:700;color:rgba(255,255,255,.55);text-shadow:0 2px 8px #000;padding:0 12px}
#load3d{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);z-index:6;display:none;
  flex-direction:column;align-items:center;gap:12px;pointer-events:auto;text-align:center;width:78%;max-width:280px}
#load3d.on{display:flex}
#load3d .ld{font-size:13px;font-weight:800;color:rgba(255,236,210,.85);animation:ldPulse 1.2s ease-in-out infinite}
@keyframes ldPulse{0%,100%{opacity:.5}50%{opacity:1}}
#presslbl,#wraptext{position:absolute;left:50%;transform:translateX(-50%);bottom:max(118px, env(safe-area-inset-bottom) + 104px);font-size:13px;font-weight:800;color:#fff;text-shadow:0 2px 8px #000;display:none;white-space:nowrap}
#presslbl.show,#wraptext.show{display:block}
#pressbar,#wrapbar{position:absolute;left:50%;transform:translateX(-50%);width:66%;max-width:300px;height:18px;bottom:max(92px, env(safe-area-inset-bottom) + 78px);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:999px;overflow:hidden;display:none}
#pressbar.show,#wrapbar.show{display:block}
#pressfill{height:100%;width:0;background:linear-gradient(90deg,#ff9f6b,#ff5e1a)}
#wrapfill{height:100%;width:0;background:linear-gradient(90deg,#7df9ff,#9be37d)}
#seal{position:absolute;left:50%;transform:translateX(-50%);bottom:max(88px, env(safe-area-inset-bottom) + 74px);display:none;pointer-events:auto;background:#ff7a3c;border:none;color:#fff;font-weight:800;font-size:16px;padding:12px 24px;border-radius:14px;z-index:5}
#seal.show{display:block}
#fmtBar{position:absolute;top:10px;left:10px;right:10px;z-index:5;pointer-events:auto;display:none;gap:6px;flex-wrap:wrap;justify-content:center}
#fmtBar.on{display:flex}
#buyOverlay{position:absolute;left:10px;right:10px;bottom:max(70px, env(safe-area-inset-bottom) + 56px);z-index:5;pointer-events:auto;display:none;max-height:42%;overflow:auto;background:rgba(20,16,14,.92);border:1px solid var(--line);border-radius:16px;padding:12px}
#buyOverlay.on{display:block}
#dock{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:8px 8px max(10px,env(safe-area-inset-bottom));background:rgba(0,0,0,.6);border-top:1px solid var(--line);z-index:30}
.tab{appearance:none;border:0;background:transparent;color:var(--muted);font-size:10px;font-weight:700;padding:8px 2px;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab .ic{font-size:20px;line-height:1}.tab.on{color:#fff;background:rgba(255,180,84,.16)}
h2{font-size:20px;font-weight:900;letter-spacing:.2px;margin-bottom:4px}
.sub{color:var(--muted);font-size:12.5px;line-height:1.35;margin-bottom:12px}
.card{background:rgba(38,30,22,.92);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:10px}
.card h3{font-size:14px;font-weight:800;margin-bottom:6px}
.muted{color:var(--muted);font-size:12px;line-height:1.35}
.btn{appearance:none;border:1px solid rgba(255,180,84,.45);background:linear-gradient(180deg,#3a2a16,#24180e);color:#ffe4b5;font-weight:800;font-size:13px;padding:11px 12px;border-radius:12px;width:100%;margin-top:8px}
.btn:active{transform:scale(.98)}.btn:disabled{opacity:.4}
.btn.ok{border-color:rgba(125,222,160,.45);background:linear-gradient(180deg,#1f3324,#132018);color:#c8f5d6}
.btn.ghost{background:rgba(255,255,255,.04);border-color:var(--line);color:#f0e2cf}
.btn.bad{border-color:rgba(255,122,122,.45);background:linear-gradient(180deg,#3a1818,#241010);color:#ffd0d0}
.btn.snap{border-color:rgba(255,45,85,.55);background:linear-gradient(180deg,#4a1528,#2a0e18);color:#ffd0dc}
.btn.beuher{border-color:rgba(0,196,106,.5);background:linear-gradient(180deg,#0f3324,#0a2018);color:#c8f5d6}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.chip{padding:7px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:12px;font-weight:800;color:var(--muted)}
.chip.on{color:#fff;border-color:rgba(255,180,84,.55);background:rgba(255,180,84,.16)}
.chip.cs{width:100%;text-align:center;pointer-events:none;background:rgba(0,0,0,.45);border-color:transparent;
  color:rgba(255,236,210,.85);font-weight:700;font-size:11px;padding:5px 8px}
.chip.cs b{color:#ffe4b5}
.stat{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px dashed rgba(255,255,255,.06);gap:8px}
.stat b{font-weight:800;text-align:right}
.bar{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin:6px 0}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#7ddea0,#ffb454)}
.apps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:16px 0 20px}
.app{appearance:none;border:0;background:transparent;color:#fff;text-align:center}
.app .icon{width:64px;height:64px;margin:0 auto;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;
  box-shadow:0 10px 28px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.18)}
.app .nm{font-size:11px;font-weight:800;margin-top:7px}
.app.snap .icon{background:linear-gradient(145deg,#ff4d6d,#c01040)}
.app.beuher .icon{background:linear-gradient(145deg,#22e07a,#0a8f4a)}
.app.atelier .icon{background:linear-gradient(145deg,#c06d6d,#6a3030)}
.app.appro .icon{background:linear-gradient(145deg,#6d8ac0,#334a7a)}
.app.cash .icon{background:linear-gradient(145deg,#e8c96a,#8a6a20)}
.app.karnet .icon{background:linear-gradient(145deg,#9a8ab0,#4a3a60)}
.app.shelter .icon{background:linear-gradient(145deg,#6ec8ff,#2a5a8a)}
/* ---- Shelter · carte Quartier Nord ---- */
.map-wrap{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--line);
  background:#1a1510;margin-bottom:10px;aspect-ratio:1;max-height:min(52vh,360px)}
.map-wrap img{display:block;width:100%;height:100%;object-fit:cover;filter:saturate(.9) contrast(1.05)}
.map-pin{position:absolute;transform:translate(-50%,-100%);border:0;background:transparent;padding:0;
  display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:2;filter:drop-shadow(0 3px 6px rgba(0,0,0,.55))}
.map-pin .dot{width:18px;height:18px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  border:2px solid #fff;box-shadow:0 0 0 2px rgba(0,0,0,.25)}
.map-pin .lbl{margin-top:3px;font-size:9px;font-weight:800;color:#fff;text-shadow:0 1px 3px #000;
  background:rgba(0,0,0,.55);padding:2px 6px;border-radius:6px;white-space:nowrap;max-width:72px;
  overflow:hidden;text-overflow:ellipsis}
.map-pin.planque .dot{background:#6ec8ff}
.map-pin.pdv .dot{background:#9be37d}
.map-pin.rival .dot{background:#ff8a6a}
.map-pin.info .dot{background:#e8c96a}
.map-pin.on .dot{box-shadow:0 0 0 3px rgba(255,180,84,.55),0 0 12px rgba(255,180,84,.35)}
.map-pin.locked{opacity:.55}
.map-pin.locked .dot{filter:grayscale(.4)}
.map-pin .pin-bac{position:absolute;top:-11px;left:50%;transform:translateX(-50%);
  font-size:9px;font-weight:800;color:#0b120c;background:#9be37d;padding:1px 5px;border-radius:8px;
  white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.55);z-index:3;pointer-events:none}
.map-pin .pin-bac.off{display:none}
.debt-strip{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:12px;margin-bottom:10px;
  background:rgba(200,68,47,.14);border:1px solid rgba(255,138,106,.4);font-size:11px;font-weight:700}
.debt-strip b{color:#ffb0a0}
.debt-strip .go{margin-left:auto;appearance:none;border:1px solid rgba(155,227,125,.45);background:rgba(30,60,40,.6);
  color:#c8f5d6;font-weight:800;font-size:11px;padding:6px 10px;border-radius:9px;white-space:nowrap}
.hit-chip{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;border:1px solid var(--line)}
.hit-chip.ok{background:rgba(0,196,106,.18);color:#9be37d}
.hit-chip.mid{background:rgba(232,201,106,.18);color:#e8c96a}
.hit-chip.hot{background:rgba(255,80,80,.22);color:#ff8a6a}
/* Le Corner — négo présentielle (étape 2) */
.nego-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.nego-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:19px;flex:none}
.nego-nm{font-weight:800;font-size:14px}
.nego-tag{font-size:9px;font-weight:800;letter-spacing:.4px;border-radius:4px;padding:1px 5px;margin-left:5px;background:rgba(255,255,255,.08)}
.nego-rel{margin-left:auto;font-size:10px;color:var(--muted,#9aa)}.nego-rel b{color:#e8ecf4}
.nego-tx{background:rgba(255,255,255,.05);border-radius:4px 12px 12px 12px;padding:8px 10px;margin:4px 0 6px;font-size:13px}
.offer{font-weight:800;border-radius:6px;padding:1px 6px;white-space:nowrap;font-size:12px}
.offer.q-fair{background:rgba(255,214,107,.16);color:#ffd66b}
.offer.q-good{background:rgba(113,230,164,.16);color:#71e6a4}
.offer.q-low{background:rgba(255,184,76,.16);color:#ffb84c}
.offer.q-scam{background:rgba(255,93,108,.16);color:#ff9aa5}
.nego-pat{height:4px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin:4px 0 8px}
.nego-pat i{display:block;height:100%;width:100%;background:#3ddc84}
.nego-price{display:flex;align-items:center;gap:6px;margin:6px 0}
.nego-price .pb{border:0;border-radius:8px;background:rgba(255,255,255,.08);color:#e8ecf4;font:inherit;font-weight:800;padding:8px 0;width:42px;cursor:pointer}
.nego-price #negoP{flex:1;text-align:center;font-size:16px;font-weight:800}
.nego-face{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border-radius:10px;padding:6px 10px;margin:2px 0 8px}
.nego-face .nfEmo{font-size:22px}
.nego-face .nfTx{color:#9aa4b8;font-weight:600;font-size:12px}
/* Le Corner — mise en scène rue (étape 2b, Option B : scène plein écran) */
#stage.corner-mode{padding:0;overflow:hidden}
.cscene{position:absolute;inset:0;width:100%;height:100%;background:linear-gradient(180deg,#070a16 0%,#0d1226 40%,#131a30 58%,#131a30 100%);overflow:hidden}
.cbat{position:absolute;bottom:28%;background:#0d1120;box-shadow:0 -2px 30px #0009}
.cbat .cgrid{position:absolute;inset:10px 8px;opacity:.5;background-image:repeating-linear-gradient(0deg,#1a2138 0 7px,transparent 7px 16px),repeating-linear-gradient(90deg,#1a2138 0 9px,transparent 9px 20px)}
.cwin{position:absolute;width:9px;height:7px;background:#ffd977;border-radius:1px;box-shadow:0 0 8px #ffd97788}
.clamp{position:absolute;left:34%;bottom:28%;width:4px;height:30%;background:linear-gradient(180deg,#39415a,#20263a)}
.clamp::before{content:"";position:absolute;top:-6px;left:-7px;width:18px;height:8px;border-radius:4px;background:#3c445e}
.clamp::after{content:"";position:absolute;top:-2px;left:-4px;width:12px;height:6px;border-radius:50%;background:#ffe9a8;box-shadow:0 0 18px 6px #ffe9a866}
.ccone{position:absolute;left:34%;bottom:0;width:220px;height:28%;transform:translateX(-48%);background:linear-gradient(180deg,#ffe9a81f 0%,#ffe9a805 70%,transparent 100%);clip-path:polygon(46% 0,54% 0,100% 100%,0 100%);filter:blur(3px);pointer-events:none}
.cground{position:absolute;bottom:0;left:0;right:0;height:28%;background:linear-gradient(180deg,#1a2032 0%,#141827 18%,#0c0f1a 100%)}
.cground::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:#242c44}
.ctag{position:absolute;bottom:29%;left:6%;color:#2c3552;font-weight:900;font-size:20px;transform:rotate(-4deg);letter-spacing:2px}
.cempty{position:absolute;left:0;right:0;top:24%;text-align:center;color:#5a6480;font-size:13px;text-shadow:0 1px 4px #000}
.cperso{position:absolute;display:flex;flex-direction:column;align-items:center;z-index:3;cursor:pointer;transform:translate(-50%,0) scale(var(--s,1));transform-origin:50% 100%;transition:left .6s cubic-bezier(.3,.8,.4,1),bottom .6s ease,transform .6s ease,opacity .4s}
.cperso.active{z-index:4;filter:drop-shadow(0 0 14px #4cc2ff55)}
.cperso.leave{opacity:0}
.chead{width:38px;height:38px;border-radius:50%;background:#1b2234;display:flex;align-items:center;justify-content:center;font-size:22px;border:2.5px solid var(--ring,#2a3450)}
.cperso.active .chead{--ring:#4cc2ff}
.cbody{width:28px;height:40px;margin-top:-7px;border-radius:11px 11px 5px 5px;background:linear-gradient(180deg,#242e48,#151b2b)}
.clbl{font-size:10px;font-weight:700;margin-top:3px;color:#e8ecf4;text-shadow:0 1px 3px #000}
.cpat2{width:36px;height:3.5px;background:#232a3add;border-radius:3px;overflow:hidden;margin-top:3px}
.cpat2 i{display:block;height:100%;width:100%;background:#3ddc84}
.ctop{position:absolute;top:8px;left:8px;right:8px;z-index:22;display:flex;align-items:center;gap:6px} /* au-dessus du tiroir → le retour ↩ reste toujours cliquable */
.cbtn{border:0;border-radius:9px;background:rgba(0,0,0,.55);color:#e8ecf4;font:inherit;font-weight:700;font-size:12px;padding:8px 11px;cursor:pointer}
.cchip{background:rgba(0,0,0,.55);border-radius:20px;padding:6px 10px;font-size:12px;font-weight:700;white-space:nowrap}
.cchip.gold{color:#ffd66b}
#cManage{margin-left:auto}
#cActive{position:absolute;left:8px;right:8px;bottom:8px;z-index:8}
#cActive .card{margin:0;animation:cslide .26s cubic-bezier(.2,.9,.3,1.15)}
@keyframes cslide{from{transform:translateY(40px);opacity:0}}
.cdrawer-bk{position:absolute;inset:0;z-index:19;background:rgba(0,0,0,.5);display:none}
.cdrawer-bk.on{display:block}
/* panneau « Gérer » : plein écran quand ouvert (translateY 0), caché sinon (110%). Une poignée persistante
   « Le corner » (.cpeek) reste au-dessus de la barre du bas pour le rouvrir (tap ou glissement vers le haut). */
.cdrawer{position:absolute;left:0;right:0;bottom:0;z-index:20;background:rgba(24,20,16,.98);border-radius:16px 16px 0 0;border-top:1px solid var(--line);padding:12px 12px max(12px,env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.9,.25,1);max-height:82%;overflow:auto}
.cdrawer.on{transform:translateY(0)}
/* poignée persistante (panneau fermé) : on la voit toujours, on la tire vers le haut / on tape pour ouvrir */
.cpeek{position:absolute;left:0;right:0;bottom:0;z-index:18;background:rgba(24,20,16,.96);border-radius:14px 14px 0 0;border-top:1px solid var(--line);padding:7px 12px 9px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none}
.cpeek .cdrawer-bar{margin:0}
.cpeek .cpeek-lb{font-size:12px;font-weight:800;color:#e8ecf4;letter-spacing:.2px}
/* poignée large (barre + titre) : toujours visible quand replié → on la tire pour dérouler. touch-action:none = on capte le geste */
.cdrawer-head{padding:10px 0 8px;margin:-4px 0 6px;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none}
.cdrawer-head .cdrawer-bar{display:block;width:52px;height:5px;border-radius:3px;background:rgba(255,255,255,.34);margin:0 auto 9px}
.cdrawer-head h3{margin:0;font-size:13px}
.story-row{display:flex;gap:10px;overflow-x:auto;padding:4px 0 12px}
.ring{flex:none;width:64px;text-align:center}
.ring .ava{width:56px;height:56px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:22px;
  background:#222;border:2.5px solid #555}
.ring.live .ava{border-color:var(--snap);box-shadow:0 0 0 2px rgba(255,45,85,.25)}
.ring .lb{font-size:10px;font-weight:700;margin-top:4px;color:var(--muted);max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flash{font-size:12px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.flash b{color:#ffb0c4}
.dm{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;padding:10px;margin-bottom:8px}
.dm .who{font-weight:900;font-size:13px;display:flex;justify-content:space-between;gap:8px}
.dm .tag{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--line);color:var(--accent)}
.dm .txt{color:var(--muted);font-size:12.5px;margin:5px 0 8px;line-height:1.35}
.courier{border:1px solid var(--line);border-radius:14px;padding:10px;margin-bottom:8px;background:rgba(0,0,0,.2)}
.courier.on{border-color:var(--beuher);background:rgba(0,196,106,.08)}
.risk{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px}
.risk.ok{background:rgba(0,196,106,.2);color:#9be37d}
.risk.mid{background:rgba(232,201,106,.2);color:#e8c96a}
.risk.hot{background:rgba(255,80,80,.25);color:#ff8a6a}
.table{width:100%;border-collapse:collapse;font-size:12px}
.table td{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.cash-arena{position:relative;min-height:220px;border-radius:18px;border:1px dashed rgba(232,201,106,.35);
  background:radial-gradient(80% 80% at 50% 40%,#2a2214,#120e0a);margin:10px 0;overflow:hidden}
.cash-arena .count{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);font-size:42px;font-weight:900;color:var(--dirty);
  text-shadow:0 4px 20px rgba(0,0,0,.6);pointer-events:none}
.bill{position:absolute;padding:12px 14px;border-radius:10px;font-weight:900;font-size:14px;border:1px solid rgba(255,255,255,.2);
  color:#eaffef;box-shadow:0 6px 16px rgba(0,0,0,.35);transform:rotate(var(--r,0deg));transition:transform .12s,opacity .15s}
.bill:active{transform:scale(.92) rotate(var(--r,0deg))}
.bill.n1{background:linear-gradient(160deg,#4a4a4a,#222);font-size:12px;padding:8px 10px}
.bill.n5{background:linear-gradient(160deg,#6a6a2f,#333318)}.bill.n20{background:linear-gradient(160deg,#3a4f7a,#1d2944)}

<script type="module">
/* snap/beuher d'abord — Three.js (scene3d) en lazy load.
   Sur mobile, unpkg bloqué cassait TOUT le proto (écran fantôme « enrouler »). */
import * as snap from "./snap.mjs?v=18";
import * as beuher from "./beuher.mjs?v=18";
import * as shelter from "./shelter.mjs?v=18";
import * as corner from "./corner.mjs?v=1";

const SAVE_VERSION = "26";
// La taille se décide À LA COUPE (anti-triche : plus de format au conditionnement).
// La demande Snap reste calée sur 2/5/8 (snap.SC.DOSE_FORMATS) — couper autre chose = risque assumé.
const CUT_MIN = 1, CUT_MAX = 20, CUT_DEFAULT = 2;
// Couteau : au début « de fortune », on ne coupe que du 2 g. Les paliers supérieurs
// (5 g, 8 g…) se débloquent avec l'upgrade Couteau — colle au canal « grosses commandes 5 g+ ».
const CUT_CAPS = [2, 5, 8, 12, 20]; // plafond de coupe par niveau de couteau (0→2 g … 4→20 g)
const SORT_POCKETS = [5, 20, 50, 100]; // trieuse 4+1 (+ reject / monnaie)
const SORT_FEED = 0.28; // s entre chaque billet (machine, pas mini-jeu)
const T3D_MS = 8000; // au-delà : réseau mobile qui bloque unpkg → bascule 2D
let scene3d = null;
let scene3dPromise = null;
let no3d = false; // 3D KO cette session → coupe/appro passent en 2D (réessayable)
async function ensure3d() {
  if (scene3d) return scene3d;
  if (!scene3dPromise) {
    scene3dPromise = Promise.race([
      import("./scene3d.mjs?v=19"),
      new Promise((_, rej) => setTimeout(() => rej(new Error("3D timeout")), T3D_MS)),
    ]).then((m) => {
      if (scene3d) return scene3d; // import lent arrivé après un retry déjà monté
      scene3d = m;
      scene3d.mount(view3d, {
        pressbar: document.getElementById("pressbar"),
        pressfill: document.getElementById("pressfill"),
        presslbl: document.getElementById("presslbl"),
        wrapbar: document.getElementById("wrapbar"),
        wrapfill: document.getElementById("wrapfill"),
        wraptext: document.getElementById("wraptext"),
        seal: document.getElementById("seal"),
        hint: document.getElementById("hint3d"),
      }, {
        getPainG: () => { const p = activePain(); return p ? p.g : 0; },
        getStash: () => ({ sizes: S.pains.map((p) => Math.round(p.g)), sel: S.painSel }),
        onSelectPain: (i) => {
          if (i >= 0 && i < S.pains.length && i !== S.painSel) {
            S.painSel = i; save(); renderFmtBar();
            toast(`Pain ${Math.round(S.pains[i].g)} g sur la planche.`);
          }
        },
        getBarG: () => barsG(),
        getBarCount: () => barCount(),
        getCutSize: () => S.cutSize || CUT_DEFAULT,
        getDoseFormat: () => S.cutSize || CUT_DEFAULT,
        getSachetCount: () => Object.values(S.sachets).reduce((a, n) => a + n, 0),
        toast,
        onCut: (g) => { const n=cutBatch(); for(let i=0;i<n;i++){ if(!applyCut(S.cutSize||CUT_DEFAULT, "lame 3D")) break; } save(); hud(); renderFmtBar(); },
        onSwipeToBag: () => { if (tab === "atelier") { atelierSub = "bag"; render(); } },
        onTakeBar: () => {}, // wrap 3D retiré — la taille est figée à la coupe
        onReturnBar: () => {},
        onPack: () => { /* wrap 3D retiré — conditionnement = renderDoseBag */ },
      });
      window.addEventListener("resize", () => scene3d && scene3d.resize());
      return scene3d;
    }).catch((err) => {
      scene3dPromise = null;
      no3d = true;
      console.error("3D indisponible", err);
      toast("3D indisponible (réseau) — mode 2D.");
      throw err;
    });
  }
  return scene3dPromise;
}
const LS = "loupe_";
const START_CASH = 0; // le liquide vient de la vente au corner (coupe → écoule)
// Une savonnette = 250 g max (réalisme filière) — au-delà, on livre un LOT de pains.
const PAIN_100 = { g:100, price:200, q:52, label:"Pain 100" };
const PAIN_250 = { g:250, price:1700, q:78, label:"Pain 250" };
const PAIN_500 = { g:500, price:3200, q:70, label:"Lot 500 (2×250)", reputGate:30, split:250 };
// Core loop directe : on démarre indépendant avec 1 plaquette (PAIN_100) à couper.
// Boucle : couper (Atelier) → écouler au corner (négo) → encaisser → racheter un pain.
const CHARB_WAGE = 80; // (réservé) tarif jour d'un charbonneur — ce qu'on paiera pour EN embaucher un plus tard
const PLANQUE_CAP_BASE = 250;
const DIRTY_HOLD_SOFT = 180, DIRTY_HOLD_HARD = 450, BUNDLE_SIZE = 5, COUNTER_RATE = 40;
const DAY_SEC_REAL = 90; // une soirée s'écoule en temps réel (horloge unique) puis se clôture
const UPG = {
  couteau: { cost:250, max:4, title:"Couteau", desc:"coupe des morceaux plus gros (5 g, 8 g…)" },
  gabarit: { cost:300, max:4, title:"Gabarit", desc:"+1 barrette / geste (coupe plus efficace)" },
  scooter: { cost:350, max:1, title:"Flotte+", desc:"+accès Go fast débloqué tôt" },
  planque: { cost:400, max:3, title:"Planque", desc:"+120 g" },
  counter: { cost:900, max:1, title:"Compteur", desc:"auto si plus de billets lâches" },
};

const APPS = [
  { id:"shelter", ic:"⌖", lb:"Quartier" },
  { id:"snap", ic:"⚡", lb:"SnapShit" },
  { id:"atelier", ic:"✂", lb:"Atelier" },
  { id:"beuher", ic:"🛵", lb:"Beuher" },
  { id:"cash", ic:"▣", lb:"Liquide" },
];
// La trieuse (liquide→propre) est masquée pour l'instant : le core loop tourne au liquide, le
// propre n'a plus d'usage (dette coupée). Elle reviendra plus tard, refondue en INVENTAIRE. → false
const SORTER_ENABLED = false;

const store = { get:k=>localStorage.getItem(LS+k), set:(k,v)=>localStorage.setItem(LS+k,v) };
const money = n => String(Math.round(n));
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

function defaultState(){
  return {
    cash: START_CASH, dirty:0, heat:0, reput:20, day:1, clock:0,
    pains:[{ g:PAIN_100.g, q:PAIN_100.q }], painSel:0, bars:{}, barQ:60, wasteG:0, // amorce : 1 plaquette à couper (core loop directe)
    sachets:{}, sachetQ:60, cutSize:CUT_DEFAULT,
    orders:[], runs:[], bills:[],
    bundles:{5:0,20:0,50:0,100:0}, _pile:{5:0,20:0,50:0,100:0},
    upgrades:{couteau:0, gabarit:0, scooter:0, planque:0, counter:0},
    journal:[], orderSeq:1, soldDay:0,
    assign:{}, counted:0, atelierMode:"cut",
    clients: corner.cornerClientsDefault(), // clientèle du corner (négo Phase B — voir INTEGRATION)
    shelter: shelter.shelterDefaults(),
    ...snap.snapDefaults(),
  };
}

let S = defaultState();
if (store.get("ver") !== SAVE_VERSION) {
  Object.keys(localStorage).filter(k=>k.startsWith(LS)).forEach(k=>localStorage.removeItem(k));
  store.set("ver", SAVE_VERSION);
}
try { const raw=store.get("save"); if(raw) S={...defaultState(), ...JSON.parse(raw)}; } catch {}
// Migration douce v17 : painG (pool de grammes) → pains (liste discrète), sans reset
if(!Array.isArray(S.pains)) S.pains=[];
if(S.painG>0 && !S.pains.length) S.pains=[{ g:S.painG, q:S.painQ||60 }];
S.painG=0; S.painQ=0; // évite une double migration au prochain chargement
if(!(S.painSel>=0) || S.painSel>=S.pains.length) S.painSel=0;
if(!S.shelter) S.shelter=shelter.shelterDefaults();
else S.shelter={...shelter.shelterDefaults(), ...S.shelter};
// clientèle du corner : seed + migration douce (nouveaux personas ajoutés en cours de route)
if(!S.clients || typeof S.clients!=="object") S.clients=corner.cornerClientsDefault();
else for(const p of corner.CORNER_PERSONAS) if(!S.clients[p.id]) S.clients[p.id]={ rel:10, unlocked:!!p.start, missed:0, gougeStreak:0, quit:false };
// Save pré-Shelter : pas de cinématique front si déjà en course
if(!S.shelter.introSeen && (S.day>1 || shelter.stockG(S)>0 || (S.journal&&S.journal.length))){
  S.shelter.introSeen=true;
}

let tab="shelter", toastT=0, atelierSub="menu", cashSub="sorter", shelterSub="map";
/** Session trieuse (non persistée) — feel Kisan 4+1 fitness sorter. */
const sorter = { running:false, current:null, cooldown:0, combo:0, sessionOk:0, sessionRj:0, dirtyUi:false };
const stage=document.getElementById("stage");
const dock=document.getElementById("dock");
const toastEl=document.getElementById("toast");
const view3d=document.getElementById("view3d");
const buyOverlay=document.getElementById("buyOverlay");
const fmtBar=document.getElementById("fmtBar");
const load3d=document.getElementById("load3d");
document.getElementById("skip3d").onclick=()=>{ // sortie de secours pendant le chargement
  atelierSub = atelierSub==="buy" ? "buy2d" : "cut2d";
  render();
};

function save(){ store.set("save", JSON.stringify(S)); }
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove("show"),1800); }
function cause(txt, why){ S.journal.unshift({t:Date.now(),txt,cause:why}); if(S.journal.length>50) S.journal.length=50; }
function planqueCap(){ return PLANQUE_CAP_BASE + S.upgrades.planque*120; }
function sizesOf(map){ return Object.keys(map).map(Number).filter(f=>map[f]>0).sort((a,b)=>b-a); }
function barsG(){ return Object.entries(S.bars).reduce((a,[f,n])=>a+n*+f,0); }
function barCount(){ return Object.values(S.bars).reduce((a,n)=>a+n,0); }
function finiG(){ return barsG() + Object.entries(S.sachets).reduce((a,[f,n])=>a+n*+f,0); }
function avgMerge(oG,oQ,aG,aQ){ const t=oG+aG; return t<=0?0:(oG*oQ+aG*aQ)/t; }
function fmtBars(){ const ks=sizesOf(S.bars); return ks.length?ks.map(f=>`${S.bars[f]}×${f}g`).join(" · "):"—"; }
function activePain(){ return S.pains[S.painSel]||S.pains[0]||null; }
function painsG(){ return S.pains.reduce((a,p)=>a+p.g,0); }
function fmtPains(){ return S.pains.length?S.pains.map((p,i)=>`${i===S.painSel?"▶":""}${Math.round(p.g)}g`).join(" · "):"—"; }
/** Une coupe = une barrette, prise sur le PAIN ACTIF (partagé 3D / débit 2D).
    La qualité de CE pain part dans la barrette. Retourne false si rien à couper. */
function applyCut(take, why){
  const p=activePain(); if(!p) return false;
  take=Math.min(take,p.g); if(take<1) return false;
  p.g-=take;
  S.barQ=avgMerge(barsG(),S.barQ,take,p.q||60);
  const key=Math.max(1,Math.round(take));
  S.bars[key]=(S.bars[key]||0)+1;
  cause(`Coupe ${take.toFixed(1)} g`,`Barrette ${key} g — ${why}`);
  if(p.g<1){ S.pains.splice(S.pains.indexOf(p),1); S.painSel=0; } // pain fini → au suivant
  return true;
}
function cutBatch(){ return 1 + (S.upgrades.gabarit||0); } // barrettes par geste (gabarit, R2/R9)
function cutCap(){ return CUT_CAPS[Math.min(CUT_CAPS.length-1, S.upgrades.couteau||0)]; } // taille max de coupe (couteau)
function fmtSachets(){ const ks=sizesOf(S.sachets); return ks.length?ks.map(f=>`${S.sachets[f]}×${f}g`).join(" · "):"—"; }
function qualAvg(){ return Math.round(S.sachetQ || S.barQ || 60); }

/** Taille de coupe — libre (CUT_MIN..CUT_MAX), défaut 2 g. Décidée ICI, pas au conditionnement.

/* ============ PDV — le corner : point de vente à 3 curseurs (CADRE) ============
   Demande / Satisfaction (déception annoncé vs livré) / Heat déterministe.
   Vente PAR CLIENT (file d'attente virtuelle) : chaque client achète un panier
   de BARRETTES (sachets) depuis le TAMPON exposé → bac (liquide de rue) → ledger.
   Menu = vitrine SnapShit (buzz). Descente au seuil : saisit tampon + bac.
   Constantes de réglage (placeholders) : */
const PDV_BASE_DEMAND=200;        // clients/h à réservoir plein, prix juste
const PDV_TIME_COMPRESS=20;       // temps de jeu accéléré (fait vivre le débit)
const PDV_RUSH_AMP=1.3, PDV_RUSH_PERIOD=38; // pics de rush cycliques
const PDV_EXPO_SCALE=140;         // buzz (vitrine SnapShit) → demande
const PDV_SERVE_RATE=4;           // clients servis/s (débit du corner)
const PDV_MAX_WAIT=5, PDV_MAX_QUEUE=14, PDV_RES_PER_SALE=0.05, PDV_RUPTURE_HIT=1.2;
const PDV_HEAT_RATE=2.0, PDV_HEAT_DECAY=0.7, PDV_SEUIL=95, PDV_AFTER=45;
const PDV_CHOUFFE_DAMP=0.7, PDV_CHOUFFE_PAY=60, PDV_TAMPON_MAX=60; // barrettes
const PDV_WANT=[1,1,2,1,3,2,1,2]; // paniers clients (barrettes)
const PDV_NAMES=["Momo","Inès","Yaz","Riton","Sofia","Sami","Lou","Nassim","Aya","Diego","Zoé","Paul"];
const PDV_AV=["🧢","🎧","🛵","🥀","💅","🎒","👟","🎲","🌙","🏗️","🎀","👤"]; // avatars des silhouettes (débit auto : charbonneur embauché)
const PDV_ADV=[{q:25,l:"Merdique"},{q:45,l:"Correct"},{q:62,l:"Bonne"},{q:78,l:"Top"}];
const pdvFair=q=>5+q*0.10;
const tampN=t=>Object.values(t||{}).reduce((a,n)=>a+n,0);      // barrettes au tampon
const tampG=t=>Object.entries(t||{}).reduce((a,[f,n])=>a+n*+f,0); // grammes au tampon
const pdvRush=()=>1+PDV_RUSH_AMP*(0.5+0.5*Math.sin((S.clock||0)*2*Math.PI/PDV_RUSH_PERIOD));
const pdvRushHot=()=>pdvRush()>1+PDV_RUSH_AMP*0.7;

function pdvDemande(){
  const P=S.shelter.pdv; const Qd=tampN(P.tampon)>0?P.tamponQ:(S.sachetQ||55); const Qa=P.advQ||Qd;
  // le PRIX pilote la demande : moins cher que le marché → plus de clients, plus cher → moins (déterministe, R4)
  const pr=P.prix/corner.cornerFair(S.reput); const attract=clamp(1.3-pr*0.5,0.12,1.35);
  const buzz=1+(S.expo||0)/PDV_EXPO_SCALE;
  return PDV_BASE_DEMAND*(P.res/100)*attract*buzz*pdvRush();
}
// sert un client (le premier de la file) : débite des barrettes du tampon
function pdvServe(P){
  const cl=P.queue.shift(); if(!cl) return;
  const sizes=Object.keys(P.tampon).map(Number).filter(f=>P.tampon[f]>0).sort((a,b)=>a-b);
  let n=0,g=0;
  for(const f of sizes){ while(P.tampon[f]>0 && n<cl.want){ P.tampon[f]--; if(P.tampon[f]<=0) delete P.tampon[f]; n++; g+=f; } if(n>=cl.want) break; }
  if(n===0){ P.res=clamp(P.res-PDV_RUPTURE_HIT,0,100); return; } // rupture : rien à vendre
  const price=Math.round(g*P.prix); P.bac+=price;
  const Qd=P.tamponQ||S.sachetQ||55, Qa=P.advQ||Qd, pr=P.prix/pdvFair(Qa);
  const content=clamp(0.55+(Qd-Qa)*0.010-0.8*Math.max(0,pr-1),0,1);
  P.res+=(content*100-P.res)*PDV_RES_PER_SALE;
  P.ledger.unshift({nm:cl.nm,n,g,eur:price}); if(P.ledger.length>6) P.ledger.length=6;
}
/* ---------- Le Corner — négo présentielle (joueur présent) : porté de le-corner/ ----------
   Quand tu tiens TON corner, la carte client remplace la vente auto :
   offre vs menu, accepter / contrer (steppers de prix) / refuser, zones déterministes.
   Le débit auto (pdvServe) ne sert plus que le charbonneur embauché (plus tard). */
const CORNER_MAX_QUEUE=6;   // on sert un client à la fois → file courte
const CORNER_ARRIVAL=3.2;   // arrivées négo : quelques clients/soirée (pas le flux auto)
function cornerActive(P){ return P.queue&&P.queue.length?P.queue[0]:null; }
function cornerTake(P, wantB){ // débite wantB barrettes du tampon (petites d'abord) → {n,g}
  const sizes=Object.keys(P.tampon).map(Number).filter(f=>P.tampon[f]>0).sort((a,b)=>a-b);
  let n=0,g=0;
  for(const f of sizes){ while(P.tampon[f]>0 && n<wantB){ P.tampon[f]--; if(P.tampon[f]<=0) delete P.tampon[f]; n++; g+=f; } if(n>=wantB) break; }
  return {n,g};
}
function cornerSpawn(P){ // client (persona ou louche) + sa demande (déterministe)
  // profil cramé (louche) : à partir de J2, apparition déterministe, un seul à la fois
  if(S.day>=corner.CORNER.LOUCHE_FROM_DAY && !P.queue.some(c=>c.kind==="louche") && cornerHash(S.day*3, P.seq)>1-corner.CORNER.LOUCHE_CHANCE){
    const L=corner.makeLouche(S.day, P.seq, S.reput, P.prix), pat=corner.patienceOf("louche");
    return { cid:null, nm:L.nm, av:L.av, kind:"louche", rel:0, want:clamp(Math.round(L.qty/2),1,10),
      g:L.qty, offer:L.offer, tx:L.tx, tell:L.tell, cop:L.cop, pat, pat0:pat, mode:"louche", negoP:L.offer, dernier:null };
  }
  const avail=corner.CORNER_PERSONAS.filter(p=>S.clients[p.id]&&S.clients[p.id].unlocked&&!S.clients[p.id].quit);
  // PNJ anonyme (le volume : vient chercher sa dose, sans plus) vs persona nommé (le sel) — tirage déterministe
  if(!avail.length || cornerHash(S.day*11, P.seq) < corner.CORNER.ANON_SHARE){
    const a=corner.makeAnon(S.day, P.seq, S.reput, P.prix), i=P.seq, pat=corner.patienceOf("anon");
    return { cid:null, nm:PDV_NAMES[i%PDV_NAMES.length], av:PDV_AV[i%PDV_AV.length], kind:"anon", rel:0,
      want:clamp(Math.round(a.qty/2),1,4), g:a.qty, offer:a.offer, tx:a.tx, tell:"", pat, pat0:pat, mode:"offer", negoP:a.offer, dernier:null };
  }
  const p=avail[(P.seq)%avail.length], c=S.clients[p.id];
  const o=corner.makeOffer(p, c.rel, S.reput, S.day, P.seq, P.prix), pat=corner.patienceOf(p.kind);
  const base={ cid:p.id, nm:p.nm, av:p.av, kind:p.kind, rel:c.rel, pat, pat0:pat, mode:o.mode, tx:o.tx, tell:o.tell, dernier:null };
  if(o.mode==="hesit") return { ...base, want:clamp(Math.round(o.usual/2),1,6), g:o.usual, usual:o.usual, offer:0, negoP:0 };
  if(o.mode==="ambig") return { ...base, want:1, g:0, expect:o.expect, composeB:0, offer:0, negoP:0 };
  return { ...base, want:clamp(Math.round(o.qty/2),1,6), g:o.qty, offer:o.offer, negoP:o.offer };
}
/* --- mise en scène rue (Option B) : silhouettes, fenêtres allumées, priorisation --- */
const CORNER_SLOTS=[{l:30,b:20,s:1.06},{l:54,b:24,s:.9},{l:66,b:26,s:.82},{l:76,b:28,s:.76},{l:85,b:30,s:.7},{l:92,b:31,s:.65}];
let cornerEls=new Map(); // client → silhouette DOM (runtime ; reconstruit à chaque renderCorner)
function cornerHash(a,b){ let x=(a*73856093)^(b*19349663); x=((x^(x>>13))*1274126177)|0; return (((x^(x>>16))>>>0)%100000)/100000; }
function cornerLitWindows(){ // fenêtres allumées déterministes par soirée
  const bats=[{el:document.getElementById("cBat1"),cols:8,rows:9},{el:document.getElementById("cBat2"),cols:11,rows:11}];
  for(let b=0;b<bats.length;b++){ const o=bats[b]; if(!o.el) continue; o.el.querySelectorAll(".cwin").forEach(w=>w.remove());
    for(let i=0;i<o.cols*o.rows;i++){ if(cornerHash(S.day*13+b*7,i)>0.86){ const w=document.createElement("div"); w.className="cwin";
      w.style.left=(6+(i%o.cols)*(88/o.cols))+"%"; w.style.top=(6+Math.floor(i/o.cols)*(86/o.rows))+"%"; w.style.opacity=0.15+cornerHash(S.day,i)*0.3; o.el.appendChild(w); } } }
}
function cornerSilhouette(cl){
  const pe=document.createElement("div"); pe.className="cperso"; pe.dataset.k=cl.kind;
  pe.style.left="108%"; pe.style.bottom="26%"; pe.style.setProperty("--s",0.7);
  pe.innerHTML=`<div class="chead">${cl.av||"👤"}</div><div class="cbody"></div><div class="clbl">${cl.nm}</div><div class="cpat2"><i></i></div>`;
  pe.onclick=()=>{ const P=S.shelter.pdv; cornerPrioritize(P, cl); };
  return pe;
}
function cornerLayoutPersos(P){

    el.style.left=s.l+"%"; el.style.bottom=s.b+"%"; el.style.setProperty("--s",s.s); el.classList.toggle("active",i===0);
    const pi=el.querySelector(".cpat2 i"); if(pi){ const r=clamp(cl.pat/cl.pat0,0,1); pi.style.width=(r*100)+"%"; pi.style.background=r>0.5?"#3ddc84":r>0.22?"#ffd06a":"#ff6a6a"; } });
  const empty=document.getElementById("cEmpty"); if(empty) empty.style.display=P.queue.length?"none":"block";

function cornerPrioritize(P, cl){ // tap une silhouette de la file → la servir en premier (Overcooked)
  const i=P.queue.indexOf(cl); if(i<=0) return;
  P.queue.splice(i,1); P.queue.unshift(cl);
  renderCornerActive(P); cornerLayoutPersos(P);
}
function cornerNegoTick(P, dt, demande, open){
  const was=cornerActive(P);
  if(open){
    P.qacc=(P.qacc||0)+demande*dt*CORNER_ARRIVAL/3600;
    while(P.qacc>=1 && P.queue.length<CORNER_MAX_QUEUE){ P.qacc-=1; P.seq=(P.seq||0)+1; const cl=cornerSpawn(P); if(cl) P.queue.push(cl); else break; }
    if(P.qacc>CORNER_MAX_QUEUE) P.qacc=CORNER_MAX_QUEUE;
  } else P.qacc=0;
  let expired=0;
  const waiting=cl=>cl.mode!=="nego"&&cl.mode!=="dernier"; // gelé pendant qu'on négocie/dernier prix
  for(let i=0;i<P.queue.length;i++){ const cl=P.queue[i]; if(!waiting(cl)) continue; cl.pat-=dt*(i===0?1:corner.CORNER.QUEUE_MELT); }
  const keep=[];
  for(const cl of P.queue){ if(waiting(cl)&&cl.pat<=0){ expired++; if(cl.cid&&S.clients[cl.cid]) S.clients[cl.cid].missed++; } else keep.push(cl); }
  if(expired){ P.queue=keep; P.res=clamp(P.res-corner.CORNER.RES_WALK*0.4*expired,0,100); P.combo=1; }
  if(cornerActive(P)!==was) renderCornerActive(P); else cornerPatchActive(P);
  cornerLayoutPersos(P); // positionne les silhouettes + jauges de patience
}
function applyDeltas(cl, v){
  const c=S.clients[cl.cid]; if(!c) return;
  if(v.rel) c.rel=clamp(c.rel+v.rel,0,100);
  if(v.reput) S.reput=clamp(S.reput+v.reput,0,100);
  if(v.res){ const P=S.shelter.pdv; P.res=clamp(P.res+v.res,0,100); }
  if(v.resetGouge) c.gougeStreak=0;
  if(v.gouge){ c.gougeStreak=(c.gougeStreak||0)+1; if(c.gougeStreak>=corner.CORNER.GOUGE_STREAK_QUIT){ c.quit=true; toast("💔 "+cl.nm+" ne reviendra plus (trop d'abus)."); } }
}
function cornerLeave(P, cl, why, v, tip){
  P.queue=P.queue.filter(c=>c!==cl);
  if(why==="done"){ const rc=v?corner.reactLine(v.outcome, S.day+(P.seq||0), corner.personaById(cl.cid)):""; toast((v?v.emo:"")+" "+cl.nm+(tip?" +"+tip+" 💝":"")+(rc?" — "+rc:"")); }
  else if(why==="louche") toast("🚨 "+cl.nm+" servi — chaleur +"+corner.CORNER.HEAT_LOUCHE+" (c'était un flic…)");
  else if(why==="pigeon") toast("🤝 "+cl.nm+" — client réglo, grosse vente propre.");
  else if(why==="flair") toast("🕶️ Bien vu, un flic. +"+corner.CORNER.FLAIR_BONUS+" discrétion.");
  else if(why==="pigeonRefus") toast("🙄 C'était un vrai client… vente perdue (aucun malus).");
  else if(why==="walk") toast("🤬 "+cl.nm+" — vente perdue");
  else if(why==="refus") toast("Ok, une autre fois. (aucun malus)");
  else if(why==="rupture") toast("Rupture — ravitaille le tampon.");
  save(); hud(); renderCornerActive(P);
}
// vente commune : débite wantB barrettes du tampon, remplit le bac + ledger. false si rupture.
function cornerSell(P, cl, wantB, total, tip){
  const sold=cornerTake(P, wantB);
  if(sold.n===0){ P.res=clamp(P.res-PDV_RUPTURE_HIT,0,100); cornerLeave(P, cl, "rupture"); return false; }
  P.bac+=total+(tip||0);
  P.ledger.unshift({nm:cl.nm, n:sold.n, g:sold.g, eur:total+(tip||0)}); if(P.ledger.length>6) P.ledger.length=6;
  return true;
}
function cornerResolve(P, cl, total, firstTry, isClientOffer){
  const v=corner.resolveOffer(cl, cl.g, total, firstTry, isClientOffer, S.reput, P.prix);
  if(v.outcome==="counter"){ cl.countered=true; cl.dernier=v.counterTotal; cl.mode="dernier"; renderCornerActive(P); toast("Il contre — dernier prix "+v.counterTotal); return; }
  if(v.outcome==="walk"){ applyDeltas(cl, v); P.combo=1; cornerLeave(P, cl, "walk", v); return; }
  let tip=0;
  if(v.tipRate){ tip=Math.round(total*v.tipRate*(P.combo||1)); }
  if(!cornerSell(P, cl, cl.want, total, tip)) return;
  if(v.tipRate) P.combo=Math.min(corner.CORNER.COMBO_MAX,(P.combo||1)+corner.CORNER.COMBO_STEP);
  applyDeltas(cl, v);
  cause("Vente corner", cl.nm+" · "+v.outcome+" +"+(total+tip));
  cornerLeave(P, cl, "done", v, tip);
}
// louche : vendre → chaleur (ni relation ni combo) ; refuser → discrétion (petit liquide)
// vendre au louche : cop:false = pigeon légitime (grosse vente propre, zéro chaleur) ; sinon (vrai flic / doute) → chaleur
function cornerResolveLouche(P, cl){
  if(!cornerSell(P, cl, cl.want, cl.offer, 0)) return;
  P.combo=1;
  if(cl.cop===false){ S.reput=clamp(S.reput+corner.CORNER.REP_DEAL,0,100); cause("Grosse vente", cl.nm+" +"+cl.offer+" · client réglo"); cornerLeave(P, cl, "pigeon"); }
  else { S.heat=clamp(S.heat+corner.CORNER.HEAT_LOUCHE,0,100); cause("Vente cramée", cl.nm+" +"+cl.offer+" · chaleur +"+corner.CORNER.HEAT_LOUCHE); cornerLeave(P, cl, "louche"); }
}
// refuser le louche : cop:false = t'as recalé un vrai client (juste une vente perdue, R1) ; sinon t'as flairé le flic (+discrétion)
function cornerFlair(P, cl){
  if(cl.cop===false){ P.combo=1; cornerLeave(P, cl, "pigeonRefus"); }
  else { S.dirty+=corner.CORNER.FLAIR_BONUS; cause("Flic flairé","+"+corner.CORNER.FLAIR_BONUS+" discrétion"); cornerLeave(P, cl, "flair"); }
}
// hésitant : toute attention convertit ; son habituel (perso) paie un pourboire
function cornerResolveHesit(P, cl, perso){
  const fair=P.prix||corner.cornerFair(S.reput), wantB=perso?cl.want:1, g=perso?cl.usual:2, total=Math.round(g*fair);
  const tip=perso?Math.round(total*corner.CORNER.TIP_LU):0;
  if(!cornerSell(P, cl, wantB, total, tip)) return;
  const c=S.clients[cl.cid]; if(c) c.rel=clamp(c.rel+(perso?corner.CORNER.REL_PERSO:corner.CORNER.REL_DEAL),0,100);
  S.reput=clamp(S.reput+corner.CORNER.REP_DEAL,0,100);
  cornerLeave(P, cl, "done", {emo:perso?"🥰":"🙂", outcome:perso?"lu":"deal"}, tip);
}
// ambigu : le joueur compose ; bien lu (grammes == attendu) → pourboire, sinon vendu quand même (R1)
function cornerResolveAmbig(P, cl){
  const fair=P.prix||corner.cornerFair(S.reput), g=(cl.composeB||0)*2;
  if(g<=0){ toast("Ajoute au moins une barrette."); return; }
  const total=Math.round(g*fair), lu=(g===cl.expect);
  const tip=lu?Math.round(total*corner.CORNER.TIP_LU*(P.combo||1)):0;
  if(!cornerSell(P, cl, cl.composeB, total, tip)) return;
  const c=S.clients[cl.cid];
  if(lu){ if(c) c.rel=clamp(c.rel+corner.CORNER.REL_JUSTE+1,0,100); P.combo=Math.min(corner.CORNER.COMBO_MAX,(P.combo||1)+corner.CORNER.COMBO_STEP); }
  else if(c) c.rel=clamp(c.rel+1,0,100);
  S.reput=clamp(S.reput+corner.CORNER.REP_DEAL,0,100);
  cornerLeave(P, cl, "done", {emo:lu?"🎯":"😶", outcome:lu?"lu":"mouais"}, tip);
}
function cornerAct(P, a){
  const cl=cornerActive(P); if(!cl) return;
  if(a==="refuse"||a==="refuse2") return cornerLeave(P, cl, "refus");
  if(a==="cancel"){ cl.mode="offer"; return renderCornerActive(P); }
  if(a==="counter"){ cl.mode="nego"; cl.negoP=cl.offer; return renderCornerActive(P); }
  if(a==="accept") return cornerResolve(P, cl, cl.offer, true, true);
  if(a==="send"){ const first=!cl.countered; cl.mode="offer"; return cornerResolve(P, cl, cl.negoP, first, false); }
  if(a==="accept2") return cornerResolve(P, cl, cl.dernier, false, true);
  if(a==="loucheOk") return cornerResolveLouche(P, cl);
  if(a==="loucheNo") return cornerFlair(P, cl);
  if(a==="hesitPerso") return cornerResolveHesit(P, cl, true);
  if(a==="hesitGen") return cornerResolveHesit(P, cl, false);
  if(a==="compSell") return cornerResolveAmbig(P, cl);
}

function pdvTick(dt){
  const P=S.shelter&&S.shelter.pdv; if(!P) return;
  // PRÉSENCE REQUISE : au début, le charbonneur c'est TOI — tu ne vends au corner
  // que quand tu le tiens (écran corner). Vendre au corner ⇄ vendre/livrer sur
  // SnapShit = un arbitrage de ta présence. L'embauche d'un charbonneur (plus tard)
  // posera S.upgrades.charbonneur et fera tourner le corner en fond (le reste du
  // tick gère déjà ce cas : file, ventes, bac, badge sur le pin).
  const held=tab==="shelter"&&shelterSub==="pdv";
  if(!held && !(S.upgrades&&S.upgrades.charbonneur)) return; // pas là & pas de charbonneur → corner fermé
  if(!P.queue) P.queue=[]; if(!P.ledger) P.ledger=[]; if(!P.tampon) P.tampon={};
  const open=tampN(P.tampon)>0;   // on ne vend que s'il y a de quoi (tampon ravitaillé)
  const demande=pdvDemande();
  const nego = held; // présent → négo au client ; absent (charbonneur embauché, plus tard) → débit auto
  if(nego){
    cornerNegoTick(P, dt, demande, open); // arrivées personas + patience + carte active (pas d'auto-serve)
  } else {
    // débit AUTO (charbonneur embauché, plus tard : le corner tourne en fond, joueur absent)
    if(open){
      P.qacc=(P.qacc||0)+demande*dt*PDV_TIME_COMPRESS/3600;
      while(P.qacc>=1 && P.queue.length<PDV_MAX_QUEUE){ P.qacc-=1; P.seq=(P.seq||0)+1; P.queue.push({nm:PDV_NAMES[P.seq%PDV_NAMES.length], av:PDV_AV[P.seq%PDV_AV.length], want:PDV_WANT[P.seq%PDV_WANT.length], wait:0}); }
      if(P.qacc>PDV_MAX_QUEUE) P.qacc=PDV_MAX_QUEUE;
    } else P.qacc=0;
    P.serveAcc=(P.serveAcc||0)+PDV_SERVE_RATE*dt;
    while(P.serveAcc>=1 && P.queue.length){ P.serveAcc-=1; pdvServe(P); }
    for(const cl of P.queue) cl.wait=(cl.wait||0)+dt;
    const before=P.queue.length; P.queue=P.queue.filter(c=>(c.wait||0)<PDV_MAX_WAIT);
    if(P.queue.length<before) P.res=clamp(P.res-PDV_RUPTURE_HIT*(before-P.queue.length),0,100);
  }
  // Heat : le corner ne chauffe que quand il tourne (à sec → il refroidit), amortie par les chouffes
  const activity=open ? clamp(demande/PDV_BASE_DEMAND + P.queue.length*0.04, 0, 1.6) : 0;
  S.heat=clamp(S.heat+(activity*PDV_HEAT_RATE/(1+(P.chouffes||0)*PDV_CHOUFFE_DAMP)-PDV_HEAT_DECAY)*dt,0,100);
  if(S.heat>=PDV_SEUIL){ pdvDescente(); return; }
  if(tab==="shelter"&&shelterSub==="pdv") pdvPatch();        // écran corner : maj live des compteurs
  else if(tab==="shelter"&&shelterSub==="map") pdvBadge(P);  // carte : le bac qui monte sur le pin
}

function pdvDescente(){

  cause("Descente au corner","−"+lost+" exposé"); hud();

// livre nWant barrettes (sachets) de la planque vers le tampon exposé (petites d'abord)
function pdvRavito(nWant){
  const P=S.shelter.pdv; if(!P.tampon) P.tampon={};
  const room=PDV_TAMPON_MAX-tampN(P.tampon);
  if(room<=0){ toast("Tampon plein ("+PDV_TAMPON_MAX+" barrettes)."); return; }
  const sizes=sizesOf(S.sachets); if(!sizes.length){ toast("Pas de sachets — coupe et conditionne d'abord (Atelier)."); return; }
  const target=Math.min(nWant||room, room); let moved=0, movedG=0;
  for(const f of sizes.slice().sort((a,b)=>a-b)){ while(S.sachets[f]>0 && moved<target){ S.sachets[f]--; if(S.sachets[f]<=0) delete S.sachets[f]; P.tampon[f]=(P.tampon[f]||0)+1; moved++; movedG+=f; } if(moved>=target) break; }

  else toast("Plus de sachets à charger.");

/** Emballe UNE barrette de taille f (telle que coupée). Retourne true si OK. */
function commitSachet(f, why){
  if(!(S.bars[f]>0)) return false;
  const stockG=Object.entries(S.sachets).reduce((a,[ff,nn])=>a+nn*+ff,0);
  S.bars[f]--; if(!S.bars[f]) delete S.bars[f];
  S.sachetQ=avgMerge(stockG,S.sachetQ,+f,S.barQ);
  S.sachets[f]=(S.sachets[f]||0)+1;
  cause(`Sachet ${f} g`, why);
  return true;
}

  const onDown=(e)=>{
    const el=e.target.closest(".bag-bar");
    if(!el||el.classList.contains("used")){
      // geste hors barrette = candidat swipe retour découpe
      if(e.target.closest("#bench")){ const p=pt(e); swipe={x:p.x,y:p.y}; }
      return;
    }
    e.preventDefault();
    const p=pt(e);
    const r=el.getBoundingClientRect();
    const homeL=el.style.left, homeT=el.style.top;
    el.classList.add("drag");
    drag={el, f:+el.dataset.f, ox:p.x-r.left, oy:p.y-r.top, homeL, homeT};
  };
  const onMove=(e)=>{
    if(!drag) return;
    e.preventDefault();
    const p=pt(e);
    const b=bench.getBoundingClientRect();
    drag.el.style.left=(((p.x-drag.ox)-b.left)/b.width*100)+"%";
    drag.el.style.top=(((p.y-drag.oy)-b.top)/b.height*100)+"%";
    zip.classList.toggle("hot", !!hitZip(p.x,p.y));
  };
  const onUp=(e)=>{
    const p=e.changedTouches?{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY}:pt(e);
    if(swipe){
      const dx=p.x-swipe.x, dy=p.y-swipe.y; swipe=null;
      if(dx>60&&Math.abs(dx)>Math.abs(dy)*1.2){ atelierSub="cut"; render(); } // swipe ▸ = revenir couper
      return;
    }
    if(!drag) return;
    const z=hitZip(p.x,p.y);
    zip.classList.remove("hot");
    const {el, f, homeL, homeT}=drag;
    el.classList.remove("drag");
    drag=null;
    if(!z){
      el.style.left=homeL; el.style.top=homeT; // R1
      return;
    }
    if(!commitSachet(f, "Barrette → zip (D31)")){
      el.style.left=homeL; el.style.top=homeT;
      toast("Plus de stock.");
      return;
    }
    // fill + barrette disparaît dans le zip
    z.querySelector(".fill").style.height="48%";
    z.querySelector(".tag").textContent=`${f}g`;
    z.classList.remove("open","hot");
    z.classList.add("sealed");
    el.classList.add("used");
    el.style.opacity="0";
    el.style.transform="scale(.2)";
    el.style.transition="opacity .2s, transform .2s";
    // sachet part automatiquement à droite
    requestAnimationFrame(()=>slot.classList.add("to-done"));
    toast(`Zip ${f} g.`);
    save(); hud();
    setTimeout(()=>{
      const m=document.createElement("div"); m.className="bag-mini"; stack.appendChild(m);
      while(stack.children.length>8) stack.removeChild(stack.firstChild);
      renderDoseBag(); // prochain zip + bac à jour
    }, 380);
  };

  if(renderDoseBag._ac) renderDoseBag._ac.abort();
  renderDoseBag._ac=new AbortController();
  const sig=renderDoseBag._ac.signal;
  bench.addEventListener("pointerdown", onDown, {passive:false, signal:sig});
  window.addEventListener("pointermove", onMove, {passive:false, signal:sig});
  window.addEventListener("pointerup", onUp, {passive:false, signal:sig});
}

function buyPain(p){
  if(!p) return;
  if(p.reputGate&&S.reput<p.reputGate){ toast("Standing insuffisant."); return; }
  if(S.dirty<p.price){ toast("Liquide insuffisant."); return; }
  if(finiG()+painsG()+p.g>planqueCap()){
    // la planque compte TOUT (pains + barrettes + sachets) — dire les chiffres, pas juste « pleine »
    toast(`Planque ${money(finiG()+painsG())}/${planqueCap()} g — pas la place pour +${p.g} g. Vends, ou agrandis (Réinvest, Home).`);
    return;
  }
  S.dirty-=p.price;
  // chaque pain garde SA qualité ; un lot livre plusieurs savonnettes (split)
  const chunk=p.split||p.g;
  for(let left=p.g; left>0; left-=chunk) S.pains.push({ g:Math.min(chunk,left), q:p.q });
  if(S.painSel>=S.pains.length) S.painSel=0;
  cause(`Achat ${p.label}`,`−${money(p.price)}`); toast("Pain reçu."); save(); hud();
}

function launchRuns(){
  const ready=S.orders.filter(o=>o.status==="ready"&&S.assign[o.id]);
  if(!ready.length){ toast("Assigne d'abord."); return; }
  const blocks=beuher.resolveRuns(S.assign, ready, S.heat);
  // RT-8 : pas de lancement suicide silencieux
  if(blocks.some(b=>b.busted)){
    toast("CHAUD — allège la charge ou change de coursier.");
    return;
  }
  for(const bl of blocks){
    S.heat=clamp(S.heat+bl.hx,0,beuher.HEAT_CAP);
    const time=bl.eta;
    S.runs.push({
      id:"r"+Math.round(S.clock*10)+"_"+bl.courier.id,
      courierId:bl.courier.id, courierNm:bl.courier.nm, col:bl.courier.col,
      g:bl.totalG, pay:bl.pay, fee:0, net:bl.net, busted:false,
      left:time, total:time, collected:false,
      orderIds:bl.orders.map(o=>o.id),
    });
    bl.orders.forEach(o=>{ o.status="assigned"; delete S.assign[o.id]; });
    cause(`Tournée ${bl.courier.nm}`, `${bl.totalG} g · ETA ${time}s · 0 fee`);
  }
  toast("Tournées lancées.");
  save(); renderBeuher();
}

function collectRun(id){
  const r=S.runs.find(x=>x.id===id);
  if(!r||r.collected||r.left>0) return;
  r.collected=true;
  if(r.busted){
    cause(`Saisie ${r.courierNm}`,`+chaleur · argent perdu`);
    toast("Saisi. BeuherShit envoie un emoji triste.");
  } else {
    S.dirty+=r.net;
    pushBills(r.net);
    S.reput=clamp(S.reput+1+(r.g>=15?1:0),0,100);
    S.soldDay+=r.g;
    cause(`Retour ${r.courierNm}`,`+${money(r.net)} liquide`);
    toast("Liquide en trémie.");
  }
  save();
  if(!r.busted){
    tab="cash"; cashSub="sorter";
    sorter.running=true; sorter.cooldown=0.15; // auto-start : tu attends
    render();
  } else renderBeuher();
}

function pushBills(amount){
  if(!SORTER_ENABLED) return; // trieuse masquée : pas de billets à trier (le liquide reste la monnaie de travail)
  // RT-1 : jamais inventer de valeur — reste exact en monnaie (1)
  let left=Math.round(amount);
  for(const d of [100,50,20,5,1]){
    while(left>=d){
      S.bills.push({ id:"b"+S.bills.length+"_"+d+"_"+Math.round(S.clock*10)+"_"+left, v:d });
      left-=d;
    }
  }
}

function sorterTick(dt){
  if(tab!=="cash") return;
  if(sorter.cooldown>0) sorter.cooldown-=dt;
  // billet en vol → à la fin du passage, poche auto
  if(sorter.current){
    sorter.current.t+=dt;
    if(sorter.current.t>=SORT_FEED) sorterCommit();
    return;
  }
  if(!sorter.running || sorter.cooldown>0) return;
  if(!S.bills.length){
    sorter.running=false;
    if(!sorter.dirtyUi){ sorter.dirtyUi=true; toast("Trémie vide. Encaisser."); renderCashSorter(); }
    return;
  }
  const b=S.bills[0];
  sorter.current={ id:b.id, v:b.v, t:0 };
  renderCashSorter();
}
function sortBill(id){
  const i=S.bills.findIndex(x=>x.id===id); if(i<0) return;
  const [b]=S.bills.splice(i,1);
  const d=b.v;
  S.dirty=Math.max(0,S.dirty-d);
  // Monnaie exacte (1) → poche, bankable 1:1
  if(d===1){
    S.looseChange=(S.looseChange||0)+1;
    save();
    return;
  }
  if(![5,20,50,100].includes(d)){ S.looseChange=(S.looseChange||0)+d; save(); return; }
  if(!S._pile) S._pile={5:0,20:0,50:0,100:0};
  S._pile[d]=(S._pile[d]||0)+1;
  S.counted=(S.counted||0)+d;
  if(S._pile[d]>=BUNDLE_SIZE){
    S._pile[d]-=BUNDLE_SIZE; S.bundles[d]=(S.bundles[d]||0)+1;
    S.counted=Math.max(0,(S.counted||0)-d*BUNDLE_SIZE);
    toast(`Liasse ${money(d)}. Enfin.`);
    try{ navigator.vibrate&&navigator.vibrate(25); }catch{}
  }
  save();
}
function bankBundles(){
  let got=0;
  for(const d of [5,20,50,100]){ const n=S.bundles[d]||0; if(n>0){ got+=d*BUNDLE_SIZE*n; S.bundles[d]=0; } }
  const loose=S.looseChange||0;
  got+=loose; S.looseChange=0;
  if(got<=0) return;
  S.cash+=got; S.counted=0;
  cause("Liasses encaissées",`+${money(got)} propre`);
  toast(`+${money(got)} propre. Rachat autorisé.`);
  save(); render();
}

/* ---------- Seed DMs if empty ---------- */
function ensureDemand(){
  if(!S.dms || !S.dms.length){
    const spike=S.posteAujourdhui?Math.round(snap.SC.DROP_SPIKE*S.credibilite):0;
    const good=Math.max(2, Math.round(S.reput/14 + S.expo/22 + spike/8));
    const bad=Math.round(good*S.flake);
    S.dms=snap.buildDMs(S, good, bad, S.expo);
  }
}

// Temps UNIQUE : une soirée s'écoule en temps réel et se clôture toute seule.
// « Passer la nuit » (bouton) = juste avancer plus vite. (retour de test : corner temps réel
// vs SnapShit à la soirée coïncidaient mal → une seule horloge.)
function advanceDay(manual){
  const qLivree=snap.deliveredQuality(S, qualAvg());
  const cons=snap.passerSoiree(S, qLivree);
  S.day++; S.heat=clamp(S.heat-6,0,100); S.soldDay=0;
  cons.forEach(c=>cause(c.t,c.c));
  // paie des chouffes du corner (liquide d'abord, puis propre) — sinon un chouffe part
  { const P=S.shelter&&S.shelter.pdv; const due=(P&&P.chouffes||0)*PDV_CHOUFFE_PAY;
    if(due>0){ if(S.dirty>=due){ S.dirty-=due; cause("Paie chouffes","−"+due+" liquide"); }
      else if(S.cash>=due){ S.cash-=due; cause("Paie chouffes","−"+due+" propre"); }
      else { P.chouffes=Math.max(0,P.chouffes-1); cause("Chouffe parti","paie manquée"); } } }
  if(S.shelter&&S.shelter.pdv) S.shelter.pdv.combo=1; // combo négo : remis à zéro à chaque clôture de soirée
  const sh=shelter.nightTick(S, planqueCap());
  sh.cons.forEach(c=>cause(c.t,c.c));
  S.dayAcc=0;
  const last=sh.cons[sh.cons.length-1] || cons[cons.length-1];
  toast(manual ? (last?.c || "Nouvelle nuit.") : ("J"+S.day+" — demande rafraîchie, paie faite."));
  save(); hud();
  if(tab==="shelter"&&shelterSub==="pdv") renderCorner(S.shelter.pdv); // rafraîchit la scène après clôture
}

let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  S.clock+=dt;
  // horloge unique : la journée avance toute seule
  S.dayAcc=(S.dayAcc||0)+dt;
  if(S.dayAcc>=DAY_SEC_REAL){ advanceDay(false); if(tab==="snap") renderSnap(); }
  if(S.dirty>DIRTY_HOLD_SOFT){
    S._dirtyAcc=(S._dirtyAcc||0)+dt;
    if(S._dirtyAcc>=3){ S._dirtyAcc=0; S.heat=clamp(S.heat+(S.dirty>DIRTY_HOLD_HARD?2:1),0,100); }
  }
  if(SORTER_ENABLED && S.upgrades.counter>0 && S.dirty>0 && S.bills.length===0){
    const take=Math.min(S.dirty, COUNTER_RATE*dt); S.dirty-=take; S.cash+=take;
  }
  let dirtyRun=false, runDone=false;
  for(const r of S.runs){
    if(r.left>0){ r.left-=dt; if(r.left<=0){ r.left=0; runDone=true; } dirtyRun=true; }
  }
  if(tab==="beuher"){
    // arrivée d'une tournée → refresh immédiat : le retour de liquide
    // apparaît sans quitter l'onglet (avant, le dernier render pouvait sauter)
    if(runDone){ frame._acc=0; renderBeuher(); }
    else if(dirtyRun){
      if(!frame._acc) frame._acc=0; frame._acc+=dt;
      if(frame._acc>0.35){ frame._acc=0; renderBeuher(); }
    }
  }
  sorterTick(dt);
  pdvTick(dt);
  if(scene3d) scene3d.tick(dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
setInterval(()=>save(),2000);

// ---------- Panneau debug (test rapide : argent, phase, stock, upgrades) ----------
// Outil de dev : bouton flottant 🐞 → panneau d'actions. Rien de tout ça n'affecte
// une partie « propre » tant qu'on n'y touche pas. À retirer avant une vraie release.
function setupDebug(){
  if(document.getElementById("dbgBtn")) return;
  const btn=document.createElement("button");
  btn.id="dbgBtn"; btn.textContent="🐞"; btn.title="Debug";
  btn.style.cssText="position:fixed;right:10px;bottom:80px;z-index:99999;width:42px;height:42px;border-radius:50%;border:1px solid #555;background:#1b1b22;color:#fff;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.55);cursor:pointer";
  const panel=document.createElement("div");
  panel.id="dbgPanel";
  panel.style.cssText="position:fixed;right:10px;bottom:130px;z-index:99999;width:238px;max-height:72vh;overflow:auto;display:none;padding:10px;border-radius:12px;border:1px solid #555;background:rgba(18,18,24,.97);color:#fff;box-shadow:0 6px 24px rgba(0,0,0,.6)";
  const A={};
  const H=t=>`<div style="margin:9px 0 2px;font-weight:800;opacity:.55;font-size:10px;letter-spacing:.4px;text-transform:uppercase">${t}</div>`;
  const add=(label,fn)=>{ A[label]=fn; return `<button data-dbg="${label}" style="display:block;width:100%;margin:3px 0;padding:7px 9px;border-radius:8px;border:1px solid #444;background:#2a2a33;color:#fff;font-size:12px;text-align:left;cursor:pointer">${label}</button>`; };
  let h=`<div style="font-weight:800;margin-bottom:2px">Debug · test</div>`;
  h+=H("Argent");
  h+=add("+200 liquide", ()=>S.dirty+=200);
  h+=add("+1000 liquide", ()=>S.dirty+=1000);
  h+=add("+200 propre", ()=>S.cash+=200);
  h+=H("Boucle");
  h+=add("🚀 Kit test (stock + liquide)", ()=>{ S.pains.push({g:100,q:52},{g:100,q:52}); S.painSel=0; S.sachets["2"]=(S.sachets["2"]||0)+60; S.sachetQ=S.sachetQ||62; S.dirty+=1000; S.reput=Math.max(S.reput,30); const P=S.shelter.pdv; P.bac=0; P.tampon={}; P.tamponQ=0; P.queue=[]; });
  h+=add("Embauche charbonneur (on/off)", ()=>{ S.upgrades.charbonneur=S.upgrades.charbonneur?0:1; });
  h+=H("Stock");
  h+=add("+Pain 100 g", ()=>{ S.pains.push({g:100,q:52}); });
  h+=add("+Pain 250 g", ()=>{ S.pains.push({g:250,q:78}); });
  h+=add("+60 sachets 2 g", ()=>{ S.sachets["2"]=(S.sachets["2"]||0)+60; S.sachetQ=S.sachetQ||62; });
  h+=add("+30 barrettes 2 g", ()=>{ S.bars["2"]=(S.bars["2"]||0)+30; S.barQ=S.barQ||60; });
  h+=H("Upgrades");
  h+=add("Couteau +1 (coupe plus gros)", ()=>{ S.upgrades.couteau=Math.min(UPG.couteau.max,(S.upgrades.couteau||0)+1); });
  h+=add("Tous les upgrades au max", ()=>{ for(const k in UPG) S.upgrades[k]=UPG[k].max; });
  h+=add("Reput +20", ()=>{ S.reput=clamp((S.reput||0)+20,0,100); });
  h+=H("Divers");
  h+=add("Heat → 0", ()=>{ S.heat=0; });
  h+=add("⏭ Passer la nuit (clôture soirée)", ()=>{ advanceDay(true); });
  h+=add("🗑 Reset save", ()=>{ Object.keys(localStorage).filter(k=>k.startsWith(LS)).forEach(k=>localStorage.removeItem(k)); store.set("ver",SAVE_VERSION); S=defaultState(); });
  panel.innerHTML=h;
  document.body.appendChild(btn); document.body.appendChild(panel);
  btn.onclick=()=>{ panel.style.display = panel.style.display==="none" ? "block" : "none"; };
  panel.querySelectorAll("[data-dbg]").forEach(b=>b.onclick=()=>{ const fn=A[b.dataset.dbg]; if(fn) fn(); save(); render(); toast("debug: "+b.dataset.dbg); });
}

ensureDemand();
render();
setupDebug();
toast(shelter.stockG(S) > 0
  ? "Une plaquette t'attend — coupe-la à l'Atelier, écoule au corner."
  : "Quartier Nord · planque · corner.");
</script>
