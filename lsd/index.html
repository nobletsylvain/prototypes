<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Buvard — LSD core loop</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; touch-action:none;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif; color:#fff;
    background:radial-gradient(120% 120% at 50% 0%, #2a1840 0%, #170d26 60%, #0b0712 100%); }
  #app { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  /* ---- HUD ---- */
  .hud { position:fixed; pointer-events:none; text-shadow:0 2px 8px rgba(0,0,0,.55); z-index:3; }
  #cash { top:max(12px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-weight:800; font-size:18px; color:#c9b3ff; }
  #debt { top:max(14px,env(safe-area-inset-top)); left:14px; font-weight:800; font-size:13px; color:#ff9db0; }
  #rep  { top:max(14px,env(safe-area-inset-top)); right:60px; font-weight:800; font-size:12px;
    background:rgba(180,150,255,.16); border:1px solid rgba(180,150,255,.5); color:#d9c9ff;
    padding:4px 9px; border-radius:999px; }
  #reset { position:fixed; top:max(10px,env(safe-area-inset-top)); right:12px; pointer-events:auto; z-index:5;
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.22); color:#fff;
    padding:8px 11px; border-radius:11px; font-size:13px; font-weight:700; }
  #reset:active { background:rgba(255,255,255,.25); }

  #xpwrap { position:fixed; top:calc(max(12px,env(safe-area-inset-top)) + 26px); left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:6px; pointer-events:none; z-index:3; }
  #level { background:rgba(155,227,125,.18); border:1px solid rgba(155,227,125,.55); color:#bdf0a3;
    font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  #xpbar { width:110px; height:6px; background:rgba(255,255,255,.14); border-radius:999px; overflow:hidden; }
  #xpfill { height:100%; width:0%; background:linear-gradient(90deg,#9b7dff,#c9b3ff); transition:width .25s; }

  /* phase title + hint */
  #phase { position:fixed; top:calc(max(12px,env(safe-area-inset-top)) + 48px); left:0; right:0; text-align:center;
    pointer-events:none; z-index:3; }
  #phase .t { font-size:12px; font-weight:800; letter-spacing:.4px; color:#cdbbff; }
  #hint { position:fixed; bottom:max(86px,calc(env(safe-area-inset-bottom) + 80px)); left:0; right:0; text-align:center;
    pointer-events:none; z-index:3; }
  #hint span { display:inline-block; background:rgba(12,8,22,.6); border:1px solid rgba(170,140,255,.35);
    color:#efe9ff; font-size:13px; font-weight:700; padding:7px 14px; border-radius:999px; max-width:92vw; }

  /* dilution slider */
  #dil { position:fixed; bottom:max(60px,calc(env(safe-area-inset-bottom) + 54px)); left:50%; transform:translateX(-50%);
    width:min(86vw,420px); pointer-events:auto; z-index:4; display:none; }
  #dil .row { display:flex; justify-content:space-between; font-size:11px; font-weight:700; color:rgba(255,255,255,.6); margin-bottom:4px; }
  #dilrange { width:100%; height:30px; -webkit-appearance:none; appearance:none; background:transparent; }
  #dilrange::-webkit-slider-runnable-track { height:8px; border-radius:999px;
    background:linear-gradient(90deg,#b48cff,#5a4a78); }
  #dilrange::-webkit-slider-thumb { -webkit-appearance:none; width:26px; height:26px; margin-top:-9px; border-radius:50%;
    background:#fff; border:3px solid #b48cff; box-shadow:0 2px 8px rgba(0,0,0,.5); }
  #dilrange::-moz-range-track { height:8px; border-radius:999px; background:linear-gradient(90deg,#b48cff,#5a4a78); }
  #dilrange::-moz-range-thumb { width:24px; height:24px; border-radius:50%; background:#fff; border:3px solid #b48cff; }

  /* bottom action bar */
  #bar { position:fixed; bottom:max(12px,calc(env(safe-area-inset-bottom) + 8px)); left:50%; transform:translateX(-50%);
    display:flex; gap:8px; align-items:center; pointer-events:auto; z-index:4; }
  .btn { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.25); color:#fff;
    font-weight:800; font-size:14px; padding:11px 16px; border-radius:13px; }
  .btn:active { transform:scale(.97); }
  .btn.go { background:#9b7dff; color:#180f2a; border-color:#9b7dff; }
  .btn.alt { background:rgba(155,227,125,.16); border-color:rgba(155,227,125,.5); color:#bdf0a3; }
  .btn[disabled] { opacity:.4; }

  /* tool picker */
  #tools { position:fixed; bottom:max(60px,calc(env(safe-area-inset-bottom) + 54px)); left:50%; transform:translateX(-50%);
    display:flex; gap:6px; pointer-events:auto; z-index:4; }
  .tool { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); color:#fff;
    font-weight:700; font-size:12px; padding:7px 10px; border-radius:11px; white-space:nowrap; }
  .tool.on { background:#b48cff; color:#180f2a; border-color:#b48cff; }
  .tool.locked { opacity:.45; }

  /* report modal */
  #modal { position:fixed; inset:0; background:rgba(8,5,16,.72); backdrop-filter:blur(4px);
    display:none; align-items:center; justify-content:center; z-index:10; padding:20px; }
  #card { width:min(94vw,440px); max-height:84vh; overflow:auto; background:#1a1230;
    border:1px solid rgba(170,140,255,.4); border-radius:20px; padding:20px; box-shadow:0 18px 60px rgba(0,0,0,.6); }
  #card h2 { font-size:19px; margin-bottom:2px; }
  #card .date { font-size:12px; color:rgba(255,255,255,.5); margin-bottom:14px; }
  #card .line { display:flex; gap:10px; padding:9px 0; border-top:1px solid rgba(255,255,255,.08); font-size:14px; }
  #card .line .v { margin-left:auto; font-weight:800; white-space:nowrap; }
  #card .line .cause { color:rgba(255,255,255,.55); font-size:12px; display:block; margin-top:2px; }
  .pos { color:#bdf0a3; } .neg { color:#ff9db0; } .neu { color:#cdbbff; }
  #card .total { margin-top:12px; padding-top:12px; border-top:2px solid rgba(170,140,255,.3); font-size:16px; font-weight:800; display:flex; }
  #card .total .v { margin-left:auto; color:#c9b3ff; }
  #closeR { margin-top:16px; width:100%; }

  #toast { position:fixed; top:34%; left:0; right:0; text-align:center; font-size:22px; font-weight:800;
    opacity:0; transition:opacity .25s, transform .25s; transform:translateY(8px); pointer-events:none; z-index:8; }
  #toast.show { opacity:1; transform:translateY(0); }
</style>
</head>
<body>
<div id="app"><canvas id="c"></canvas></div>

<div id="cash" class="hud">0 €</div>
<div id="debt" class="hud">Dette 0 €</div>
<div id="rep"  class="hud">Réput 50</div>
<button id="reset">↻</button>
<div id="xpwrap"><span id="level">Niv. 1</span><div id="xpbar"><div id="xpfill"></div></div></div>
<div id="phase" class="hud"><div class="t" id="phaseT">ACHAT</div></div>
<div id="hint" class="hud"><span id="hintTxt">Achète une fiole à crédit pour commencer.</span></div>

<div id="dil">
  <div class="row"><span id="dilL">Pur — qualité max</span><span id="dilR">buvards possibles</span></div>
  <input id="dilrange" type="range" min="0" max="3" step="0.1" value="0">
</div>

<div id="tools">
  <button class="tool on" data-tool="pipette">💧 Pipette</button>
  <button class="tool locked" data-tool="semi">⚗️ Semi-auto</button>
  <button class="tool locked" data-tool="machine">🏭 Machine</button>
</div>

<div id="bar"></div>

<div id="modal"><div id="card">
  <h2>Rapport de lot</h2>
  <div class="date" id="rDate"></div>
  <div id="rLines"></div>
  <div class="total"><span>Net en caisse</span><span class="v" id="rTotal">+0 €</span></div>
  <button id="closeR" class="btn go">Lot suivant</button>
</div></div>

<div id="toast"></div>

<script type="module">
/* ============================================================================
   BUVARD — core loop LSD.  Canvas 2D, zéro dépendance.
   Boucle : Achat(crédit) -> Dilution(cuve) -> Dosage(pipette) -> Découpe(swipe)
            -> Vente -> Rapport(causes) -> horloge de dette.
   Invariant CrimWorld : la QUALITÉ est le levier unique. Volume & réputation
   sont des co-effets parallèles. Aucune conséquence aléatoire : tout remonte à
   un geste du joueur (visée, ratio, propreté de coupe) et porte une `cause`.
   ========================================================================== */

/* ---------- Constantes économiques (réglage humain au checkpoint) ---------- */
const SAVE_VERSION = "1";
const N = 10, TABS = N*N;            // feuille 10×10 = 100 buvards
const BASE_POTENCY  = 1.0;          // qualité max d'un buvard pur parfaitement dosé
const DIL_MAX       = 3;            // facteur de dilution max
const VIAL_DOSES    = 60;           // doses "idéales" dans une fiole non diluée
const DEBT_PER_VIAL = 80;           // crédit grossiste -> dette
const DEBT_TICK     = 14;           // intérêt ajouté à la dette à chaque lot vendu
const PRICE_BASE    = 6;            // € par buvard calibré (qualité 1)
const FEE_MACHINE   = 0.18;         // commission externalisation
const DOSE_RATE     = 0.0024;       // dose/ms en titrage manuel (pipette)
const TOOL_CEIL = { pipette:1.00, semi:0.92, machine:0.80 };
const REP_GAIN  = 28;               // gain de réput par qualité moyenne au-dessus du seuil
const REP_DEFECT= 0.9;              // perte de réput par buvard défectueux
const REP_REF   = 0.55;             // seuil de qualité moyenne neutre
const UNLOCK_SEMI_LVL = 3, UNLOCK_MACHINE_LVL = 6;

const potencyPerDrop = dil => BASE_POTENCY / (1 + dil*0.5);   // 0..3 -> 1,0.8,0.66,0.57
const dosesAvailable = dil => Math.round(VIAL_DOSES * (1 + dil));

/* ---------- État persistant ---------- */
if (localStorage.getItem("lsd_ver") !== SAVE_VERSION) {
  ["lsd_cash","lsd_debt","lsd_rep","lsd_level","lsd_xp"].forEach(k=>localStorage.removeItem(k));
  localStorage.setItem("lsd_ver", SAVE_VERSION);
}
let cash  = +(localStorage.getItem("lsd_cash")  || 0);
let debt  = +(localStorage.getItem("lsd_debt")  || 0);
let rep   = Math.min(100, Math.max(0, +(localStorage.getItem("lsd_rep") || 50)));
let level = Math.max(1, +(localStorage.getItem("lsd_level") || 1));
let xp    = Math.max(0, +(localStorage.getItem("lsd_xp") || 0));
function save() {
  localStorage.setItem("lsd_cash", String(Math.round(cash)));
  localStorage.setItem("lsd_debt", String(Math.round(debt)));
  localStorage.setItem("lsd_rep",  rep.toFixed(1));
  localStorage.setItem("lsd_level",String(level));
  localStorage.setItem("lsd_xp",   String(Math.round(xp)));
}

/* ---------- Lot en cours ---------- */
const PHASE = { BUY:"ACHAT", DIL:"DILUTION", DOSE:"DOSAGE", CUT:"DÉCOUPE", SELL:"VENTE" };
let phase = PHASE.BUY;
let tool = "pipette";
let dilution = 0;
let dosesLeft = 0;
// chaque buvard : { dose, q, overdose, separated, torn }
let tabs = [];
let hCut = Array(N-1).fill(0), vCut = Array(N-1).fill(0);   // 0 nul,1 net,-1 déchiré
function freshSheet() {
  tabs = Array.from({length:TABS}, () => ({ dose:0, q:0, overdose:false, separated:false, torn:false }));
  hCut = Array(N-1).fill(0); vCut = Array(N-1).fill(0);
}
freshSheet();

/* ---------- Canvas ---------- */
const cv = document.getElementById("c"), ctx = cv.getContext("2d");
let W=0, H=0, DPR=1, grid={x:0,y:0,s:0,cell:0};
function resize() {
  DPR = Math.min(2, window.devicePixelRatio||1);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  const s = Math.min(W*0.86, H*0.56);
  grid = { s, cell:s/N, x:(W-s)/2, y:H*0.30 };
}
window.addEventListener("resize", resize); resize();

/* ---------- HUD helpers ---------- */
const $ = id => document.getElementById(id);
function xpNeed(l){ return 40 + (l-1)*30; }
function levelMult(){ return 1 + (level-1)*0.03; }
function refreshHUD() {
  $("cash").textContent = Math.round(cash) + " €";
  $("debt").textContent = "Dette " + Math.round(debt) + " €";
  $("rep").textContent  = "Réput " + Math.round(rep);
  $("level").textContent= "Niv. " + level;
  $("xpfill").style.width = Math.min(100, (xp/xpNeed(level))*100) + "%";
}
function addXP(n){
  xp += n;
  while (xp >= xpNeed(level)) { xp -= xpNeed(level); level++; toast("Niveau "+level+" !", "#bdf0a3"); checkUnlocks(); }
  refreshHUD(); save();
}
let toastT=0;
function toast(msg, col="#cdbbff"){ const t=$("toast"); t.textContent=msg; t.style.color=col; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1300); }

/* ---------- Outils ---------- */
function checkUnlocks(){
  document.querySelectorAll(".tool").forEach(b=>{
    const t=b.dataset.tool;
    const ok = t==="pipette" || (t==="semi"&&level>=UNLOCK_SEMI_LVL) || (t==="machine"&&level>=UNLOCK_MACHINE_LVL);
    b.classList.toggle("locked", !ok);
  });
}
document.querySelectorAll(".tool").forEach(b=>b.addEventListener("click",()=>{
  if (b.classList.contains("locked")) {
    const need = b.dataset.tool==="semi"?UNLOCK_SEMI_LVL:UNLOCK_MACHINE_LVL;
    toast("Débloqué au niveau "+need, "#ff9db0"); return;
  }
  tool = b.dataset.tool;
  document.querySelectorAll(".tool").forEach(x=>x.classList.toggle("on", x===b));
}));

/* ---------- Barre d'action selon la phase ---------- */
const bar = $("bar");
function setPhase(p){
  phase = p;
  $("phaseT").textContent = p;
  bar.innerHTML = ""; $("dil").style.display="none"; $("tools").style.display="flex";
  const hint = $("hintTxt");
  if (p===PHASE.BUY){
    $("tools").style.display="none";
    hint.textContent = "Achète une fiole à crédit (dette +"+DEBT_PER_VIAL+" €).";
    addBtn("Acheter une fiole — crédit", "go", buyVial);
  } else if (p===PHASE.DIL){
    $("tools").style.display="none";
    $("dil").style.display="block";
    hint.textContent = "Règle la cuve : diluer = + de buvards, mais + pâles (qualité ↓).";
    addBtn("Tremper la feuille", "go", ()=>setPhase(PHASE.DOSE));
  } else if (p===PHASE.DOSE){
    if (tool==="machine"){
      hint.textContent = "Machine externalisée : dosage auto en gros volume (commission 18 %).";
      addBtn("Lancer la machine", "go", machineDose);
    } else {
      hint.textContent = tool==="semi"
        ? "Semi-auto : tape une case, la goutte s'aimante et délivre une dose régulière."
        : "Pipette : MAINTIENS sur une case pour titrer, RELÂCHE pour déposer. Vise 1.0×.";
      addBtn("Passer à la découpe ✓", "alt", ()=>{ if (dosedCount()>0) setPhase(PHASE.CUT); else toast("Dose au moins un buvard","#ff9db0"); });
    }
  } else if (p===PHASE.CUT){
    $("tools").style.display="none";
    hint.textContent = "Swipe le long des perforations (9 H + 9 V). Reste droit : dévier = déchirer.";
    addBtn("Vendre le lot 💸", "go", ()=>{ if (cutCount()>0) sell(); else toast("Découpe d'abord","#ff9db0"); });
  }
  refreshHUD();
}
function addBtn(label, cls, fn){ const b=document.createElement("button"); b.className="btn "+cls; b.textContent=label; b.onclick=fn; bar.appendChild(b); }

/* ---------- ACHAT ---------- */
function buyVial(){
  debt += DEBT_PER_VIAL;
  freshSheet(); dilution = 0; $("dilrange").value = 0; updateDilLabels();
  dosesLeft = dosesAvailable(0);
  save(); refreshHUD();
  setPhase(PHASE.DIL);
}

/* ---------- DILUTION ---------- */
const dilRange = $("dilrange");
dilRange.addEventListener("input", ()=>{ dilution = +dilRange.value; dosesLeft = dosesAvailable(dilution); updateDilLabels(); });
function updateDilLabels(){
  $("dilL").textContent = dilution<0.1 ? "Pur — qualité max" : "Dilué ×"+(1+dilution).toFixed(1)+" — pâleur ↑";
  $("dilR").textContent = dosesAvailable(dilution)+" doses dispo";
}
updateDilLabels();

/* ---------- DOSAGE (cœur de skill) ---------- */
function dosedCount(){ return tabs.filter(t=>t.dose>0).length; }
function commitDose(i, dose){
  const t = tabs[i]; if (!t || t.dose>0 || dosesLeft<=0) return;
  dose = Math.min(dose, dosesLeft);
  const acc = dose<=1 ? dose : Math.max(0, 1-(dose-1)*0.7);
  t.dose = dose;
  t.q = Math.min(TOOL_CEIL[tool], potencyPerDrop(dilution)) * acc;
  t.overdose = dose > 1.45;
  dosesLeft = Math.max(0, dosesLeft - dose);
  if (dosesLeft<=0.01) toast("Fiole vide", "#ff9db0");
}
function machineDose(){
  // dosage auto régulier jusqu'à épuisement de la fiole, dose ~idéale
  for (let i=0;i<TABS && dosesLeft>0.5;i++) commitDose(i, 1.0);
  toast(dosedCount()+" buvards dosés", "#bdf0a3");
  setPhase(PHASE.CUT);
}

/* press-hold titrage (pipette) */
let holding=null;   // {i, t0, dose}
function tabAt(px,py){
  if (px<grid.x||py<grid.y||px>grid.x+grid.s||py>grid.y+grid.s) return -1;
  const cx=Math.floor((px-grid.x)/grid.cell), cy=Math.floor((py-grid.y)/grid.cell);
  return cy*N+cx;
}

/* ---------- DÉCOUPE (swipe) ---------- */
let swipe=null;   // {x0,y0,x1,y1}
function applySwipe(s){
  const dx=s.x1-s.x0, dy=s.y1-s.y0;
  const horiz = Math.abs(dx) > Math.abs(dy);
  const len = Math.abs(horiz?dx:dy);
  if (len < grid.s*0.5) { toast("Swipe plus franc","#ff9db0"); return; }   // trop court
  if (horiz){
    const my=(s.y0+s.y1)/2; const k=Math.round((my-grid.y)/grid.cell)-1;   // ligne H interne 0..N-2
    if (k<0||k>=N-1) return;
    const lineY = grid.y + (k+1)*grid.cell;
    const off = Math.abs(my-lineY)/grid.cell;                              // écart à la perfo
    setCut(hCut,k, off<0.28?1:-1);
  } else {
    const mx=(s.x0+s.x1)/2; const k=Math.round((mx-grid.x)/grid.cell)-1;
    if (k<0||k>=N-1) return;
    const lineX = grid.x + (k+1)*grid.cell;
    const off = Math.abs(mx-lineX)/grid.cell;
    setCut(vCut,k, off<0.28?1:-1);
  }
}
function setCut(arr,k,val){ if (arr[k]!==0) return; arr[k]=val; if (val<0) toast("Déchiré","#ff9db0"); }
function cutCount(){ return hCut.filter(v=>v!==0).length + vCut.filter(v=>v!==0).length; }
function finalizeSeparation(){
  // un buvard est vendable si les 4 lignes qui le bordent (internes) sont coupées nettes
  for (let r=0;r<N;r++) for (let c=0;c<N;c++){
    const t=tabs[r*N+c];
    const top    = r===0   ? 1 : hCut[r-1];
    const bottom = r===N-1 ? 1 : hCut[r];
    const left   = c===0   ? 1 : vCut[c-1];
    const right  = c===N-1 ? 1 : vCut[c];
    const edges=[top,bottom,left,right];
    t.separated = edges.every(e=>e!==0);
    t.torn = t.separated && edges.some(e=>e<0);
  }
}

/* ---------- VENTE + RAPPORT (contrat `cause`) ---------- */
function sell(){
  finalizeSeparation();
  const sellable = tabs.filter(t=>t.separated && t.dose>0);
  const sold = sellable.filter(t=>!t.torn);
  const torn = sellable.filter(t=>t.torn).length;
  const stuck = tabs.filter(t=>t.dose>0 && !t.separated).length;   // dosés mais pas découpés

  if (sold.length===0){ toast("Aucun buvard vendable","#ff9db0"); return; }

  const avgQ = sold.reduce((a,t)=>a+t.q,0)/sold.length;
  const overdoses = sold.filter(t=>t.overdose).length;
  const placebos  = sold.filter(t=>t.q<0.2).length;
  const defects   = overdoses + placebos;

  const repMult = 0.6 + (rep/100)*0.6;          // 0.6..1.2
  let revenue = sold.reduce((a,t)=>a + PRICE_BASE*t.q, 0) * repMult * levelMult();
  let fee = 0;
  if (tool==="machine"){ fee = revenue*FEE_MACHINE; revenue -= fee; }

  // Réputation = co-effet de la QUALITÉ moyenne, jamais du volume.
  let repCapped = false;
  let dRep = (avgQ - REP_REF)*REP_GAIN - defects*REP_DEFECT;
  if (tool==="machine" && rep+dRep>78){ dRep = 78-rep; repCapped = true; }   // plafond de réput externalisée
  rep = Math.min(100, Math.max(0, rep + dRep));

  cash += revenue;
  const interest = Math.round(debt*0.04) + DEBT_TICK;   // horloge de dette grossiste
  debt += interest;
  addXP(Math.max(2, Math.round(sold.length*0.4 + avgQ*10)));
  save(); refreshHUD();

  showReport({
    revenue, fee, sold:sold.length, torn, stuck, avgQ, overdoses, placebos, dRep, interest, repCapped
  });
}

/* ---------- Rapport ---------- */
function showReport(r){
  const lines = $("rLines"); lines.innerHTML="";
  const L = (label, val, cls, cause) => {
    const d=document.createElement("div"); d.className="line";
    const left=document.createElement("div");
    const lab=document.createElement("span"); lab.textContent=label; left.appendChild(lab);
    if (cause){ const cz=document.createElement("span"); cz.className="cause"; cz.textContent=cause; left.appendChild(cz); }
    const right=document.createElement("div"); right.className="v "+cls; right.textContent=val;
    d.appendChild(left); d.appendChild(right); lines.appendChild(d);
  };
  L("Buvards écoulés", r.sold+" / "+TABS, "neu",
    `dilution ×${(1+dilution).toFixed(1)} · outil ${tool}`);
  L("Qualité moyenne", Math.round(r.avgQ*100)+"%", r.avgQ>=0.6?"pos":r.avgQ>=0.35?"neu":"neg",
    r.avgQ>=0.6 ? "lot calibré, clients fidélisés"
                : r.avgQ>=0.35 ? "lot dilué : puissance plafonnée par la cuve"
                : "lot pâle : sous-dosage et/ou dilution forte");
  L("Revenu brut", "+"+Math.round(r.revenue + r.fee)+" €", "pos",
    `prix indexé sur la qualité × réput ${Math.round((0.6+(rep/100)*0.6)*100)}%`);
  if (r.fee>0) L("Commission machine", "−"+Math.round(r.fee)+" €", "neg", "externalisation : 18 % prélevés");
  if (r.overdoses>0) L("Surdoses", r.overdoses+" buvards", "neg", "trop chargés : ont fait peur, réput entamée");
  if (r.placebos>0)  L("Placebos", r.placebos+" buvards", "neg", "sous-dosés : clients déçus");
  if (r.torn>0)      L("Déchets de coupe", r.torn+" buvards", "neg", "swipe dévié des perforations");
  if (r.stuck>0)     L("Feuille non découpée", r.stuck+" buvards", "neg", "perforations incomplètes : invendables");
  L("Réputation", (r.dRep>=0?"+":"")+Math.round(r.dRep), r.dRep>=0?"pos":"neg",
    r.repCapped ? "plafonnée : lots externalisés peu signés"
                : r.dRep>=0 ? "qualité au-dessus du seuil"
                : "défauts au-dessus du seuil");
  L("Intérêts grossiste", "+"+r.interest+" € de dette", "neg", "horloge de crédit : rembourse vite");

  $("rTotal").textContent = "+"+Math.round(r.revenue)+" €";
  $("rDate").textContent = "Outil : "+tool+" · dilution ×"+(1+dilution).toFixed(1);
  $("modal").style.display="flex";
}
$("closeR").onclick = ()=>{ $("modal").style.display="none"; setPhase(PHASE.BUY); };

/* ---------- Remboursement rapide : taper la dette ---------- */
$("debt").style.pointerEvents="auto";
$("debt").addEventListener("click", ()=>{
  if (debt<=0){ toast("Aucune dette","#bdf0a3"); return; }
  const pay = Math.min(cash, debt);
  if (pay<=0){ toast("Pas de cash","#ff9db0"); return; }
  cash-=pay; debt-=pay; save(); refreshHUD(); toast("Remboursé "+Math.round(pay)+" €","#bdf0a3");
});

/* ---------- Entrées pointer ---------- */
let downAt=0;
cv.addEventListener("pointerdown", e=>{
  const x=e.offsetX, y=e.offsetY; downAt=performance.now();
  if (phase===PHASE.DOSE && tool!=="machine"){
    const i=tabAt(x,y); if (i<0) return;
    if (tool==="semi"){ commitDose(i,1.0); }                 // tap = dose régulière aimantée
    else holding = { i, t0:performance.now(), dose:0 };       // pipette = titrage
  } else if (phase===PHASE.CUT){
    swipe = { x0:x, y0:y, x1:x, y1:y };
  }
});
cv.addEventListener("pointermove", e=>{
  if (swipe){ swipe.x1=e.offsetX; swipe.y1=e.offsetY; }
});
cv.addEventListener("pointerup", e=>{
  if (holding){ commitDose(holding.i, holding.dose); holding=null; }
  if (swipe){ applySwipe(swipe); swipe=null; }
});
cv.addEventListener("pointercancel", ()=>{ holding=null; swipe=null; });

/* ---------- Rendu ---------- */
function tabColor(t){
  // pâleur = dilution (lightness ↑) ; alpha = dose ; rouge = surdose
  if (t.dose<=0) return "rgba(255,255,255,0.05)";
  const light = 60 + dilution*9;                  // plus dilué -> plus clair
  if (t.overdose) return `hsla(350,80%,${Math.min(72,light)}%,${0.35+t.q})`;
  const hue = 270 - t.q*30;                        // violet LSD -> bleuté quand fort
  return `hsla(${hue},70%,${light}%,${0.25 + t.q*0.7})`;
}
function draw(){
  // titrage continu pipette
  if (holding){ holding.dose = (performance.now()-holding.t0)*DOSE_RATE; if (holding.dose>2) holding.dose=2; }

  ctx.clearRect(0,0,W,H);
  const {x,y,s,cell}=grid;

  // support feuille
  ctx.fillStyle="rgba(255,255,255,0.06)";
  roundRect(x-8,y-8,s+16,s+16,14); ctx.fill();

  // buvards
  for (let r=0;r<N;r++) for (let c=0;c<N;c++){
    const t=tabs[r*N+c]; const tx=x+c*cell, ty=y+r*cell;
    const gap = t.separated ? 2.2 : 1;
    ctx.fillStyle = tabColor(t);
    roundRect(tx+gap, ty+gap, cell-gap*2, cell-gap*2, 3); ctx.fill();
    if (t.separated){ ctx.strokeStyle = t.torn? "rgba(255,120,140,.7)":"rgba(180,150,255,.45)"; ctx.lineWidth=1; ctx.stroke(); }
  }

  // perforations (pointillés) + état coupe
  ctx.lineWidth=1.5;
  for (let k=0;k<N-1;k++){
    const ly=y+(k+1)*cell;
    ctx.strokeStyle = hCut[k]>0?"rgba(189,240,163,.9)":hCut[k]<0?"rgba(255,120,140,.9)":"rgba(255,255,255,.18)";
    dashLine(x,ly,x+s,ly, hCut[k]!==0);
    const lx=x+(k+1)*cell;
    ctx.strokeStyle = vCut[k]>0?"rgba(189,240,163,.9)":vCut[k]<0?"rgba(255,120,140,.9)":"rgba(255,255,255,.18)";
    dashLine(lx,y,lx,y+s, vCut[k]!==0);
  }

  // cuve de dilution (phase DIL) : niveau de pâleur
  if (phase===PHASE.DIL){
    const vw=Math.min(W*0.6,260), vx=W/2-vw/2, vy=y+s+22, vh=20;
    ctx.fillStyle="rgba(255,255,255,.1)"; roundRect(vx,vy,vw,vh,10); ctx.fill();
    const lf=60+dilution*9;
    ctx.fillStyle=`hsla(270,70%,${lf}%,0.85)`; roundRect(vx,vy,vw,vh,10); ctx.fill();
  }

  // pipette (phase DOSE pipette) : anneau de titrage
  if (phase===PHASE.DOSE && holding){
    const r=Math.floor(holding.i/N), c=holding.i%N;
    const cx=x+c*cell+cell/2, cy=y+r*cell+cell/2;
    const d=holding.dose;
    ctx.beginPath(); ctx.arc(cx,cy,cell*0.55,0,Math.PI*2); ctx.strokeStyle="rgba(255,255,255,.25)"; ctx.lineWidth=3; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,cell*0.55,-Math.PI/2,-Math.PI/2+Math.min(1,d/1.5)*Math.PI*2);
    ctx.strokeStyle = d>1.45?"#ff7a8c":(d>=0.85&&d<=1.15?"#bdf0a3":"#c9b3ff"); ctx.lineWidth=4; ctx.stroke();
    ctx.fillStyle="#fff"; ctx.font="bold 12px -apple-system,sans-serif"; ctx.textAlign="center";
    ctx.fillText(d.toFixed(2)+"×", cx, cy+4);
  }

  // trait de swipe en cours
  if (swipe){
    ctx.beginPath(); ctx.moveTo(swipe.x0,swipe.y0); ctx.lineTo(swipe.x1,swipe.y1);
    ctx.strokeStyle="rgba(201,179,255,.9)"; ctx.lineWidth=3; ctx.setLineDash([6,5]); ctx.stroke(); ctx.setLineDash([]);
  }

  // jauges contextuelles
  ctx.textAlign="center"; ctx.fillStyle="rgba(255,255,255,.7)"; ctx.font="bold 13px -apple-system,sans-serif";
  if (phase===PHASE.DOSE) ctx.fillText("Doses restantes : "+dosesLeft.toFixed(1)+"   ·   "+dosedCount()+" buvards dosés", W/2, y-22);
  if (phase===PHASE.CUT)  ctx.fillText("Perforations : "+cutCount()+" / "+(2*(N-1)), W/2, y-22);

  requestAnimationFrame(draw);
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function dashLine(x0,y0,x1,y1,solid){ ctx.beginPath(); ctx.setLineDash(solid?[]:[4,4]); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke(); ctx.setLineDash([]); }

/* ---------- Reset ---------- */
$("reset").addEventListener("click", ()=>{
  if (!confirm("Réinitialiser la partie ?")) return;
  ["lsd_cash","lsd_debt","lsd_rep","lsd_level","lsd_xp"].forEach(k=>localStorage.removeItem(k));
  location.reload();
});

/* ---------- Boot ---------- */
checkUnlocks(); refreshHUD(); setPhase(PHASE.BUY); requestAnimationFrame(draw);
</script>
