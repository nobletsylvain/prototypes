<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Onion Market — appro darkweb</title>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<style>
  /* =========================================================================
     Onion Market — prototype « fournisseur » (façon Silk Road / TOR).
     Périmètre : marché + RELATION fournisseur (messagerie, négociation,
     favoris, fidélité). Pas d'Ubeur / transit ici (lot ultérieur).

     INVARIANT (repris de CrimWorld) : DÉTERMINISTE. Aucun Math.random ne pilote
     une conséquence. Tout — qualité réelle, remise, réponse du fournisseur —
     est fonction d'une DÉCISION traçable (tier choisi, historique, volume).
       · qualité RÉELLE  = annoncée × fiabilité(rating)
       · remise totale   = fidélité(historique) + négo(tier) + volume, plafond(tier)
       · échantillon      = accordé si rating ≥ 3, sinon refusé (en personnage)
     Persistance localStorage préfixe `dw_`.
     ========================================================================= */
  :root{
    --bg:#0B0E0B; --surface:#11160F; --surface2:#161C13; --border:#243121;
    --text:#D7E4CF; --muted:#7E8C77; --faint:#566150;
    --onion:#7FBF4D; --onion-d:#4f7d2e; --neon:#46c2a0; --rust:#C8442F;
    --gold:#E8B84B; --star:#E8B84B;
    --mono:"SFMono-Regular",ui-monospace,"Menlo","Consolas",monospace;
    --sans:-apple-system,"Segoe UI","Roboto","Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none}
  html,body{height:100%}
  body{background:radial-gradient(1100px 650px at 70% -10%,#13180f 0,var(--bg) 60%);
       font-family:var(--sans);color:var(--text);min-height:100vh;
       display:flex;align-items:center;justify-content:center;padding:16px 10px}

  /* ---- coque téléphone ---- */
  .phone{position:relative;width:min(390px,96vw);height:min(820px,94vh);border-radius:38px;
       background:var(--bg);border:1px solid var(--border);overflow:hidden;
       box-shadow:0 30px 80px -20px #000,0 0 0 8px #070907;display:flex;flex-direction:column}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);
       width:130px;height:26px;background:#070907;border-radius:0 0 16px 16px;z-index:60}
  .statusbar{height:38px;flex:none;display:flex;align-items:flex-end;justify-content:space-between;
       padding:0 22px 6px;font:600 12px var(--sans);color:var(--muted)}
  .statusbar #clock{font:700 12px var(--mono);color:var(--text)}
  .statusbar .tor{color:var(--onion);display:flex;align-items:center;gap:4px}

  /* ---- en-tête de l'app ---- */
  .appbar{flex:none;padding:8px 14px 10px;border-bottom:1px solid var(--border);background:#0d110c}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .logo{width:34px;height:34px;border-radius:10px;flex:none;display:flex;align-items:center;
       justify-content:center;font-size:20px;background:rgba(127,191,77,.12);
       border:1px solid rgba(127,191,77,.35)}
  .brand .nm{font:800 16px var(--sans);letter-spacing:.2px}
  .brand .nm b{color:var(--onion)}
  .brand .url{font:600 10px var(--mono);color:var(--faint);margin-top:1px}
  .brand .lock{margin-left:auto;font:700 10px var(--mono);color:var(--onion);
       border:1px solid var(--onion-d);border-radius:6px;padding:3px 7px}

  /* ---- bandeau wallet ---- */
  .wallet{flex:none;display:flex;gap:7px;padding:9px 12px;border-bottom:1px solid var(--border);background:#0e120d}
  .wallet .seg{flex:1;min-width:0;border-radius:10px;background:var(--surface);border:1px solid var(--border);
       padding:6px 9px;display:flex;flex-direction:column;gap:1px}
  .wallet .k{font:600 9px var(--sans);letter-spacing:.05em;color:var(--faint);text-transform:uppercase;
       white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wallet b{font:800 15px var(--mono);line-height:1.1}
  .wallet .cash b{color:var(--onion)}
  .wallet .stock b{color:var(--text)}
  .wallet .qual b{color:var(--gold)}
  .wallet .debt b{color:var(--rust)}

  /* ---- filtres famille + tri ---- */
  .filters{flex:none;display:flex;gap:6px;padding:9px 12px 3px;overflow-x:auto}
  .filters::-webkit-scrollbar{display:none}
  .chip{flex:none;font:700 11px var(--sans);color:var(--muted);background:var(--surface);
       border:1px solid var(--border);border-radius:999px;padding:5px 11px;cursor:pointer;white-space:nowrap}
  .chip.on{color:var(--bg);background:var(--onion);border-color:var(--onion)}
  .chip.fav.on{background:var(--gold);border-color:var(--gold)}
  .sortrow{flex:none;display:flex;align-items:center;gap:7px;padding:4px 12px 6px}
  .sortrow .lbl{font:600 9px var(--sans);letter-spacing:.05em;color:var(--faint);text-transform:uppercase}
  .seg{display:flex;gap:0;border:1px solid var(--border);border-radius:9px;overflow:hidden;background:var(--surface)}
  .seg button{font:700 10px var(--sans);color:var(--muted);background:none;border:none;padding:5px 10px;cursor:pointer}
  .seg button.on{background:var(--surface2);color:var(--text)}

  /* ---- liste des listings ---- */
  .feed{flex:1;overflow-y:auto;padding:4px 12px 14px;display:flex;flex-direction:column;gap:9px}
  .listing{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:11px 12px;
       cursor:pointer;transition:border-color .15s,transform .05s;position:relative}
  .listing:active{transform:scale(.992)}
  .lhead{display:flex;align-items:center;gap:9px}
  .av{width:38px;height:38px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;
       font-size:20px;background:var(--surface2);border:1px solid var(--border)}
  /* vignette produit 3D (image baked) */
  .thumb{width:54px;height:54px;flex:none;border-radius:11px;overflow:hidden;position:relative;
       background:radial-gradient(120% 120% at 50% 20%,#1a2113 0,#0a0d08 100%);border:1px solid var(--border)}
  .thumb img{width:100%;height:100%;object-fit:contain;display:block}
  .thumb .pe{position:absolute;bottom:2px;right:3px;font-size:11px;filter:drop-shadow(0 1px 1px #000)}
  /* viewer 3D interactif (fiche commande) */
  .viewer{position:relative;flex:none;width:100%;height:190px;margin:2px 0 12px;border-radius:14px;overflow:hidden;
       background:radial-gradient(130% 100% at 50% 10%,#1a2113 0,#0a0d08 70%);border:1px solid var(--border);
       display:flex;align-items:center;justify-content:center}
  .viewer canvas{display:block;touch-action:none}
  .viewer .vhint{position:absolute;bottom:7px;left:0;right:0;text-align:center;font:600 9px var(--mono);
       color:var(--faint);letter-spacing:.04em;pointer-events:none}
  .viewer .vtag{position:absolute;top:7px;left:8px;font:700 9px var(--mono);padding:3px 7px;border-radius:6px;
       letter-spacing:.03em}
  .viewer .vtag.annonce{color:#0a0908;background:var(--gold)}
  .viewer .vtag.reel{color:var(--bg);background:var(--neon)}
  .who{min-width:0;flex:1}
  .handle{font:800 14px var(--sans);display:flex;align-items:center;gap:6px}
  .verif{color:var(--onion);font-size:12px}
  .sub{font:600 10px var(--mono);color:var(--faint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .favstar{flex:none;font-size:18px;color:var(--faint);cursor:pointer;padding:2px 2px 2px 6px;line-height:1}
  .favstar.on{color:var(--gold)}
  .tier{flex:none;font:800 9px var(--mono);letter-spacing:.04em;text-transform:uppercase;
       border-radius:6px;padding:3px 7px}
  .tier.cheap{color:#c9a06a;background:rgba(201,160,106,.12);border:1px solid rgba(201,160,106,.35)}
  .tier.mid{color:#7bbfe0;background:rgba(123,191,224,.12);border:1px solid rgba(123,191,224,.35)}
  .tier.premium{color:var(--gold);background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.4)}
  .badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
  .bdg{font:700 9px var(--mono);letter-spacing:.02em;border-radius:5px;padding:2px 6px;
       border:1px solid var(--border);color:var(--muted);background:var(--surface2)}
  .bdg.loy{color:var(--onion);border-color:var(--onion-d)}
  .bdg.fam{color:var(--neon);border-color:#2c4a44}
  .bdg.samp{color:var(--gold);border-color:rgba(232,184,75,.4)}
  .lbody{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;margin-top:9px}
  .prod{font:600 12px var(--sans);color:var(--text)}
  .prod .pq{color:var(--muted);font:600 11px var(--mono)}
  .stars{font:700 11px var(--mono);color:var(--star);margin-top:3px;letter-spacing:.5px}
  .stars .cnt{color:var(--faint)}
  .price{text-align:right;flex:none}
  .price b{font:800 16px var(--mono);color:var(--onion)}
  .price .u{font:600 10px var(--mono);color:var(--faint)}
  .price .was{font:600 10px var(--mono);color:var(--faint);text-decoration:line-through;display:block}
  .actrow{display:flex;gap:7px;margin-top:10px}
  .mini{flex:1;font:700 11px var(--sans);text-align:center;border-radius:9px;padding:8px;cursor:pointer;
       border:1px solid var(--border);background:var(--surface2);color:var(--text)}
  .mini.msg{color:var(--neon);border-color:#2c4a44}
  .mini.order{color:var(--bg);background:var(--onion);border-color:var(--onion)}
  .mini .un{display:block;font:600 9px var(--mono);opacity:.7;margin-top:1px}

  /* ---- bottom-sheet générique ---- */
  .scrim{position:absolute;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;
       transition:opacity .2s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:50;background:var(--surface);
       border-top:1px solid var(--border);border-radius:22px 22px 0 0;padding:8px 16px 18px;
       transform:translateY(102%);transition:transform .26s cubic-bezier(.2,.8,.2,1);
       max-height:88%;overflow-y:auto;display:flex;flex-direction:column}
  .sheet.show{transform:translateY(0)}
  .grab{width:42px;height:4px;border-radius:99px;background:var(--border);margin:4px auto 12px;flex:none}
  .shead{display:flex;align-items:center;gap:11px;margin-bottom:10px;flex:none}
  .shead .av{width:46px;height:46px;font-size:24px}
  .shead .handle{font-size:16px}

  /* ---- fiche / commande ---- */
  .specs{display:flex;gap:7px;margin:4px 0 12px}
  .spec{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 9px;text-align:center}
  .spec .k{font:600 8px var(--sans);letter-spacing:.05em;color:var(--faint);text-transform:uppercase}
  .spec .v{font:800 14px var(--mono);margin-top:2px}
  .spec.q .v{color:var(--gold)}
  .desc{font:400 12px/1.5 var(--sans);color:var(--muted);background:var(--surface2);border:1px solid var(--border);
       border-radius:10px;padding:10px 11px;margin-bottom:12px}
  .desc .warn{color:var(--gold)} .desc .good{color:var(--onion)}
  .qtitle{font:700 11px var(--sans);color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
  .qtys{display:flex;gap:7px;margin-bottom:13px}
  .qtys{flex-wrap:wrap}
  .qty{flex:1 1 28%;background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:9px 4px;
       text-align:center;cursor:pointer;transition:border-color .12s}
  .qty.on{border-color:var(--onion);background:rgba(127,191,77,.1)}
  .qty.locked{opacity:.55;border-style:dashed}
  .qty .g{font:800 14px var(--mono)}
  .qty .e{font:600 10px var(--mono);color:var(--faint);margin-top:2px}
  /* forme (weed) + crédit */
  .forms{display:flex;gap:7px;margin-bottom:13px}
  .formopt{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:9px 10px;cursor:pointer}
  .formopt.on{border-color:var(--onion);background:rgba(127,191,77,.1)}
  .formopt b{display:block;font:800 12px var(--sans)}
  .formopt span{font:600 10px var(--mono);color:var(--faint)}
  .credit{display:flex;align-items:center;gap:8px;margin-top:10px;padding:9px 11px;cursor:pointer;
       background:var(--surface2);border:1px solid var(--border);border-radius:11px;font:700 12px var(--sans);color:var(--text)}
  .credit input{width:16px;height:16px;accent-color:var(--gold)}
  .credit span{font:600 10px var(--mono);color:var(--faint)}
  .credithint{margin-top:10px;font:600 10px var(--mono);color:var(--faint);text-align:center}
  .recap{display:flex;justify-content:space-between;align-items:baseline;font:600 12px var(--sans);
       color:var(--muted);margin-bottom:4px}
  .recap b{font:800 15px var(--mono);color:var(--text)}
  .recap .disc{color:var(--onion)}
  .recap.tot b{color:var(--onion);font-size:19px}
  .buy{margin-top:12px;width:100%;border:none;border-radius:14px;padding:14px;cursor:pointer;
       font:800 15px var(--sans);color:var(--bg);background:var(--onion);transition:transform .05s,opacity .15s}
  .buy:active{transform:scale(.99)}
  .buy:disabled{opacity:.4;cursor:not-allowed}
  .buy .sm{display:block;font:600 10px var(--mono);opacity:.8;margin-top:2px}
  .ghostbtn{margin-top:9px;width:100%;border:1px solid var(--border);border-radius:13px;padding:11px;cursor:pointer;
       font:700 12px var(--sans);color:var(--neon);background:none}

  /* ---- messagerie ---- */
  .thread{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:2px 0 8px;min-height:160px}
  .relline{align-self:center;font:600 9px var(--sans);color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin:2px 0}
  .msg-b{max-width:82%;padding:9px 12px;border-radius:15px;font:400 13px/1.4 var(--sans);animation:pop .18s ease}
  @keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .msg-b.them{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:5px}
  .msg-b.me{align-self:flex-end;background:var(--onion-d);color:#eaf6df;border-bottom-right-radius:5px}
  .msg-b .meta{display:block;font:600 9px var(--mono);color:var(--faint);margin-top:3px}
  .msg-b.them .num{color:var(--onion);font-weight:700}
  .chatacts{flex:none;display:flex;flex-direction:column;gap:7px;padding-top:8px;border-top:1px solid var(--border)}
  .chatrow{display:flex;gap:7px}
  .cbtn{flex:1;border:1px solid var(--border);border-radius:12px;padding:10px;cursor:pointer;
       font:700 12px var(--sans);background:var(--surface2);color:var(--text);text-align:center}
  .cbtn:disabled{opacity:.4;cursor:default}
  .cbtn.nego{color:var(--gold);border-color:rgba(232,184,75,.4)}
  .cbtn.samp{color:var(--neon);border-color:#2c4a44}
  .cbtn.order{color:var(--bg);background:var(--onion);border-color:var(--onion)}
  .cbtn .un{display:block;font:600 9px var(--mono);opacity:.7;margin-top:1px}

  /* ---- toast ---- */
  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);
       background:#070907;border:1px solid var(--onion);color:var(--onion);font:600 12px var(--sans);
       padding:10px 15px;border-radius:12px;max-width:84%;text-align:center;opacity:0;pointer-events:none;
       transition:opacity .25s,transform .25s;z-index:58;line-height:1.4}
  .toast.bad{border-color:var(--rust);color:var(--rust)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---- barre du bas ---- */
  .tabbar{flex:none;border-top:1px solid var(--border);background:#0d110c;padding:7px 12px 10px;
       display:flex;align-items:center;gap:10px}
  .tabbar .last{flex:1;min-width:0;font:600 11px var(--mono);color:var(--muted);
       white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tabbar .last b{color:var(--text)}
  .reset{flex:none;font:700 11px var(--sans);color:var(--faint);background:none;border:1px solid var(--border);
       border-radius:8px;padding:5px 9px;cursor:pointer}

  /* ---- reçus ---- */
  .receipts{display:flex;flex-direction:column;gap:8px}
  .rcpt{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 11px;font:600 12px var(--sans)}
  .rcpt .r1{display:flex;justify-content:space-between}
  .rcpt .amt{font:800 13px var(--mono);color:var(--rust)}
  .rcpt .cause{font:500 11px/1.4 var(--mono);color:var(--muted);margin-top:4px}
  .rcpt .cause .ok{color:var(--onion)} .rcpt .cause .lo{color:var(--rust)} .rcpt .cause .di{color:var(--onion)}
  .empty{font:600 12px var(--sans);color:var(--faint);text-align:center;padding:24px 0}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="statusbar">
    <span id="clock">23:14</span>
    <span class="tor">🧅 TOR · <span id="ping">relayé</span></span>
  </div>

  <div class="appbar">
    <div class="brand">
      <div class="logo">🧅</div>
      <div>
        <div class="nm">Onion<b>Market</b></div>
        <div class="url">onionmkt7r…xq.onion · place de marché</div>
      </div>
      <div class="lock">🔒 PGP</div>
    </div>
  </div>

  <div class="wallet" id="wallet"></div>

  <div class="filters" id="filters">
    <div class="chip on" data-f="all">Tout</div>
    <div class="chip" data-f="resine">Résine</div>
    <div class="chip" data-f="extraction">Concentrés</div>
    <div class="chip" data-f="weed">Weed</div>
    <div class="chip fav" data-f="fav">★ Favoris</div>
  </div>
  <div class="sortrow">
    <span class="lbl">Trier</span>
    <div class="seg" id="sort">
      <button data-s="rating" class="on">Note ★</button>
      <button data-s="qual">Qualité</button>
      <button data-s="price">Prix ↑</button>
    </div>
  </div>

  <div class="feed" id="feed"></div>

  <div class="tabbar">
    <div class="last" id="last">Aucune commande pour l'instant.</div>
    <button class="reset" id="receipts-btn">Reçus</button>
    <button class="reset" id="reset-btn">⟲</button>
  </div>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet"></div>
  <div class="toast" id="toast"></div>
</div>

<script type="module">
import * as THREE from 'three';
/* ===========================================================================
   DONNÉES — roster FIXE (constantes nommées). Aucun tirage ne pilote l'état.
   family : resine | extraction | weed   ·   tier : cheap | mid | premium
   =========================================================================== */
const SAVE_VERSION = 3;
const KEY = 'dw_state';
const START_CASH = 1600;

const FAMILIES = { resine:'Résine', extraction:'Concentrés', weed:'Weed' };

const SUPPLIERS = [
  // ---- Résine (hash pressé) ----
  { id:'pneu',  handle:'PneuDeSecours', emoji:'🛞', family:'resine', tier:'cheap',  rating:2.1, sales:418,

    prod:'Beldia artisanal', eurG:6.8, annoncee:82, qtys:[10,25,50,100],
    desc:"Petit producteur, lots irréguliers mais honnêtes. Parfois en-dessous de l'annonce." },
  // ---- Extraction ----
  { id:'frost', handle:'FrostbiteLab', emoji:'❄️', family:'extraction', tier:'premium', rating:4.8, sales:512,
    prod:'Ice-o-lator 1ère coulée', eurG:14.0, annoncee:94, qtys:[10,25,50],
    desc:"Top du marché. PGP signé, escrow, lab-tested. Cher, mais ce que tu commandes EST ce qui arrive." },
  { id:'verde', handle:'VerdeReserva', emoji:'🫒', family:'extraction', tier:'premium', rating:4.5, sales:201,
    prod:'Dry-sift 120µ', eurG:12.0, annoncee:90, qtys:[10,25,50],
    desc:"Réserve haut de gamme, stock limité. Très peu d'avis négatifs. Min. de commande bas, idéal pour tester." },

/* ----- fonctions DÉTERMINISTES (cœur du design) ----- */
const reliab   = r => Math.min(1, 0.5 + 0.1 * r);                 // fiabilité 0..1 depuis le rating
const realQual = s => Math.round(s.annoncee * reliab(s.rating));  // qualité réelle livrée
const capPct   = { cheap:32, mid:24, premium:14 };                // plafond de remise par tier
const negoBonus= { cheap:8,  mid:5,  premium:2 };                 // remise débloquée par la négociation
// remise « gros volume » — c'est là que se font les meilleures affaires, surtout
// en cheap/moyen (bas/moyen de gamme). Le premium ne brade presque pas.
const BULK = {
  cheap:   [[1000,16],[500,11],[250,7],[100,3]],
  mid:     [[1000,12],[500,9],[250,6],[100,3]],
  premium: [[2000,7],[1000,5],[500,2]],
};
function bulkPct(s,g){ for(const [t,p] of BULK[s.tier]) if(g>=t) return p; return 0; }
// palier de fidélité depuis le nombre de commandes passées chez ce fournisseur
function loyalty(count){
  if(count >= 10) return { lvl:'régulier', pct:8 };
  if(count >= 5)  return { lvl:'habitué',  pct:5 };
  if(count >= 2)  return { lvl:'connu',    pct:2 };
  return { lvl:'nouveau', pct:0 };
}
// rang de réputation (gate les grosses quantités)
function repRank(s){ const c = rel(s.id).count; return c>=10?3 : c>=5?2 : c>=2?1 : 0; }
// échelle de quantités par tier/famille. Le haut de gamme ne se vend qu'en
// gros (250 g→2 kg) ; la weed part de 250 g ; les très grosses quantités
// exigent de la réputation.
function qtyBase(s){
  if(s.family === 'weed')    return [250,500,1000,2000];
  if(s.tier === 'premium')   return [250,500,1000,2000];
  if(s.tier === 'mid')       return [50,100,250,500,1000];
  return [50,100,250,500,1000];                                   // cheap
}
const qtyReq = g => g>=2000?3 : g>=1000?2 : g>=500?1 : 0;          // rang de répu requis
function qtyLadder(s){ return qtyBase(s).map(g => ({ g, need:qtyReq(g), locked: repRank(s) < qtyReq(g) })); }
// crédit : débloqué une fois la relation établie (habitué), jamais sur le premium
function creditOK(s){ return s.tier !== 'premium' && rel(s.id).count >= 5; }
// facteur de prix selon la forme (weed branchage = brut, moins cher)
const formFactor = (s, form) => (s.family === 'weed' && form === 'branchage') ? 0.7 : 1;
// remise debout (hors volume) : fidélité + négo si débloquée, plafonnée par tier
function standingPct(s){
  const r = rel(s.id);
  return Math.min(capPct[s.tier], loyalty(r.count).pct + (r.deal ? negoBonus[s.tier] : 0));
}
// remise effective pour une commande de g grammes
function orderPct(s, g){
  const r = rel(s.id);
  return Math.min(capPct[s.tier], loyalty(r.count).pct + (r.deal ? negoBonus[s.tier] : 0) + bulkPct(s, g));
}
const effEurG = (s, g, form) => s.eurG * formFactor(s, form) * (1 - orderPct(s, g) / 100);

/* ===========================================================================
   APERÇU PRODUIT 3D (Three.js) — modèles procéduraux paramétrés par la QUALITÉ.
   · vignette « photo du listing » = baked à la qualité ANNONCÉE (flatteuse) ;
   · viewer interactif de la fiche = annoncée, ou RÉELLE après échantillon.
   L'aléa ici est de PRÉSENTATION uniquement (placement des grains/cristaux) —
   seedé donc stable, il ne pilote aucune conséquence.
   =========================================================================== */
const seeded = i => { const x = Math.sin(i*127.1 + 311.7) * 43758.5453; return x - Math.floor(x); };
const qOf = pct => Math.max(0, Math.min(1, (pct - 50) / 46));   // qualité % -> 0..1 visuel
const _cl = v => Math.max(0, Math.min(255, v|0));

// --- grain procédural multi-échelle (marbrures + grain fin + impuretés), repris
//     de guitar-shito : c'est ce qui rend la résine crédible (pas une couleur plate).
function grainTex(r,g,b,contrast,spots){
  const S=128, c=document.createElement('canvas'); c.width=c.height=S; const x=c.getContext('2d');
  x.fillStyle='rgb('+(r|0)+','+(g|0)+','+(b|0)+')'; x.fillRect(0,0,S,S);
  for(let i=0;i<20;i++){                                   // marbrures (pressage irrégulier)
    const rx=seeded(i*3)*S, ry=seeded(i*5)*S, rad=S*(0.06+seeded(i*7)*0.16), d=(seeded(i*9)-0.5)*contrast;
    const rgb=_cl(r+d)+','+_cl(g+d)+','+_cl(b+d*0.9);
    const grd=x.createRadialGradient(rx,ry,0,rx,ry,rad);
    grd.addColorStop(0,'rgba('+rgb+',0.42)'); grd.addColorStop(1,'rgba('+rgb+',0)');
    x.fillStyle=grd; x.fillRect(0,0,S,S);
  }
  const img=x.getImageData(0,0,S,S), d=img.data;          // grain fin
  for(let i=0;i<d.length;i+=4){ const n=(Math.random()-0.5)*contrast; d[i]=_cl(d[i]+n); d[i+1]=_cl(d[i+1]+n); d[i+2]=_cl(d[i+2]+n); }
  x.putImageData(img,0,0);
  for(let k=0;k<spots;k++){                                // impuretés pressées
    x.fillStyle='rgba(20,12,6,'+(Math.random()*0.22)+')';
    x.beginPath(); x.arc(Math.random()*S,Math.random()*S,Math.random()*1.6+0.5,0,6.283); x.fill();
  }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(1.5,1.5); t.anisotropy=4; return t;
}
// bump map partagé : micro-relief de résine pressée
const resinBump = (()=>{
  const S=128, c=document.createElement('canvas'); c.width=c.height=S; const x=c.getContext('2d');
  x.fillStyle='#808080'; x.fillRect(0,0,S,S);
  for(let i=0;i<40;i++){ const rx=Math.random()*S, ry=Math.random()*S, rad=S*(0.03+Math.random()*0.1), v=Math.random()<0.5?0:255, a=0.1+Math.random()*0.22;
    const grd=x.createRadialGradient(rx,ry,0,rx,ry,rad); grd.addColorStop(0,'rgba('+v+','+v+','+v+','+a+')'); grd.addColorStop(1,'rgba('+v+','+v+','+v+',0)');
    x.fillStyle=grd; x.fillRect(0,0,S,S); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(1.5,1.5); return t;
})();
// rectangle arrondi + plaque extrudée biseautée (plaque de hash plate à coins ronds)
function roundedRect(w,h,r){
  const s=new THREE.Shape(), x=-w/2, y=-h/2;
  s.moveTo(x+r,y); s.lineTo(x+w-r,y); s.quadraticCurveTo(x+w,y,x+w,y+r);
  s.lineTo(x+w,y+h-r); s.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  s.lineTo(x+r,y+h); s.quadraticCurveTo(x,y+h,x,y+h-r);
  s.lineTo(x,y+r); s.quadraticCurveTo(x,y,x+r,y); return s;
}
function roundedSlab(w,len,thick,r){
  const b=r*0.6;
  const geo=new THREE.ExtrudeGeometry(roundedRect(w,len,r),
    { depth:Math.max(0.02,thick-2*b), bevelEnabled:true, bevelThickness:b, bevelSize:b, bevelSegments:2, steps:1 });
  geo.center(); geo.rotateX(-Math.PI/2); geo.computeVertexNormals(); return geo;
}

function makeProduct(family, pct, form){
  const q = qOf(pct), g = new THREE.Group();
  if(family === 'resine'){
    // plaque de hash pressée : slab arrondi + grain multi-échelle + bump + lustre.
    const lo = new THREE.Color(46/255,31/255,18/255), hi = new THREE.Color(150/255,112/255,56/255);
    const base = lo.clone().lerp(hi, q);
    const grain = grainTex(base.r*255, base.g*255, base.b*255, 34, Math.round(50 + (1-q)*200));
    const mat = new THREE.MeshPhysicalMaterial({ map:grain, bumpMap:resinBump, bumpScale:0.5,
      roughness:0.62-0.30*q, metalness:0.06, clearcoat:0.15+0.55*q, clearcoatRoughness:0.5-0.25*q, envMapIntensity:0.95 });
    const slab = new THREE.Mesh(roundedSlab(1.7,1.25,0.34,0.16), mat); g.add(slab);
    // estampe pressée au centre
    const stampMat = new THREE.MeshPhysicalMaterial({ map:grain, bumpMap:resinBump, bumpScale:0.9,
      color:new THREE.Color(0.6,0.55,0.5), roughness:0.5, clearcoat:0.3 });
    const stamp = new THREE.Mesh(roundedSlab(0.6,0.6,0.06,0.1), stampMat); stamp.position.y=0.16; g.add(stamp);
    // miettes (plus nombreuses en basse qualité)
    const crumbs = Math.round(7*(1-q));
    for(let i=0;i<crumbs;i++){
      const c = new THREE.Mesh(new THREE.IcosahedronGeometry(0.05+seeded(i)*0.05,0),
        new THREE.MeshStandardMaterial({ map:grain, roughness:0.95, flatShading:true }));
      c.position.set((seeded(i*3)-0.5)*1.85, -0.16, (seeded(i*7)-0.5)*1.35);
      c.rotation.set(seeded(i)*3, seeded(i*2)*3, 0); g.add(c);
    }
  } else if(family === 'extraction'){
    // cristaux : MeshPhysical + transmission (translucidité vitreuse ∝ qualité)
    const col = new THREE.Color().lerpColors(new THREE.Color('#8a6420'), new THREE.Color('#edc04f'), q);
    const n = 8 + Math.round(q*12);
    for(let i=0;i<n;i++){
      const r = 0.16 + seeded(i)*0.16;
      const m = new THREE.Mesh(new THREE.IcosahedronGeometry(r,0),
        new THREE.MeshPhysicalMaterial({ color:col, roughness:0.18-0.12*q, metalness:0.0,
          transmission:0.25+0.5*q, ior:1.55, thickness:0.6, attenuationColor:col.clone(), attenuationDistance:1.4,
          envMapIntensity:1.3, flatShading:true, transparent:true }));
      const a = seeded(i*3)*6.283, rad = seeded(i*7)*0.5;
      m.position.set(Math.cos(a)*rad, -0.25 + seeded(i*5)*0.55, Math.sin(a)*rad);
      m.rotation.set(seeded(i)*3, seeded(i*2)*3, seeded(i*4)*3); g.add(m);
    }
  } else { // weed
    const branch = (form === 'branchage');     // brut (tiges + feuilles) vs paquet manucuré
    const green = new THREE.Color().lerpColors(new THREE.Color('#56602c'), new THREE.Color('#5f9230'), q);
    const calyx = new THREE.MeshPhysicalMaterial({ color:green, roughness:0.68, metalness:0,
      sheen:0.5+0.4*q, sheenRoughness:0.5, sheenColor:new THREE.Color('#d2e8a0'),
      clearcoat:0.15*q, envMapIntensity:0.6 });
    const n = 16 + Math.round(q*12);
    for(let i=0;i<n;i++){
      const r = 0.17 + seeded(i)*0.09, t = i/n, ang = i*2.39, rad = (branch?0.46:0.37)*(1-0.45*t);
      const m = new THREE.Mesh(new THREE.SphereGeometry(r,10,8), calyx);
      m.position.set(Math.cos(ang)*rad, t*1.3-0.65, Math.sin(ang)*rad); g.add(m);
    }
    if(branch){
      // forme brute : tige centrale + ramures + feuilles palmées -> mène à l'effeuillage
      const stemMat = new THREE.MeshStandardMaterial({ color:'#6e5a30', roughness:0.9 });
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.06,1.7,6), stemMat); g.add(stem);
      const leafMat = new THREE.MeshStandardMaterial({ color:green.clone().multiplyScalar(0.85), roughness:0.85, side:THREE.DoubleSide });
      for(let i=0;i<6;i++){
        const l = new THREE.Mesh(new THREE.CircleGeometry(0.36,5), leafMat);
        const a = i/6*6.283;
        l.position.set(Math.cos(a)*0.4, -0.35+i*0.2, Math.sin(a)*0.4);
        l.rotation.set(-1.0, a, (seeded(i)-0.5)*0.8); g.add(l);
      }
    }
    const np = (branch?3:5) + Math.round(q*(branch?8:16));             // pistils orange
    const pm = new THREE.MeshStandardMaterial({ color:'#d2702a', roughness:0.5 });
    for(let i=0;i<np;i++){
      const c = new THREE.Mesh(new THREE.CylinderGeometry(0.004,0.022,0.24,4), pm);
      const ang = seeded(i*9)*6.283, t = seeded(i*4), rad = 0.3*(1-0.4*t);
      c.position.set(Math.cos(ang)*rad, t*1.2-0.45, Math.sin(ang)*rad);
      c.rotation.set((seeded(i*2)-0.5)*1.6, 0, (seeded(i)-0.5)*1.6); g.add(c);
    }
    const npt = Math.round((branch?20:50) + q*(branch?120:260));        // givre (moins sur le brut)
    const pts = new Float32Array(npt*3);
    for(let i=0;i<npt;i++){
      const t=i/npt, ang=i*2.39, rad=(branch?0.46:0.4)*(1-0.45*t)*(0.82+0.2*seeded(i));
      pts[i*3]=Math.cos(ang)*rad; pts[i*3+1]=t*1.3-0.65+(seeded(i*3)-0.5)*0.1; pts[i*3+2]=Math.sin(ang)*rad;
    }
    const pg = new THREE.BufferGeometry(); pg.setAttribute('position', new THREE.BufferAttribute(pts,3));
    g.add(new THREE.Points(pg, new THREE.PointsMaterial({ color:'#eef2dd', size:0.05, transparent:true, opacity:0.5+0.35*q })));
  }
  return g;
}

// env-map studio générée en core three (pas d'addon) : PMREM d'une scène de
// 3 « softbox » émissives -> IBL pour les MeshPhysicalMaterial (reflets/transmission).
function buildEnv(renderer){
  const pmrem = new THREE.PMREMGenerator(renderer);
  const s = new THREE.Scene(); s.background = new THREE.Color(0x0c0f0a);
  const box = (hex, mul, pos, scl) => {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(1,1),
      new THREE.MeshBasicMaterial({ color:new THREE.Color(hex).multiplyScalar(mul), side:THREE.DoubleSide }));
    m.position.set(...pos); m.scale.set(...scl); m.lookAt(0,0,0); s.add(m);
  };
  box(0xfff1d8, 3.2, [ 4, 6, 4], [9,9,1]);   // key chaude
  box(0x9fc4ff, 1.4, [-5, 2,-3], [7,7,1]);   // rim froide
  box(0xffffff, 0.5, [ 0,-4, 2], [7,7,1]);   // fill bas
  const tex = pmrem.fromScene(s, 0.04).texture;
  pmrem.dispose();
  return tex;
}

// ombre de contact (radial gradient) pour poser le produit
let _shadowTex = null;
function shadowTexture(){
  if(_shadowTex) return _shadowTex;
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const x = c.getContext('2d'); const grd = x.createRadialGradient(64,64,4,64,64,62);
  grd.addColorStop(0,'rgba(0,0,0,0.55)'); grd.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle = grd; x.fillRect(0,0,128,128);
  _shadowTex = new THREE.CanvasTexture(c); return _shadowTex;
}

function makeStage(){
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(34,1,0.1,100);
  camera.position.set(2.0,1.3,2.4); camera.lookAt(0,-0.1,0);
  scene.add(new THREE.AmbientLight(0xffffff,0.25));
  const key = new THREE.DirectionalLight(0xfff0d8,1.6); key.position.set(3,5,4); scene.add(key);
  const rim = new THREE.DirectionalLight(0x8fbaff,0.5); rim.position.set(-3,2,-3); scene.add(rim);
  const shadow = new THREE.Mesh(new THREE.PlaneGeometry(2.4,2.4),
    new THREE.MeshBasicMaterial({ map:shadowTexture(), transparent:true, depthWrite:false }));
  shadow.rotation.x = -Math.PI/2; shadow.position.y = -0.66; scene.add(shadow);
  return { scene, camera };
}
function tuneRenderer(r){ r.toneMapping = THREE.ACESFilmicToneMapping; r.toneMappingExposure = 1.1; }

// ---- vignettes baked (cache par famille+qualité) ----
const thumbCache = {};
let thumbR = null, thumbStage = null;
function bakeThumb(family, pct){
  const key = family + '_' + pct;
  if(thumbCache[key]) return thumbCache[key];
  try{
    if(!thumbR){
      thumbR = new THREE.WebGLRenderer({ antialias:true, alpha:true, preserveDrawingBuffer:true });
      thumbR.setPixelRatio(2); thumbR.setSize(120,120); tuneRenderer(thumbR);
      thumbStage = makeStage(); thumbStage.scene.environment = buildEnv(thumbR);
    }
    const old = thumbStage.scene.getObjectByName('product'); if(old) thumbStage.scene.remove(old);
    const p = makeProduct(family, pct); p.name = 'product'; p.rotation.y = 0.7; thumbStage.scene.add(p);
    thumbR.render(thumbStage.scene, thumbStage.camera);
    const url = thumbR.domElement.toDataURL('image/png');
    thumbCache[key] = url; return url;
  }catch(e){ return null; }   // si WebGL indispo, on retombe sur l'emoji
}

// ---- viewer interactif (un seul à la fois) ----
let live = null;
function disposeViewer(){
  if(!live) return;
  cancelAnimationFrame(live.raf);
  window.removeEventListener('pointermove', live.move);
  window.removeEventListener('pointerup', live.up);
  live.renderer.dispose();
  if(live.dom && live.dom.parentNode) live.dom.parentNode.removeChild(live.dom);
  live = null;
}
function mountViewer(el, family, pct, form){
  disposeViewer();
  let renderer;
  try{ renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true }); }
  catch(e){ el.innerHTML = '<div class="vhint">aperçu 3D indisponible</div>'; return; }
  const w = el.clientWidth || 340, h = el.clientHeight || 190;
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
  renderer.setSize(w, h); tuneRenderer(renderer); el.appendChild(renderer.domElement);
  const stage = makeStage(); stage.scene.environment = buildEnv(renderer);
  stage.camera.aspect = w/h; stage.camera.updateProjectionMatrix();
  const group = makeProduct(family, pct, form); stage.scene.add(group);
  let rot = 0.5, vel = 0.006, dragging = false, lastX = 0;
  const dom = renderer.domElement; dom.style.cursor = 'grab';
  const down = e => { dragging = true; lastX = (e.touches?e.touches[0].clientX:e.clientX); vel = 0; dom.style.cursor='grabbing'; };
  const move = e => { if(!dragging) return; const x = (e.touches?e.touches[0].clientX:e.clientX); rot += (x-lastX)*0.011; lastX = x; };
  const up = () => { dragging = false; dom.style.cursor='grab'; };
  dom.addEventListener('pointerdown', down);
  window.addEventListener('pointermove', move);
  window.addEventListener('pointerup', up);
  live = { renderer, raf:0, dom, move, up };
  (function loop(){ rot += vel; group.rotation.y = rot; renderer.render(stage.scene, stage.camera);
    live.raf = requestAnimationFrame(loop); })();
}

  list.forEach(s => {
    const r = rel(s.id), loy = loyalty(r.count), st = standingPct(s);
    const fav = S.favs.includes(s.id);
    const showQ = r.sampled ? `<span class="pq">· réel ${realQual(s)}%</span>` : `<span class="pq">· ${s.annoncee}% annoncé</span>`;
    const priceBlock = st > 0
      ? `<span class="was">${fmt1(s.eurG)}/g</span><b>${fmt1(s.eurG*(1-st/100))}</b><span class="u">/g</span>`
      : `<b>${fmt1(s.eurG)}</b><span class="u">/g</span>`;
    const badges = [
      `<span class="bdg fam">${FAMILIES[s.family]}</span>`,
      loy.pct > 0 ? `<span class="bdg loy">${loy.lvl} −${loy.pct}%</span>` : '',
      r.deal ? `<span class="bdg loy">remise négociée</span>` : '',
      r.sampled ? `<span class="bdg samp">échantillon vu</span>` : '',
    ].filter(Boolean).join('');
    const thumb = bakeThumb(s.family, s.annoncee);   // photo du listing = qualité annoncée
    const thumbHTML = thumb
      ? `<div class="thumb"><img src="${thumb}" alt=""><span class="pe">${s.emoji}</span></div>`
      : `<div class="av">${s.emoji}</div>`;
    const el = document.createElement('div');
    el.className = 'listing'; el.dataset.card = s.id;
    el.innerHTML = `
      <div class="lhead">
        ${thumbHTML}
        <div class="who">
          <div class="handle">${s.handle}${s.rating>=4.5?'<span class="verif">✔︎</span>':''}</div>
          <div class="sub">${s.id}@onion · PGP ✓ · escrow</div>
        </div>
        <div class="favstar ${fav?'on':''}" data-fav="${s.id}">${fav?'★':'☆'}</div>
        <div class="tier ${s.tier}">${s.tier}</div>
      </div>
      <div class="badges">${badges}</div>
      <div class="lbody">
        <div>
          <div class="prod">${s.prod} ${showQ}</div>
          <div class="stars">${stars(s.rating)} <span class="cnt">${s.rating.toFixed(1)} · ${s.sales} ventes</span></div>
        </div>
        <div class="price">${priceBlock}</div>
      </div>
      <div class="actrow">
        <div class="mini msg" data-msg="${s.id}">💬 Contacter${r.count?`<span class="un">${r.count} cmd</span>`:''}</div>
        <div class="mini order" data-order="${s.id}">Commander</div>
      </div>`;
    feed.appendChild(el);
  });
}

/* ===========================================================================
   COMMANDE (la conséquence)
   =========================================================================== */
let sel = null, selQty = 0, selForm = 'paquet', selCredit = false;
const labelG = g => g>=1000 ? (g/1000)+' kg' : g+' g';
const repName = rank => rank>=3 ? 'régulier' : rank>=2 ? 'habitué' : 'connu';

function openOrder(s){
  disposeViewer();
  sel = s; selCredit = false; if(s.family !== 'weed') selForm = 'paquet';
  const ladder = qtyLadder(s);
  if(!ladder.some(o => o.g===selQty && !o.locked)) selQty = (ladder.find(o=>!o.locked) || ladder[0]).g;
  const r = rel(s.id), loy = loyalty(r.count);
  const real = realQual(s), gap = s.annoncee - real;
  const qInfo = r.sampled
    ? `Échantillon vu : qualité réelle <span class="${gap>6?'warn':'good'}">${real}%</span> (annoncé ${s.annoncee}%).`
    : (gap > 6
        ? `<span class="warn">⚠ Note basse (${s.rating.toFixed(1)}★) : la qualité réelle tombe souvent sous l'annonce. Demande un échantillon en message.</span>`
        : `<span class="good">Note solide : livre au niveau annoncé.</span>`);
  const formSel = s.family === 'weed' ? `
    <div class="qtitle">Forme</div>
    <div class="forms" id="forms">
      <div class="formopt ${selForm==='paquet'?'on':''}" data-form="paquet"><b>🌿 Paquet manucuré</b><span>têtes parées · prix plein</span></div>
      <div class="formopt ${selForm==='branchage'?'on':''}" data-form="branchage"><b>🌾 Branchage brut</b><span>−30% · à effeuiller</span></div>
    </div>` : '';
  const creditRow = creditOK(s)
    ? `<label class="credit" id="credit-row"><input type="checkbox" id="credit-cb"> 💳 Payer à crédit <span>· dette envers ${s.handle}, à rembourser</span></label>`
    : (s.tier!=='premium' && r.count<5 ? `<div class="credithint">💳 Crédit débloqué après 5 commandes (relation « habitué »).</div>`
                                       : (s.tier==='premium' ? `<div class="credithint">Haut de gamme : cash uniquement, pas de crédit.</div>` : ''));
  const basePrice = fmt1(s.eurG * formFactor(s, selForm));
  $('sheet').innerHTML = `
    <div class="grab"></div>
    <div class="shead">
      <div class="av">${s.emoji}</div>
      <div class="who"><div class="handle">${s.handle}</div>
        <div class="sub">${stars(s.rating)} ${s.rating.toFixed(1)} · ${s.sales} ventes · ${FAMILIES[s.family]}</div></div>
      <div class="tier ${s.tier}">${s.tier}</div>
    </div>
    <div class="viewer" id="viewer">
      <div class="vtag ${r.sampled?'reel':'annonce'}">${r.sampled?'rendu réel · échantillon':'photo du listing'}</div>
      <div class="vhint">glisse pour tourner · ${r.sampled?'qualité réelle':'qualité annoncée'}</div>
    </div>
    <div class="specs">
      <div class="spec"><div class="k">Produit</div><div class="v" style="font-size:11px">${s.prod}</div></div>
      <div class="spec"><div class="k">Prix base</div><div class="v" id="r-base">${basePrice}/g</div></div>
      <div class="spec q"><div class="k">Qualité ${r.sampled?'réelle':'annoncée'}</div><div class="v">${r.sampled?realQual(s):s.annoncee}%</div></div>
    </div>
    <div class="desc">${qInfo}</div>
    ${formSel}
    <div class="qtitle">Quantité</div>
    <div class="qtys" id="qtys"></div>
    <div class="recap"><span>Prix appliqué</span><b id="r-unit">—</b></div>
    <div class="recap"><span>Remise</span><b class="disc" id="r-disc">—</b></div>
    <div class="recap tot"><span>Total</span><b id="r-total">—</b></div>
    ${creditRow}
    <button class="buy" id="buy"></button>
    <button class="ghostbtn" id="to-chat">💬 Négocier / demander un échantillon</button>`;
  renderQtys();
  $('buy').addEventListener('click', doOrder);
  $('to-chat').addEventListener('click', () => openChat(s));
  const cb = $('credit-cb'); if(cb) cb.addEventListener('change', e => { selCredit = e.target.checked; refreshRecap(); });
  const forms = $('forms'); if(forms) forms.addEventListener('click', e => {
    const o = e.target.closest('[data-form]'); if(!o) return; selForm = o.dataset.form; openOrder(s);
  });
  showSheet();
  mountViewer($('viewer'), s.family, r.sampled ? realQual(s) : s.annoncee, selForm);
}
function renderQtys(){
  const box = $('qtys'); box.innerHTML = '';
  qtyLadder(sel).forEach(o => {
    const el = document.createElement('div');
    el.className = 'qty' + (o.g===selQty?' on':'') + (o.locked?' locked':'');
    el.innerHTML = o.locked
      ? `<div class="g">${labelG(o.g)}</div><div class="e">🔒 ${repName(o.need)}</div>`
      : `<div class="g">${labelG(o.g)}</div><div class="e">${fmt(o.g*effEurG(sel,o.g,selForm))}</div>`;
    el.addEventListener('click', () => {
      if(o.locked){ toast(`Quantité réservée : réputation « ${repName(o.need)} » requise chez ${sel.handle}.`, true); return; }
      selQty = o.g; renderQtys(); refreshRecap();
    });
    box.appendChild(el);
  });
  refreshRecap();
}
function refreshRecap(){
  const s = sel, g = selQty, pct = orderPct(s,g), unit = effEurG(s,g,selForm), total = Math.round(g*unit);
  const full = s.eurG * formFactor(s, selForm) * g;
  $('r-unit').textContent = fmt1(unit) + '/g';
  $('r-disc').textContent = pct > 0 ? `−${pct}% (${fmt(full - total)})` : '—';
  $('r-total').textContent = fmt(total);
  const btn = $('buy');
  if(selCredit){
    btn.disabled = false;
    btn.innerHTML = `Commander ${labelG(g)} à crédit · ${fmt(total)} <span class="sm">+${fmt(total)} de dette envers ${s.handle}</span>`;
  } else {
    const ok = total <= S.cash; btn.disabled = !ok;
    btn.innerHTML = ok
      ? `Commander ${labelG(g)} · ${fmt(total)} <span class="sm">paiement cash · escrow · livraison immédiate</span>`
      : `Cash insuffisant <span class="sm">il manque ${fmt(total - S.cash)}</span>`;
  }
}
function doOrder(){
  const s = sel, g = selQty, pct = orderPct(s,g), unit = effEurG(s,g,selForm), total = Math.round(g*unit);
  if(!selCredit && total > S.cash) return;
  const credit = selCredit, real = realQual(s), r = rel(s.id), loy = loyalty(r.count);
  if(credit) S.debt += total; else S.cash -= total;
  S.stockG += g; S.qualSum += g*real;
  r.count += 1; r.grams += g; s.sales += 1;
  const gap = s.annoncee - real;
  const form = (s.family==='weed') ? (selForm==='branchage'?' · branchage brut (à effeuiller)':' · paquet manucuré') : '';
  const qcause = (gap <= 2
    ? `<span class="ok">qualité tenue (${real}%)</span> — ${s.rating.toFixed(1)}★`
    : `<span class="lo">qualité réelle ${real}% &lt; ${s.annoncee}% annoncé</span> — note ${s.rating.toFixed(1)}★`) + form;
  const dparts = [
    loy.pct>0?`fidélité ${loy.lvl} −${loy.pct}%`:'',
    r.deal?`négo −${negoBonus[s.tier]}%`:'',
    bulkPct(s,g)>0?`volume −${bulkPct(s,g)}%`:'',
  ].filter(Boolean);
  const dcause = pct>0 ? ` · <span class="di">remise −${pct}% (${dparts.join(', ')})</span>` : '';
  const ccause = credit ? ` · <span class="lo">à crédit (+${fmt(total)} dette)</span>` : '';
  S.receipts.unshift({ handle:s.handle, g, total, credit, annoncee:s.annoncee, real, cause:qcause + dcause + ccause });
  if(S.receipts.length > 40) S.receipts.pop();
  save(); closeSheet(); renderWallet(); renderFeed();
  toast(`${labelG(g)} ${credit?'à crédit ':''}reçus de ${s.handle} · qualité réelle ${real}%` + (gap>6?` (annoncé ${s.annoncee}%)`:''), gap>6);
}

/* ===========================================================================
   MESSAGERIE / NÉGOCIATION — réponses déterministes, en personnage
   =========================================================================== */
let chatSel = null;
function openChat(s){
  disposeViewer();
  chatSel = s; renderChat(); showSheet();
}
function renderChat(){
  const s = chatSel, r = rel(s.id), loy = loyalty(r.count);
  // fil reconstruit depuis l'état (déterministe) : accueil + échanges débloqués
  const greet = loy.lvl==='régulier' ? "Ah, mon client régulier 🤝 toujours dispo pour toi."
              : loy.lvl==='habitué'  ? "Re. On commence à se connaître, c'est bien."
              : loy.lvl==='connu'    ? "Salut, déjà recroisé je crois. Qu'est-ce qu'il te faut ?"
              : "Yo. Tu cherches quoi ? PGP/escrow only, je réponds pas en clair.";
  const msgs = [`<div class="msg-b them">${greet}<span class="meta">${s.handle} · ${stars(s.rating)} ${s.rating.toFixed(1)}</span></div>`];

  // offres proactives qui s'ouvrent avec la relation (déterministe)
  if(creditOK(s))
    msgs.push(`<div class="msg-b them">Et puis t'as fait tes preuves : je peux te laisser tourner <span class="num">à crédit</span> maintenant, tu régleras la dette plus tard. 🤝</div>`);
  if(repRank(s) >= 2)
    msgs.push(`<div class="msg-b them">Vu la confiance, je t'ouvre les <span class="num">gros volumes</span> (jusqu'à 2 kg). Les grosses quantités, je les garde pour les sérieux.</div>`);

  if(r.sampled){
    msgs.push(`<div class="msg-b me">Tu peux m'envoyer un échantillon avant que je commande ?</div>`);
    if(s.rating >= 3){
      const gap = s.annoncee - realQual(s);
      msgs.push(`<div class="msg-b them">Tiens, photo macro + test. Honnête : c'est du <span class="num">${realQual(s)}%</span> réel${gap>2?` (j'annonce ${s.annoncee}%, je gonfle un peu, comme tout le monde)`:`, pile ce que j'annonce`}.</div>`);
    } else {
      msgs.push(`<div class="msg-b them">Pas d'échantillons. C'est à prendre ou à laisser, à ce prix-là tu fais pas la fine bouche.</div>`);
    }
  }
  if(r.deal){
    msgs.push(`<div class="msg-b me">On peut s'arranger sur le prix si je deviens régulier ?</div>`);
    msgs.push(`<div class="msg-b them">Ok. Vu ${loy.pct>0?'qu\'on bosse ensemble':'que tu te lances'}, je te débloque <span class="num">−${negoBonus[s.tier]}%</span> en plus sur tes prochaines commandes${s.tier==='premium'?" (je descends pas plus, c'est du haut de gamme)":''}. Marché conclu.</div>`);
  }

  const sampleDone = r.sampled, dealDone = r.deal;
  $('sheet').innerHTML = `
    <div class="grab"></div>
    <div class="shead">
      <div class="av">${s.emoji}</div>
      <div class="who"><div class="handle">${s.handle}</div>
        <div class="sub">${FAMILIES[s.family]} · ${loy.lvl}${loy.pct>0?` (−${loy.pct}%)`:''} · ${r.count} commande${r.count>1?'s':''}</div></div>
      <div class="tier ${s.tier}">${s.tier}</div>
    </div>
    <div class="thread" id="thread">
      <div class="relline">canal chiffré · onion</div>
      ${msgs.join('')}
    </div>
    <div class="chatacts">
      <div class="chatrow">
        <button class="cbtn nego" id="c-nego" ${dealDone?'disabled':''}>${dealDone?'Remise obtenue ✓':'Négocier une remise'}<span class="un">${dealDone?`−${negoBonus[s.tier]}% acquis`:`jusqu'à −${negoBonus[s.tier]}% (plafond ${s.tier})`}</span></button>
        <button class="cbtn samp" id="c-samp" ${sampleDone?'disabled':''}>${sampleDone?'Échantillon vu ✓':'Demander un échantillon'}<span class="un">${sampleDone?'qualité réelle connue':'révèle la qualité réelle'}</span></button>
      </div>
      <div class="chatrow"><button class="cbtn order" id="c-order">Passer commande →</button></div>
    </div>`;
  const th = $('thread'); th.scrollTop = th.scrollHeight;
  if(!dealDone) $('c-nego').addEventListener('click', () => { rel(s.id).deal = true; save(); renderChat(); renderFeed();
    toast(`${s.handle} t'accorde −${negoBonus[s.tier]}% sur tes commandes.`); });
  if(!sampleDone) $('c-samp').addEventListener('click', () => { rel(s.id).sampled = true; save(); renderChat(); renderFeed();
    toast(s.rating>=3 ? `Échantillon reçu : qualité réelle ${realQual(s)}%.` : `${s.handle} refuse l'échantillon.`, s.rating<3); });
  $('c-order').addEventListener('click', () => openOrder(s));
}

/* ===========================================================================
   REÇUS
   =========================================================================== */
function openReceipts(){
  disposeViewer();
  if(!S.receipts.length){
    $('sheet').innerHTML = `<div class="grab"></div><div class="empty">Pas encore de reçu.<br>Passe une commande sur le marché.</div>`;
  } else {
    const rows = S.receipts.map(r => `
      <div class="rcpt">
        <div class="r1"><span>${r.g} g · ${r.handle}</span><span class="amt">-${fmt(r.total)}</span></div>
        <div class="cause">${r.cause}</div>
      </div>`).join('');
    $('sheet').innerHTML = `<div class="grab"></div>
      <div class="qtitle" style="margin-bottom:10px">Reçus · ${S.receipts.length}</div>
      <div class="receipts">${rows}</div>`;
  }
  showSheet();
}

/* ===========================================================================
   SHEET helpers, filtres, tri, reset, horloge, init
   =========================================================================== */
function showSheet(){ $('scrim').classList.add('show'); $('sheet').classList.add('show'); }
function closeSheet(){ disposeViewer(); $('scrim').classList.remove('show'); $('sheet').classList.remove('show'); sel=chatSel=null; }

let toastT = null;
function toast(msg, bad=false){
  const t = $('toast');
  t.className = 'toast show' + (bad ? ' bad' : '');
  t.innerHTML = msg;
  clearTimeout(toastT);
  toastT = setTimeout(() => { t.className = 'toast'; }, 2600);
}

$('feed').addEventListener('click', e => {
  const fav = e.target.closest('[data-fav]');
  if(fav){ const id = fav.dataset.fav; const i = S.favs.indexOf(id);
    i<0 ? S.favs.push(id) : S.favs.splice(i,1); save(); renderFeed(); return; }
  const msg = e.target.closest('[data-msg]'); if(msg){ openChat(byId(msg.dataset.msg)); return; }
  const ord = e.target.closest('[data-order]'); if(ord){ openOrder(byId(ord.dataset.order)); return; }
  const card = e.target.closest('[data-card]'); if(card){ openOrder(byId(card.dataset.card)); return; }
});
$('filters').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if(!c) return;
  filter = c.dataset.f;
  [...$('filters').children].forEach(x => x.classList.toggle('on', x===c));
  renderFeed();
});
$('sort').addEventListener('click', e => {
  const b = e.target.closest('button'); if(!b) return;
  sortBy = b.dataset.s;
  [...$('sort').children].forEach(x => x.classList.toggle('on', x===b));
  renderFeed();
});
$('scrim').addEventListener('click', closeSheet);
$('receipts-btn').addEventListener('click', openReceipts);
$('reset-btn').addEventListener('click', () => {
  if(confirm('Repartir de zéro (cash, stock, relations, favoris) ?')){
    S = DEFAULT(); save(); renderWallet(); renderFeed(); toast('Compte réinitialisé.');
  }
});

function tick(){ const d=new Date();
  $('clock').textContent = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
setInterval(tick, 10000); tick();

renderWallet(); renderFeed();
</script>
</body>
</html>
