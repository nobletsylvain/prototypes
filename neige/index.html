<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Neige</title>
<style>
  /* --- Plein ecran, pense mobile (pas de scroll, pas de zoom) --- */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; touch-action:none;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 120% at 50% 0%, #1b2b3c 0%, #0e1722 60%, #070d14 100%); }
  #app { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  /* --- HUD (overlay HTML par dessus la scene 3D) --- */
  .hud { position:fixed; left:0; right:0; pointer-events:none; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  #count { top:max(14px,env(safe-area-inset-top)); left:16px; font-weight:800; font-size:16px; color:#cfe9ff; }
  #reset { position:fixed; top:max(10px,env(safe-area-inset-top)); right:14px; pointer-events:auto;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    padding:9px 13px; border-radius:12px; font-size:14px; font-weight:700; backdrop-filter:blur(6px); }
  #reset:active { background:rgba(255,255,255,.25); }
  #toast { top:34%; text-align:center; font-size:25px; font-weight:800; opacity:0;
    transition:opacity .25s, transform .25s; transform:translateY(8px); }
  #toast.show { opacity:1; transform:translateY(0); }
  #title { top:max(46px,calc(env(safe-area-inset-top) + 30px)); left:16px; font-size:12px;
    color:rgba(255,255,255,.45); font-weight:600; letter-spacing:.5px; }
  #remain { top:max(62px,calc(env(safe-area-inset-top) + 46px)); left:16px; font-size:12px;
    color:rgba(125,200,255,.85); font-weight:700; letter-spacing:.3px; }

  /* --- Cash + bac dechets + reputation --- */
  #cash { position:fixed; top:max(14px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-weight:800; font-size:18px; color:#9be37d; text-shadow:0 2px 8px rgba(0,0,0,.5); pointer-events:none; }
  #waste { position:fixed; top:calc(max(14px,env(safe-area-inset-top)) + 27px); left:50%; transform:translateX(-50%);
    pointer-events:auto; background:rgba(202,161,95,.18); border:1px solid rgba(202,161,95,.5); color:#e6c896;
    font-weight:700; font-size:13px; padding:4px 11px; border-radius:10px; }
  #waste:active { background:rgba(202,161,95,.35); }
  #rep { position:fixed; top:max(14px,env(safe-area-inset-top)); right:70px; pointer-events:none;
    background:rgba(122,160,255,.16); border:1px solid rgba(122,160,255,.5); color:#bcd0ff;
    font-weight:700; font-size:12px; padding:4px 9px; border-radius:999px; }

  /* --- Niveau + barre d'XP --- */
  #xpwrap { position:fixed; top:calc(max(14px,env(safe-area-inset-top)) + 54px); left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:6px; pointer-events:none; z-index:4; }
  #level { background:rgba(155,227,125,.18); border:1px solid rgba(155,227,125,.55); color:#bdf0a3;
    font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  #xpbar { width:120px; height:7px; background:rgba(255,255,255,.14); border-radius:999px; overflow:hidden; }
  #xpfill { height:100%; width:0%; background:linear-gradient(90deg,#7ad17a,#bdf0a3); border-radius:999px; transition:width .25s; }

  /* --- Etiquettes flottantes (bacs / brique / dalle) --- */
  #labels { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
  .blabel { position:absolute; transform:translate(-50%,-50%); white-space:nowrap;
    font-weight:800; font-size:13px; padding:2px 7px; border-radius:8px;
    background:rgba(0,0,0,.5); text-shadow:0 1px 3px rgba(0,0,0,.6); }

  /* --- Bandeau de consigne (guidage) : toujours visible, indique le geste courant --- */
  #prompt { bottom:max(60px,calc(env(safe-area-inset-bottom) + 54px)); text-align:center; pointer-events:none; }
  #prompt span { display:inline-block; background:rgba(8,16,26,.6); border:1px solid rgba(125,200,255,.35);
    color:#eaf6ff; font-size:14px; font-weight:700; padding:8px 16px; border-radius:999px;
    backdrop-filter:blur(6px); box-shadow:0 4px 14px rgba(0,0,0,.4); max-width:90vw; }

  /* --- Selecteur de format de vente --- */
  #fmtbar { position:fixed; left:50%; transform:translateX(-50%); bottom:max(12px,calc(env(safe-area-inset-bottom) + 8px));
    display:flex; align-items:center; gap:6px; pointer-events:auto; z-index:4; }
  #fmtbar .lbl { color:rgba(255,255,255,.6); font-size:11px; font-weight:700; margin-right:2px; }
  .fmtbtn { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    font-weight:800; font-size:13px; padding:7px 11px; border-radius:10px; }
  .fmtbtn.on { background:#7aa0ff; color:#0e162a; border-color:#7aa0ff; }
  .fmtbtn:disabled { opacity:.4; }

  /* --- Boutique --- */
  #shopbtn { position:fixed; right:14px; top:calc(max(10px,env(safe-area-inset-top)) + 46px); pointer-events:auto;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff; font-size:18px;
    width:46px; height:42px; border-radius:12px; }
  #shopbtn:active { background:rgba(255,255,255,.25); }
  #shopbtn.pulse { animation:pulsebtn 1.1s ease-in-out infinite; }
  @keyframes pulsebtn { 0%,100%{ box-shadow:0 0 0 0 rgba(125,200,255,.0);} 50%{ box-shadow:0 0 0 6px rgba(125,200,255,.35);} }
  #shop { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.5); z-index:6; }
  #shop.show { display:flex; }
  #shopinner { width:88%; max-width:380px; max-height:74vh; overflow:auto; background:#14202e;
    border:1px solid rgba(255,255,255,.15); border-radius:16px; padding:16px; color:#fff; }
  #shophead { font-weight:800; font-size:18px; margin-bottom:12px; display:flex; justify-content:space-between; }
  #shopcash { color:#9be37d; }
  .shopitem { display:flex; align-items:center; gap:10px; padding:10px; margin-bottom:10px;
    border:1px solid rgba(255,255,255,.12); border-radius:12px; background:rgba(255,255,255,.04); }
  .shopitem .ic { font-size:26px; }
  .shopitem .info { flex:1; }
  .shopitem .nm { font-weight:700; }
  .shopitem .ds { font-size:12px; color:rgba(255,255,255,.6); }
  .shopitem button { background:#2f5d8a; border:none; color:#fff; font-weight:700; padding:9px 12px; border-radius:10px; min-width:64px; }
  .shopitem button:disabled { background:rgba(255,255,255,.12); color:rgba(255,255,255,.4); }
  #shopclose { width:100%; background:rgba(255,255,255,.12); border:none; color:#fff; font-weight:700; padding:11px; border-radius:12px; }
</style>

<!-- Three.js charge en module depuis un CDN (import map). Supporte par Safari iOS 16.4+ -->
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body>
<div id="app"></div>
<div class="hud" id="count">Produit : 0 g</div>
<div id="cash">💶 0 €</div>
<button id="waste">🗑️ 0 g</button>
<div id="rep">Réput 100%</div>
<div id="xpwrap"><span id="level">Niv. 1</span><div id="xpbar"><div id="xpfill"></div></div></div>
<div class="hud" id="title">BRIQUE</div>
<div class="hud" id="remain">Bulk : 0 g</div>
<button id="reset">🔄 Lot</button>
<button id="shopbtn">🛒</button>
<div class="hud" id="prompt"><span>Reçois une brique…</span></div>
<div class="hud" id="toast"></div>
<div id="labels"></div>

<!-- Selecteur de format de vente -->
<div id="fmtbar">
  <span class="lbl">Sachet</span>
  <button class="fmtbtn on" data-fmt="1">1g</button>
  <button class="fmtbtn" data-fmt="5">5g</button>
  <button class="fmtbtn" data-fmt="25" title="Briquette (presse requise)">25g</button>
</div>

<!-- Boutique -->
<div id="shop">
  <div id="shopinner">
    <div id="shophead"><span>🛒 Boutique</span><span id="shopcash"></span></div>
    <div id="shopitems"></div>
    <button id="shopclose">Fermer</button>
  </div>
</div>

<script type="module">
"use strict";
import * as THREE from "three";

/* =========================================================================
   NEIGE — core loop "bulk -> retail" (proto mobile WebGL)
   -------------------------------------------------------------------------
   Refonte "feeling > skill" : plus de mini-jeux d'adresse / de jauges à viser.
   On manipule DIRECTEMENT la matière au doigt, sur la scène 3D. Aucun geste
   n'est pénalisé s'il est grossier — il produit toujours quelque chose, et la
   satisfaction vient du retour (flux de poudre, volume qui gonfle, sachets qui
   partent, son, secousse). Un guidage (halo sous la station active + bandeau
   de consigne) rend la boucle bloc -> poudre -> mix -> sachet évidente.

     1) RECEPTION : on achète une brique (gros). Elle arrive avec sa pureté.
     2) VERSER     : on MAINTIENT le doigt sur le 🧱 BLOC -> un flux de poudre
                     coule sur la 🪟 DALLE (on verse autant qu'on veut).
     3) MELANGER   : on TOURNE le doigt sur la DALLE -> le volume gonfle
                     (stretch) et la poudre s'homogénéise. Se termine juste en
                     s'y prenant (même brouillon), jamais raté.
     4) ENSACHER   : on TAPE / MAINTIENT le bac 📦 PRODUIT -> chaque geste
                     remplit un sachet (1/5/25 g) qui se scelle, s'envole et se
                     vend. Pas de timing, pas de raté.

   Boutique : agents de coupe (stretch+), presse à briquettes, auto-ensacheuse,
   etc. + niveaux (XP) + réputation (qualité moyenne des ventes). Persistance
   localStorage sous le préfixe `neige_*`.
   ========================================================================= */

/* -------------------------------------------------------------------------
   0) ECONOMIE
   ------------------------------------------------------------------------- */
const BRICK_PRICES = { 50: 2200, 100: 4000 };     // achat gros (~44 / 40 €/g de bulk)
const FMT_PRICE    = { 1: 80, 5: 62, 25: 48 };    // €/g au détail selon le format (petit = +cher)
const FMT_LABEL    = { 1: "rue 1 g", 5: "semi 5 g", 25: "briquette 25 g" };
const SCHLAG_RATE  = 12;                            // €/g des déchets bradés
const STARTER      = { g: 30, purity: 0.78 };       // lot de dépannage gratuit (anti soft-lock)
const POUR_RATE    = 26;                             // g/s versés en maintenant sur le bloc
const MIX_DRAG_K   = 1 / 650;                        // homogénéité gagnée par pixel de swirl
const MIX_TIME_K   = 0.55;                           // homogénéité gagnée par seconde d'engagement
const BAG_HOLD_RATE= 0.26;                           // s entre deux sachets quand on maintient

/* -------------------------------------------------------------------------
   1) SCENE, CAMERA, RENDU
   ------------------------------------------------------------------------- */
const app = document.getElementById("app");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 200);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setClearColor(0x000000, 0);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const VIEW_DIR    = new THREE.Vector3(0.0, 0.66, 0.75).normalize();
const VIEW_TARGET = new THREE.Vector3(0, 0.25, 0.75);
const VIEW_RADIUS = Math.hypot(2.5, 0.9, 2.1);
const baseCamPos  = new THREE.Vector3();
let zoom = +(localStorage.getItem("neige_zoom")) || 1;
zoom = Math.max(0.6, Math.min(2.6, zoom));

function fitView() {
  const vFov = camera.fov * Math.PI / 180;
  const hFov = 2 * Math.atan(Math.tan(vFov / 2) * camera.aspect);
  const fov  = Math.min(vFov, hFov);
  const dist = (VIEW_RADIUS / Math.sin(fov / 2)) * 1.03 / zoom;
  baseCamPos.copy(VIEW_TARGET).addScaledVector(VIEW_DIR, dist);
  camera.position.copy(baseCamPos);
  camera.lookAt(VIEW_TARGET);
}
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  fitView();
}
window.addEventListener("resize", resize);

/* -------------------------------------------------------------------------
   2) LUMIERES
   ------------------------------------------------------------------------- */
scene.add(new THREE.HemisphereLight(0xdfeeff, 0x1a2230, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 1.35);
sun.position.set(5, 11, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.bias = -0.0004;
const sc = sun.shadow.camera;
sc.left = -8; sc.right = 8; sc.top = 8; sc.bottom = -8; sc.near = 1; sc.far = 30;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x9fc0ff, 0.4);
fill.position.set(-4, 3, 6);
scene.add(fill);

/* -------------------------------------------------------------------------
   3) PLAN DE TRAVAIL : table + dalle + brique + balance + bacs
   ------------------------------------------------------------------------- */
const board = new THREE.Mesh(
  new THREE.BoxGeometry(5.2, 0.3, 4.8),
  new THREE.MeshStandardMaterial({ color: 0x2a3340, roughness: 0.7, metalness: 0.25 })
);
board.position.set(0, -0.15, 0.5);
board.receiveShadow = true;
scene.add(board);

const SLAB_POS = new THREE.Vector3(0, 0, 0.2);
const slab = new THREE.Mesh(
  new THREE.BoxGeometry(2.3, 0.12, 1.5),
  new THREE.MeshStandardMaterial({ color: 0xbfe9ff, transparent: true, opacity: 0.4, roughness: 0.06, metalness: 0.3 })
);
slab.position.copy(SLAB_POS).setY(0.06);
slab.receiveShadow = true;
scene.add(slab);

const BRICK_POS = new THREE.Vector3(-1.65, 0, -0.5);
const brick = new THREE.Group();
brick.position.copy(BRICK_POS);
const mylar = new THREE.MeshStandardMaterial({ color: 0xdfe6ee, roughness: 0.32, metalness: 0.4 });
const brickBody = new THREE.Mesh(new THREE.BoxGeometry(1.15, 0.5, 0.8), mylar);
brickBody.position.y = 0.25; brickBody.castShadow = true; brick.add(brickBody);
const tape = new THREE.Mesh(new THREE.BoxGeometry(1.17, 0.16, 0.12),
  new THREE.MeshStandardMaterial({ color: 0x9aa6b2, roughness: 0.5 }));
tape.position.set(0, 0.25, 0); brick.add(tape);
scene.add(brick);

const scaleGrp = new THREE.Group();
scaleGrp.position.set(1.7, 0, -0.35);
const scaleBase = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.16, 0.8),
  new THREE.MeshStandardMaterial({ color: 0x20262e, roughness: 0.5, metalness: 0.4 }));
scaleBase.position.y = 0.08; scaleBase.castShadow = true; scaleBase.receiveShadow = true; scaleGrp.add(scaleBase);
const scalePan = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.04, 0.6),
  new THREE.MeshStandardMaterial({ color: 0xc8d2dc, roughness: 0.25, metalness: 0.7 }));
scalePan.position.set(0, 0.18, -0.02); scaleGrp.add(scalePan);
const scaleRead = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.18, 0.04),
  new THREE.MeshStandardMaterial({ color: 0x0a1a12, emissive: 0x123d22, roughness: 0.4 }));
scaleRead.position.set(0, 0.2, 0.3); scaleGrp.add(scaleRead);
scene.add(scaleGrp);

function makeBin(pos, col) {
  const grp = new THREE.Group(); grp.position.copy(pos);
  const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.7, metalness: 0.1, side: THREE.DoubleSide });
  const w = 1.55, d = 1.1, h = 0.4, th = 0.07;
  const floor = new THREE.Mesh(new THREE.BoxGeometry(w, th, d), mat); floor.position.y = th / 2; floor.receiveShadow = true; grp.add(floor);
  const wLR = (x) => { const m = new THREE.Mesh(new THREE.BoxGeometry(th, h, d), mat); m.position.set(x, h / 2, 0); grp.add(m); };
  const wFB = (z) => { const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, th), mat); m.position.set(0, h / 2, z); grp.add(m); };
  wLR(-w / 2); wLR(w / 2); wFB(-d / 2); wFB(d / 2);
  scene.add(grp); return grp;
}
const PROD_POS  = new THREE.Vector3(-1.1, 0, 2.0);
const WASTE_POS = new THREE.Vector3(1.1, 0, 2.0);
const prodBin   = makeBin(PROD_POS, 0x2f5d8a);
const wasteBin  = makeBin(WASTE_POS, 0x55504a);

// Halo de guidage : un disque lumineux pulsant sous la station "à utiliser".
const glow = new THREE.Mesh(
  new THREE.CircleGeometry(1.05, 28),
  new THREE.MeshBasicMaterial({ color: 0x7df9ff, transparent: true, opacity: 0.25, side: THREE.DoubleSide, depthWrite: false })
);
glow.rotation.x = -Math.PI / 2; glow.position.y = 0.04; scene.add(glow);

/* -------------------------------------------------------------------------
   4) TAS DE POUDRE (heaps) : un cône blanc dont l'échelle suit les grammes.
   ------------------------------------------------------------------------- */
function powderTex(base) {
  const c = document.createElement("canvas"); c.width = c.height = 64;
  const x = c.getContext("2d"); const img = x.createImageData(64, 64);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 26;
    img.data[i] = base + n; img.data[i+1] = base + n; img.data[i+2] = base + 4 + n; img.data[i+3] = 255;
  }
  x.putImageData(img, 0, 0);
  const t = new THREE.CanvasTexture(c); t.wrapS = t.wrapT = THREE.RepeatWrapping; return t;
}
function makeHeap(base) {
  const m = new THREE.Mesh(
    new THREE.ConeGeometry(0.78, 0.5, 20),
    new THREE.MeshStandardMaterial({ map: powderTex(base), roughness: 0.97 })
  );
  m.castShadow = true; m.visible = false; scene.add(m); return m;
}
const trayHeap  = makeHeap(238); trayHeap.position.set(SLAB_POS.x, 0.12, SLAB_POS.z);
const prodHeap  = makeHeap(228); prodHeap.position.set(PROD_POS.x, 0.06, PROD_POS.z);
const wasteHeap = makeHeap(150); wasteHeap.position.set(WASTE_POS.x, 0.06, WASTE_POS.z);
function setHeap(mesh, g, maxG) {
  const k = Math.min(1, g / maxG);
  const s = 0.18 + 0.95 * Math.cbrt(k);
  mesh.visible = g > 0.3;
  mesh.scale.set(s, 0.55 + 0.6 * k, s);
}
// Teinte du tas sur la dalle : du blanc pur (poudre fraîche) vers une teinte
// "coupée" crème au fur et à mesure du mélange.
const COL_FRESH = new THREE.Color(0xffffff);
const COL_CUT   = new THREE.Color(0xefe6cf);
function setTrayTint(h) { trayHeap.material.color.lerpColors(COL_FRESH, COL_CUT, Math.min(1, h)); }

/* -------------------------------------------------------------------------
   5) ETAT DE PARTIE + PERSISTANCE
   ------------------------------------------------------------------------- */
const SAVE_VERSION = "2";
if (localStorage.getItem("neige_ver") !== SAVE_VERSION) {
  ["neige_cash", "neige_waste", "neige_level", "neige_xp", "neige_shop", "neige_rep"].forEach(k => localStorage.removeItem(k));
  localStorage.setItem("neige_ver", SAVE_VERSION);
}
let cash       = +(localStorage.getItem("neige_cash") || 0);
let wasteGrams = +(localStorage.getItem("neige_waste") || 0);
let level      = Math.max(1, +(localStorage.getItem("neige_level") || 1));
let xp         = Math.max(0, +(localStorage.getItem("neige_xp") || 0));
let rep        = Math.min(1.2, Math.max(0.7, +(localStorage.getItem("neige_rep") || 1)));
let fmt        = +(localStorage.getItem("neige_fmt") || 1);

let bulkG = 0, bulkPurity = STARTER.purity;        // brique de bulk en cours
const tray = { g: 0, psum: 0 };                     // portion versée sur la dalle (avant cut)
const prod = { g: 0, qsum: 0 };                     // produit coupé : g + qualité pondérée
let homog = 0;                                       // homogénéité du mélange courant (0..1)

function trayPurity() { return tray.g > 0 ? tray.psum / tray.g : bulkPurity; }
function prodQual()   { return prod.g > 0 ? prod.qsum / prod.g : 0.6; }
function addTray(g, p)   { tray.g += g; tray.psum += g * p; }
function addProd(g, q)   { prod.g += g; prod.qsum += g * q; updateProdLabel(); }
function takeProd(g) {
  if (prod.g <= 0) return;
  const r = Math.min(1, g / prod.g);
  prod.qsum *= (1 - r); prod.g = Math.max(0, prod.g - g);
  updateProdLabel();
}

/* -------------------------------------------------------------------------
   6) UI (références + setters)
   ------------------------------------------------------------------------- */
const ui = {
  count:document.getElementById("count"), cash:document.getElementById("cash"),
  waste:document.getElementById("waste"), rep:document.getElementById("rep"),
  level:document.getElementById("level"), xpfill:document.getElementById("xpfill"),
  title:document.getElementById("title"), remain:document.getElementById("remain"),
  prompt:document.getElementById("prompt").firstElementChild, toast:document.getElementById("toast"),
  shop:document.getElementById("shop"), shopitems:document.getElementById("shopitems"), shopcash:document.getElementById("shopcash"),
  shopbtn:document.getElementById("shopbtn"),
};
function setCash(v) {
  cash = v; localStorage.setItem("neige_cash", String(Math.round(cash)));
  ui.cash.textContent = "💶 " + Math.round(cash) + " €";
  if (ui.shop.classList.contains("show")) renderShop();
}
function setWaste(v) {
  wasteGrams = Math.max(0, v); localStorage.setItem("neige_waste", String(Math.round(wasteGrams)));
  ui.waste.textContent = "🗑️ " + Math.round(wasteGrams) + " g";
  setHeap(wasteHeap, wasteGrams, 120);
}
function addWaste(g) { setWaste(wasteGrams + g); }
function setRep(v) {
  rep = Math.min(1.2, Math.max(0.7, v)); localStorage.setItem("neige_rep", rep.toFixed(3));
  ui.rep.textContent = "Réput " + Math.round(rep * 100) + "%";
}
function updateCount()      { ui.count.textContent = "Produit : " + Math.round(prod.g) + " g"; }
function updateRemain()     { ui.remain.textContent = "Bulk : " + Math.round(bulkG) + " g · " + Math.round(bulkPurity * 100) + "%"; }
function updateTitle()      { ui.title.textContent = "BRIQUE " + Math.round(bulkG) + " g"; }
function updateProdLabel()  { prodLabel.textContent = "📦 PRODUIT " + Math.round(prod.g) + " g"; setHeap(prodHeap, prod.g, 260); updateCount(); }
function updateTrayHeap()   { setHeap(trayHeap, tray.g, 120); }

/* -------------------------------------------------------------------------
   7) NIVEAUX / XP
   ------------------------------------------------------------------------- */
function xpNeed(lvl)  { return Math.round(140 * Math.pow(1.35, lvl - 1)); }
function levelMult()  { return 1 + (level - 1) * 0.025; }
function updateXpUI() {
  ui.level.textContent = "Niv. " + level + " · +" + Math.round((levelMult() - 1) * 100) + "%";
  ui.xpfill.style.width = Math.min(100, (xp / xpNeed(level)) * 100) + "%";
}
function addXP(n) {
  xp += n; let leveled = false;
  while (xp >= xpNeed(level)) { xp -= xpNeed(level); level++; leveled = true; }
  if (leveled) {
    showToast("Niveau " + level + " ! +" + Math.round((levelMult() - 1) * 100) + "% revenus", "#bdf0a3");
    addShake(0.18);
    const ac = ensureAudio();
    if (ac) { const t = ac.currentTime; beep(660, t, 0.1, 0.2); beep(880, t + 0.08, 0.1, 0.2); beep(1180, t + 0.16, 0.16, 0.22); }
  }
  localStorage.setItem("neige_level", String(level));
  localStorage.setItem("neige_xp", String(Math.round(xp)));
  updateXpUI();
}

/* -------------------------------------------------------------------------
   8) AUDIO (synthétisé, débloqué au 1er tap)
   ------------------------------------------------------------------------- */
let actx = null;
function ensureAudio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === "suspended") actx.resume();
  return actx;
}
function noiseBurst(dur, f0, f1, vol, type, q) {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime, len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate), ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.4);
  const src = ac.createBufferSource(); src.buffer = buf;
  const filt = ac.createBiquadFilter(); filt.type = type || "bandpass"; filt.Q.value = q || 0.8;
  filt.frequency.setValueAtTime(f0, t);
  filt.frequency.exponentialRampToValueAtTime(Math.max(60, f1), t + dur);
  const g = ac.createGain(); g.gain.value = vol;
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(t); src.stop(t + dur);
}
function beep(freq, t0, dur, vol) {
  const ac = ensureAudio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = "square"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t0); o.stop(t0 + dur);
}
const sScrape= () => noiseBurst(0.09, 2200, 800, 0.25, "bandpass", 0.9);   // swirl du mélange
const sZip   = () => noiseBurst(0.13, 1100, 2600, 0.22, "bandpass", 1.3);  // zip sachet
const sErr   = () => { const ac = ensureAudio(); if (ac) beep(150, ac.currentTime, 0.12, 0.2); };
function sSale() { const ac = ensureAudio(); if (!ac) return; const t = ac.currentTime; beep(880, t, 0.12, 0.24); beep(1320, t + 0.08, 0.16, 0.22); }

/* -------------------------------------------------------------------------
   9) PUFFS de poudre (juice) + secousse
   ------------------------------------------------------------------------- */
const puffs = [];
const puffGeo = new THREE.BoxGeometry(0.06, 0.06, 0.06);
const puffMat = new THREE.MeshStandardMaterial({ color: 0xf2f6fb, roughness: 1 });
function spawnPuff(pos, vx, vy, vz) {
  const m = new THREE.Mesh(puffGeo, puffMat);
  m.position.copy(pos); scene.add(m);
  puffs.push({ mesh: m, vx, vy, vz, settled: false });
  while (puffs.length > 90) { const p = puffs.shift(); scene.remove(p.mesh); }
}
function burstPuffs(pos, n, toward) {
  for (let i = 0; i < n; i++) {
    const tx = toward ? (toward.x - pos.x) * 1.2 : (Math.random() - 0.5) * 1.6;
    const tz = toward ? (toward.z - pos.z) * 1.2 : (Math.random() - 0.5) * 1.6;
    spawnPuff(new THREE.Vector3(pos.x + (Math.random()-0.5)*0.5, pos.y + 0.2, pos.z + (Math.random()-0.5)*0.5),
      tx + (Math.random()-0.5)*0.6, 1.6 + Math.random()*1.0, tz + (Math.random()-0.5)*0.6);
  }
}
function updatePuffs(dt) {
  for (const p of puffs) {
    if (p.settled) continue;
    p.vy -= 9 * dt;
    p.mesh.position.x += p.vx * dt; p.mesh.position.y += p.vy * dt; p.mesh.position.z += p.vz * dt;
    p.mesh.rotation.x += dt * 6; p.mesh.rotation.y += dt * 4;
    if (p.mesh.position.y <= 0.1) { scene.remove(p.mesh); p.settled = true; }
  }
  for (let i = puffs.length - 1; i >= 0; i--) if (puffs[i].settled) puffs.splice(i, 1);
}
let shake = 0;
function addShake(a) { shake = Math.min(0.6, shake + a); }

/* -------------------------------------------------------------------------
   10) SACHETS qui s'envolent (juice de vente)
   ------------------------------------------------------------------------- */
const bags = [];
const bagGeo = new THREE.BoxGeometry(0.3, 0.07, 0.38);
const bagMat = new THREE.MeshStandardMaterial({ color: 0xeaf6ff, transparent: true, opacity: 0.9, roughness: 0.3, metalness: 0.1 });
function spawnBagFly() {
  const m = new THREE.Mesh(bagGeo, bagMat);
  m.position.set(PROD_POS.x, 0.4, PROD_POS.z); m.castShadow = true; scene.add(m);
  bags.push({ mesh: m, t: 0, from: m.position.clone(),
    to: new THREE.Vector3(PROD_POS.x + 1.0 + Math.random()*0.4, 1.7, PROD_POS.z - 0.6) });
  while (bags.length > 24) { const b = bags.shift(); scene.remove(b.mesh); }
}
function updateBags(dt) {
  for (let i = bags.length - 1; i >= 0; i--) {
    const b = bags[i]; b.t += dt * 1.7; const k = Math.min(1, b.t);
    b.mesh.position.lerpVectors(b.from, b.to, k);
    b.mesh.position.y += Math.sin(k * Math.PI) * 0.4;       // petit arc
    b.mesh.rotation.y += dt * 5; b.mesh.scale.setScalar(1 - 0.55 * k);
    if (k >= 1) { scene.remove(b.mesh); bags.splice(i, 1); }
  }
}

function stretchFactor() { return 1.3 + owned.agent * 0.1; }                    // 1.3 .. ~1.9
function bagInterval()   { return 3.0 * Math.pow(0.82, owned.cadence); }        // s/sachet (auto)

function receiveBrick(size) {
  const cost = BRICK_PRICES[size];
  if (cash < cost) { showToast("Pas assez : " + cost + " €", "#ff6b6b"); return; }
  setCash(cash - cost);
  ui.shop.classList.remove("show");
  const purity = 0.74 + Math.random() * 0.18;     // pureté du lot (74..92 %)
  loadBrick(size, purity);
  burstPuffs(BRICK_POS, 8); sSale();
  showToast("Lot reçu : " + size + " g · " + Math.round(purity * 100) + "%", "#bfe9ff");
}
function loadBrick(size, purity) {
  const tot = bulkG + size;
  bulkPurity = tot > 0 ? (bulkG * bulkPurity + size * purity) / tot : purity;
  bulkG = tot;
  brick.visible = true; updateTitle(); updateRemain();
}

/* -------------------------------------------------------------------------
   15) GESTE 1 — VERSER : maintenir sur le BLOC fait couler la poudre.
   Aucun objectif, aucune perte : on verse autant qu'on veut sur la dalle.
   ------------------------------------------------------------------------- */
let pouring = false, pourSndT = 0;
function updatePour(dt) {
  if (!pouring) return;
  if (bulkG <= 0.05) { pouring = false; showToast("Bloc fini", "#e6c896"); return; }
  const g = Math.min(bulkG, POUR_RATE * dt);
  bulkG -= g; addTray(g, bulkPurity);
  homog = 0; setTrayTint(0);                       // poudre fraîche -> à re-mélanger
  updateTrayHeap(); updateRemain(); updateTitle();
  // Flux de particules du bloc vers la dalle.
  const from = new THREE.Vector3(BRICK_POS.x + 0.3, 0.55, BRICK_POS.z + 0.2);
  spawnPuff(from.clone(), (SLAB_POS.x - from.x) * 1.1 + (Math.random()-0.5)*0.3,
            0.3 + Math.random()*0.3, (SLAB_POS.z - from.z) * 1.1 + (Math.random()-0.5)*0.3);
  // Son de versement (hiss qui monte avec la quantité), retriggé périodiquement.
  pourSndT += dt;
  if (pourSndT >= 0.09) { pourSndT = 0; noiseBurst(0.1, 900 + Math.min(1, tray.g/100)*1400, 400, 0.14, "lowpass", 0.7); }
}

/* -------------------------------------------------------------------------
   16) GESTE 2 — MELANGER : tourner le doigt sur la dalle gonfle le volume
   (stretch) et homogénéise. Progresse au drag ET au temps -> même un geste
   grossier marche. À 100 %, le lot devient du PRODUIT (jamais pénalisé).
   ------------------------------------------------------------------------- */
let mixing = false;
function mixAddDrag(px) {                            // appelé au pointermove
  if (!mixing || tray.g <= 0) return;
  homog = Math.min(1, homog + px * MIX_DRAG_K);
  setTrayTint(homog);
}
function updateMix(dt) {
  if (!mixing || tray.g <= 0.3) return;
  homog = Math.min(1, homog + dt * MIX_TIME_K);     // composante "temps" : tenir suffit
  setTrayTint(homog);
  if (Math.random() < dt * 14) {                    // petits puffs de swirl
    spawnPuff(new THREE.Vector3(SLAB_POS.x + (Math.random()-0.5)*1.0, 0.3, SLAB_POS.z + (Math.random()-0.5)*0.6),
      (Math.random()-0.5)*0.6, 0.6 + Math.random()*0.4, (Math.random()-0.5)*0.6);
    sScrape();
  }
  if (homog >= 1) commitMix();
}
function commitMix() {
  mixing = false;
  const stretch = stretchFactor();
  const resultP = trayPurity() / stretch;           // pureté diluée par le stretch
  const qual = Math.max(0.2, Math.min(1, 0.45 + 0.55 * resultP)); // qualité = pureté (pas de skill)
  const added = tray.g * stretch;                    // volume vendable gonflé
  addProd(added, qual);
  setRep(rep + (qual - 0.6) * 0.05);
  tray.g = 0; tray.psum = 0; homog = 0; setTrayTint(0); updateTrayHeap();
  burstPuffs(SLAB_POS, 12, PROD_POS); addShake(0.16); sSale();
  addXP(Math.max(1, Math.round(added * 0.3)));
  showToast("Mélangé ! +" + Math.round(added) + " g produit (qual " + Math.round(qual * 100) + "%)", "#bfe9ff");
}

/* -------------------------------------------------------------------------
   17) GESTE 3 — ENSACHER : taper/maintenir le bac PRODUIT remplit un sachet
   qui se scelle, s'envole et se vend. Pas de timing, pas de raté.
   ------------------------------------------------------------------------- */
let bagging = false, bagHoldT = 0;
function bagOnce() {
  if (prod.g < fmt) { showToast("Pas assez pour un sachet " + fmt + " g", "#e6c896"); sErr(); return false; }
  const q = prodQual(); takeProd(fmt);
  const price = fmt * FMT_PRICE[fmt] * q * rep * levelMult();
  setCash(cash + price); addXP(Math.max(1, Math.round(price * 0.03)));
  spawnBagFly(); sZip(); burstPuffs(PROD_POS, 3, null);
  const ac = ensureAudio(); if (ac) beep(720, ac.currentTime, 0.05, 0.12);
  return true;
}
function updateBagging(dt) {
  if (!bagging) return;
  bagHoldT += dt;
  if (bagHoldT >= BAG_HOLD_RATE) {
    bagHoldT = 0;
    if (!bagOnce()) bagging = false;                 // plus de produit -> on arrête
  }
}

/* -------------------------------------------------------------------------
   18) DECHETS : bradés aux schlags

function sellWaste() {
  if (wasteGrams < 1) { showToast("Bac déchets vide", "#e6c896"); return; }
  const earn = wasteGrams * SCHLAG_RATE * levelMult();
  setCash(cash + earn); addXP(Math.max(1, Math.round(wasteGrams * 0.04)));
  setWaste(0); addShake(0.1); sSale();
  showToast("+ " + Math.round(earn) + " € (schlag)", "#e6c896");
}

   19) AUTO-ENSACHEUSE (passive)

let autoTimer = 0;
function updateAuto(dt) {
  if (!owned.autobag) return;
  autoTimer += dt;
  if (autoTimer >= bagInterval() && prod.g >= fmt) {
    autoTimer = 0;
    const q = prodQual(); takeProd(fmt);
    const price = fmt * FMT_PRICE[fmt] * q * rep * 0.85 * levelMult();
    setCash(cash + price); addXP(Math.max(1, Math.round(price * 0.03)));
    spawnBagFly();
    const ac = ensureAudio(); if (ac) beep(680, ac.currentTime, 0.05, 0.1);
  }
}

/* -------------------------------------------------------------------------
   20) GUIDAGE : consigne + halo pulsant sous la station "à utiliser".
   ------------------------------------------------------------------------- */
function currentStep() {
  if (tray.g > 0.3)               return "mix";       // de la poudre à mélanger
  if (prod.g >= fmt)              return "bag";       // du produit à ensacher
  if (bulkG > 0.3)               return "pour";      // du bulk à verser
  return "receive";
}
const PROMPTS = {
  pour:    "🧱 Maintiens sur le BLOC pour verser la poudre sur la dalle",
  mix:     "🪟 Tourne le doigt sur la DALLE pour mélanger — le volume gonfle",
  bag:     "📦 Tape (ou maintiens) le bac PRODUIT pour ensacher & vendre",
  receive: "🛒 Reçois une brique (ou 🔄 Lot gratuit) pour démarrer",
};
const STEP_POS = { pour: BRICK_POS, mix: SLAB_POS, bag: PROD_POS };
let glowPhase = 0;
function updateGuide(dt) {
  const step = currentStep();
  if (ui.prompt.textContent !== PROMPTS[step]) ui.prompt.textContent = PROMPTS[step];
  ui.shopbtn.classList.toggle("pulse", step === "receive");
  const pos = STEP_POS[step];
  glow.visible = !!pos;
  if (pos) {
    glowPhase += dt * 3.5;
    const p = 0.5 + 0.5 * Math.sin(glowPhase);
    glow.position.x = pos.x; glow.position.z = pos.z;
    glow.material.opacity = 0.14 + 0.18 * p;
    const s = 0.85 + 0.18 * p; glow.scale.set(s, s, s);
  }
}

/* -------------------------------------------------------------------------
   21) ENTREES : gestes directs sur la scène 3D (+ pinch zoom)
   Le geste est déterminé par l'objet touché au pointerdown puis "verrouillé".
   ------------------------------------------------------------------------- */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const el = renderer.domElement;
function rayHit(cx, cy, objs, recursive) {
  const r = el.getBoundingClientRect();
  ndc.x = ((cx - r.left) / r.width) * 2 - 1;
  ndc.y = -((cy - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  return raycaster.intersectObjects(objs, !!recursive).length > 0;
}

const pointers = new Map();
let pinching = false, pinchStartDist = 0, pinchStartZoom = 1;
let gesture = null, lastX = 0, lastY = 0;             // geste actif + dernier point (pour le swirl)
function pinchDist() { const a = [...pointers.values()]; return Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y); }
function startPinch() {
  pinching = true; gesture = null; pouring = false; mixing = false; bagging = false;
  pinchStartDist = pinchDist() || 1; pinchStartZoom = zoom;
}
function updatePinch() {
  zoom = Math.max(0.6, Math.min(2.6, pinchStartZoom * (pinchDist() / pinchStartDist)));
  localStorage.setItem("neige_zoom", zoom.toFixed(3)); fitView();
}

el.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size >= 2) { startPinch(); return; }
  ensureAudio();
  lastX = e.clientX; lastY = e.clientY;
  // Priorité des cibles : déchets, produit (ensacher), bloc (verser), dalle (mélanger).
  if (rayHit(e.clientX, e.clientY, wasteBin.children)) { sellWaste(); return; }
  if (rayHit(e.clientX, e.clientY, prodBin.children) || (prod.g >= fmt && rayHit(e.clientX, e.clientY, [prodHeap]))) {
    if (prod.g >= fmt) { gesture = "bag"; bagging = true; bagHoldT = 0; bagOnce(); }
    else showToast("Mélange d'abord du produit", "#e6c896");
    return;
  }
  if (rayHit(e.clientX, e.clientY, [brickBody, tape])) {
    if (bulkG > 0.05) { gesture = "pour"; pouring = true; }
    else showToast("Bloc vide — reçois une brique 🛒", "#e6c896");
    return;
  }
  if (rayHit(e.clientX, e.clientY, [slab, trayHeap])) {
    if (tray.g > 0.3) { gesture = "mix"; mixing = true; }
    else showToast("Verse d'abord de la poudre sur la dalle", "#e6c896");
    return;
  }
}, { passive:false });

el.addEventListener("pointermove", (e) => {
  if (pointers.has(e.pointerId)) pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pinching && pointers.size >= 2) { e.preventDefault(); updatePinch(); return; }
  if (gesture === "mix") {
    const d = Math.hypot(e.clientX - lastX, e.clientY - lastY);
    mixAddDrag(d);
  }
  lastX = e.clientX; lastY = e.clientY;
}, { passive:false });

function onUp(e) {
  if (e) e.preventDefault();
  pointers.delete(e.pointerId);
  if (pinching && pointers.size < 2) pinching = false;
  if (pointers.size === 0) {                          // fin de tout geste
    if (pouring) burstPuffs(SLAB_POS, 4);
    pouring = false; mixing = false; bagging = false; gesture = null;
  }
}
el.addEventListener("pointerup", onUp, { passive:false });
el.addEventListener("pointercancel", onUp, { passive:false });

// Boutons HUD.
document.getElementById("reset").addEventListener("click", restock);
ui.shopbtn.addEventListener("click", () => { renderShop(); ui.shop.classList.add("show"); });
document.getElementById("shopclose").addEventListener("click", () => ui.shop.classList.remove("show"));
ui.shop.addEventListener("click", (e) => { if (e.target === ui.shop) ui.shop.classList.remove("show"); });
ui.waste.addEventListener("click", sellWaste);
for (const b of document.querySelectorAll(".fmtbtn")) b.addEventListener("click", () => setFmt(+b.dataset.fmt));

function setFmt(f) {
  if (f === 25 && !owned.press) { showToast("Achète la presse à briquettes 🛒", "#e6c896"); return; }
  fmt = f; localStorage.setItem("neige_fmt", String(f));
  for (const b of document.querySelectorAll(".fmtbtn")) b.classList.toggle("on", +b.dataset.fmt === f);
}
function refreshFmtButtons() {
  for (const b of document.querySelectorAll(".fmtbtn"))
    b.disabled = (+b.dataset.fmt === 25 && !owned.press);
}
// "🔄 Lot" : filet anti soft-lock. Pas de quoi acheter une brique -> petit lot gratuit.
function restock() {
  if (cash >= BRICK_PRICES[50]) { renderShop(); ui.shop.classList.add("show"); return; }
  loadBrick(STARTER.g, STARTER.purity);
  burstPuffs(BRICK_POS, 6);
  showToast("Lot de dépannage +" + STARTER.g + " g (gratuit)", "#7df9ff");
}

/* -------------------------------------------------------------------------
   22) BOUCLE PRINCIPALE
   ------------------------------------------------------------------------- */
let last = 0;
function loop(t) {
  const dt = Math.min((t - last) / 1000 || 0, 0.05); last = t;
  updatePour(dt);
  updateMix(dt);
  updateBagging(dt);
  updateAuto(dt);
  updatePuffs(dt);
  updateBags(dt);
  updateGuide(dt);
  if (shake > 0) { shake *= Math.pow(0.0008, dt); if (shake < 0.002) shake = 0; }
  camera.position.copy(baseCamPos);
  if (shake > 0) {
    camera.position.x += (Math.random() - 0.5) * shake;
    camera.position.y += (Math.random() - 0.5) * shake;
    camera.position.z += (Math.random() - 0.5) * shake;
  }
  camera.lookAt(VIEW_TARGET);
  updateLabels();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

/* -------------------------------------------------------------------------
   23) BOOTSTRAP
   ------------------------------------------------------------------------- */
resize();
setCash(cash); setWaste(wasteGrams); setRep(rep); updateXpUI();
setFmt(fmt); refreshFmtButtons();
updateProdLabel(); updateTrayHeap();
loadBrick(STARTER.g, STARTER.purity);   // lot de départ gratuit pour amorcer la boucle
requestAnimationFrame(loop);
</script>
