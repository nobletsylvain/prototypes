<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Neige</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; touch-action:none;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 120% at 50% 0%, #1b2b3c 0%, #0e1722 60%, #070d14 100%); }
  #app { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  .hud { position:fixed; left:0; right:0; pointer-events:none; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  #count { top:max(14px,env(safe-area-inset-top)); left:16px; font-weight:800; font-size:16px; color:#cfe9ff; }
  #reset { position:fixed; top:max(10px,env(safe-area-inset-top)); right:14px; pointer-events:auto;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    padding:9px 13px; border-radius:12px; font-size:14px; font-weight:700; backdrop-filter:blur(6px); }
  #reset:active { background:rgba(255,255,255,.25); }
  #toast { top:32%; text-align:center; font-size:24px; font-weight:800; opacity:0;
    transition:opacity .25s, transform .25s; transform:translateY(8px); padding:0 18px; }
  #toast.show { opacity:1; transform:translateY(0); }
  #title { top:max(46px,calc(env(safe-area-inset-top) + 30px)); left:16px; font-size:12px;
    color:rgba(255,255,255,.55); font-weight:700; letter-spacing:.3px; }
  #remain { top:max(62px,calc(env(safe-area-inset-top) + 46px)); left:16px; font-size:12px;
    color:rgba(220,210,180,.85); font-weight:700; letter-spacing:.3px; }

  #cash { position:fixed; top:max(14px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-weight:800; font-size:18px; color:#9be37d; text-shadow:0 2px 8px rgba(0,0,0,.5); pointer-events:none; }
  #rep { position:fixed; top:max(14px,env(safe-area-inset-top)); right:70px; pointer-events:none;
    background:rgba(122,160,255,.16); border:1px solid rgba(122,160,255,.5); color:#bcd0ff;
    font-weight:700; font-size:12px; padding:4px 9px; border-radius:999px; }

  #xpwrap { position:fixed; top:calc(max(14px,env(safe-area-inset-top)) + 27px); left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:6px; pointer-events:none; z-index:4; }
  #level { background:rgba(155,227,125,.18); border:1px solid rgba(155,227,125,.55); color:#bdf0a3;
    font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  #xpbar { width:120px; height:7px; background:rgba(255,255,255,.14); border-radius:999px; overflow:hidden; }
  #xpfill { height:100%; width:0%; background:linear-gradient(90deg,#7ad17a,#bdf0a3); border-radius:999px; transition:width .25s; }

  #labels { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
  .blabel { position:absolute; transform:translate(-50%,-50%); white-space:nowrap;
    font-weight:800; font-size:13px; padding:2px 7px; border-radius:8px;
    background:rgba(0,0,0,.5); text-shadow:0 1px 3px rgba(0,0,0,.6); }

  #prompt { bottom:max(88px,calc(env(safe-area-inset-bottom) + 82px)); text-align:center; pointer-events:none; }
  #prompt span { display:inline-block; background:rgba(8,16,26,.6); border:1px solid rgba(125,200,255,.35);
    color:#eaf6ff; font-size:14px; font-weight:700; padding:8px 16px; border-radius:999px;
    backdrop-filter:blur(6px); box-shadow:0 4px 14px rgba(0,0,0,.4); max-width:92vw; }

  /* Deux barres de sélecteurs : Coupe (diluant) au-dessus, Sachet (format) en bas. */
  .selbar { position:fixed; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:6px; pointer-events:auto; z-index:4; }
  #dilbar { bottom:max(48px,calc(env(safe-area-inset-bottom) + 44px)); }
  #fmtbar { bottom:max(12px,calc(env(safe-area-inset-bottom) + 8px)); }
  .selbar .lbl { color:rgba(255,255,255,.6); font-size:11px; font-weight:700; margin-right:2px; }
  .selbtn { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    font-weight:800; font-size:13px; padding:6px 9px; border-radius:10px; }
  .fmtbtn.on { background:#7aa0ff; color:#0e162a; border-color:#7aa0ff; }
  .dilbtn.on  { background:#caa15f; color:#1a1020; border-color:#caa15f; }
  .selbtn:disabled { opacity:.4; }
  .dilbtn.empty { opacity:.5; }

  #shopbtn { position:fixed; right:14px; top:calc(max(10px,env(safe-area-inset-top)) + 46px); pointer-events:auto;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff; font-size:18px;
    width:46px; height:42px; border-radius:12px; }
  #shopbtn:active { background:rgba(255,255,255,.25); }
  #shopbtn.pulse { animation:pulsebtn 1.1s ease-in-out infinite; }
  #discard { position:fixed; right:14px; top:calc(max(10px,env(safe-area-inset-top)) + 94px); pointer-events:auto;
    background:rgba(202,161,95,.18); border:1px solid rgba(202,161,95,.5); color:#e6c896; font-size:17px;
    width:46px; height:42px; border-radius:12px; }
  #discard:active { background:rgba(202,161,95,.35); }
  @keyframes pulsebtn { 0%,100%{ box-shadow:0 0 0 0 rgba(125,200,255,.0);} 50%{ box-shadow:0 0 0 6px rgba(125,200,255,.35);} }
  #shop { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.5); z-index:6; }
  #shop.show { display:flex; }
  #shopinner { width:88%; max-width:380px; max-height:74vh; overflow:auto; background:#14202e;
    border:1px solid rgba(255,255,255,.15); border-radius:16px; padding:16px; color:#fff; }
  #shophead { font-weight:800; font-size:18px; margin-bottom:12px; display:flex; justify-content:space-between; }
  #shopcash { color:#9be37d; }
  .shopitem { display:flex; align-items:center; gap:10px; padding:10px; margin-bottom:10px;
    border:1px solid rgba(255,255,255,.12); border-radius:12px; background:rgba(255,255,255,.04); }
  .shopitem .ic { font-size:26px; }
  .shopitem .info { flex:1; }
  .shopitem .nm { font-weight:700; }
  .shopitem .ds { font-size:12px; color:rgba(255,255,255,.6); }
  .shopitem button { background:#2f5d8a; border:none; color:#fff; font-weight:700; padding:9px 12px; border-radius:10px; min-width:64px; }
  .shopitem button:disabled { background:rgba(255,255,255,.12); color:rgba(255,255,255,.4); }
  #shopclose { width:100%; background:rgba(255,255,255,.12); border:none; color:#fff; font-weight:700; padding:11px; border-radius:12px; }
</style>

<script type="importmap">

</script>

<body>
<div id="app"></div>
<div class="hud" id="count">Produit : 0 g</div>
<div id="cash">💶 0 €</div>
<div id="rep">Réput 100%</div>
<div id="xpwrap"><span id="level">Niv. 1</span><div id="xpbar"><div id="xpfill"></div></div></div>
<div class="hud" id="title">COKE</div>
<div class="hud" id="remain">Diluant</div>
<button id="reset">🔄 Lot</button>
<button id="shopbtn">🛒</button>
<button id="discard" title="Jeter le mix / nettoyer la dalle">🗑️</button>
<div class="hud" id="prompt"><span>Reçois de la coke…</span></div>
<div class="hud" id="toast"></div>
<div id="labels"></div>

<div id="dilbar" class="selbar">
  <span class="lbl">Coupe</span>
  <button class="selbtn dilbtn" data-dil="leva">Léva</button>
  <button class="selbtn dilbtn" data-dil="lacto">Lacto</button>
  <button class="selbtn dilbtn" data-dil="manni">Manni</button>
  <button class="selbtn dilbtn" data-dil="benzo">Benzo</button>
</div>
<div id="fmtbar" class="selbar">
  <span class="lbl">Sachet</span>
  <button class="selbtn fmtbtn on" data-fmt="1">1g</button>
  <button class="selbtn fmtbtn" data-fmt="5">5g</button>
  <button class="selbtn fmtbtn" data-fmt="25">25g</button>
</div>

<div id="shop">
  <div id="shopinner">
    <div id="shophead"><span>🛒 Boutique</span><span id="shopcash"></span></div>
    <div id="shopitems"></div>
    <button id="shopclose">Fermer</button>
  </div>
</div>

<script type="module">
"use strict";
import * as THREE from "three";

/* =========================================================================
   NEIGE — core loop "bulk -> retail" (proto mobile WebGL)
   -------------------------------------------------------------------------
   "Feeling > skill" : on manipule la matière au doigt, jamais de geste raté.
   La COUPE est physique ET un choix : on verse soi-même un diluant (4 paliers
   du moins cher/plus nocif au plus cher/plus propre) avant de mélanger. Plus
   on coupe, plus de grammes mais pureté/qualité en baisse ; un diluant nocif
   rapporte vite mais fait chuter la réputation.

     1) RECEPTION : on achète coke (briques pressées) + diluant (pots), de la
                    même façon, en boutique.
     2) VERSER     : MAINTENIR le doigt sur la 🧱 PILE DE COKE ou le 🧪 POT DE
                     DILUANT -> un flux de poudre coule sur la 🪟 DALLE.
     3) MELANGER   : coke + diluant sur la dalle -> TOURNER le doigt dessus ->
                     PRODUIT (g = coke + diluant ; pureté = coke / total).
     4) ENSACHER   : TAPER / MAINTENIR le bac 📦 PRODUIT -> un pochon (sachet
                     zip plat) se remplit, se pose sur la table et se vend.

   Formes inspirées de Drug Dealer Simulator : briques pressées empilées, pots
   de coupe cylindriques, pochons carrés plats alignés sur la table.
   Persistance localStorage sous le préfixe `neige_*`.
   ========================================================================= */

/* -------------------------------------------------------------------------
   0) ECONOMIE
   ------------------------------------------------------------------------- */
const BRICK_PRICES = { 50: 2200, 100: 4000 };      // coke (gros)
const FMT_PRICE    = { 1: 80, 5: 62, 25: 48 };     // €/g au détail selon le format
const STARTER      = { coke: 30, purity: 0.8, dil: 40 };
const POUR_RATE    = 26;
const MIX_DRAG_K   = 1 / 650;
const MIX_TIME_K   = 0.55;
const BAG_HOLD_RATE= 0.26;
const DIL_REFILL_G = 200;
// Paliers de diluant : du moins cher/plus nocif au plus cher/plus propre.
//  price = €/g d'achat · clean = propreté (-> qualité/€/g) · harm = nocivité (-> réput)
const DILUANTS = [
  { key:"leva",  name:"Lévamisole", short:"Léva",  icon:"☠️", price:0.6, clean:0.55, harm:0.12, col:0xb89086 },
  { key:"lacto", name:"Lactose",    short:"Lacto", icon:"🧂", price:1.2, clean:0.70, harm:0.04, col:0xdad7cc },
  { key:"manni", name:"Mannitol",   short:"Manni", icon:"⚪", price:2.2, clean:0.85, harm:0.015,col:0xc3d2df },
  { key:"benzo", name:"Benzocaïne", short:"Benzo", icon:"💉", price:4.5, clean:1.00, harm:0.0,  col:0xa9c4e6 },
];
const DIL_BY = Object.fromEntries(DILUANTS.map(d => [d.key, d]));

/* -------------------------------------------------------------------------
   1) SCENE, CAMERA, RENDU
   ------------------------------------------------------------------------- */
const app = document.getElementById("app");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setClearColor(0x000000, 0);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const VIEW_DIR    = new THREE.Vector3(0.0, 0.66, 0.75).normalize();
const VIEW_TARGET = new THREE.Vector3(0, 0.25, 0.8);
const VIEW_RADIUS = Math.hypot(2.5, 0.9, 2.3);
const baseCamPos  = new THREE.Vector3();
let zoom = +(localStorage.getItem("neige_zoom")) || 1;
zoom = Math.max(0.6, Math.min(2.6, zoom));

function fitView() {
  const vFov = camera.fov * Math.PI / 180;
  const hFov = 2 * Math.atan(Math.tan(vFov / 2) * camera.aspect);
  const fov  = Math.min(vFov, hFov);
  const dist = (VIEW_RADIUS / Math.sin(fov / 2)) * 1.03 / zoom;
  baseCamPos.copy(VIEW_TARGET).addScaledVector(VIEW_DIR, dist);
  camera.position.copy(baseCamPos);
  camera.lookAt(VIEW_TARGET);
}
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  fitView();
}
window.addEventListener("resize", resize);

/* -------------------------------------------------------------------------
   2) LUMIERES
   ------------------------------------------------------------------------- */
scene.add(new THREE.HemisphereLight(0xdfeeff, 0x1a2230, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 1.35);
sun.position.set(5, 11, 5); sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024); sun.shadow.bias = -0.0004;
const sc = sun.shadow.camera; sc.left = -8; sc.right = 8; sc.top = 8; sc.bottom = -8; sc.near = 1; sc.far = 30;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x9fc0ff, 0.4); fill.position.set(-4, 3, 6); scene.add(fill);

/* -------------------------------------------------------------------------
   3) PLAN DE TRAVAIL
   ------------------------------------------------------------------------- */
const board = new THREE.Mesh(
  new THREE.BoxGeometry(5.2, 0.3, 5.2),
  new THREE.MeshStandardMaterial({ color: 0x2a3340, roughness: 0.7, metalness: 0.25 })
);
board.position.set(0, -0.15, 0.6); board.receiveShadow = true; scene.add(board);

const SLAB_POS = new THREE.Vector3(0, 0, 0.2);
const slab = new THREE.Mesh(
  new THREE.BoxGeometry(2.3, 0.12, 1.5),
  new THREE.MeshStandardMaterial({ color: 0xbfe9ff, transparent: true, opacity: 0.4, roughness: 0.06, metalness: 0.3 })
);
slab.position.copy(SLAB_POS).setY(0.06); slab.receiveShadow = true; scene.add(slab);

// PILE DE COKE (briques pressées empilées, façon DDS) au fond-gauche.
const COKE_POS = new THREE.Vector3(-1.6, 0, -0.6);
const coke = new THREE.Group(); coke.position.copy(COKE_POS);
// Brique = bloc de poudre pressée (mat) emballé dans un film CELLOPHANE brillant
// (couche translucide un poil plus grande, faible rugosité -> reflets plastique).
const powderBlockMat = new THREE.MeshStandardMaterial({ color: 0xf4f6f9, roughness: 0.85 });
const wrapMat = new THREE.MeshStandardMaterial({ color: 0xe9f2f8, transparent: true, opacity: 0.32, roughness: 0.05, metalness: 0.25, side: THREE.DoubleSide });
const cokePick = [];
const cokeBricks = [];
function pressedBrick(x, y, z, ry) {
  const g = new THREE.Group(); g.position.set(x, y, z); g.rotation.y = ry;
  const inner = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.32, 0.72), powderBlockMat);
  inner.castShadow = true; inner.receiveShadow = true; g.add(inner); cokePick.push(inner);
  const film = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 0.82), wrapMat);
  film.castShadow = true; g.add(film); cokePick.push(film);
  cokeBricks.push(g); coke.add(g); return g;
}
pressedBrick(0.05, 0.2, 0.05, 0.05);               // brique du dessous
pressedBrick(-0.05, 0.6, -0.04, -0.12);            // 2e brique (visible si gros stock)
// petit tas de poudre renversé devant (comme une brique entamée, façon la réf)
const cokeSpill = new THREE.Mesh(new THREE.ConeGeometry(0.34, 0.12, 16), powderBlockMat);
cokeSpill.position.set(0.28, 0.04, 0.62); cokeSpill.scale.set(1, 0.5, 0.7); cokeSpill.rotation.y = 0.6; cokeSpill.castShadow = true;
coke.add(cokeSpill);
scene.add(coke);
// La coke n'est physiquement présente que si le joueur en a en stock.
function updateCokeBricks() {
  cokeBricks[0].visible = bulkG > 0.5;
  cokeBricks[1].visible = bulkG > 55;
  cokeSpill.visible = bulkG > 0.5;
}

// POTS DE DILUANT (cylindres étiquetés, façon DDS) au fond-droit. Un seul pot
// "actif" visible, teinté selon le palier choisi.
const DIL_POS = new THREE.Vector3(1.6, 0, -0.6);
const dilTub = new THREE.Group(); dilTub.position.copy(DIL_POS);
const dilBody = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.42, 0.64, 24),
  new THREE.MeshStandardMaterial({ color: 0xdad7cc, roughness: 0.4, metalness: 0.15 }));
dilBody.position.y = 0.32; dilBody.castShadow = true; dilTub.add(dilBody);
const dilBand = new THREE.Mesh(new THREE.CylinderGeometry(0.43, 0.43, 0.22, 24),
  new THREE.MeshStandardMaterial({ color: 0xf3f0e8, roughness: 0.7 }));
dilBand.position.y = 0.3; dilTub.add(dilBand);
const dilLid = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 0.1, 24),
  new THREE.MeshStandardMaterial({ color: 0x7e8a97, roughness: 0.5 }));
dilLid.position.y = 0.66; dilTub.add(dilLid);
scene.add(dilTub);
// Petits pots décoratifs derrière (les autres paliers en rayon).
for (let i = 0; i < 3; i++) {
  const j = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.5, 18),
    new THREE.MeshStandardMaterial({ color: DILUANTS[i].col, roughness: 0.5 }));
  j.position.set(DIL_POS.x - 0.5 + i * 0.5, 0.25, DIL_POS.z - 0.7); j.castShadow = true; scene.add(j);
}

function makeBin(pos, col) {
  const grp = new THREE.Group(); grp.position.copy(pos);
  const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.7, metalness: 0.1, side: THREE.DoubleSide });
  const w = 1.55, d = 1.1, h = 0.4, th = 0.07;
  const floor = new THREE.Mesh(new THREE.BoxGeometry(w, th, d), mat); floor.position.y = th / 2; floor.receiveShadow = true; grp.add(floor);
  const wLR = (x) => { const m = new THREE.Mesh(new THREE.BoxGeometry(th, h, d), mat); m.position.set(x, h / 2, 0); grp.add(m); };
  const wFB = (z) => { const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, th), mat); m.position.set(0, h / 2, z); grp.add(m); };
  wLR(-w / 2); wLR(w / 2); wFB(-d / 2); wFB(d / 2);
  scene.add(grp); return grp;
}
const PROD_POS = new THREE.Vector3(-0.55, 0, 1.95);
const prodBin  = makeBin(PROD_POS, 0x2f5d8a);

const glow = new THREE.Mesh(
  new THREE.CircleGeometry(1.0, 28),
  new THREE.MeshBasicMaterial({ color: 0x7df9ff, transparent: true, opacity: 0.25, side: THREE.DoubleSide, depthWrite: false })
);
glow.rotation.x = -Math.PI / 2; glow.position.y = 0.04; scene.add(glow);

/* -------------------------------------------------------------------------
   4) TAS DE POUDRE
   ------------------------------------------------------------------------- */
function powderTex(base) {
  const c = document.createElement("canvas"); c.width = c.height = 64;
  const x = c.getContext("2d"); const img = x.createImageData(64, 64);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 26;
    img.data[i] = base + n; img.data[i+1] = base + n; img.data[i+2] = base + 4 + n; img.data[i+3] = 255;
  }
  x.putImageData(img, 0, 0);
  const t = new THREE.CanvasTexture(c); t.wrapS = t.wrapT = THREE.RepeatWrapping; return t;
}
function makeHeap(base) {
  const m = new THREE.Mesh(new THREE.ConeGeometry(0.78, 0.5, 20),
    new THREE.MeshStandardMaterial({ map: powderTex(base), roughness: 0.97 }));
  m.castShadow = true; m.visible = false; scene.add(m); return m;
}
const trayHeap = makeHeap(238); trayHeap.position.set(SLAB_POS.x, 0.12, SLAB_POS.z);
const prodHeap = makeHeap(228); prodHeap.position.set(PROD_POS.x, 0.06, PROD_POS.z);
function setHeap(mesh, g, maxG) {
  const k = Math.min(1, g / maxG);
  const s = 0.18 + 0.95 * Math.cbrt(k);
  mesh.visible = g > 0.3; mesh.scale.set(s, 0.55 + 0.6 * k, s);
}
const COL_FRESH = new THREE.Color(0xffffff);
const COL_CUT   = new THREE.Color(0xefe6cf);
function setTrayTint(h) { trayHeap.material.color.lerpColors(COL_FRESH, COL_CUT, Math.min(1, h)); }

/* -------------------------------------------------------------------------
   5) ETAT DE PARTIE + PERSISTANCE
   ------------------------------------------------------------------------- */
const SAVE_VERSION = "3";
if (localStorage.getItem("neige_ver") !== SAVE_VERSION) {
  ["neige_cash", "neige_level", "neige_xp", "neige_shop", "neige_rep", "neige_waste"].forEach(k => localStorage.removeItem(k));
  localStorage.setItem("neige_ver", SAVE_VERSION);
}
let cash  = +(localStorage.getItem("neige_cash") || 0);
let level = Math.max(1, +(localStorage.getItem("neige_level") || 1));
let xp    = Math.max(0, +(localStorage.getItem("neige_xp") || 0));
let rep   = Math.min(1.2, Math.max(0.7, +(localStorage.getItem("neige_rep") || 1)));
let fmt   = +(localStorage.getItem("neige_fmt") || 1);
let curDil = localStorage.getItem("neige_dil") || "lacto";
if (!DIL_BY[curDil]) curDil = "lacto";

let bulkG = 0, bulkPurity = STARTER.purity;
const dilStock = { leva: 0, lacto: 0, manni: 0, benzo: 0 };
const tray = { coke: 0, dil: 0, cokePure: 0, dilClean: 0, dilHarm: 0 };
const prod = { g: 0, qsum: 0 };
let homog = 0;

function trayG()      { return tray.coke + tray.dil; }
function totalDil()   { let s = 0; for (const k in dilStock) s += dilStock[k]; return s; }
function curDef()     { return DIL_BY[curDil]; }
function prodQual()   { return prod.g > 0 ? prod.qsum / prod.g : 0.6; }
function addProd(g, q){ prod.g += g; prod.qsum += g * q; updateProdLabel(); }
function takeProd(g) {
  if (prod.g <= 0) return;
  const r = Math.min(1, g / prod.g);
  prod.qsum *= (1 - r); prod.g = Math.max(0, prod.g - g);
  if (prod.g < 0.05) { prod.g = 0; prod.qsum = 0; }   // pas de reliquat fantôme < format
  updateProdLabel();
}

/* -------------------------------------------------------------------------

let actx = null;
function ensureAudio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === "suspended") actx.resume();
  return actx;
}
function noiseBurst(dur, f0, f1, vol, type, q) {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime, len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate), ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.4);
  const src = ac.createBufferSource(); src.buffer = buf;
  const filt = ac.createBiquadFilter(); filt.type = type || "bandpass"; filt.Q.value = q || 0.8;
  filt.frequency.setValueAtTime(f0, t);
  filt.frequency.exponentialRampToValueAtTime(Math.max(60, f1), t + dur);
  const g = ac.createGain(); g.gain.value = vol;
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(t); src.stop(t + dur);
}
function beep(freq, t0, dur, vol) {
  const ac = ensureAudio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = "square"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t0); o.stop(t0 + dur);
}
const sScrape= () => noiseBurst(0.09, 2200, 800, 0.25, "bandpass", 0.9);
const sZip   = () => noiseBurst(0.13, 1100, 2600, 0.22, "bandpass", 1.3);
const sErr   = () => { const ac = ensureAudio(); if (ac) beep(150, ac.currentTime, 0.12, 0.2); };
function sSale() { const ac = ensureAudio(); if (!ac) return; const t = ac.currentTime; beep(880, t, 0.12, 0.24); beep(1320, t + 0.08, 0.16, 0.22); }

/* -------------------------------------------------------------------------
   9) PUFFS de poudre + secousse
   ------------------------------------------------------------------------- */
const puffs = [];
const puffGeo = new THREE.BoxGeometry(0.06, 0.06, 0.06);
const puffMat    = new THREE.MeshStandardMaterial({ color: 0xf2f6fb, roughness: 1 });
const puffMatDil = new THREE.MeshStandardMaterial({ color: 0xe7ddc6, roughness: 1 });
function spawnPuff(pos, vx, vy, vz, mat) {
  const m = new THREE.Mesh(puffGeo, mat || puffMat);
  m.position.copy(pos); scene.add(m);
  puffs.push({ mesh: m, vx, vy, vz, settled: false });
  while (puffs.length > 90) { const p = puffs.shift(); scene.remove(p.mesh); }
}
function burstPuffs(pos, n, toward, mat) {
  for (let i = 0; i < n; i++) {
    const tx = toward ? (toward.x - pos.x) * 1.2 : (Math.random() - 0.5) * 1.6;
    const tz = toward ? (toward.z - pos.z) * 1.2 : (Math.random() - 0.5) * 1.6;
    spawnPuff(new THREE.Vector3(pos.x + (Math.random()-0.5)*0.5, pos.y + 0.2, pos.z + (Math.random()-0.5)*0.5),
      tx + (Math.random()-0.5)*0.6, 1.6 + Math.random()*1.0, tz + (Math.random()-0.5)*0.6, mat);
  }
}
function updatePuffs(dt) {
  for (const p of puffs) {
    if (p.settled) continue;
    p.vy -= 9 * dt;
    p.mesh.position.x += p.vx * dt; p.mesh.position.y += p.vy * dt; p.mesh.position.z += p.vz * dt;
    p.mesh.rotation.x += dt * 6; p.mesh.rotation.y += dt * 4;
    if (p.mesh.position.y <= 0.1) { scene.remove(p.mesh); p.settled = true; }
  }
  for (let i = puffs.length - 1; i >= 0; i--) if (puffs[i].settled) puffs.splice(i, 1);
}
let shake = 0;
function addShake(a) { shake = Math.min(0.6, shake + a); }

/* -------------------------------------------------------------------------
   10) POCHONS (sachets zip carrés plats, alignés sur la table façon DDS)
   ------------------------------------------------------------------------- */
const POCHON_SIZE = { 1: 0.8, 5: 1.15, 25: 1.5 };    // 1 g petit · 5 g plus grand · 25 g briquette
const COL_H = 6, COLS = 4;                            // 6 pochons / colonne, 4 colonnes (l'une derrière l'autre)
const pochonZipMat = new THREE.MeshStandardMaterial({ color: 0x2bb6c4, roughness: 0.3 });
// Sachet plastique : translucide + brillant (faible rugosité -> reflets plastique).
const pochonBagMat = new THREE.MeshStandardMaterial({ color: 0xeaf4fb, transparent: true, opacity: 0.55, roughness: 0.1, metalness: 0.08, side: THREE.DoubleSide });
function makePochon() {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.06, 0.3), pochonBagMat);
  body.position.y = 0.03; body.castShadow = true; g.add(body);
  const zip = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.03, 0.06), pochonZipMat);
  zip.position.set(0, 0.06, 0.13); g.add(zip);
  return g;
}
// Trois files de tas sur la droite (une par format). Une colonne monte jusqu'à
// COL_H, puis une nouvelle se forme DERRIÈRE — on ne repart de zéro qu'une fois
// les COLS colonnes pleines (lot « expédié »).
const PILES = {};
[ { f:1, x:1.25 }, { f:5, x:1.78 }, { f:25, x:2.3 } ].forEach(cfg => {
  const size = POCHON_SIZE[cfg.f], thick = 0.05 * size + 0.02;
  const pile = { idx:0, size, items:[] };
  for (let i = 0; i < COL_H * COLS; i++) {
    const col = Math.floor(i / COL_H), h = i % COL_H;
    const g = makePochon();
    g.position.set(cfg.x + (Math.random()-0.5)*0.05, 0.02 + h * thick, 2.5 - col * 0.46 + (Math.random()-0.5)*0.05);
    g.rotation.y = (Math.random()-0.5) * 0.4;
    g.visible = false; g.scale.setScalar(0.001); scene.add(g);
    pile.items.push({ grp: g, pop: 0 });
  }
  PILES[cfg.f] = pile;
});
function popPochon(f) {
  const pile = PILES[f] || PILES[1];
  const slot = pile.idx % (COL_H * COLS);
  if (slot === 0 && pile.idx > 0) for (const it of pile.items) it.grp.visible = false;  // tout plein -> on repart
  const it = pile.items[slot]; it.grp.visible = true; it.pop = 0; pile.idx++;
}
function updatePochons(dt) {
  for (const k in PILES) {
    const pile = PILES[k];
    for (const it of pile.items) {
      if (!it.grp.visible || it.pop >= 1) continue;
      it.pop = Math.min(1, it.pop + dt * 6);
      it.grp.scale.setScalar(pile.size * (0.25 + 0.75 * it.pop));
    }
  }
}

let pouring = null, pourSndT = 0;
function updatePour(dt) {
  if (!pouring) return;
  const isCoke = pouring === "coke";
  const stock = isCoke ? bulkG : dilStock[curDil];
  if (stock <= 0.05) { pouring = null; showToast(isCoke ? "Brique finie" : "Pot « " + curDef().name + " » vide", "#e6c896"); return; }
  const g = Math.min(stock, POUR_RATE * dt);
  if (isCoke) { bulkG -= g; tray.coke += g; tray.cokePure += g * bulkPurity; }
  else { const d = curDef(); dilStock[curDil] -= g; tray.dil += g; tray.dilClean += g * d.clean; tray.dilHarm += g * d.harm; }
  homog = 0; setTrayTint(0);
  updateTrayHeap(); updateResources();
  const src = isCoke ? COKE_POS : DIL_POS;
  spawnPuff(new THREE.Vector3(src.x + (isCoke ? 0.3 : -0.3), 0.7, src.z + 0.2),
    (SLAB_POS.x - src.x) * 1.1 + (Math.random()-0.5)*0.3, 0.3 + Math.random()*0.3,
    (SLAB_POS.z - src.z) * 1.1 + (Math.random()-0.5)*0.3, isCoke ? puffMat : puffMatDil);
  pourSndT += dt;
  if (pourSndT >= 0.09) { pourSndT = 0; noiseBurst(0.1, (isCoke?900:700) + Math.min(1, trayG()/140)*1300, 380, 0.14, "lowpass", 0.7); }
}

   ------------------------------------------------------------------------- */
let mixing = false;
function mixAddDrag(px) {
  if (!mixing || trayG() <= 0) return;
  homog = Math.min(1, homog + px * MIX_DRAG_K); setTrayTint(homog);
}
function updateMix(dt) {
  if (!mixing || tray.coke <= 0 || tray.dil <= 0) return;
  homog = Math.min(1, homog + dt * MIX_TIME_K); setTrayTint(homog);
  if (Math.random() < dt * 14) {
    spawnPuff(new THREE.Vector3(SLAB_POS.x + (Math.random()-0.5)*1.0, 0.3, SLAB_POS.z + (Math.random()-0.5)*0.6),
      (Math.random()-0.5)*0.6, 0.6 + Math.random()*0.4, (Math.random()-0.5)*0.6, puffMatDil);
    sScrape();
  }
  if (homog >= 1) commitMix();
}
function commitMix() {
  mixing = false;
  const total = trayG();
  const purity = total > 0 ? tray.cokePure / total : 0;
  const cleanAvg = tray.dil > 0 ? tray.dilClean / tray.dil : 1;
  const harmAvg  = tray.dil > 0 ? tray.dilHarm / tray.dil : 0;
  const cutFrac  = total > 0 ? tray.dil / total : 0;
  const qual = cutQuality(purity, cleanAvg);
  addProd(total, qual);
  setRep(rep + (qual - 0.55) * 0.06 - harmAvg * cutFrac);   // nocivité -> réput
  const stretch = tray.coke > 0 ? total / tray.coke : 1;
  tray.coke = tray.dil = tray.cokePure = tray.dilClean = tray.dilHarm = 0; homog = 0; setTrayTint(0); updateTrayHeap();
  burstPuffs(SLAB_POS, 12, PROD_POS); addShake(0.16); sSale();
  addXP(Math.max(1, Math.round(total * 0.3)));
  showToast("Coupé ×" + stretch.toFixed(2) + " → +" + Math.round(total) + " g (pureté " + Math.round(purity*100) + "%, qual " + Math.round(qual*100) + "%)", "#bfe9ff");
}

  if (prod.g < 0.05) { showToast("Plus de produit à ensacher", "#e6c896"); sErr(); return false; }
  const take = Math.min(fmt, prod.g);             // le dernier sachet peut être partiel (reliquat)
  const q = prodQual(); takeProd(take);
  const price = take * FMT_PRICE[fmt] * q * rep * levelMult();
  setCash(cash + price); addXP(Math.max(1, Math.round(price * 0.03)));
  popPochon(fmt); sZip(); burstPuffs(PROD_POS, 3, null);
  const ac = ensureAudio(); if (ac) beep(720, ac.currentTime, 0.05, 0.12);
  return true;
}
function updateBagging(dt) {
  if (!bagging) return;
  bagHoldT += dt;
  if (bagHoldT >= BAG_HOLD_RATE) { bagHoldT = 0; if (!bagOnce()) bagging = false; }
}

}

  receive:  "🛒 Reçois de la coke et du diluant (ou 🔄 Lot gratuit)",
};
const STEP_POS = { pourCoke: COKE_POS, pourDil: DIL_POS, mix: SLAB_POS, bag: PROD_POS };
let glowPhase = 0;
function updateGuide(dt) {
  const step = currentStep();
  if (ui.prompt.textContent !== PROMPTS[step]) ui.prompt.textContent = PROMPTS[step];
  ui.shopbtn.classList.toggle("pulse", step === "receive" || step === "buyDil");
  const pos = STEP_POS[step];
  glow.visible = !!pos;
  if (pos) {
    glowPhase += dt * 3.5;
    const p = 0.5 + 0.5 * Math.sin(glowPhase);
    glow.position.x = pos.x; glow.position.z = pos.z;
    glow.material.opacity = 0.14 + 0.18 * p;
    const s = 0.85 + 0.18 * p; glow.scale.set(s, s, s);
  }
}

/* -------------------------------------------------------------------------
   20) ENTREES
   ------------------------------------------------------------------------- */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const el = renderer.domElement;
function rayHit(cx, cy, objs, recursive) {
  const r = el.getBoundingClientRect();
  ndc.x = ((cx - r.left) / r.width) * 2 - 1;
  ndc.y = -((cy - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  return raycaster.intersectObjects(objs, !!recursive).length > 0;
}
const pointers = new Map();
let pinching = false, pinchStartDist = 0, pinchStartZoom = 1;
let gesture = null, lastX = 0, lastY = 0;
function pinchDist() { const a = [...pointers.values()]; return Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y); }
function startPinch() {
  pinching = true; gesture = null; pouring = null; mixing = false; bagging = false;
  pinchStartDist = pinchDist() || 1; pinchStartZoom = zoom;
}
function updatePinch() {
  zoom = Math.max(0.6, Math.min(2.6, pinchStartZoom * (pinchDist() / pinchStartDist)));
  localStorage.setItem("neige_zoom", zoom.toFixed(3)); fitView();
}

el.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size >= 2) { startPinch(); return; }
  ensureAudio();
  lastX = e.clientX; lastY = e.clientY;
  if (rayHit(e.clientX, e.clientY, prodBin.children) || (prod.g >= 0.05 && rayHit(e.clientX, e.clientY, [prodHeap]))) {
    if (prod.g >= 0.05) { gesture = "bag"; bagging = true; bagHoldT = 0; bagOnce(); }
    else showToast("Mélange du produit d'abord", "#e6c896");
    return;
  }
  if (rayHit(e.clientX, e.clientY, cokePick)) {
    if (bulkG > 0.05) { gesture = "pour"; pouring = "coke"; }
    else showToast("Plus de coke — achète une brique 🛒", "#e6c896");
    return;
  }
  if (rayHit(e.clientX, e.clientY, [dilBody, dilBand, dilLid])) {
    if (dilStock[curDil] > 0.05) { gesture = "pour"; pouring = "dil"; }
    else if (totalDil() > 0.05) showToast("Pot « " + curDef().name + " » vide — change de coupe (en bas)", "#e6c896");
    else showToast("Plus de diluant — achète une coupe 🛒", "#e6c896");
    return;
  }
  if (rayHit(e.clientX, e.clientY, [slab, trayHeap])) {
    if (tray.coke <= 0.3) showToast("Verse d'abord de la coke sur la dalle", "#e6c896");
    else if (tray.dil <= 0.3) showToast("Ajoute du diluant avant de mélanger 🧪", "#e6c896");
    else { gesture = "mix"; mixing = true; }
    return;
  }
}, { passive:false });

el.addEventListener("pointermove", (e) => {
  if (pointers.has(e.pointerId)) pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pinching && pointers.size >= 2) { e.preventDefault(); updatePinch(); return; }
  if (gesture === "mix") mixAddDrag(Math.hypot(e.clientX - lastX, e.clientY - lastY));
  lastX = e.clientX; lastY = e.clientY;
}, { passive:false });

function onUp(e) {
  if (e) e.preventDefault();
  pointers.delete(e.pointerId);
  if (pinching && pointers.size < 2) pinching = false;
  if (pointers.size === 0) {
    if (pouring) burstPuffs(SLAB_POS, 4);
    pouring = null; mixing = false; bagging = false; gesture = null;
  }
}
el.addEventListener("pointerup", onUp, { passive:false });
el.addEventListener("pointercancel", onUp, { passive:false });

document.getElementById("reset").addEventListener("click", restock);
document.getElementById("discard").addEventListener("click", discardMix);
// Jeter le contenu : d'abord le PRODUIT (mix prêt), sinon nettoyer la dalle.
function discardMix() {
  if (prod.g > 0.05) {
    const lost = Math.round(prod.g);
    prod.g = 0; prod.qsum = 0; updateProdLabel();
    burstPuffs(PROD_POS, 8, null, puffMatDil); addShake(0.08); sScrape();
    showToast("Produit jeté : −" + lost + " g", "#e6c896");
  } else if (trayG() > 0.3) {
    burstPuffs(SLAB_POS, 8, null, puffMatDil); addShake(0.08); sScrape();
    tray.coke = tray.dil = tray.cokePure = tray.dilClean = tray.dilHarm = 0; homog = 0; setTrayTint(0); updateTrayHeap();
    showToast("Dalle nettoyée", "#e6c896");
  } else { showToast("Rien à jeter", "#e6c896"); }
}
ui.shopbtn.addEventListener("click", () => { renderShop(); ui.shop.classList.add("show"); });
document.getElementById("shopclose").addEventListener("click", () => ui.shop.classList.remove("show"));
ui.shop.addEventListener("click", (e) => { if (e.target === ui.shop) ui.shop.classList.remove("show"); });
for (const b of document.querySelectorAll(".fmtbtn")) b.addEventListener("click", () => setFmt(+b.dataset.fmt));
for (const b of document.querySelectorAll(".dilbtn")) b.addEventListener("click", () => setDil(b.dataset.dil));

function setFmt(f) {
  if (f === 25 && !owned.press) { showToast("Achète la presse à briquettes 🛒", "#e6c896"); return; }
  fmt = f; localStorage.setItem("neige_fmt", String(f));
  for (const b of document.querySelectorAll(".fmtbtn")) b.classList.toggle("on", +b.dataset.fmt === f);
}
function refreshFmtButtons() {
  for (const b of document.querySelectorAll(".fmtbtn"))
    b.disabled = (+b.dataset.fmt === 25 && !owned.press);
}
function setDil(key) {
  if (!DIL_BY[key]) return;
  curDil = key; localStorage.setItem("neige_dil", key);
  dilBody.material.color.setHex(DIL_BY[key].col);
  updateDilBar(); updateResources();
}
function updateDilBar() {
  for (const b of document.querySelectorAll(".dilbtn")) {
    b.classList.toggle("on", b.dataset.dil === curDil);
    b.classList.toggle("empty", dilStock[b.dataset.dil] <= 0.5);
  }
}
function restock() {
  if (cash >= BRICK_PRICES[50]) { renderShop(); ui.shop.classList.add("show"); return; }
  const tot = bulkG + STARTER.coke;
  bulkPurity = tot > 0 ? (bulkG * bulkPurity + STARTER.coke * STARTER.purity) / tot : STARTER.purity;
  bulkG = tot; dilStock.lacto += STARTER.dil;
  if (dilStock[curDil] <= 0.5) setDil("lacto"); else updateResources();
  burstPuffs(COKE_POS, 6); burstPuffs(DIL_POS, 6, null, puffMatDil);
  showToast("Lot de dépannage : +" + STARTER.coke + " g coke, +" + STARTER.dil + " g lactose", "#7df9ff");
}

/* -------------------------------------------------------------------------
   21) BOUCLE PRINCIPALE
   ------------------------------------------------------------------------- */
let last = 0;
function loop(t) {
  const dt = Math.min((t - last) / 1000 || 0, 0.05); last = t;
  updatePour(dt);
  updateMix(dt);
  updateBagging(dt);
  updateAuto(dt);
  updatePuffs(dt);
  updatePochons(dt);
  updateGuide(dt);
  if (shake > 0) { shake *= Math.pow(0.0008, dt); if (shake < 0.002) shake = 0; }
  camera.position.copy(baseCamPos);
  if (shake > 0) {
    camera.position.x += (Math.random() - 0.5) * shake;
    camera.position.y += (Math.random() - 0.5) * shake;
    camera.position.z += (Math.random() - 0.5) * shake;
  }
  camera.lookAt(VIEW_TARGET);
  updateLabels();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

/* -------------------------------------------------------------------------
   22) BOOTSTRAP
   ------------------------------------------------------------------------- */
resize();
setCash(cash); setRep(rep); updateXpUI();
setFmt(fmt); refreshFmtButtons();
updateProdLabel(); updateTrayHeap();
bulkG = STARTER.coke; bulkPurity = STARTER.purity; dilStock.lacto = STARTER.dil;
setDil(curDil);           // applique la teinte du pot + la barre, puis met à jour le HUD
if (dilStock[curDil] <= 0.5) setDil("lacto");
requestAnimationFrame(loop);
</script>
