<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Cristal</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; touch-action:none;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 120% at 50% 0%, #11283a 0%, #0a1622 60%, #050b12 100%); }
  #app { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  .hud { position:fixed; left:0; right:0; pointer-events:none; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  #count { top:max(14px,env(safe-area-inset-top)); left:16px; font-weight:800; font-size:16px; color:#bfe9ff; }
  #reset { position:fixed; top:max(10px,env(safe-area-inset-top)); right:14px; pointer-events:auto;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    padding:9px 13px; border-radius:12px; font-size:14px; font-weight:700; backdrop-filter:blur(6px); }
  #reset:active { background:rgba(255,255,255,.25); }
  #toast { top:30%; text-align:center; font-size:24px; font-weight:800; opacity:0;
    transition:opacity .25s, transform .25s; transform:translateY(8px); padding:0 18px; }
  #toast.show { opacity:1; transform:translateY(0); }
  #title { top:max(46px,calc(env(safe-area-inset-top) + 30px)); left:16px; font-size:12px;
    color:rgba(255,255,255,.55); font-weight:700; letter-spacing:.3px; }
  #remain { top:max(62px,calc(env(safe-area-inset-top) + 46px)); left:16px; font-size:12px;
    color:rgba(150,220,255,.85); font-weight:700; letter-spacing:.3px; }
  #tier { top:max(78px,calc(env(safe-area-inset-top) + 62px)); left:16px; font-size:12px;
    color:rgba(190,170,255,.9); font-weight:700; letter-spacing:.3px; }

  #cash { position:fixed; top:max(14px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-weight:800; font-size:18px; color:#9be37d; text-shadow:0 2px 8px rgba(0,0,0,.5); pointer-events:none; }
  #rep { position:fixed; top:max(14px,env(safe-area-inset-top)); right:70px; pointer-events:none;
    background:rgba(122,160,255,.16); border:1px solid rgba(122,160,255,.5); color:#bcd0ff;
    font-weight:700; font-size:12px; padding:4px 9px; border-radius:999px; }

  #xpwrap { position:fixed; top:calc(max(14px,env(safe-area-inset-top)) + 27px); left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:6px; pointer-events:none; z-index:4; }
  #level { background:rgba(155,227,125,.18); border:1px solid rgba(155,227,125,.55); color:#bdf0a3;
    font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  #xpbar { width:120px; height:7px; background:rgba(255,255,255,.14); border-radius:999px; overflow:hidden; }
  #xpfill { height:100%; width:0%; background:linear-gradient(90deg,#56c7ff,#bfe9ff); border-radius:999px; transition:width .25s; }

  /* Compteur de combo (broyage rythmé) */
  #combo { position:fixed; left:50%; top:24%; transform:translateX(-50%); pointer-events:none; text-align:center;
    opacity:0; transition:opacity .2s, transform .12s; }
  #combo.show { opacity:1; }
  #combo .n { font-size:34px; font-weight:900; color:#7df9ff; text-shadow:0 2px 10px rgba(0,0,0,.6); }
  #combo .j { font-size:14px; font-weight:800; letter-spacing:1px; }

  #labels { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
  .blabel { position:absolute; transform:translate(-50%,-50%); white-space:nowrap;
    font-weight:800; font-size:13px; padding:2px 7px; border-radius:8px;
    background:rgba(0,0,0,.5); text-shadow:0 1px 3px rgba(0,0,0,.6); }

  #prompt { bottom:max(88px,calc(env(safe-area-inset-bottom) + 82px)); text-align:center; pointer-events:none; }
  #prompt span { display:inline-block; background:rgba(8,18,28,.6); border:1px solid rgba(125,200,255,.35);
    color:#eaf6ff; font-size:14px; font-weight:700; padding:8px 16px; border-radius:999px;
    backdrop-filter:blur(6px); box-shadow:0 4px 14px rgba(0,0,0,.4); max-width:92vw; }

  .selbar { position:fixed; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:6px; pointer-events:auto; z-index:4; }
  #cutbar { bottom:max(48px,calc(env(safe-area-inset-bottom) + 44px)); }
  #fmtbar { bottom:max(12px,calc(env(safe-area-inset-bottom) + 8px)); }
  .selbar .lbl { color:rgba(255,255,255,.6); font-size:11px; font-weight:700; margin-right:2px; }
  .selbtn { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    font-weight:800; font-size:13px; padding:6px 9px; border-radius:10px; }
  .fmtbtn.on { background:#56c7ff; color:#06121f; border-color:#56c7ff; }
  .cutbtn.on  { background:#caa15f; color:#1a1020; border-color:#caa15f; }
  .selbtn:disabled { opacity:.4; }
  .cutbtn.empty { opacity:.5; }

  #shopbtn { position:fixed; right:14px; top:calc(max(10px,env(safe-area-inset-top)) + 46px); pointer-events:auto;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff; font-size:18px;
    width:46px; height:42px; border-radius:12px; }
  #shopbtn:active { background:rgba(255,255,255,.25); }
  #shopbtn.pulse { animation:pulsebtn 1.1s ease-in-out infinite; }
  #discard { position:fixed; right:14px; top:calc(max(10px,env(safe-area-inset-top)) + 94px); pointer-events:auto;
    background:rgba(202,161,95,.18); border:1px solid rgba(202,161,95,.5); color:#e6c896; font-size:17px;
    width:46px; height:42px; border-radius:12px; }
  #discard:active { background:rgba(202,161,95,.35); }
  @keyframes pulsebtn { 0%,100%{ box-shadow:0 0 0 0 rgba(125,200,255,.0);} 50%{ box-shadow:0 0 0 6px rgba(125,200,255,.35);} }
  #shop { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.5); z-index:6; }
  #shop.show { display:flex; }
  #shopinner { width:88%; max-width:380px; max-height:74vh; overflow:auto; background:#102030;
    border:1px solid rgba(255,255,255,.15); border-radius:16px; padding:16px; color:#fff; }
  #shophead { font-weight:800; font-size:18px; margin-bottom:12px; display:flex; justify-content:space-between; }
  #shopcash { color:#9be37d; }
  .shopitem { display:flex; align-items:center; gap:10px; padding:10px; margin-bottom:10px;
    border:1px solid rgba(255,255,255,.12); border-radius:12px; background:rgba(255,255,255,.04); }
  .shopitem .ic { font-size:26px; }
  .shopitem .info { flex:1; }
  .shopitem .nm { font-weight:700; }
  .shopitem .ds { font-size:12px; color:rgba(255,255,255,.6); }
  .shopitem button { background:#2f5d8a; border:none; color:#fff; font-weight:700; padding:9px 12px; border-radius:10px; min-width:64px; }
  .shopitem button:disabled { background:rgba(255,255,255,.12); color:rgba(255,255,255,.4); }
  #shopclose { width:100%; background:rgba(255,255,255,.12); border:none; color:#fff; font-weight:700; padding:11px; border-radius:12px; }
</style>

<script type="importmap">

<body>
<div id="app"></div>
<div class="hud" id="count">Poudre : 0 g</div>
<div id="cash">💶 0 €</div>
<div id="rep">Réput 100%</div>
<div id="xpwrap"><span id="level">Niv. 1</span><div id="xpbar"><div id="xpfill"></div></div></div>
<div class="hud" id="title">CRISTAL</div>
<div class="hud" id="remain">Coupe</div>
<div class="hud" id="tier">🪨 Mortier</div>
<button id="reset">🔄 Lot</button>
<button id="shopbtn">🛒</button>
<button id="discard" title="Jeter la cuve">🗑️</button>
<div class="hud" id="prompt"><span>Reçois du cristal…</span></div>
<div class="hud" id="toast"></div>
<div id="combo"><div class="n"></div><div class="j"></div></div>
<div id="labels"></div>

<div id="cutbar" class="selbar">
  <span class="lbl">Coupe</span>
  <button class="selbtn cutbtn" data-cut="epsom">Epsom</button>
  <button class="selbtn cutbtn" data-cut="msm">MSM</button>
  <button class="selbtn cutbtn" data-cut="dmso2">DMSO₂</button>
</div>
<div id="fmtbar" class="selbar">
  <span class="lbl">Gabarit</span>
  <button class="selbtn fmtbtn on" data-fmt="0.2">point</button>
  <button class="selbtn fmtbtn" data-fmt="0.5">½g</button>
  <button class="selbtn fmtbtn" data-fmt="1">1g</button>
  <button class="selbtn fmtbtn" data-fmt="3.5">8-ball</button>
</div>

<div id="shop">
  <div id="shopinner">
    <div id="shophead"><span>🛒 Boutique</span><span id="shopcash"></span></div>
    <div id="shopitems"></div>
    <button id="shopclose">Fermer</button>
  </div>
</div>

<script type="module">
"use strict";
import * as THREE from "three";

/* =========================================================================
   CRISTAL — core loop "meth" (proto mobile WebGL)
   -------------------------------------------------------------------------
   Geste signature : BROYER au RYTHME. Les cailloux bleus translucides éclatent
   en POUDRE MATE quand on tape sur le temps (métronome). Tap juste = grain fin
   (qualité haute) + COMBO ; tap à côté = grain grossier MAIS ça broie quand
   même (R1 : aucun tap perdu). On peut aussi MAINTENIR (auto-broyage cadencé,
   qualité plafonnée) -> le no-skill avance, le skill gagne plus.

     1) RÉCEPTION : cristal (gros, à crédit) + coupant (MSM…), en boutique.
     2) BROYER    : TAP/HOLD en cadence sur la CUVE -> cristaux -> poudre mate.
     3) COUPER    : MAINTENIR sur le POT DE COUPE -> +grammes, -qualité (parallèle).
     4) PESER     : DRAG sur la BALANCE -> remplir le sachet jusqu'au gabarit.
     5) VENDRE    : prix = poids × €/g(format) × qualité × réput × bonus niveau.

   5 paliers d'outils (R2, la difficulté rythmique fond) : mortier -> broyeur à
   main -> électrique -> industriel -> ligne externalisée (broie tout seul).
   Persistance localStorage sous le préfixe `cristal_*`.
   Aucun aléatoire ne pilote une conséquence : la qualité sort du geste. Le
   random ne sert qu'à la présentation (éclats, pureté d'import).
   ========================================================================= */

/* -------------------------------------------------------------------------
   0) ECONOMIE — calibrée grosso modo sur le marché meth (UE, en €)
   - Cristal en gros : ~10–18 €/g selon le volume, pureté d'import ~75–90 %.
   - Détail (rue) : petit sachet = €/g plus cher (point ~110 €/g -> 8-ball ~50).
   - Coupants : centimes/g. Le vrai coût d'un cut nocif n'est pas l'agent mais
     la RÉPUTATION (donc le prix de TOUTES les ventes).
   ------------------------------------------------------------------------- */
const CRYSTAL_PRICES = { 25: 420, 50: 760, 100: 1380, 250: 3100 };   // ≈ 17 / 15 / 14 / 12 €/g
// Pureté d'import FIXE par taille de lot (déterministe, zéro aléatoire de conséquence) :
// gros lot = moins cher au gramme MAIS moins pur -> arbitrage cupidité/qualité tracable.
const CRYSTAL_PURITY = { 25: 0.90, 50: 0.86, 100: 0.82, 250: 0.76 };
const STARTER  = { cryst: 30, purity: 0.80, cut: 40 };
const CUT_RATE = 22;            // g/s versés à la coupe
const PESE_K   = 1 / 240;       // px de drag -> g dans le sachet
const BAG_CAP_MULT = 1.25;      // on peut remplir jusqu'à 1.25× le gabarit
const CUT_REFILL_G = 200;
// €/g détail à qualité 100 % par poids (interpolé) : petit = cher.
const FMT_TABLE = [ {w:0.2,p:110}, {w:0.5,p:90}, {w:1,p:70}, {w:3.5,p:50} ];

// Coupants : clean = propreté (-> qualité) · harm = nocivité (-> réput) · col = teinte.
const CUTS = [
  { key:"epsom", name:"Sel d'Epsom", short:"Epsom", icon:"🧂", price:0.03, clean:0.55, harm:0.10, col:0xd8e2e8 },
  { key:"msm",   name:"MSM",         short:"MSM",   icon:"⚪", price:0.08, clean:0.82, harm:0.02, col:0xeaf2f6 },
  { key:"dmso2", name:"Diméthylsulfone", short:"DMSO₂", icon:"💎", price:0.20, clean:1.00, harm:0.0, col:0xcfeaff },
];
const CUT_BY = Object.fromEntries(CUTS.map(c => [c.key, c]));

// 5 paliers d'outils. window↑, bpm↑, qFloor↑ : chaque palier ADOUCIT le rythme (R2).
const GRIND_TIERS = [
  { name:"Mortier & pilon",    icon:"🪨", gBeat:2.2, window:0.10, bpm:84,  qFloor:0.35, auto:false, col:0x8a7d6b },
  { name:"Broyeur à main",     icon:"⚙️", gBeat:3.5, window:0.13, bpm:96,  qFloor:0.45, auto:false, col:0x9a9aa6 },
  { name:"Broyeur électrique", icon:"🔌", gBeat:5.5, window:0.16, bpm:112, qFloor:0.55, auto:false, col:0xb05a4a },
  { name:"Broyeur industriel", icon:"🏭", gBeat:8.5, window:0.20, bpm:128, qFloor:0.65, auto:false, col:0x6a7c8c },
  { name:"Ligne externalisée", icon:"🚚", gBeat:12,  window:0.99, bpm:140, qFloor:0.80, auto:true,  col:0x5a8a6a },
];
const TIER_COST = [0, 1800, 7000, 22000, 60000];

/* -------------------------------------------------------------------------
   1) SCENE, CAMERA, RENDU
   ------------------------------------------------------------------------- */
const app = document.getElementById("app");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setClearColor(0x000000, 0);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const VIEW_DIR    = new THREE.Vector3(0.0, 0.78, 0.65).normalize();
const VIEW_TARGET = new THREE.Vector3(0.2, 0.12, 0.9);
const VIEW_RADIUS = Math.hypot(1.95, 0.7, 1.6);
const baseCamPos  = new THREE.Vector3();
let zoom = +(localStorage.getItem("cristal_zoom")) || 1;
zoom = Math.max(0.6, Math.min(2.6, zoom));

function fitView() {
  const vFov = camera.fov * Math.PI / 180;
  const hFov = 2 * Math.atan(Math.tan(vFov / 2) * camera.aspect);
  const fov  = Math.min(vFov, hFov);
  const dist = (VIEW_RADIUS / Math.sin(fov / 2)) * 1.03 / zoom;
  baseCamPos.copy(VIEW_TARGET).addScaledVector(VIEW_DIR, dist);
  camera.position.copy(baseCamPos);
  camera.lookAt(VIEW_TARGET);
}
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  fitView();
}
window.addEventListener("resize", resize);

/* -------------------------------------------------------------------------
   2) LUMIERES
   ------------------------------------------------------------------------- */
scene.add(new THREE.HemisphereLight(0xdfeeff, 0x16202c, 0.62));
const sun = new THREE.DirectionalLight(0xffffff, 1.35);
sun.position.set(5, 11, 5); sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024); sun.shadow.bias = -0.0004;
const sc = sun.shadow.camera; sc.left = -8; sc.right = 8; sc.top = 8; sc.bottom = -8; sc.near = 1; sc.far = 30;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8fc0ff, 0.42); fill.position.set(-4, 3, 6); scene.add(fill);

/* -------------------------------------------------------------------------
   3) PLAN DE TRAVAIL + CUVE + STOCKS + BALANCE + BAC
   ------------------------------------------------------------------------- */
const board = new THREE.Mesh(
  new THREE.BoxGeometry(9, 0.3, 8),
  new THREE.MeshStandardMaterial({ color: 0x232c38, roughness: 0.7, metalness: 0.25 })
);
board.position.set(0.3, -0.15, 0.6); board.receiveShadow = true; scene.add(board);

// CUVE (bol de broyage) au centre — là où cristal -> poudre, puis coupe.
const CUVE_POS = new THREE.Vector3(0, 0, 0.25);
const cuveGrp = new THREE.Group(); cuveGrp.position.copy(CUVE_POS); scene.add(cuveGrp);
const bowlMat = new THREE.MeshStandardMaterial({ color: 0x33414f, roughness: 0.35, metalness: 0.6, side: THREE.DoubleSide });
const bowl = new THREE.Mesh(new THREE.CylinderGeometry(1.15, 0.82, 0.5, 36, 1, true), bowlMat);
bowl.position.y = 0.27; bowl.castShadow = true; bowl.receiveShadow = true; cuveGrp.add(bowl);
const bowlFloor = new THREE.Mesh(new THREE.CylinderGeometry(0.82, 0.82, 0.06, 36), bowlMat);
bowlFloor.position.y = 0.05; bowlFloor.receiveShadow = true; cuveGrp.add(bowlFloor);

// Contenu de la cuve : un tas dont la matière LERP cristal(bleu brillant) -> poudre mate.
const CRYSTAL_COL = new THREE.Color(0x6fc7e8);
const POWDER_COL  = new THREE.Color(0xe7eef2);
const contentMat = new THREE.MeshStandardMaterial({
  color: CRYSTAL_COL.clone(), roughness: 0.12, metalness: 0.35,
  transparent: true, opacity: 0.85, emissive: 0x0a3346, emissiveIntensity: 0.5,
});
const content = new THREE.Mesh(new THREE.ConeGeometry(0.7, 0.42, 18), contentMat);
content.position.set(CUVE_POS.x, 0.12, CUVE_POS.z); content.castShadow = true; content.visible = false; scene.add(content);
// Quelques gros cailloux décoratifs (non broyés) posés dans la cuve.
const shardMat = new THREE.MeshStandardMaterial({ color: 0x7fd4f2, roughness: 0.05, metalness: 0.4,
  transparent: true, opacity: 0.8, emissive: 0x0c3a52, emissiveIntensity: 0.6 });
const shards = [];
for (let i = 0; i < 5; i++) {
  const s = new THREE.Mesh(new THREE.IcosahedronGeometry(0.16 + (i % 3) * 0.04, 0), shardMat);
  const a = (i / 5) * Math.PI * 2;
  s.position.set(CUVE_POS.x + Math.cos(a) * 0.32, 0.16, CUVE_POS.z + Math.sin(a) * 0.32);
  s.rotation.set(i, i * 1.3, i * 0.7); s.castShadow = true; s.visible = false; scene.add(s);
  shards.push(s);
}

// PILE DE CRISTAL (stock brut) au fond-gauche.
const CRYST_POS = new THREE.Vector3(-1.7, 0, -0.55);
const crystPile = new THREE.Group(); crystPile.position.copy(CRYST_POS); scene.add(crystPile);
const crystPick = [];
const rockMat = new THREE.MeshStandardMaterial({ color: 0x7fd4f2, roughness: 0.05, metalness: 0.45,
  transparent: true, opacity: 0.82, emissive: 0x0c3a52, emissiveIntensity: 0.7 });
const crystRocks = [];
for (let i = 0; i < 6; i++) {
  const r = new THREE.Mesh(new THREE.IcosahedronGeometry(0.18 + (i % 3) * 0.05, 0), rockMat);
  r.position.set((i % 3 - 1) * 0.34, 0.18 + Math.floor(i / 3) * 0.3, (i % 2) * 0.28 - 0.1);
  r.rotation.set(i, i * 1.7, i); r.castShadow = true; crystPile.add(r); crystPick.push(r); crystRocks.push(r);
}
function updateCrystPile() {
  for (let i = 0; i < crystRocks.length; i++) crystRocks[i].visible = bulkG > i * 8 + 0.5;
}

// POT DE COUPE (cylindre étiqueté) au fond-droit, teinté selon le palier choisi.
const CUT_POS = new THREE.Vector3(1.7, 0, -0.55);
const cutTub = new THREE.Group(); cutTub.position.copy(CUT_POS); scene.add(cutTub);
const cutBody = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.42, 0.64, 24),
  new THREE.MeshStandardMaterial({ color: 0xeaf2f6, roughness: 0.4, metalness: 0.15 }));
cutBody.position.y = 0.32; cutBody.castShadow = true; cutTub.add(cutBody);
const cutBand = new THREE.Mesh(new THREE.CylinderGeometry(0.43, 0.43, 0.22, 24),
  new THREE.MeshStandardMaterial({ color: 0xf3f0e8, roughness: 0.7 }));
cutBand.position.y = 0.3; cutTub.add(cutBand);
const cutLid = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 0.1, 24),
  new THREE.MeshStandardMaterial({ color: 0x7e8a97, roughness: 0.5 }));
cutLid.position.y = 0.66; cutTub.add(cutLid);

// BALANCE (plateau) devant — zone de pesée au drag.
const SCALE_POS = new THREE.Vector3(-0.4, 0, 1.95);
const scaleGrp = new THREE.Group(); scaleGrp.position.copy(SCALE_POS); scene.add(scaleGrp);
const scalePick = [];
const scaleBase = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.12, 1.05),
  new THREE.MeshStandardMaterial({ color: 0x2a2f38, roughness: 0.5, metalness: 0.5 }));
scaleBase.position.y = 0.06; scaleBase.receiveShadow = true; scaleGrp.add(scaleBase); scalePick.push(scaleBase);
const scalePan = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.04, 28),
  new THREE.MeshStandardMaterial({ color: 0xc8d2da, roughness: 0.25, metalness: 0.7 }));
scalePan.position.set(0, 0.14, 0); scalePan.receiveShadow = true; scaleGrp.add(scalePan); scalePick.push(scalePan);
// Tas de poudre en cours de pesée (sur le plateau).
const bagHeap = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.3, 16),
  new THREE.MeshStandardMaterial({ color: POWDER_COL.clone(), roughness: 0.97 }));
bagHeap.position.set(SCALE_POS.x, 0.16, SCALE_POS.z); bagHeap.castShadow = true; bagHeap.visible = false; scene.add(bagHeap);

const glow = new THREE.Mesh(
  new THREE.CircleGeometry(1.0, 28),
  new THREE.MeshBasicMaterial({ color: 0x7df9ff, transparent: true, opacity: 0.25, side: THREE.DoubleSide, depthWrite: false })
);
glow.rotation.x = -Math.PI / 2; glow.position.y = 0.04; scene.add(glow);

// Anneau de cadence (métronome) au-dessus de la cuve : se contracte à chaque temps.
const beatRing = new THREE.Mesh(
  new THREE.RingGeometry(0.9, 1.02, 40),

function setContentHeap() {
  const g = cuvePowder() + cuve.cut;
  const k = Math.min(1, g / 90);
  const s = 0.2 + 0.95 * Math.cbrt(Math.max(0, k));
  content.visible = g > 0.3;
  content.scale.set(s, 0.5 + 0.7 * k, s);
  // teinte : cristal (broyage 0) -> poudre mate (broyage 1) + dilution par coupe
  const mat = Math.max(grindProgress, cuve.cut > 0 ? Math.min(1, cuve.cut / Math.max(1, g)) : 0);
  contentMat.color.lerpColors(CRYSTAL_COL, POWDER_COL, mat);
  contentMat.roughness = 0.12 + 0.85 * mat;
  contentMat.metalness = 0.35 * (1 - mat);
  contentMat.opacity = 0.85 + 0.13 * mat;
  contentMat.emissiveIntensity = 0.5 * (1 - mat);
  // cailloux non broyés visibles tant qu'il reste du cristal à passer
  const rawShown = Math.min(shards.length, Math.ceil((bulkG / 18)));
  for (let i = 0; i < shards.length; i++) shards[i].visible = i < rawShown && cuvePowder() < 60;
}

let actx = null;
function ensureAudio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === "suspended") actx.resume();
  return actx;
}
function noiseBurst(dur, f0, f1, vol, type, q) {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime, len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate), ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.4);
  const src = ac.createBufferSource(); src.buffer = buf;
  const filt = ac.createBiquadFilter(); filt.type = type || "bandpass"; filt.Q.value = q || 0.8;
  filt.frequency.setValueAtTime(f0, t);
  filt.frequency.exponentialRampToValueAtTime(Math.max(60, f1), t + dur);
  const g = ac.createGain(); g.gain.value = vol;
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(t); src.stop(t + dur);
}
function beep(freq, t0, dur, vol) {
  const ac = ensureAudio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = "square"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t0); o.stop(t0 + dur);
}
const sCrack = () => noiseBurst(0.07, 2600, 700, 0.3, "bandpass", 1.1);   // craquement de cristal
const sTick  = () => { const ac = ensureAudio(); if (ac) beep(1200, ac.currentTime, 0.03, 0.08); };
const sZip   = () => noiseBurst(0.13, 1100, 2600, 0.22, "bandpass", 1.3);
const sErr   = () => { const ac = ensureAudio(); if (ac) beep(150, ac.currentTime, 0.12, 0.2); };
function sSale() { const ac = ensureAudio(); if (!ac) return; const t = ac.currentTime; beep(880, t, 0.12, 0.24); beep(1320, t + 0.08, 0.16, 0.22); }

const puffs = [];
const puffGeo = new THREE.BoxGeometry(0.06, 0.06, 0.06);
const puffMat    = new THREE.MeshStandardMaterial({ color: 0xeaf4fb, roughness: 1 });
const puffMatBlue= new THREE.MeshStandardMaterial({ color: 0x8fd8f4, roughness: 0.6, metalness: 0.3 });
function spawnPuff(pos, vx, vy, vz, mat) {
  const m = new THREE.Mesh(puffGeo, mat || puffMat);
  m.position.copy(pos); scene.add(m);
  puffs.push({ mesh: m, vx, vy, vz, settled: false });
  while (puffs.length > 90) { const p = puffs.shift(); scene.remove(p.mesh); }
}
function burstPuffs(pos, n, toward, mat) {
  for (let i = 0; i < n; i++) {
    const tx = toward ? (toward.x - pos.x) * 1.2 : (Math.random() - 0.5) * 1.6;
    const tz = toward ? (toward.z - pos.z) * 1.2 : (Math.random() - 0.5) * 1.6;
    spawnPuff(new THREE.Vector3(pos.x + (Math.random()-0.5)*0.5, pos.y + 0.2, pos.z + (Math.random()-0.5)*0.5),
      tx + (Math.random()-0.5)*0.6, 1.6 + Math.random()*1.0, tz + (Math.random()-0.5)*0.6, mat);
  }
}
function updatePuffs(dt) {
  for (const p of puffs) {
    if (p.settled) continue;
    p.vy -= 9 * dt;
    p.mesh.position.x += p.vx * dt; p.mesh.position.y += p.vy * dt; p.mesh.position.z += p.vz * dt;
    p.mesh.rotation.x += dt * 6; p.mesh.rotation.y += dt * 4;
    if (p.mesh.position.y <= 0.1) { scene.remove(p.mesh); p.settled = true; }
  }
  for (let i = puffs.length - 1; i >= 0; i--) if (puffs[i].settled) puffs.splice(i, 1);
}
let shake = 0;
function addShake(a) { shake = Math.min(0.6, shake + a); }

/* -------------------------------------------------------------------------
   10) SACHETS (pochons carrés plats, alignés sur la table)
   ------------------------------------------------------------------------- */
const COL_H = 6, COLS = 4;
const pochonZipMat = new THREE.MeshStandardMaterial({ color: 0x2bb6c4, roughness: 0.3 });
const pochonBagMat = new THREE.MeshStandardMaterial({ color: 0xeaf4fb, transparent: true, opacity: 0.55, roughness: 0.1, metalness: 0.08, side: THREE.DoubleSide });
function makePochon(size) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.06, 0.3), pochonBagMat);
  body.position.y = 0.03; body.castShadow = true; g.add(body);
  const zip = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.03, 0.06), pochonZipMat);
  zip.position.set(0, 0.06, 0.13); g.add(zip);
  g.userData.size = size; return g;
}
const pile = { idx: 0, items: [] };
for (let i = 0; i < COL_H * COLS; i++) {
  const col = Math.floor(i / COL_H), h = i % COL_H;
  const g = makePochon(0.9);
  g.position.set(1.55 + (Math.random()-0.5)*0.05 + col * 0.0, 0.02 + h * 0.07, 2.5 - col * 0.46 + (Math.random()-0.5)*0.05);
  g.rotation.y = (Math.random()-0.5) * 0.4;
  g.visible = false; g.scale.setScalar(0.001); scene.add(g);
  pile.items.push({ grp: g, pop: 0, size: 0.9 });
}
function popPochon(w) {
  const slot = pile.idx % (COL_H * COLS);
  if (slot === 0 && pile.idx > 0) for (const it of pile.items) it.grp.visible = false;
  const it = pile.items[slot];
  it.size = 0.7 + Math.min(1, w / 3.5) * 0.8;        // gabarit -> taille du sachet
  it.grp.visible = true; it.pop = 0; pile.idx++;
}
function updatePochons(dt) {
  for (const it of pile.items) {
    if (!it.grp.visible || it.pop >= 1) continue;
    it.pop = Math.min(1, it.pop + dt * 6);
    it.grp.scale.setScalar(it.size * (0.25 + 0.75 * it.pop));
  }
}

/* -------------------------------------------------------------------------
   15) METRONOME + BROYAGE RYTHME (cœur du jeu)
   ------------------------------------------------------------------------- */
let beatTimer = 0, combo = 0, ringPulse = 0;
// Pilon (mesh outil au-dessus de la cuve) : un petit "coup" visuel à chaque broyage.
const pestle = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.2, 0.5, 16),
  new THREE.MeshStandardMaterial({ color: GRIND_TIERS[owned.tier].col, roughness: 0.4, metalness: 0.5 }));
pestle.position.set(CUVE_POS.x, 0.85, CUVE_POS.z); pestle.castShadow = true; scene.add(pestle);
let pestleHit = 0;

function beatPeriod() { return 60 / tierDef().bpm; }
function updateBeat(dt) {
  beatTimer += dt;
  const period = beatPeriod();
  while (beatTimer >= period) {
    beatTimer -= period;
    ringPulse = 1;                 // l'anneau claque sur le temps
    if (!tierDef().auto) sTick();
    if (holding && !tierDef().auto) grindChunk(tierDef().gBeat, 0.78, false);  // maintien = auto-tap "BIEN"
  }
  // anneau : opacité + rayon pulsent
  ringPulse = Math.max(0, ringPulse - dt * 3.2);
  const phase = beatTimer / period;
  const closeness = 1 - Math.min(phase, 1 - phase) * 2;   // 1 sur le temps, 0 à mi-chemin
  beatRing.material.opacity = (tierDef().auto ? 0.0 : 0.12 + 0.5 * Math.max(closeness, ringPulse));
  const s = 1.15 - 0.3 * Math.max(closeness, ringPulse);
  beatRing.scale.set(s, s, s);
  // pilon : descend sur un coup
  pestleHit = Math.max(0, pestleHit - dt * 6);
  pestle.position.y = 0.85 - 0.28 * pestleHit;
}

// Un broyage : convertit du cristal brut -> poudre. Borné par le stock (R1 : jamais de perte sèche).
function grindChunk(baseG, quality, manual) {
  if (bulkG <= 0.05) {
    if (manual) showToast("Plus de cristal — achète une pièce 🛒", "#e6c896");
    return false;
  }
  const comboMult = manual ? 1 + Math.min(combo, 10) * 0.08 : 1;   // snowball seulement au tap manuel
  const g = Math.min(bulkG, baseG * comboMult);
  bulkG -= g;
  cuve.powderG  += g;
  cuve.qGrindSum += g * quality;
  cuve.puritySum += g * bulkPurity;
  grindProgress = 1;                              // ce qui sort de la cuve est de la poudre
  pestleHit = 1;
  burstPuffs(CUVE_POS, manual ? 5 : 2, null, Math.random() < 0.5 ? puffMatBlue : puffMat);
  sCrack();
  updateResources();
  return true;
}

// Tap manuel sur la cuve : juge le timing par rapport au temps le plus proche.
function tapGrind() {
  if (tierDef().auto) { showToast("Ligne externalisée : ça broie tout seul", "#bda7ff"); return; }
  const period = beatPeriod();
  const dist = Math.min(beatTimer, period - beatTimer);     // s jusqu'au temps le plus proche
  const win = tierDef().window;
  let q, judge, col;
  if (dist <= win * 0.35) { q = 1.0; combo++; judge = "PARFAIT"; col = "#7df9ff"; }
  else if (dist <= win)   { q = 1.0 - (dist / win) * 0.30; combo++; judge = "BIEN"; col = "#bdf0a3"; }
  else                    { q = tierDef().qFloor; combo = 0; judge = "RATÉ"; col = "#e6a85a"; }   // broie quand même
  if (!grindChunk(tierDef().gBeat, q, true)) return;
  if (combo >= 2) { showCombo(combo, judge, col); sCombo(combo); }
  else showCombo(1, judge, col);
  addShake(0.05 + 0.04 * q);
}

/* -------------------------------------------------------------------------
   16) COUPE (verser le coupant dans la cuve) — co-effet parallèle
   ------------------------------------------------------------------------- */
let pouring = false, pourSndT = 0;
function updatePour(dt) {
  if (!pouring) return;
  if (cuve.powderG <= 0.3) { pouring = false; showToast("Broie d'abord du cristal", "#e6c896"); return; }
  const stock = cutStock[curCut];
  if (stock <= 0.05) { pouring = false; showToast("Pot « " + curCutDef().short + " » vide", "#e6c896"); return; }
  const c = curCutDef();
  const g = Math.min(stock, CUT_RATE * dt);
  cutStock[curCut] -= g;
  cuve.cut += g; cuve.cutClean += g * c.clean; cuve.cutHarm += g * c.harm;
  updateResources();
  spawnPuff(new THREE.Vector3(CUT_POS.x - 0.3, 0.7, CUT_POS.z + 0.2),
    (CUVE_POS.x - CUT_POS.x) * 1.1 + (Math.random()-0.5)*0.3, 0.3 + Math.random()*0.3,
    (CUVE_POS.z - CUT_POS.z) * 1.1 + (Math.random()-0.5)*0.3, puffMat);
  pourSndT += dt;
  if (pourSndT >= 0.09) { pourSndT = 0; noiseBurst(0.1, 700 + Math.min(1, cuveTotal()/120)*1100, 380, 0.13, "lowpass", 0.7); }
}

/* -------------------------------------------------------------------------
   17) QUALITE PRODUIT & PRIX
   ------------------------------------------------------------------------- */
function productQuality() {
  if (cuve.powderG <= 0) return 0.6;
  const grindAvg = cuve.qGrindSum / cuve.powderG;
  const pureAvg  = cuve.puritySum / cuve.powderG;
  const cleanAvg = cuve.cut > 0 ? cuve.cutClean / cuve.cut : 1;
  return Math.max(0.2, Math.min(1, 0.15 + 0.45 * grindAvg + 0.25 * pureAvg + 0.15 * cleanAvg));
}
function pricePerGram(w) {
  const T = FMT_TABLE;
  if (w <= T[0].w) return T[0].p;
  if (w >= T[T.length - 1].w) return T[T.length - 1].p;
  for (let i = 0; i < T.length - 1; i++) {
    if (w <= T[i + 1].w) {
      const k = (w - T[i].w) / (T[i + 1].w - T[i].w);
      return T[i].p + k * (T[i + 1].p - T[i].p);
    }
  }
  return T[T.length - 1].p;
}
// Débite la cuve de `take` g (poudre + coupe au prorata) et renvoie la qualité au moment de la vente.
function debitCuve(take) {
  const total = cuveTotal();
  if (total <= 0) return 0.6;
  const q = productQuality();
  const r = Math.min(1, take / total);
  cuve.powderG  *= (1 - r); cuve.qGrindSum *= (1 - r); cuve.puritySum *= (1 - r);
  cuve.cut *= (1 - r); cuve.cutClean *= (1 - r); cuve.cutHarm *= (1 - r);
  if (cuveTotal() < 0.05) { cuve.powderG = cuve.qGrindSum = cuve.puritySum = cuve.cut = cuve.cutClean = cuve.cutHarm = 0; grindProgress = 0; }
  return q;
}

/* -------------------------------------------------------------------------
   18) PESEE + PACKAGING (drag sur la balance)
   ------------------------------------------------------------------------- */
let bagging = false, bagFill = 0;
function startBag() {
  if (cuveTotal() < 0.02) { showToast("Rien à peser — broie d'abord", "#e6c896"); sErr(); return; }
  bagging = true; bagFill = 0;
  bagHeap.visible = true; bagHeap.scale.setScalar(0.01);
}
function bagDrag(px) {
  if (!bagging) return;
  const cap = Math.min(fmt * BAG_CAP_MULT, cuveTotal());
  bagFill = Math.max(0, Math.min(cap, bagFill + px * PESE_K));
  const k = bagFill / Math.max(0.0001, fmt);
  bagHeap.scale.set(0.2 + 0.9 * k, 0.2 + 0.9 * k, 0.2 + 0.9 * k);
  if (bagFill >= fmt - 1e-4 && bagFill < fmt + fmt * 0.02) { sealBag(true); }  // snap au gabarit
}
function sealBag(onTarget) {
  if (!bagging) return;
  bagging = false; bagHeap.visible = false;
  const take = Math.min(bagFill, cuveTotal());
  if (take < 0.02) return;
  const q = debitCuve(take);
  const onSpot = onTarget || Math.abs(take - fmt) <= fmt * 0.06;
  const bonus = onSpot ? 1.06 : 1.0;                  // "pesée nickel"
  const price = take * pricePerGram(take) * q * rep * levelMult() * bonus;
  setCash(cash + price);
  setRep(rep + (q - 0.55) * 0.05 - harmFrac());       // qualité↑réput · nocivité↓réput
  addXP(Math.max(1, Math.round(price * 0.03)));
  popPochon(take); sZip(); burstPuffs(SCALE_POS, 4, null);
  const ac = ensureAudio(); if (ac) beep(720, ac.currentTime, 0.05, 0.12);
  if (onSpot) showToast("Pesée nickel " + take.toFixed(2) + " g · " + Math.round(price) + " € (q" + Math.round(q*100) + "%)", "#bdf0a3");
  else showToast(take.toFixed(2) + " g · " + Math.round(price) + " € (q" + Math.round(q*100) + "%)", "#bfe9ff");
  updateResources();
}
function harmFrac() {
  const total = cuveTotal();
  if (total <= 0 || cuve.cut <= 0) return 0;
  const harmAvg = cuve.cutHarm / cuve.cut;
  return harmAvg * (cuve.cut / total);
}

/* -------------------------------------------------------------------------
   19) AUTO (ligne externalisée = auto-broyage ; auto-doseuse = auto-vente)
   ------------------------------------------------------------------------- */
let autoTimer = 0;
function updateAuto(dt) {
  if (tierDef().auto && bulkG > 0.05) grindChunk(tierDef().gBeat * dt, 0.92, false);  // broie tout seul
  if (!owned.autobag) return;
  autoTimer += dt;
  if (autoTimer >= bagInterval() && cuveTotal() >= 0.02) {
    autoTimer = 0;
    const take = Math.min(fmt, cuveTotal());
    const q = debitCuve(take);
    const price = take * pricePerGram(take) * q * rep * 0.85 * levelMult();
    setCash(cash + price); addXP(Math.max(1, Math.round(price * 0.03)));
    setRep(rep + (q - 0.55) * 0.04 - harmFrac());
    popPochon(take);
    const ac = ensureAudio(); if (ac) beep(680, ac.currentTime, 0.05, 0.1);
    updateResources();
  }
}

/* -------------------------------------------------------------------------
   20) GUIDAGE
   ------------------------------------------------------------------------- */
function currentStep() {
  if (cuveTotal() >= 0.02 && cuve.powderG > 0.3) return "bag";
  if (bulkG > 0.3) return "grind";
  if (cuveTotal() >= 0.02) return "bag";
  return "receive";
}
const PROMPTS = {
  grind:   "💎 TAP en rythme sur la CUVE pour broyer (anneau = le temps). Maintiens = auto.",
  bag:     "⚖️ DRAG sur la BALANCE pour peser & ensacher · 🧪 maintiens la coupe pour étirer",
  receive: "🛒 Reçois du cristal (ou 🔄 Lot de dépannage)",
};
const STEP_POS = { grind: CUVE_POS, bag: SCALE_POS };
let glowPhase = 0;
function updateGuide(dt) {
  const step = currentStep();
  if (ui.prompt.textContent !== PROMPTS[step]) ui.prompt.textContent = PROMPTS[step];
  ui.shopbtn.classList.toggle("pulse", step === "receive");
  const pos = STEP_POS[step];
  glow.visible = !!pos;
  if (pos) {
    glowPhase += dt * 3.5;
    const p = 0.5 + 0.5 * Math.sin(glowPhase);
    glow.position.x = pos.x; glow.position.z = pos.z;
    glow.material.opacity = 0.12 + 0.16 * p;
    const s = 0.85 + 0.18 * p; glow.scale.set(s, s, s);
  }
}

/* -------------------------------------------------------------------------
   21) ENTREES
   ------------------------------------------------------------------------- */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const el = renderer.domElement;
function rayHit(cx, cy, objs, recursive) {
  const r = el.getBoundingClientRect();
  ndc.x = ((cx - r.left) / r.width) * 2 - 1;
  ndc.y = -((cy - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  return raycaster.intersectObjects(objs, !!recursive).length > 0;
}
const pointers = new Map();
let pinching = false, pinchStartDist = 0, pinchStartZoom = 1;
let gesture = null, holding = false, lastX = 0, lastY = 0;
function pinchDist() { const a = [...pointers.values()]; return Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y); }
function startPinch() {
  pinching = true; gesture = null; holding = false; pouring = false; bagging = false; bagHeap.visible = false;
  pinchStartDist = pinchDist() || 1; pinchStartZoom = zoom;
}
function updatePinch() {
  zoom = Math.max(0.6, Math.min(2.6, pinchStartZoom * (pinchDist() / pinchStartDist)));
  localStorage.setItem("cristal_zoom", zoom.toFixed(3)); fitView();
}

el.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size >= 2) { startPinch(); return; }
  ensureAudio();
  lastX = e.clientX; lastY = e.clientY;
  // BALANCE -> pesée au drag (priorité si poudre prête)
  if (rayHit(e.clientX, e.clientY, scalePick) || (cuveTotal() >= 0.02 && rayHit(e.clientX, e.clientY, [bagHeap]))) {
    gesture = "bag"; startBag(); return;
  }
  // POT DE COUPE -> verser
  if (rayHit(e.clientX, e.clientY, [cutBody, cutBand, cutLid])) {
    if (cuve.powderG <= 0.3) showToast("Broie d'abord du cristal", "#e6c896");
    else if (cutStock[curCut] > 0.05) { gesture = "pour"; pouring = true; }
    else if (totalCut() > 0.05) showToast("Pot « " + curCutDef().short + " » vide — change de coupe", "#e6c896");
    else showToast("Plus de coupe — achète-en 🛒", "#e6c896");
    return;
  }
  // CUVE ou PILE DE CRISTAL -> broyer (tap rythmé / maintien)
  if (rayHit(e.clientX, e.clientY, [bowl, bowlFloor, content, pestle]) || rayHit(e.clientX, e.clientY, crystPick)) {
    if (bulkG <= 0.05 && !tierDef().auto) { showToast("Plus de cristal — achète une pièce 🛒", "#e6c896"); return; }
    gesture = "grind"; holding = true; tapGrind(); return;
  }
}, { passive:false });

el.addEventListener("pointermove", (e) => {
  if (pointers.has(e.pointerId)) pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pinching && pointers.size >= 2) { e.preventDefault(); updatePinch(); return; }
  if (gesture === "bag") {
    // drag horizontal+vertical : on compte le mouvement vers la droite/haut comme "verser plus"
    const dx = e.clientX - lastX, dy = lastY - e.clientY;
    bagDrag(Math.abs(dx) + Math.abs(dy) * 0.6);
  }
  lastX = e.clientX; lastY = e.clientY;
}, { passive:false });

function onUp(e) {
  if (e) e.preventDefault();
  pointers.delete(e.pointerId);
  if (pinching && pointers.size < 2) pinching = false;
  if (pointers.size === 0) {
    if (gesture === "bag" && bagging) sealBag(false);
    if (pouring) burstPuffs(CUVE_POS, 4);
    pouring = false; holding = false; gesture = null;
  }
}
el.addEventListener("pointerup", onUp, { passive:false });
el.addEventListener("pointercancel", onUp, { passive:false });

document.getElementById("reset").addEventListener("click", restock);
document.getElementById("discard").addEventListener("click", discardCuve);
function discardCuve() {
  if (cuveTotal() > 0.05) {
    const lost = Math.round(cuveTotal());
    cuve.powderG = cuve.qGrindSum = cuve.puritySum = cuve.cut = cuve.cutClean = cuve.cutHarm = 0; grindProgress = 0;
    burstPuffs(CUVE_POS, 8, null); addShake(0.08); sCrack();
    showToast("Cuve jetée : −" + lost + " g", "#e6c896"); updateResources();
  } else { showToast("Rien à jeter", "#e6c896"); }
}
ui.shopbtn.addEventListener("click", () => { renderShop(); ui.shop.classList.add("show"); });
document.getElementById("shopclose").addEventListener("click", () => ui.shop.classList.remove("show"));
ui.shop.addEventListener("click", (e) => { if (e.target === ui.shop) ui.shop.classList.remove("show"); });
for (const b of document.querySelectorAll(".fmtbtn")) b.addEventListener("click", () => setFmt(+b.dataset.fmt));
for (const b of document.querySelectorAll(".cutbtn")) b.addEventListener("click", () => setCut(b.dataset.cut));

function setFmt(f) {
  fmt = f; localStorage.setItem("cristal_fmt", String(f));
  for (const b of document.querySelectorAll(".fmtbtn")) b.classList.toggle("on", +b.dataset.fmt === f);
}
function setCut(key) {
  if (!CUT_BY[key]) return;
  curCut = key; localStorage.setItem("cristal_cut", key);
  cutBody.material.color.setHex(CUT_BY[key].col);
  updateCutBar(); updateResources();
}
function updateCutBar() {
  for (const b of document.querySelectorAll(".cutbtn")) {
    b.classList.toggle("on", b.dataset.cut === curCut);
    b.classList.toggle("empty", cutStock[b.dataset.cut] <= 0.5);
  }
}
function restock() {
  if (cash >= CRYSTAL_PRICES[25]) { renderShop(); ui.shop.classList.add("show"); return; }
  const tot = bulkG + STARTER.cryst;
  bulkPurity = tot > 0 ? (bulkG * bulkPurity + STARTER.cryst * STARTER.purity) / tot : STARTER.purity;
  bulkG = tot; cutStock.msm += STARTER.cut;
  if (cutStock[curCut] <= 0.5) setCut("msm"); else updateResources();
  burstPuffs(CRYST_POS, 6, null, puffMatBlue); burstPuffs(CUT_POS, 6);
  showToast("Lot de dépannage : +" + STARTER.cryst + " g cristal, +" + STARTER.cut + " g MSM", "#7df9ff");
}

/* -------------------------------------------------------------------------
   22) BOUCLE PRINCIPALE
   ------------------------------------------------------------------------- */
let last = 0;
function loop(t) {
  const dt = Math.min((t - last) / 1000 || 0, 0.05); last = t;
  updateBeat(dt);
  updatePour(dt);
  updateAuto(dt);
  updatePuffs(dt);
  updatePochons(dt);
  updateGuide(dt);
  setContentHeap();
  for (const r of crystRocks) { r.rotation.y += dt * 0.4; }
  for (const s of shards) { s.rotation.y += dt * 0.6; }
  if (shake > 0) { shake *= Math.pow(0.0008, dt); if (shake < 0.002) shake = 0; }
  camera.position.copy(baseCamPos);
  if (shake > 0) {
    camera.position.x += (Math.random() - 0.5) * shake;
    camera.position.y += (Math.random() - 0.5) * shake;
    camera.position.z += (Math.random() - 0.5) * shake;
  }
  camera.lookAt(VIEW_TARGET);
  updateLabels();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

/* -------------------------------------------------------------------------
   23) BOOTSTRAP
   ------------------------------------------------------------------------- */
resize();
setCash(cash); setRep(rep); updateXpUI();
setFmt(fmt);
bulkG = STARTER.cryst; bulkPurity = STARTER.purity; cutStock.msm = STARTER.cut;
pestle.material.color.setHex(GRIND_TIERS[owned.tier].col);
setCut(curCut);
if (cutStock[curCut] <= 0.5) setCut("msm");
updateResources();
requestAnimationFrame(loop);
</script>
