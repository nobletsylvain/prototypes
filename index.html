<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Cake Slicer 3D — quatre-quarts</title>
<style>
  /* --- Plein ecran, pense mobile (pas de scroll, pas de zoom) --- */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; touch-action:none;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 120% at 50% 0%, #2c1c44 0%, #160d22 60%, #0d0815 100%); }
  #app { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  /* --- HUD (overlay HTML par dessus la scene 3D) --- */
  .hud { position:fixed; left:0; right:0; pointer-events:none; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  #count { top:max(14px,env(safe-area-inset-top)); left:16px; font-weight:800; font-size:18px; }
  #reset { position:fixed; top:max(10px,env(safe-area-inset-top)); right:14px; pointer-events:auto;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    padding:9px 14px; border-radius:12px; font-size:14px; font-weight:700; backdrop-filter:blur(6px); }
  #reset:active { background:rgba(255,255,255,.25); }
  #hint { bottom:max(22px,env(safe-area-inset-bottom)); text-align:center; font-size:14px;
    color:rgba(255,255,255,.7); padding:0 24px; transition:opacity .4s; }
  #toast { top:38%; text-align:center; font-size:26px; font-weight:800; opacity:0;
    transition:opacity .25s, transform .25s; transform:translateY(8px); }
  #toast.show { opacity:1; transform:translateY(0); }
  #title { top:max(46px,calc(env(safe-area-inset-top) + 30px)); left:16px; font-size:12px;
    color:rgba(255,255,255,.45); font-weight:600; letter-spacing:.5px; }
</style>

<!-- Three.js charge en module depuis un CDN (import map). Supporte par Safari iOS 16.4+ -->
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body>
<div id="app"></div>
<div class="hud" id="count">Tranches : 0</div>
<div class="hud" id="title">QUATRE-QUARTS</div>
<button id="reset">🔄 Nouveau cake</button>
<div class="hud" id="hint">Glisse ton doigt en travers du cake pour couper une tranche</div>
<div class="hud" id="toast"></div>

<script type="module">
"use strict";
import * as THREE from "three";

/* =========================================================================
   CAKE SLICER 3D — quatre-quarts long, coupe multiple
   -------------------------------------------------------------------------
   - Le cake est un PAIN long (quatre-quarts) pose sur une planche.
   - Le joueur GLISSE le doigt en travers du cake : le trace definit un plan
     de coupe vertical. Au relachement, la TRANCHE situee cote "bout libre"
     (cote droit) se detache et tombe sur la planche (petite physique).
   - Chaque coupe REUSSIT toujours, meme imprecise : l'epaisseur et le biais
     varient -> on affiche juste un petit feedback de qualite.
   - On peut enchainer les tranches jusqu'a ce qu'il ne reste plus de cake.
   Tout est commente en francais, brique par brique.
   ========================================================================= */

/* -------------------------------------------------------------------------
   0) DIMENSIONS DU CAKE (unites monde)
   Un quatre-quarts long : allonge sur X, assez haut, pas trop large.
   ------------------------------------------------------------------------- */
const L = 6.0;   // longueur totale (axe X), du talon (x=0) au bout libre (x=L)
const W = 1.7;   // largeur (axe Z)
const H = 1.4;   // hauteur (axe Y), base a y=0

/* -------------------------------------------------------------------------
   1) SCENE, CAMERA, RENDU
   ------------------------------------------------------------------------- */
const app = document.getElementById("app");
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(3.2, 5.3, 8.2);
camera.lookAt(2.8, 0.3, 0);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setClearColor(0x000000, 0);           // fond transparent -> on voit le degrade CSS
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);

/* -------------------------------------------------------------------------
   2) LUMIERES
   ------------------------------------------------------------------------- */
scene.add(new THREE.HemisphereLight(0xfff3e0, 0x402c4d, 0.75));
const sun = new THREE.DirectionalLight(0xfff0dc, 1.0);
sun.position.set(6, 11, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
const s = sun.shadow.camera;
s.left = -8; s.right = 8; s.top = 8; s.bottom = -8; s.near = 1; s.far = 30;
scene.add(sun);

/* -------------------------------------------------------------------------
   3) PLANCHE A DECOUPER (recoit les ombres + les tranches)
   ------------------------------------------------------------------------- */
const board = new THREE.Mesh(
  new THREE.BoxGeometry(L + 3.5, 0.3, W + 2.6),
  new THREE.MeshStandardMaterial({ color: 0x6b4a2b, roughness: 0.85 })
);
board.position.set(L / 2 - 0.3, -0.15, 0);
board.receiveShadow = true;
scene.add(board);

/* -------------------------------------------------------------------------
   4) MATERIAUX DU CAKE
   crust  = croute doree (dessus + cotes longs)
   pale   = dessous, plus clair
   sponge = mie (faces fraichement coupees) -> jaune pale
   ------------------------------------------------------------------------- */
const matCrust  = new THREE.MeshStandardMaterial({ color: 0xb9772e, roughness: 0.8, side: THREE.DoubleSide });
const matPale   = new THREE.MeshStandardMaterial({ color: 0xe6c485, roughness: 0.9, side: THREE.DoubleSide });
const matSponge = new THREE.MeshStandardMaterial({ color: 0xf4dca6, roughness: 0.95, side: THREE.DoubleSide });
const cakeMats  = [matCrust, matPale, matSponge];

/* -------------------------------------------------------------------------
   5) GEOMETRIE D'UN MORCEAU (prisme)
   Un morceau est defini par DEUX faces verticales :
     - face gauche a x = aNeg (cote z-) et x = aPos (cote z+)
     - face droite a x = bNeg (cote z-) et x = bPos (cote z+)
   Si aNeg != aPos (ou bNeg != bPos), la coupe est BIAISEE -> tranche en coin.
   On construit 6 quads (non indexes) avec des groupes pour les materiaux.
   ------------------------------------------------------------------------- */
function makePrism(aNeg, aPos, bNeg, bPos) {
  const zN = -W / 2, zP = W / 2;
  // 8 coins : L=face gauche (a), R=face droite (b)
  const L0=[aNeg,0,zN], L1=[aPos,0,zP], L2=[aPos,H,zP], L3=[aNeg,H,zN];
  const R0=[bNeg,0,zN], R1=[bPos,0,zP], R2=[bPos,H,zP], R3=[bNeg,H,zN];

  const pos = [];
  const quad = (p0,p1,p2,p3) => { // 2 triangles
    pos.push(...p0,...p1,...p2,  ...p0,...p2,...p3);
  };
  quad(L0,R0,R1,L1); // 0 dessous     -> pale (1)
  quad(L3,L2,R2,R3); // 1 dessus      -> crust (0)
  quad(L0,L3,R3,R0); // 2 cote z-     -> crust (0)
  quad(L1,R1,R2,L2); // 3 cote z+     -> crust (0)
  quad(L0,L1,L2,L3); // 4 bout gauche -> sponge (2)
  quad(R0,R1,R2,R3); // 5 bout droit  -> sponge (2)

  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
  g.addGroup(0,  6, 1);
  g.addGroup(6,  6, 0);
  g.addGroup(12, 6, 0);
  g.addGroup(18, 6, 0);
  g.addGroup(24, 6, 2);
  g.addGroup(30, 6, 2);
  g.computeVertexNormals();
  return g;
}

/* -------------------------------------------------------------------------
   6) LE CAKE RESTANT
   On suit le bord droit (la "frontiere") par deux x : rightNeg (cote z-) et
   rightPos (cote z+). Le talon gauche reste fixe a x=0.
   ------------------------------------------------------------------------- */
let rightNeg, rightPos;             // position du bord droit aux deux cotes
const cakeMesh = new THREE.Mesh(makePrism(0,0,0,0), cakeMats);
cakeMesh.castShadow = true; cakeMesh.receiveShadow = true;
scene.add(cakeMesh);

// La craquelure typique du quatre-quarts sur le dessus.
const crack = new THREE.Mesh(
  new THREE.BoxGeometry(1, 0.06, 0.22),
  new THREE.MeshStandardMaterial({ color: 0x7a4a1e, roughness: 0.9 })
);
crack.position.y = H + 0.005;
scene.add(crack);

function rebuildCake() {
  cakeMesh.geometry.dispose();
  cakeMesh.geometry = makePrism(0, 0, rightNeg, rightPos);
  const maxB = Math.max(rightNeg, rightPos);
  if (maxB > 0.6) {
    crack.visible = true;
    crack.scale.x = maxB - 0.5;
    crack.position.x = maxB / 2;
  } else {
    crack.visible = false;
  }
  cakeMesh.visible = maxB > 0.05;
}

/* -------------------------------------------------------------------------
   7) ETAT DE PARTIE
   ------------------------------------------------------------------------- */
let slices = [];     // tranches detachees (avec physique)
let count = 0;       // nombre de tranches coupees
let over = false;    // plus de cake ?

function resetGame() {
  for (const sl of slices) { scene.remove(sl.mesh); sl.mesh.geometry.dispose(); }
  slices = [];
  rightNeg = L; rightPos = L;
  count = 0; over = false;
  rebuildCake();
  ui.count.textContent = "Tranches : 0";
  ui.hint.style.opacity = "1";
  ui.hint.textContent = "Glisse ton doigt en travers du cake pour couper une tranche";
}

/* -------------------------------------------------------------------------
   8) ENTREES : on projette le doigt sur le plan du DESSUS du cake (y=H)
   pour connaitre la position (x,z) visee. Un swipe = 2 points -> un plan.
   ------------------------------------------------------------------------- */
const raycaster = new THREE.Raycaster();
const topPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -H); // plan y = H
const ndc = new THREE.Vector2();

function pointOnTop(clientX, clientY) {
  const r = renderer.domElement.getBoundingClientRect();
  ndc.x = ((clientX - r.left) / r.width) * 2 - 1;
  ndc.y = -((clientY - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const out = new THREE.Vector3();
  return raycaster.ray.intersectPlane(topPlane, out) ? out : null;
}

// A partir de deux points du swipe, calcule la ligne de coupe (cutNeg,cutPos)
// = position en x de la coupe sur chaque cote (z- et z+).
function cutLineFrom(p0, p1) {
  const dz = p1.z - p0.z;
  let cutNeg, cutPos;
  if (Math.abs(dz) < 0.18) {
    // Swipe quasi parallele au cake -> coupe droite a la position moyenne.
    const xm = (p0.x + p1.x) / 2;
    cutNeg = xm; cutPos = xm;
  } else {
    const slope = (p1.x - p0.x) / dz;            // dx par unite de z
    const xAt = (z) => p0.x + slope * (z - p0.z);
    cutNeg = xAt(-W / 2);
    cutPos = xAt(W / 2);
  }
  // On ne coupe que DANS le cake restant, et jamais au-dela du talon.
  cutNeg = Math.max(0, Math.min(cutNeg, rightNeg));
  cutPos = Math.max(0, Math.min(cutPos, rightPos));
  return { cutNeg, cutPos };
}

/* -------------------------------------------------------------------------
   9) LE GUIDE DE COUPE (ruban brillant montre pendant le glissement)
   ------------------------------------------------------------------------- */
const guideGeo = new THREE.BufferGeometry();
guideGeo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(18), 3));
const guide = new THREE.Mesh(guideGeo, new THREE.MeshBasicMaterial({
  color: 0x7df9ff, transparent: true, opacity: 0.85, side: THREE.DoubleSide
}));
guide.visible = false;
scene.add(guide);

function updateGuide(cutNeg, cutPos) {
  const y = H + 0.03;
  // direction de la ligne dans le plan xz, puis perpendiculaire pour l'epaisseur
  const dx = cutPos - cutNeg, dz = W;
  const len = Math.hypot(dx, dz) || 1;
  const px = (dz / len) * 0.05, pz = (-dx / len) * 0.05; // perpendiculaire * demi-epaisseur
  const A = [cutNeg, y, -W/2 - 0.12], B = [cutPos, y, W/2 + 0.12];
  const c0=[A[0]+px,y,A[2]+pz], c1=[A[0]-px,y,A[2]-pz], c2=[B[0]-px,y,B[2]-pz], c3=[B[0]+px,y,B[2]+pz];
  const arr = guideGeo.attributes.position.array;
  const set = (i,p)=>{ arr[i*3]=p[0]; arr[i*3+1]=p[1]; arr[i*3+2]=p[2]; };
  set(0,c0); set(1,c1); set(2,c2);  set(3,c0); set(4,c2); set(5,c3);
  guideGeo.attributes.position.needsUpdate = true;
  guide.visible = true;
}

/* -------------------------------------------------------------------------
   10) COUPER : detache la tranche [coupe .. bord droit] et la fait tomber.
   ------------------------------------------------------------------------- */
function performCut(cutNeg, cutPos) {
  const thick = ((rightNeg - cutNeg) + (rightPos - cutPos)) / 2;
  if (thick < 0.06) { showToast("Trop pres du bord 🙃", "#ffd166"); return; }

  // Biais de la coupe : difference de largeur entre les deux cotes de la tranche.
  const skew = Math.abs((rightNeg - cutNeg) - (rightPos - cutPos));

  // Geometrie de la tranche : de la coupe (gauche) au bord droit actuel.
  const geo = makePrism(cutNeg, cutPos, rightNeg, rightPos);
  // On recentre la geometrie sur son centre pour pouvoir la faire tourner.
  geo.computeBoundingBox();
  const c = new THREE.Vector3();
  geo.boundingBox.getCenter(c);
  geo.translate(-c.x, -c.y, -c.z);
  geo.computeBoundingSphere();

  const mesh = new THREE.Mesh(geo, cakeMats);
  mesh.castShadow = true; mesh.receiveShadow = true;
  mesh.position.copy(c);
  scene.add(mesh);

  slices.push({
    mesh,
    vx: 0.7 + Math.random() * 0.6,
    vy: 1.8 + Math.random() * 1.0,
    vz: 1.0 + Math.random() * 0.9,
    vrx: 2.0 + Math.random() * 2.0,
    vrz: (Math.random() - 0.5) * 3.0,
    rest: 0.20 + geo.boundingSphere.radius * 0.18,
    settled: false,
  });

  // Le cake restant s'arrete maintenant a la coupe.
  rightNeg = cutNeg; rightPos = cutPos;
  rebuildCake();

  count++;
  ui.count.textContent = "Tranches : " + count;
  ui.hint.style.opacity = "0";
  rateSlice(thick, skew);

  // Fin de partie ?
  if (Math.max(rightNeg, rightPos) < 0.25) {
    over = true;
    showToast("Cake termine ! 🎉", "#9be37d");
    ui.hint.style.opacity = "1";
    ui.hint.textContent = "Tape 🔄 pour un nouveau cake";
  }
}

function rateSlice(thick, skew) {
  let msg, col;
  if (skew > 0.6)            { msg = "Tranche bancale 😅";  col = "#ff9f6b"; }
  else if (thick > 1.2)      { msg = "Grosse part ! 😋";    col = "#ffd166"; }
  else if (thick < 0.28)     { msg = "Tranche fine 🔪";     col = "#9be3ff"; }
  else if (skew < 0.18)      { msg = "Tranche parfaite ✨"; col = "#9be37d"; }
  else                       { msg = "Bonne tranche 🍰";    col = "#cdb8ff"; }
  showToast(msg, col);
}

/* -------------------------------------------------------------------------
   11) PETITE PHYSIQUE DES TRANCHES (chute + repos sur la planche)
   ------------------------------------------------------------------------- */
function updateSlices(dt) {
  const g = 11;
  for (const sl of slices) {
    if (sl.settled) continue;
    sl.vy -= g * dt;
    sl.mesh.position.x += sl.vx * dt;
    sl.mesh.position.y += sl.vy * dt;
    sl.mesh.position.z += sl.vz * dt;
    sl.mesh.rotation.x += sl.vrx * dt;
    sl.mesh.rotation.z += sl.vrz * dt;
    if (sl.mesh.position.y < sl.rest) {           // contact planche
      sl.mesh.position.y = sl.rest;
      sl.vy *= -0.32; sl.vx *= 0.6; sl.vz *= 0.6;
      sl.vrx *= 0.4;  sl.vrz *= 0.4;
      if (Math.abs(sl.vy) < 0.5) { sl.vy = 0; sl.settled = true; }
    }
  }
}

/* -------------------------------------------------------------------------
   12) HUD + GESTION DU GESTE (pointer events : tactile + souris)
   ------------------------------------------------------------------------- */
const ui = {
  count: document.getElementById("count"),
  hint:  document.getElementById("hint"),
  toast: document.getElementById("toast"),
};
let dragging = false, startPt = null, lastCut = null;

const el = renderer.domElement;
el.addEventListener("pointerdown", (e) => {
  if (over) return;
  e.preventDefault();
  const p = pointOnTop(e.clientX, e.clientY);
  if (!p) return;
  dragging = true; startPt = p; lastCut = null;
}, { passive:false });

el.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  e.preventDefault();
  const p = pointOnTop(e.clientX, e.clientY);
  if (!p) return;
  lastCut = cutLineFrom(startPt, p);
  updateGuide(lastCut.cutNeg, lastCut.cutPos);
}, { passive:false });

function endDrag(e) {
  if (!dragging) return;
  if (e) e.preventDefault();
  dragging = false;
  guide.visible = false;
  if (lastCut) performCut(lastCut.cutNeg, lastCut.cutPos);
  lastCut = null;
}
el.addEventListener("pointerup", endDrag, { passive:false });
el.addEventListener("pointercancel", endDrag, { passive:false });

document.getElementById("reset").addEventListener("click", resetGame);

/* -------------------------------------------------------------------------
   13) TOAST (feedback qualite ephemere)
   ------------------------------------------------------------------------- */
let toastTimer = 0;
function showToast(msg, color) {
  ui.toast.textContent = msg;
  ui.toast.style.color = color;
  ui.toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => ui.toast.classList.remove("show"), 900);
}

/* -------------------------------------------------------------------------
   14) BOUCLE PRINCIPALE
   ------------------------------------------------------------------------- */
let last = 0;
function loop(t) {
  const dt = Math.min((t - last) / 1000 || 0, 0.05);
  last = t;
  updateSlices(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

resize();
resetGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
