<style>
  /* --- Plein ecran, pense mobile (pas de scroll, pas de zoom) --- */

  #reset:active { background:rgba(255,255,255,.25); }

  @keyframes pop {

  /* --- Cash + bouton dechets --- */

  #waste { position:fixed; top:calc(max(14px,env(safe-area-inset-top)) + 27px); left:50%; transform:translateX(-50%);
    pointer-events:auto; background:rgba(202,161,95,.18); border:1px solid rgba(202,161,95,.5); color:#e6c896;
    font-weight:700; font-size:13px; padding:4px 11px; border-radius:10px; }

  /* --- Overlay d'emballage cellophane --- */
  #wrapui { position:fixed; inset:0; display:none; flex-direction:column; align-items:center;

  #wrapbarwrap { width:62%; max-width:320px; height:14px; background:rgba(255,255,255,.15);

  #wrapbar { height:100%; width:0%; background:linear-gradient(90deg,#7df9ff,#9be37d); transition:width .07s; }
  #seal { display:none; pointer-events:auto; background:#ff7a3c; border:none; color:#fff;
    font-weight:800; font-size:16px; padding:12px 24px; border-radius:14px; box-shadow:0 4px 14px rgba(255,122,60,.4); }

  /* --- Boutique --- */
  #shopbtn { position:fixed; right:14px; top:calc(max(10px,env(safe-area-inset-top)) + 46px); pointer-events:auto;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff; font-size:18px;

  .shopitem .ic { font-size:26px; }

  .shopitem .nm { font-weight:700; }
  .shopitem .ds { font-size:12px; color:rgba(255,255,255,.6); }

<script type="module">
"use strict";
import * as THREE from "three";

/* =========================================================================
   CAKE SLICER 3D — quatre-quarts long, coupe multiple
   -------------------------------------------------------------------------
   - Le cake est un PAIN long (quatre-quarts) pose sur une planche.
   - Le joueur GLISSE le doigt en travers du cake : le trace definit un plan
     de coupe vertical. Au relachement, la TRANCHE situee cote "bout libre"
     (cote droit) se detache et tombe sur la planche (petite physique).
   - Chaque coupe REUSSIT toujours, meme imprecise : l'epaisseur et le biais
     varient -> on affiche juste un petit feedback de qualite.
   - On peut enchainer les tranches jusqu'a ce qu'il ne reste plus de cake.
   Tout est commente en francais, brique par brique.
   ========================================================================= */

/* -------------------------------------------------------------------------
   0) DIMENSIONS DU CAKE (unites monde)
   Un quatre-quarts long : allonge sur X, assez haut, pas trop large.
   ------------------------------------------------------------------------- */
const L = 5.2;   // longueur totale (axe X), du talon (x=0) au bout libre (x=L)
const W = 2.3;   // largeur (axe Z)
const H = 0.85;  // epaisseur (axe Y), base a y=0 -> savonnette plate

// Densite "de jeu" : calibree pour que la savonnette entiere pese ~250 g.
// poids(barrette) = volume(unites^3) * DENS  (g).
const DENS = 250 / (L * W * H);

/* -------------------------------------------------------------------------
   1) SCENE, CAMERA, RENDU
   ------------------------------------------------------------------------- */
const app = document.getElementById("app");
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 200);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setClearColor(0x000000, 0);           // fond transparent -> on voit le degrade CSS
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

// On cadre le cake pour qu'il tienne TOUJOURS a l'ecran (portrait comme
// paysage). On calcule la distance de camera pour que la sphere englobante
// du cake rentre dans le champ de vision le plus etroit (horizontal en
// portrait). La camera garde un joli angle 3/4 vue de dessus.
const VIEW_DIR = new THREE.Vector3(0.04, 0.74, 0.67).normalize(); // direction camera->cible (plus plongeante)
const VIEW_TARGET = new THREE.Vector3(L / 2, 0.35, 0);           // centre de la savonnette
const VIEW_RADIUS = Math.hypot(L / 2 + 0.6, 0.8, W);             // rayon englobant
const baseCamPos = new THREE.Vector3();                          // position "au repos" (la secousse oscille autour)
let zoom = +(localStorage.getItem("hash_zoom")) || 1;           // facteur de zoom (pinch a 2 doigts)
zoom = Math.max(0.6, Math.min(2.6, zoom));

function fitView() {
  const vFov = camera.fov * Math.PI / 180;
  const hFov = 2 * Math.atan(Math.tan(vFov / 2) * camera.aspect);
  const fov = Math.min(vFov, hFov);                 // le plus contraignant
  const dist = (VIEW_RADIUS / Math.sin(fov / 2)) * 1.08 / zoom; // marge + zoom (zoom>1 = plus pres)
  baseCamPos.copy(VIEW_TARGET).addScaledVector(VIEW_DIR, dist);
  camera.position.copy(baseCamPos);
  camera.lookAt(VIEW_TARGET);
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  fitView();
}
window.addEventListener("resize", resize);

/* -------------------------------------------------------------------------
   2) LUMIERES
   ------------------------------------------------------------------------- */
scene.add(new THREE.HemisphereLight(0xfff3e0, 0x402c4d, 0.75));
const sun = new THREE.DirectionalLight(0xfff0dc, 1.0);
sun.position.set(6, 11, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
const s = sun.shadow.camera;
s.left = -8; s.right = 8; s.top = 8; s.bottom = -8; s.near = 1; s.far = 30;
scene.add(sun);

/* -------------------------------------------------------------------------
   3) PLANCHE A DECOUPER (recoit les ombres + les tranches)
   ------------------------------------------------------------------------- */
const board = new THREE.Mesh(
  new THREE.BoxGeometry(L + 3.5, 0.3, W + 2.6),
  new THREE.MeshStandardMaterial({ color: 0x6b4a2b, roughness: 0.85 })
);
board.position.set(L / 2 - 0.3, -0.15, 0);
board.receiveShadow = true;
scene.add(board);

/* -------------------------------------------------------------------------
   4) MATERIAUX DE LA SAVONNETTE
   crust  = peau pressee exterieure (dessus + cotes), brun tres fonce, leger lustre
   pale   = dessous, brun fonce
   sponge = interieur revele aux coupes -> brun plus clair / olive
   ------------------------------------------------------------------------- */
const matCrust  = new THREE.MeshStandardMaterial({ color: 0x322318, roughness: 0.5,  metalness: 0.2, side: THREE.DoubleSide });
const matPale   = new THREE.MeshStandardMaterial({ color: 0x4a3a26, roughness: 0.8,  side: THREE.DoubleSide });
const matSponge = new THREE.MeshStandardMaterial({ color: 0x705730, roughness: 0.85, side: THREE.DoubleSide });
const cakeMats  = [matCrust, matPale, matSponge];

/* -------------------------------------------------------------------------
   5) GEOMETRIE D'UN MORCEAU (prisme)
   Un morceau est defini par DEUX faces verticales :
     - face gauche a x = aNeg (cote z-) et x = aPos (cote z+)
     - face droite a x = bNeg (cote z-) et x = bPos (cote z+)
   Si aNeg != aPos (ou bNeg != bPos), la coupe est BIAISEE -> tranche en coin.
   On construit 6 quads (non indexes) avec des groupes pour les materiaux.
   ------------------------------------------------------------------------- */
function makePrism(aNeg, aPos, bNeg, bPos) {
  const zN = -W / 2, zP = W / 2;
  // 8 coins : L=face gauche (a), R=face droite (b)
  const L0=[aNeg,0,zN], L1=[aPos,0,zP], L2=[aPos,H,zP], L3=[aNeg,H,zN];
  const R0=[bNeg,0,zN], R1=[bPos,0,zP], R2=[bPos,H,zP], R3=[bNeg,H,zN];

  const pos = [];
  const quad = (p0,p1,p2,p3) => { // 2 triangles
    pos.push(...p0,...p1,...p2,  ...p0,...p2,...p3);
  };
  quad(L0,R0,R1,L1); // 0 dessous     -> pale (1)
  quad(L3,L2,R2,R3); // 1 dessus      -> crust (0)
  quad(L0,L3,R3,R0); // 2 cote z-     -> crust (0)
  quad(L1,R1,R2,L2); // 3 cote z+     -> crust (0)
  quad(L0,L1,L2,L3); // 4 bout gauche -> sponge (2)
  quad(R0,R1,R2,R3); // 5 bout droit  -> sponge (2)

  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
  g.addGroup(0,  6, 1);
  g.addGroup(6,  6, 0);
  g.addGroup(12, 6, 0);
  g.addGroup(18, 6, 0);
  g.addGroup(24, 6, 2);
  g.addGroup(30, 6, 2);
  g.computeVertexNormals();
  return g;
}

/* -------------------------------------------------------------------------
   6) LE CAKE RESTANT
   On suit le bord droit (la "frontiere") par deux x : rightNeg (cote z-) et
   rightPos (cote z+). Le talon gauche reste fixe a x=0.
   ------------------------------------------------------------------------- */
let rightNeg, rightPos;             // position du bord droit aux deux cotes
const cakeMesh = new THREE.Mesh(makePrism(0,0,0,0), cakeMats);
cakeMesh.castShadow = true; cakeMesh.receiveShadow = true;
scene.add(cakeMesh);

// La rainure pressee sur le dessus de la savonnette (marque du moule).
const crack = new THREE.Mesh(
  new THREE.BoxGeometry(1, 0.05, 0.14),
  new THREE.MeshStandardMaterial({ color: 0x1a120b, roughness: 0.9 })
);
crack.position.y = H - 0.01;
scene.add(crack);

function rebuildCake() {
  cakeMesh.geometry.dispose();
  cakeMesh.geometry = makePrism(0, 0, rightNeg, rightPos);
  const maxB = Math.max(rightNeg, rightPos);
  if (maxB > 0.6) {
    crack.visible = true;
    crack.scale.x = maxB - 0.5;
    crack.position.x = maxB / 2;
  } else {
    crack.visible = false;
  }
  cakeMesh.visible = maxB > 0.05;
}

/* -------------------------------------------------------------------------
   7) ETAT DE PARTIE
   ------------------------------------------------------------------------- */
let slices = [];     // barrettes detachees (avec physique)
let count = 0;       // nombre de barrettes coupees
let over = false;    // plus de savonnette ?
let mode = "cut";    // "cut" (coupe) | "wrap" (emballage)
let cash = +(localStorage.getItem("hash_cash") || 0);     // € sauvegardes
let wasteGrams = +(localStorage.getItem("hash_waste") || 0); // dechets accumules (g)
const wrap = { slice:null, film:null, pct:0, shownPct:0, phase:"", t0:0, tSell:0,
               spin:0, spinTarget:0, filmScale:1.32, focus:new THREE.Vector3() };

function resetGame() {
  // Nettoyage d'un emballage en cours, le cas echeant.
  if (wrap.film) { wrap.film.geometry.dispose(); wrap.film.material.dispose(); wrap.film = null; }
  wrap.slice = null; wrap.phase = ""; mode = "cut";
  ui.wrapui.classList.remove("show");

  machineJob = null; machineTimer = 0;   // annule un traitement machine en cours
  for (const sl of slices) { scene.remove(sl.mesh); sl.mesh.geometry.dispose(); sl.label.remove(); }
  slices = [];
  for (const c of crumbs) scene.remove(c.mesh);
  crumbs.length = 0;
  rightNeg = L; rightPos = L;
  count = 0; over = false;
  rebuildCake();
  ui.count.textContent = "Barrettes : 0";
  ui.hint.style.opacity = "1";
  ui.hint.textContent = "Glisse pour couper · tape une barrette pour l'emballer · pince pour zoomer";
}

/* -------------------------------------------------------------------------
   8) ENTREES : on projette le doigt sur le plan du DESSUS du cake (y=H)
   pour connaitre la position (x,z) visee. Un swipe = 2 points -> un plan.
   ------------------------------------------------------------------------- */
const raycaster = new THREE.Raycaster();
const topPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -H); // plan y = H
const ndc = new THREE.Vector2();

function pointOnTop(clientX, clientY) {
  const r = renderer.domElement.getBoundingClientRect();
  ndc.x = ((clientX - r.left) / r.width) * 2 - 1;
  ndc.y = -((clientY - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const out = new THREE.Vector3();
  return raycaster.ray.intersectPlane(topPlane, out) ? out : null;
}

// A partir de deux points du swipe, calcule la ligne de coupe (cutNeg,cutPos)
// = position en x de la coupe sur chaque cote (z- et z+).
function cutLineFrom(p0, p1) {
  const dz = p1.z - p0.z;
  let cutNeg, cutPos;
  if (Math.abs(dz) < 0.18) {
    // Swipe quasi parallele au cake -> coupe droite a la position moyenne.
    const xm = (p0.x + p1.x) / 2;
    cutNeg = xm; cutPos = xm;
  } else {
    const slope = (p1.x - p0.x) / dz;            // dx par unite de z
    const xAt = (z) => p0.x + slope * (z - p0.z);
    cutNeg = xAt(-W / 2);
    cutPos = xAt(W / 2);
  }
  // On ne coupe que DANS le cake restant, et jamais au-dela du talon.
  cutNeg = Math.max(0, Math.min(cutNeg, rightNeg));
  cutPos = Math.max(0, Math.min(cutPos, rightPos));
  return { cutNeg, cutPos };
}

/* -------------------------------------------------------------------------
   9) LE GUIDE DE COUPE (ruban brillant montre pendant le glissement)
   ------------------------------------------------------------------------- */
const guideGeo = new THREE.BufferGeometry();
guideGeo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(18), 3));
const guide = new THREE.Mesh(guideGeo, new THREE.MeshBasicMaterial({
  color: 0x7df9ff, transparent: true, opacity: 0.85, side: THREE.DoubleSide
}));
guide.visible = false;
scene.add(guide);

function updateGuide(cutNeg, cutPos) {
  const y = H + 0.03;
  // direction de la ligne dans le plan xz, puis perpendiculaire pour l'epaisseur
  const dx = cutPos - cutNeg, dz = W;
  const len = Math.hypot(dx, dz) || 1;
  const px = (dz / len) * 0.05, pz = (-dx / len) * 0.05; // perpendiculaire * demi-epaisseur
  const A = [cutNeg, y, -W/2 - 0.12], B = [cutPos, y, W/2 + 0.12];
  const c0=[A[0]+px,y,A[2]+pz], c1=[A[0]-px,y,A[2]-pz], c2=[B[0]-px,y,B[2]-pz], c3=[B[0]+px,y,B[2]+pz];
  const arr = guideGeo.attributes.position.array;
  const set = (i,p)=>{ arr[i*3]=p[0]; arr[i*3+1]=p[1]; arr[i*3+2]=p[2]; };
  set(0,c0); set(1,c1); set(2,c2);  set(3,c0); set(4,c2); set(5,c3);
  guideGeo.attributes.position.needsUpdate = true;
  guide.visible = true;
}

/* -------------------------------------------------------------------------
   10) COUPER : detache la tranche [coupe .. bord droit] et la fait tomber.
   ------------------------------------------------------------------------- */
function performCut(cutNeg, cutPos) {
  const thick = ((rightNeg - cutNeg) + (rightPos - cutPos)) / 2;
  if (thick < 0.06) { showToast("Trop pres du bord 🙃", "#ffd166"); return; }

  // Biais de la coupe : difference de largeur entre les deux cotes de la tranche.
  const skew = Math.abs((rightNeg - cutNeg) - (rightPos - cutPos));

  // Geometrie de la tranche : de la coupe (gauche) au bord droit actuel.
  const geo = makePrism(cutNeg, cutPos, rightNeg, rightPos);
  // On recentre la geometrie sur son centre pour pouvoir la faire tourner.
  geo.computeBoundingBox();
  const c = new THREE.Vector3();
  geo.boundingBox.getCenter(c);
  geo.translate(-c.x, -c.y, -c.z);
  geo.computeBoundingSphere();

  const mesh = new THREE.Mesh(geo, cakeMats);
  mesh.castShadow = true; mesh.receiveShadow = true;
  mesh.position.copy(c);
  scene.add(mesh);

  // Stats de la barrette : poids (g) deduit du volume, et grade de coupe.
  const grams = thick * W * H * DENS;
  const grade = gradeFor(thick, skew);
  const label = makeLabel(grams.toFixed(1) + " g · " + grade, GRADE_COL[grade]);

  slices.push({
    mesh, label, grams, grade,
    vx: 0.7 + Math.random() * 0.6,
    vy: 1.8 + Math.random() * 1.0,
    vz: 1.0 + Math.random() * 0.9,
    vrx: 2.0 + Math.random() * 2.0,
    vrz: (Math.random() - 0.5) * 3.0,
    rest: 0.20 + geo.boundingSphere.radius * 0.18,
    settled: false,
  });

  // Le cake restant s'arrete maintenant a la coupe.
  rightNeg = cutNeg; rightPos = cutPos;
  rebuildCake();

  count++;
  ui.count.textContent = "Barrettes : " + count;
  ui.hint.style.opacity = "0";
  showToast(grams.toFixed(1) + " g · " + grade, GRADE_COL[grade]);

  // --- Feedback (dopamine) : miettes a la coupe + secousse + son ---
  burstCrumbs((cutNeg + cutPos) / 2, H * 0.6, 0, 12);
  addWaste(grams * 0.10);            // ~10% part en miettes -> bac dechets
  addShake(grade === "A" ? 0.22 : 0.16);
  playCut(grade);

  // Fin de partie ?
  if (Math.max(rightNeg, rightPos) < 0.25) {
    over = true;
    showToast("Savonnette finie ! 🎉", "#9be37d");
    ui.hint.style.opacity = "1";
    ui.hint.textContent = "Tape 🔄 pour une nouvelle savonnette";
  }
}

// Grade de coupe A/B/C selon la proprete (biais) et l'epaisseur.
const labelsEl = document.getElementById("labels");
const GRADE_COL = { A: "#9be37d", B: "#ffd166", C: "#ff9f6b" };
function gradeFor(thick, skew) {
  if (skew < 0.18 && thick >= 0.28 && thick <= 1.2) return "A";
  if (skew < 0.45) return "B";
  return "C";
}

// Cree une petite etiquette HTML qui suivra la barrette en 3D (poids + grade).
function makeLabel(text, color) {
  const d = document.createElement("div");
  d.className = "blabel";
  d.textContent = text;

  return d;
}

/* -------------------------------------------------------------------------
   10b) JUICE : son (WebAudio), miettes, secousse de camera
   Tout est synthetise -> aucun fichier audio. L'AudioContext est cree/repris
   au premier appui (obligatoire sur iOS).
   ------------------------------------------------------------------------- */
let actx = null;
function ensureAudio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === "suspended") actx.resume();
  return actx;
}
// Bruit filtre avec balayage de frequence (sert au "schnk" de coupe et au briquet).
function noiseBurst(dur, f0, f1, vol, type, q) {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime;
  const len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.5);
  const src = ac.createBufferSource(); src.buffer = buf;
  const filt = ac.createBiquadFilter(); filt.type = type || "bandpass"; filt.Q.value = q || 0.8;
  filt.frequency.setValueAtTime(f0, t);
  filt.frequency.exponentialRampToValueAtTime(Math.max(60, f1), t + dur);
  const g = ac.createGain(); g.gain.value = vol;
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(t); src.stop(t + dur);
}
function beep(freq, t0, dur, vol) {
  const ac = ensureAudio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = "square"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t0); o.stop(t0 + dur);
}
function playCut(grade) {           // "schnk" plus aigu si belle coupe
  const k = grade === "A" ? 1.0 : grade === "B" ? 0.9 : 0.8;
  noiseBurst(0.11, 2600 * k, 700, 0.34, "bandpass", 0.9);
}
function playSeal() { noiseBurst(0.22, 500, 1700, 0.25, "lowpass", 0.6); } // briquet "fwoosh"
function playSale() {                // petit "cha-ching" ascendant
  const ac = ensureAudio(); if (!ac) return; const t = ac.currentTime;
  beep(880, t, 0.13, 0.25); beep(1320, t + 0.09, 0.18, 0.22);
}

// Miettes de resine projetees a la coupe (petits cubes, courte duree de vie).
const crumbs = [];
const crumbGeo = new THREE.BoxGeometry(0.07, 0.07, 0.07);
const crumbMat = new THREE.MeshStandardMaterial({ color: 0x6e562f, roughness: 1 });
function burstCrumbs(x, y, z, n) {
  for (let i = 0; i < n; i++) {
    const m = new THREE.Mesh(crumbGeo, crumbMat);
    m.position.set(x + (Math.random() - 0.5) * W * 0.6, y, z + (Math.random() - 0.5) * W * 0.6);
    scene.add(m);
    // Vitesse orientee vers le BAC DECHETS -> les miettes y atterrissent.
    crumbs.push({ mesh: m,
      vx: (WASTE_POS.x - x) * 1.4 + (Math.random() - 0.5) * 0.8,
      vy: 2.2 + Math.random() * 1.4,
      vz: (WASTE_POS.z - z) * 1.4 + (Math.random() - 0.5) * 0.8,
      settled: false });
  }
  while (crumbs.length > 60) { const c = crumbs.shift(); scene.remove(c.mesh); } // plafond memoire
}
function updateCrumbs(dt) {
  for (const c of crumbs) {
    if (c.settled) continue;
    c.vy -= 11 * dt;
    c.mesh.position.x += c.vx * dt; c.mesh.position.y += c.vy * dt; c.mesh.position.z += c.vz * dt;
    c.mesh.rotation.x += dt * 7; c.mesh.rotation.y += dt * 5;
    if (c.mesh.position.y <= 0.12) { c.mesh.position.y = 0.12; c.settled = true; } // se pose dans le bac
  }
}

// Secousse de camera (amortie dans la boucle principale).
let shake = 0;
function addShake(a) { shake = Math.min(0.6, shake + a); }

/* -------------------------------------------------------------------------
   10c) BACS DE TRI + DECHETS (vente aux schlags)
   Deux bacs poses devant la savonnette : les barrettes emballees filent dans
   le bac "a vendre", les miettes tombent dans le bac "dechets" (vendu a bas
   prix aux schlags). Le bac dechets se tape pour encaisser.
   ------------------------------------------------------------------------- */
const SELL_POS  = new THREE.Vector3(L * 0.30, 0, 1.7);   // bac des barrettes emballees
const WASTE_POS = new THREE.Vector3(L * 0.72, 0, 1.7);   // bac des miettes / dechets
const SCHLAG_RATE = 0.5;                                  // €/g des dechets (vs 2 €/g emballe)
const _tmp = new THREE.Vector3();

function makeBin(pos, col) {
  const grp = new THREE.Group(); grp.position.copy(pos);
  const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.7, metalness: 0.1, side: THREE.DoubleSide });
  const w = 1.6, d = 1.15, h = 0.42, th = 0.07;
  const floor = new THREE.Mesh(new THREE.BoxGeometry(w, th, d), mat); floor.position.y = th / 2; floor.receiveShadow = true; grp.add(floor);
  const wLR = (x) => { const m = new THREE.Mesh(new THREE.BoxGeometry(th, h, d), mat); m.position.set(x, h / 2, 0); grp.add(m); };
  const wFB = (z) => { const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, th), mat); m.position.set(0, h / 2, z); grp.add(m); };
  wLR(-w / 2); wLR(w / 2); wFB(-d / 2); wFB(d / 2);
  scene.add(grp); return grp;
}
const sellBin  = makeBin(SELL_POS, 0x3a6b3a);
const wasteBin = makeBin(WASTE_POS, 0x55504a);

// Etiquettes flottantes des deux bacs (memes etiquettes HTML projetees).
const sellLabel  = makeLabel("📦 À VENDRE", "#9be37d");
const wasteLabel = makeLabel("🗑️ DÉCHETS", "#caa15f");
function placeLabel(div, pos) {

  if (_lv.z > 1) { div.style.display = "none"; return; }
  div.style.display = "block";

  div.style.top  = ((-_lv.y * 0.5 + 0.5) * window.innerHeight) + "px";
}
function updateBinLabels() { placeLabel(sellLabel, SELL_POS); placeLabel(wasteLabel, WASTE_POS); }

/* -------------------------------------------------------------------------
   11) PETITE PHYSIQUE DES TRANCHES (chute + repos sur la planche)
   ------------------------------------------------------------------------- */
function updateSlices(dt) {
  const g = 11;
  for (const sl of slices) {
    if (sl.settled) continue;
    sl.vy -= g * dt;
    sl.mesh.position.x += sl.vx * dt;
    sl.mesh.position.y += sl.vy * dt;
    sl.mesh.position.z += sl.vz * dt;
    sl.mesh.rotation.x += sl.vrx * dt;
    sl.mesh.rotation.z += sl.vrz * dt;
    if (sl.mesh.position.y < sl.rest) {           // contact planche
      sl.mesh.position.y = sl.rest;
      sl.vy *= -0.32; sl.vx *= 0.6; sl.vz *= 0.6;
      sl.vrx *= 0.4;  sl.vrz *= 0.4;
      if (Math.abs(sl.vy) < 0.5) { sl.vy = 0; sl.settled = true; }
    }
  }
}

let dragging = false, startPt = null, lastCut = null;
const el = renderer.domElement;

// --- Pinch a deux doigts (zoom) ---
const pointers = new Map();
let pinching = false, pinchStartDist = 0, pinchStartZoom = 1;
function pinchDist() { const a = [...pointers.values()]; return Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y); }
function startPinch() {
  pinching = true; dragging = false; guide.visible = false; lastCut = null; wrapLast = null;
  pinchStartDist = pinchDist() || 1; pinchStartZoom = zoom;
}
function updatePinch() {
  zoom = Math.max(0.6, Math.min(2.6, pinchStartZoom * (pinchDist() / pinchStartDist)));
  localStorage.setItem("hash_zoom", zoom.toFixed(3));
  fitView();
}

// Quelle barrette POSEE est sous le doigt ? (pour l'emballer)
function pickSlice(cx, cy) {
  const r = el.getBoundingClientRect();
  ndc.x = ((cx - r.left) / r.width) * 2 - 1;
  ndc.y = -((cy - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const meshes = [];
  for (const s of slices) if (s.settled && s !== wrap.slice && !s.machine) meshes.push(s.mesh);
  const hit = raycaster.intersectObjects(meshes, false)[0];
  return hit ? slices.find(s => s.mesh === hit.object) : null;
}

// Le doigt est-il sur le BAC DECHETS ? (pour le vendre)
function pickWasteBin(cx, cy) {
  const r = el.getBoundingClientRect();
  ndc.x = ((cx - r.left) / r.width) * 2 - 1;
  ndc.y = -((cy - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  return raycaster.intersectObjects(wasteBin.children, false).length > 0;
}

el.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size >= 2) { startPinch(); return; }   // 2e doigt -> on bascule en zoom
  ensureAudio();                            // debloque le son (requis sur iOS)
  if (mode === "wrap") { wrapDown(e); return; }
  const sl = pickSlice(e.clientX, e.clientY);
  if (sl) { enterWrap(sl); return; }       // tape une barrette posee -> emballage
  if (pickWasteBin(e.clientX, e.clientY)) { sellWaste(); return; } // tape le bac dechets -> vente schlag
  if (over) return;                        // plus de savonnette a couper
  const p = pointOnTop(e.clientX, e.clientY);
  if (!p) return;
  dragging = true; startPt = p; lastCut = null;
}, { passive:false });

el.addEventListener("pointermove", (e) => {
  if (pointers.has(e.pointerId)) pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pinching && pointers.size >= 2) { e.preventDefault(); updatePinch(); return; }
  if (mode === "wrap") { wrapMove(e); return; }
  if (!dragging) return;
  e.preventDefault();
  const p = pointOnTop(e.clientX, e.clientY);
  if (!p) return;
  lastCut = cutLineFrom(startPt, p);
  updateGuide(lastCut.cutNeg, lastCut.cutPos);
}, { passive:false });

function endDrag(e) {
  if (mode === "wrap") { wrapLast = null; return; }
  if (!dragging) return;
  if (e) e.preventDefault();
  dragging = false;
  guide.visible = false;
  if (lastCut) performCut(lastCut.cutNeg, lastCut.cutPos);
  lastCut = null;
}
function onUp(e) {
  if (e) e.preventDefault();
  pointers.delete(e.pointerId);
  if (pinching) { if (pointers.size < 2) pinching = false; return; } // sortie de pinch : pas de coupe parasite
  endDrag(e);
}
el.addEventListener("pointerup", onUp, { passive:false });
el.addEventListener("pointercancel", onUp, { passive:false });

document.getElementById("reset").addEventListener("click", resetGame);
ui.seal.addEventListener("click", () => { if (mode === "wrap" && wrap.phase === "seal") sealWrap(); });
ui.waste.addEventListener("click", sellWaste);   // raccourci HUD pour vendre les dechets
document.getElementById("shopbtn").addEventListener("click", () => { renderShop(); ui.shop.classList.add("show"); });
document.getElementById("shopclose").addEventListener("click", () => ui.shop.classList.remove("show"));
ui.shop.addEventListener("click", (e) => { if (e.target === ui.shop) ui.shop.classList.remove("show"); }); // clic backdrop

/* -------------------------------------------------------------------------
   12b) EMBALLAGE CELLOPHANE
   On tape une barrette -> elle se met en avant, un film translucide apparait.
   On GLISSE pour l'enrouler (jauge de serrage + la barrette roule + le film
   se resserre). A 100%, bouton "Sceller" (briquet) -> vente -> €.
   ------------------------------------------------------------------------- */
let wrapLast = null;
const _wrapScale = new THREE.Vector3();

function enterWrap(sl) {
  mode = "wrap"; wrap.slice = sl; wrap.pct = 0; wrap.shownPct = 0; wrap.phase = "enroule";
  wrap.t0 = performance.now(); wrap.spin = 0; wrap.spinTarget = 0; wrap.filmScale = 1.32;
  sl.label.style.display = "none";
  // Film translucide facon cellophane (enfant -> suit position/rotation).
  sl.mesh.geometry.computeBoundingBox();
  const size = new THREE.Vector3(); sl.mesh.geometry.boundingBox.getSize(size);
  const film = new THREE.Mesh(
    new THREE.BoxGeometry(size.x, size.y, size.z),
    new THREE.MeshStandardMaterial({ color: 0xdff3ff, transparent: true, opacity: 0.28, roughness: 0.08, metalness: 0.3, side: THREE.DoubleSide })
  );
  film.scale.setScalar(wrap.filmScale);
  sl.mesh.add(film); wrap.film = film;
  wrap.focus.set(L * 0.5, 2.0, 2.4);        // pose de presentation, bien au-dessus du tas + vers la camera
  ui.wrapui.classList.add("show");
  ui.seal.classList.remove("show");
  ui.wraptext.textContent = "Enroule : glisse pour emballer";
  ui.wrapbar.style.width = "0%";
  ui.hint.style.opacity = "0";
}

function wrapDown(e) { e.preventDefault(); wrapLast = { x: e.clientX, y: e.clientY }; }
function wrapMove(e) {
  e.preventDefault();
  if (!wrapLast || wrap.phase !== "enroule") return;
  const dx = e.clientX - wrapLast.x, dy = e.clientY - wrapLast.y;
  const d = Math.hypot(dx, dy); wrapLast = { x: e.clientX, y: e.clientY };
  wrap.pct = Math.min(100, wrap.pct + d * 0.16);
  wrap.spinTarget = Math.min(9, wrap.spinTarget + d * 0.05);  // coup de pouce de rotation (lisse dans updateWrap)
  if (wrap.pct >= 100) {
    wrap.phase = "seal";
    ui.seal.classList.add("show");
    ui.wraptext.textContent = "Bien serre ! Scelle au briquet";
  }
}

function sealWrap() {
  wrap.phase = "done"; wrap.tSell = performance.now();
  ui.seal.classList.remove("show");
  if (wrap.film) { wrap.film.scale.setScalar(1.0); wrap.film.material.opacity = 0.38; wrap.film.material.roughness = 0.05; }
  flame(); playSeal(); playSale(); addShake(0.12);
  // Prix = €/g * bonus de grade * bonus de serrage (plus on a emballe vite, plus c'est serre).
  const secs  = (wrap.tSell - wrap.t0) / 1000;
  const tight = secs < 3 ? 1.3 : secs < 6 ? 1.1 : 0.9;
  const gmult = wrap.slice.grade === "A" ? 1.5 : wrap.slice.grade === "B" ? 1.0 : 0.6;
  const price = wrap.slice.grams * 2 * gmult * tight;
  setCash(cash + price);
  showToast("+ " + Math.round(price) + " €", "#9be37d");
  ui.wraptext.textContent = "Vendu ! 💶";
}

// Retire une barrette de la scene (vendue / consommee).
function removeSlice(sl) {
  scene.remove(sl.mesh); sl.mesh.geometry.dispose();
  sl.label.remove();
  slices = slices.filter(s => s !== sl);
}

function exitWrap() {
  if (wrap.film) { wrap.film.geometry.dispose(); wrap.film.material.dispose(); }
  removeSlice(wrap.slice);
  wrap.slice = null; wrap.film = null; wrap.phase = ""; mode = "cut";
  ui.wrapui.classList.remove("show");
}

// Petite flammeche du briquet (effet HTML ephemere).
function flame() {
  const f = document.createElement("div");
  f.textContent = "🔥";
  f.style.cssText = "position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);font-size:64px;pointer-events:none;z-index:5;transition:opacity .5s ease,transform .5s ease;";
  document.body.appendChild(f);
  requestAnimationFrame(() => { f.style.opacity = "0"; f.style.transform = "translate(-50%,-95%) scale(1.6)"; });
  setTimeout(() => f.remove(), 520);
}

// Animation d'emballage (appelee chaque frame) -> tout est lisse pour la fluidite.
function updateWrap(dt) {
  if (mode !== "wrap" || !wrap.slice) return;
  const m = wrap.slice.mesh;
  if (wrap.phase === "done") {
    // La barrette emballee file dans le bac "a vendre" en retrecissant.
    const k = Math.min(1, (performance.now() - wrap.tSell) / 600);
    _tmp.set(SELL_POS.x, 0.55, SELL_POS.z);
    m.position.lerp(_tmp, Math.min(1, dt * 6));
    m.rotation.z += dt * 5;
    m.scale.setScalar(Math.max(0.001, 1.5 * (1 - k)));
    if (k >= 1) exitWrap();
    return;
  }
  // Mise en avant fluide + agrandissement.
  const e1 = Math.min(1, dt * 6);
  m.position.lerp(wrap.focus, e1);
  m.scale.lerp(_wrapScale.set(1.6, 1.6, 1.6), e1);
  // Rotation continue lissee (la barrette "roule"), boostee par les gestes.
  wrap.spin += (wrap.spinTarget - wrap.spin) * Math.min(1, dt * 4);
  m.rotation.x += (0.7 + wrap.spin) * dt;
  wrap.spinTarget *= Math.pow(0.03, dt);
  // Film qui se resserre en douceur.
  const ftar = 1.32 - 0.30 * (wrap.shownPct / 100);
  wrap.filmScale += (ftar - wrap.filmScale) * Math.min(1, dt * 6);
  if (wrap.film) wrap.film.scale.setScalar(wrap.filmScale);
  // Jauge qui se remplit progressivement.
  wrap.shownPct += (wrap.pct - wrap.shownPct) * Math.min(1, dt * 8);
  ui.wrapbar.style.width = wrap.shownPct.toFixed(1) + "%";
}

   13) TOAST (feedback qualite ephemere)

let toastTimer = 0;

/* -------------------------------------------------------------------------
   13b) MACHINE (auto-emballeuse) + BOUTIQUE
   1ere machine semi-auto : prend une barrette posee toutes les N secondes,
   l'emballe/vend automatiquement (serrage fixe 1.0, donc un peu moins
   rentable que l'emballage manuel soigne). Amelioration "Cadence +".
   ------------------------------------------------------------------------- */
const owned = JSON.parse(localStorage.getItem("hash_shop") || "{}");
owned.autowrap = owned.autowrap || 0;
owned.cadence  = owned.cadence  || 0;
function saveShop() { localStorage.setItem("hash_shop", JSON.stringify(owned)); }
function gradeMult(g) { return g === "A" ? 1.5 : g === "B" ? 1.0 : 0.6; }
function mInterval() { return 3.2 * Math.pow(0.82, owned.cadence); } // s entre deux barrettes

// Petite machine posee pres du bac "a vendre" (visible une fois achetee).
const machineMesh = new THREE.Mesh(
  new THREE.BoxGeometry(1.3, 0.75, 0.95),
  new THREE.MeshStandardMaterial({ color: 0x556070, metalness: 0.45, roughness: 0.5 })
);
machineMesh.position.set(SELL_POS.x, 0.38, SELL_POS.z - 1.0);
machineMesh.castShadow = true;
scene.add(machineMesh);

let machineJob = null, machineTimer = 0;
function nextSettled() {
  for (const s of slices) if (s.settled && s !== wrap.slice && !s.machine) return s;
  return null;
}
function updateMachine(dt) {
  machineMesh.visible = !!owned.autowrap;
  if (!owned.autowrap) return;
  if (machineJob) {                       // une barrette est en cours de traitement
    const j = machineJob; j.t += dt;
    const k = Math.min(1, j.t / 0.8);
    _tmp.set(SELL_POS.x, 0.55, SELL_POS.z);
    j.sl.mesh.position.lerp(_tmp, Math.min(1, dt * 6));
    j.sl.mesh.rotation.y += dt * 7;
    j.sl.mesh.scale.setScalar(Math.max(0.001, 1 - k));
    if (k >= 1) {                         // emballee -> vendue (serrage fixe 1.0)
      setCash(cash + j.sl.grams * 2 * gradeMult(j.sl.grade));
      removeSlice(j.sl); machineJob = null;
      const ac = ensureAudio(); if (ac) { const t = ac.currentTime; beep(760, t, 0.09, 0.16); }
    }
    return;
  }
  machineTimer += dt;
  if (machineTimer >= mInterval()) {
    machineTimer = 0;
    const sl = nextSettled();
    if (sl) { sl.machine = true; sl.label.style.display = "none"; machineJob = { sl, t: 0 }; }
  }
}

// Boutique (data-driven : facile d'ajouter des machines plus tard).
const SHOP = [
  { id: "autowrap", icon: "📦", name: "Auto-emballeuse",
    desc: () => "Emballe et vend une barrette toute seule.",
    cost: () => 150, can: () => owned.autowrap < 1, maxed: () => owned.autowrap >= 1,
    buy: () => { owned.autowrap = 1; } },
  { id: "cadence", icon: "⚙️", name: "Cadence +",
    desc: () => "Accélère la machine (" + mInterval().toFixed(1) + " s/barrette).",
    cost: () => Math.round(120 * Math.pow(1.6, owned.cadence)),
    can: () => owned.autowrap >= 1 && owned.cadence < 8, maxed: () => owned.cadence >= 8,
    buy: () => { owned.cadence++; } },
];
function renderShop() {
  ui.shopcash.textContent = "💶 " + Math.round(cash) + " €";
  ui.shopitems.innerHTML = "";
  for (const it of SHOP) {
    const cost = it.cost(), maxed = it.maxed(), can = !maxed && it.can() && cash >= cost;
    const row = document.createElement("div"); row.className = "shopitem";
    row.innerHTML = '<div class="ic">' + it.icon + '</div><div class="info"><div class="nm">' +
      it.name + '</div><div class="ds">' + it.desc() + '</div></div>';
    const b = document.createElement("button");
    b.textContent = maxed ? "✓" : (cost + " €");
    b.disabled = !can;
    b.addEventListener("click", () => buy(it));
    row.appendChild(b);
    ui.shopitems.appendChild(row);
  }
}
function buy(it) {
  const cost = it.cost();
  if (it.maxed() || !it.can() || cash < cost) return;
  setCash(cash - cost); it.buy(); saveShop();
  machineMesh.visible = !!owned.autowrap;
  const ac = ensureAudio(); if (ac) { const t = ac.currentTime; beep(660, t, 0.1, 0.2); beep(990, t + 0.07, 0.14, 0.2); }
  renderShop();
}

/* -------------------------------------------------------------------------
   14) ETIQUETTES 3D : on projette la position de chaque barrette a l'ecran
   pour y poser son etiquette poids/grade (suit la barrette qui tombe).
   ------------------------------------------------------------------------- */
const _lv = new THREE.Vector3();
function updateLabels() {
  const w = window.innerWidth, h = window.innerHeight;
  for (const sl of slices) {
    if (sl === wrap.slice) { sl.label.style.display = "none"; continue; } // masquee en emballage
    _lv.copy(sl.mesh.position); _lv.y += 0.7;   // un peu au-dessus de la barrette
    _lv.project(camera);
    if (_lv.z > 1) { sl.label.style.display = "none"; continue; } // derriere la camera
    sl.label.style.display = "block";
    sl.label.style.left = ((_lv.x * 0.5 + 0.5) * w) + "px";
    sl.label.style.top  = ((-_lv.y * 0.5 + 0.5) * h) + "px";
  }
}

/* -------------------------------------------------------------------------
   15) BOUCLE PRINCIPALE
   ------------------------------------------------------------------------- */
let last = 0;
function loop(t) {
  const dt = Math.min((t - last) / 1000 || 0, 0.05);
  last = t;
  updateSlices(dt);
  updateWrap(dt);
  updateMachine(dt);
  updateCrumbs(dt);
  // Secousse de camera (oscille autour de la position de repos, puis s'amortit).
  if (shake > 0) { shake *= Math.pow(0.0008, dt); if (shake < 0.002) shake = 0; }
  camera.position.copy(baseCamPos);
  if (shake > 0) {
    camera.position.x += (Math.random() - 0.5) * shake;
    camera.position.y += (Math.random() - 0.5) * shake;
    camera.position.z += (Math.random() - 0.5) * shake;
  }
  camera.lookAt(VIEW_TARGET);
  updateLabels();
  updateBinLabels();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

resize();
resetGame();
setCash(cash);
setWaste(wasteGrams);
requestAnimationFrame(loop);
</script>
