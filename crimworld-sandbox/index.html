<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CrimWorld — Sandbox</title>
<style>
  /* =========================================================================
     CrimWorld — Sandbox v2.1. Langue visuelle du proto « La Bascule ».
     Snap = story + DM (clients qui te DM en temps réel). Logique = sim.mjs.
     ========================================================================= */
  :root{
    --bg:#0E0D0C; --surface:#1A1714; --surface2:#221E1A; --border:#352E28;
    --text:#E4DED5; --muted:#8C837B; --faint:#615951;
    --sodium:#E8A33D; --neon:#3E7CC2; --rust:#C8442F; --green:#7FA37F;
    --snap:#FFFC00; --tor:#7E57C2; --story1:#F44; --story2:#FB5; --story3:#9B5;
    --mono:"SFMono-Regular",ui-monospace,"Menlo","Consolas",monospace;
    --sans:-apple-system,"Segoe UI","Roboto","Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 30% -10%,#1b1714 0,var(--bg) 60%);
       font-family:var(--sans);color:var(--text);min-height:100vh;
       display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;padding:18px 12px}

  .phone{position:relative;width:min(390px,96vw);height:min(800px,92vh);border-radius:38px;
       background:var(--bg);border:1px solid var(--border);overflow:hidden;
       box-shadow:0 30px 80px -20px #000,0 0 0 8px #0a0908;display:flex;flex-direction:column}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:130px;height:26px;background:#0a0908;border-radius:0 0 16px 16px;z-index:60}
  .statusbar{height:38px;flex:none;display:flex;align-items:flex-end;justify-content:space-between;padding:0 22px 6px;font:600 12px var(--sans);color:var(--muted)}
  .statusbar #clock{font:700 12px var(--mono);color:var(--text)}
  .statusbar b{color:var(--sodium)}

  .stake{flex:none;display:flex;gap:7px;padding:7px 11px;border-bottom:1px solid var(--border);background:#120f0c}
  .stake .seg{flex:1;display:flex;flex-direction:column;gap:1px;padding:5px 9px;min-width:0;border-radius:9px;background:#1a1511;border:1px solid #241d17}
  .stake .seg .k{font:600 9px var(--sans);letter-spacing:.05em;color:var(--faint);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stake .seg b{font:800 15px var(--mono);line-height:1.1}
  .stake .cash b{color:var(--green)} .stake .frais b{color:var(--rust)} .stake .vente b{color:var(--sodium)}

  .reputbar{flex:none;display:flex;align-items:center;justify-content:space-between;gap:8px;margin:9px 11px 2px;border-radius:11px;padding:8px 13px;border:1px solid var(--border);background:var(--surface)}
  .reputbar .k{font:700 11px var(--sans);color:var(--text)}
  .reputbar .v{font:800 13px var(--mono);color:var(--sodium);letter-spacing:.05em}
  .inv{flex:none;display:flex;gap:7px;padding:2px 11px 4px}
  .invc{flex:1;border-radius:9px;border:1px solid var(--border);background:var(--surface);padding:6px 9px;min-width:0}
  .invc.lock{opacity:.45}
  .invc .nm{font:700 11px var(--sans);display:flex;align-items:center;gap:5px}
  .invc .g{font:600 10px var(--mono);color:var(--muted);margin-top:2px}
  .invc .g b{color:var(--text)}

  .body{flex:1;overflow-y:auto;position:relative}
  .view{display:none;flex-direction:column;padding:10px 12px 14px;gap:10px}
  .view.show{display:flex}
  .vtitle{font:800 14px var(--sans);display:flex;align-items:center;gap:7px;color:var(--text)}
  .vsub{font:500 11px var(--sans);color:var(--muted);margin-top:-4px;line-height:1.4}

  /* ---- Snap : story tray + DM ---- */
  .tray{display:flex;gap:14px;padding:4px 2px 6px;border-bottom:1px solid var(--border)}
  .story{display:flex;flex-direction:column;align-items:center;gap:6px;flex:none;width:64px;cursor:pointer}
  .ring{width:58px;height:58px;border-radius:50%;padding:2.5px;background:#3a332c}
  .ring.ready{background:var(--snap);animation:pulse 1.4s infinite}
  .ring.posted{background:conic-gradient(var(--story1),var(--story2),var(--story3),var(--story1))}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,252,0,.5)}50%{box-shadow:0 0 0 7px rgba(255,252,0,0)}}
  .ring .inner{width:100%;height:100%;border-radius:50%;background:var(--surface);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted)}
  .story .cap{font:500 10px var(--sans);color:var(--muted);max-width:64px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dmempty{font:500 12px var(--sans);color:var(--faint);font-style:italic;text-align:center;padding:22px 10px;line-height:1.5}
  .dm{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:9px 11px;animation:pop .2s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .dm .av{width:38px;height:38px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;background:linear-gradient(135deg,#3a322b,#181410);border:1px solid var(--border)}
  .dm .col{flex:1;min-width:0}
  .dm .nm{font:700 12px var(--sans);display:flex;align-items:center;gap:6px}
  .dm .msg{font:400 12px var(--sans);color:var(--muted);margin-top:1px}
  .dm .serve{flex:none;border:1px solid var(--neon);color:#bcd6f0;background:var(--surface2);border-radius:11px;padding:8px 11px;font:800 12px var(--sans);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px}
  .dm .serve .px{font:600 9px var(--mono);color:var(--muted)}
  .dm .serve:active{transform:scale(.97)}

  /* tarifs vitrine : prix par format (levier joueur) */
  .tarifs{border:1px solid var(--border);background:var(--surface);border-radius:12px;padding:9px 11px;margin-top:8px}
  .tarifs .tarh{font:700 11px var(--sans);color:var(--muted);margin-bottom:7px}
  .trow{display:flex;gap:8px}
  .tcell{flex:1;background:#1a1511;border:1px solid #241d17;border-radius:9px;padding:6px 4px;text-align:center}
  .tcell .tf{font:700 11px var(--mono);color:var(--text)}
  .tctr{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
  .tctr .tbtn{width:22px;height:22px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font:800 14px var(--sans);cursor:pointer;line-height:1;padding:0}
  .tctr .tbtn:active{transform:scale(.94)}
  .tctr .tval{font:800 12px var(--mono);color:var(--green);min-width:34px}

  /* cartes produit (labo) + offres (darkweb) */
  .card{border-radius:13px;border:1px solid var(--border);background:var(--surface);padding:11px 13px;display:flex;flex-direction:column;gap:9px}
  .card.lock{opacity:.5}
  .card .hd{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .card .nm{font:800 14px var(--sans);display:flex;align-items:center;gap:7px}
  .card .meta{font:600 11px var(--mono);color:var(--muted);text-align:right;line-height:1.4}
  .card .meta b{color:var(--text)}
  .row{display:flex;gap:8px;align-items:center}
  .btn{flex:1;border-radius:11px;padding:10px 12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font:700 13px var(--sans);display:flex;flex-direction:column;align-items:center;gap:1px;transition:transform .05s}
  .btn:active{transform:scale(.98)}
  .btn .es{font:500 10px var(--mono);color:var(--muted)}
  .btn.clean{border-color:var(--green);color:#cfe3cf} .btn.dirty{border-color:var(--sodium);color:#f0d3a3}
  .btn.buy{border-color:var(--tor);color:#cdbce8} .btn:disabled{opacity:.4;cursor:default}
  .torhead{border-radius:12px;border:1px solid var(--tor);background:rgba(126,87,194,.1);padding:10px 13px}
  .torhead .t{font:800 13px var(--sans);color:#cdbce8;display:flex;align-items:center;gap:7px}
  .torhead .s{font:500 10px var(--mono);color:var(--muted);margin-top:3px}
  .offer{border-radius:12px;border:1px solid var(--border);background:var(--surface);padding:10px 12px;display:flex;align-items:center;gap:10px}
  .offer .av{width:34px;height:34px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-size:17px;background:linear-gradient(135deg,#2a2540,#161320);border:1px solid var(--tor)}
  .offer .col{flex:1;min-width:0}
  .offer .nm{font:700 12px var(--sans)} .offer .ds{font:500 10px var(--mono);color:var(--muted);margin-top:2px}
  .offer .px{font:800 13px var(--mono);color:var(--sodium)}
  .offer .btn{flex:none}

  /* metrics */
  .mday{border-radius:12px;border:1px solid var(--border);background:var(--surface);padding:11px 13px}
  .mday .hd{display:flex;align-items:center;justify-content:space-between;font:800 13px var(--sans)}
  .mday .net{font:800 13px var(--mono)} .net.pos{color:var(--green)} .net.neg{color:var(--rust)}
  .mday .nums{font:600 10px var(--mono);color:var(--muted);margin-top:5px;line-height:1.5}
  .mline{font:500 11px var(--sans);color:var(--muted);margin-top:6px;padding-left:4px;border-left:2px solid var(--border)}
  .mline .ca{display:block;font:600 10px var(--mono);color:var(--faint);margin-top:1px}
  .empty{font:500 12px var(--sans);color:var(--faint);font-style:italic;text-align:center;padding:24px 0}

  .nav{flex:none;display:flex;border-top:1px solid var(--border);background:#0a0908}
  .navbtn{flex:1;padding:9px 4px 11px;background:none;border:none;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font:700 9.5px var(--sans);position:relative}
  .navbtn .ic{font-size:19px;filter:grayscale(.4);opacity:.7}
  .navbtn.on{color:var(--snap)} .navbtn.on .ic{filter:none;opacity:1}
  .navbtn .badge{position:absolute;top:5px;left:calc(50% + 6px);min-width:15px;height:15px;border-radius:8px;background:var(--rust);color:#fff;font:800 9px var(--mono);display:flex;align-items:center;justify-content:center;padding:0 3px}

  .toast{position:absolute;left:50%;bottom:74px;transform:translateX(-50%) translateY(10px);background:#0a0908;border:1px solid var(--sodium);color:var(--sodium);font:600 12px var(--sans);padding:9px 14px;border-radius:12px;max-width:80%;text-align:center;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:58}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .devnote{font:500 11px var(--mono);color:var(--faint);text-align:center;max-width:390px;line-height:1.5}

  /* ---- overlay LABO : un proto (iframe) en mode atelier ---- */
  .labov{position:absolute;inset:0;z-index:70;background:#0a0908;display:none;flex-direction:column}
  .labov.show{display:flex}
  .labov .lh{flex:none;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:#120f0c}
  .labov .lh .t{font:800 13px var(--sans);color:var(--text);display:flex;align-items:center;gap:7px}
  .labov .lh .x{border:1px solid var(--border);background:var(--surface2);color:var(--muted);border-radius:9px;padding:7px 12px;font:700 12px var(--sans);cursor:pointer}
  .labov iframe{flex:1;width:100%;border:0;background:#000;display:block}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="statusbar"><span id="clock">08:00</span><span>JOUR <b id="jour">1</b></span></div>

  <div class="stake">
    <span class="seg cash"><span class="k">💵 Caisse</span><b id="cash">0€</b></span>
    <span class="seg frais"><span class="k">💸 Frais (cumul)</span><b id="frais">0€</b></span>
    <span class="seg vente"><span class="k">📈 Ventes/j</span><b id="ventesj">0€</b></span>
  </div>

  <div class="reputbar">
    <span class="k">🔥 Réput conso <span style="color:var(--faint);font-weight:500">(la demande)</span></span>
    <span class="v" id="reput">🔥 •••</span>
  </div>
  <div class="inv" id="inv"></div>

  <div class="body">
    <div class="view show" id="view-snap"></div>
    <div class="view" id="view-dark"></div>
    <div class="view" id="view-labo"></div>
    <div class="view" id="view-metrics"></div>
  </div>

  <div class="nav" id="nav">
    <button class="navbtn on" data-v="snap"><span class="ic">⚡</span>Snap</button>
    <button class="navbtn" data-v="dark"><span class="ic">🧅</span>Darkweb</button>
    <button class="navbtn" data-v="labo"><span class="ic">⚗️</span>Labo</button>
    <button class="navbtn" data-v="metrics"><span class="ic">📊</span>Metrics</button>
  </div>

  <div class="labov" id="labov">
    <div class="lh"><span class="t" id="labotitle">⚗️ Labo</span><button class="x" id="laboclose">✕ Fermer</button></div>
    <iframe id="laboframe" title="labo"></iframe>
  </div>

  <div class="toast" id="toast"></div>
</div>

<div class="devnote">Sandbox v2.1 — mets ta vitrine en vente, sers les clients qui te DM (jusqu’à épuisement du stock). Horloge temps réel, données dans Metrics.</div>

<script type="module">
import { createSim, C, jaugeOpaque } from './sim.mjs';

const SAVE_VERSION = '8';
if (localStorage.getItem('sbx_ver') !== SAVE_VERSION){
  for (const k of Object.keys(localStorage)) if (k.startsWith('sbx_')) localStorage.removeItem(k);
  localStorage.setItem('sbx_ver', SAVE_VERSION);
}

const sim = createSim();
window.sim = sim;          // inspection en console (DNA : « inspectable en console »)
const $ = id => document.getElementById(id);

const META = { hash:{nm:'Hash',ic:'🟫'}, weed:{nm:'Weed',ic:'🌿'}, neige:{nm:'Neige',ic:'❄️'} };
const REASSORT = {
  hash:  [ { av:'🐍', nm:'ParraLi', g:100, px:250, ds:'savonnette 100g' },
           { av:'🦂', nm:'Vex_02',  g:250, px:560, ds:'plaque 250g (gros)' } ],
  weed:  [ { av:'🌒', nm:'Niko_tn', g:100, px:300, ds:'beuh 100g' } ],
  neige: [ { av:'❄️', nm:'Saff99',  g:50,  px:1800, ds:'coke 50g' } ],
};
/* labo : chaque produit ouvre SON proto en mode atelier (embed) */
const LABO_PROTO = { hash:'../hash-slicer-v2/', weed:'../green-front-v3/', neige:'../neige/' };
/* présentation des DM (pseudo/avatar aléatoires = présentation autorisée) */
const CM_PRE=['Kalo','Naps','Vex','Zko','Brth','Lome','Saff','Dru','Niko','Ylw','Mok','Ras','Tina','Momo'];
const CM_SUF=['Li','45','_','xx','02','tn','99','z','_b','77','ka','23'];
const CM_AV=['🦅','🐍','🦊','👹','🐺','🥷','🎭','🪙','😶‍🌫️','🧃','🧢','😵'];
const MSGS=['yo tu dépanne ?','besoin vite frère 🙏','t’as de quoi ?','wesh dispo ?','un petit truc stp','tu peux me sortir ça ?'];
const pick = a => a[(Math.random()*a.length)|0];

let view = 'snap', lastJour = sim.state.jour, lastDmKey = '';
let _reputLast = null, _reputNoise = '';
const dmProfile = new Map();   // profil stable par id de client (présentation)

const el = (t,c,x)=>{const e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e;};
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>e.classList.remove('show'),1800);}
function heureStr(h){const hh=Math.floor(h)%24,mm=Math.floor((h-Math.floor(h))*60);return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');}

function updateHUD(){
  const s = sim.state;
  $('clock').textContent=heureStr(s.heure);
  $('jour').textContent=s.jour;
  $('cash').textContent=s.cash+'€';
  $('frais').textContent=s.loyerDu+'€';
  $('ventesj').textContent=sim.metricsDuJour().ventesEUR+'€';
  if (s.reput!==_reputLast){ _reputLast=s.reput;
    _reputNoise=jaugeOpaque(Math.max(0,Math.min(100,s.reput+(Math.random()<.5?0:(Math.random()<.5?5:-5)))),100); }
  $('reput').textContent=_reputNoise;
  // badge DM sur l'onglet Snap
  const n=sim.dmEnAttente().length;
  const snapBtn=document.querySelector('[data-v="snap"]');
  let b=snapBtn.querySelector('.badge');
  if(n>0){ if(!b){b=el('span','badge');snapBtn.appendChild(b);} b.textContent=n; }
  else if(b){ b.remove(); }
  renderInv();
}
function renderInv(){
  const box=$('inv'); box.replaceChildren();
  for(const p of C.PRODUITS){
    const c=el('div','invc'+(sim.state.debloques[p]?'':' lock'));
    c.appendChild(el('div','nm',META[p].ic+' '+META[p].nm));
    const st=sim.state.stock[p];
    const g=el('div','g'); g.append('brut '); g.appendChild(el('b',null,sim.state.matiere[p]+'g')); c.appendChild(g);
    const sa=el('div','g');
    C.FORMATS.forEach((f,i)=>{ if(i) sa.append(' '); sa.append(f+'g·'); sa.appendChild(el('b',null,String(st[f]))); });
    c.appendChild(sa);
    box.appendChild(c);
  }
}

/* ===================== SNAP : story + DM ===================== */
function renderSnap(){
  const v=$('view-snap'); v.replaceChildren();
  v.appendChild(el('div','vtitle','⚡ Snap — ta vitrine'));

  const tray=el('div','tray');
  const story=el('div','story');
  const ring=el('div','ring '+(sim.state.vitrine?'posted':'ready'));
  const inner=el('div','inner',sim.state.vitrine?'🟢':'＋'); ring.appendChild(inner);
  story.appendChild(ring);
  story.appendChild(el('div','cap',sim.state.vitrine?'En vente':'Mettre en vente'));
  story.addEventListener('click',()=>{
    if(sim.state.vitrine){toast('déjà en vente — ton stock part jusqu’à épuisement');return;}
    sim.ouvrirVitrine(); toast('Vitrine en vente 🟢 — les clients vont DM'); renderSnap();
  });
  tray.appendChild(story);
  v.appendChild(tray);

  // tarifs : prix par format (ta marge) — modifiables à tout moment
  const tar=el('div','tarifs');
  tar.appendChild(el('div','tarh','💶 Tes prix — hash (par sachet)'));
  const trow=el('div','trow');
  for(const f of C.FORMATS){
    const cell=el('div','tcell'); cell.appendChild(el('div','tf',f+'g'));
    const ctr=el('div','tctr');
    const minus=el('button','tbtn',null); minus.textContent='−';
    const val=el('span','tval',sim.state.prix.hash[f]+'€');
    const plus=el('button','tbtn',null); plus.textContent='+';
    const maj=()=>{ val.textContent=sim.state.prix.hash[f]+'€'; renderDMs(); };
    minus.addEventListener('click',()=>{ sim.setPrix('hash',f,sim.state.prix.hash[f]-2); maj(); });
    plus .addEventListener('click',()=>{ sim.setPrix('hash',f,sim.state.prix.hash[f]+2); maj(); });
    ctr.append(minus,val,plus); cell.appendChild(ctr); trow.appendChild(cell);
  }
  tar.appendChild(trow);
  v.appendChild(tar);

  const list=el('div',null); list.id='dmlist'; list.style.cssText='display:flex;flex-direction:column;gap:8px;margin-top:6px';
  v.appendChild(list);
  renderDMs();
}
function renderDMs(){
  const list=$('dmlist'); if(!list) return;
  list.replaceChildren();
  const dms=sim.dmEnAttente();
  if(!sim.state.vitrine){
    list.appendChild(el('div','dmempty','Mets ta vitrine en vente 👆 — ton stock partira jusqu’à épuisement.')); return;
  }
  if(!dms.length){
    list.appendChild(el('div','dmempty','Vitrine en vente 🟢 — les clients arrivent au fil de la journée.')); return;
  }
  for(const c of dms){
    if(!dmProfile.has(c.id)) dmProfile.set(c.id,{nm:pick(CM_PRE)+pick(CM_SUF),av:pick(CM_AV),msg:pick(MSGS)});
    const p=dmProfile.get(c.id);
    const dm=el('div','dm');
    dm.appendChild(el('div','av',p.av));
    const col=el('div','col');
    col.appendChild(el('div','nm',p.nm));
    col.appendChild(el('div','msg',p.msg+' (un '+c.format+'g '+META[c.produit].nm+')'));
    dm.appendChild(col);
    const serve=el('button','serve'); serve.appendChild(el('span',null,'Servir'));
    serve.appendChild(el('span','px',sim.state.prix[c.produit][c.format]+'€'));
    serve.addEventListener('click',()=>{
      const g=sim.servir(c.id);
      if(g>0){ toast('+'+g+'€'); dmProfile.delete(c.id); }   // servi : on oublie son profil
      else { toast('rupture sur le '+c.format+'g — produis-en au labo ⚗️'); }   // reste en DM (sers-le après resto)
      renderDMs(); updateHUD();
    });
    dm.appendChild(serve);
    list.appendChild(dm);
  }
}

/* ===================== DARKWEB : réassort ===================== */
function renderDark(){
  const v=$('view-dark'); v.replaceChildren();
  v.appendChild(el('div','vtitle','🧅 Réassort — réseau oignon'));
  const head=el('div','torhead');
  head.appendChild(el('div','t','🧅 SilkRoad — semi-grossistes'));
  head.appendChild(el('div','s','matière première · livraison discrète · paiement crypto'));
  v.appendChild(head);
  for(const p of C.PRODUITS){
    const unlocked=sim.state.debloques[p];
    for(const o of (REASSORT[p]||[])){
      const off=el('div','offer'); if(!unlocked) off.style.opacity='.5';
      off.appendChild(el('div','av',o.av));
      const col=el('div','col');
      col.appendChild(el('div','nm',META[p].ic+' '+o.nm+' — '+META[p].nm));
      col.appendChild(el('div','ds',o.ds+' · '+o.g+'g'));
      off.appendChild(col);
      if(unlocked){
        const buy=el('button','btn buy'); buy.appendChild(el('span',null,o.px+'€')); buy.appendChild(el('span','es','acheter'));
        buy.addEventListener('click',()=>{ sim.acheterMatiere(p,o.g,o.px,'acheté à '+o.nm+' (darkweb)'); toast('+'+o.g+'g '+META[p].nm+' (−'+o.px+'€)'); updateHUD(); });
        off.appendChild(buy);
      } else off.appendChild(el('div','px','🔒'));
      v.appendChild(off);
    }
  }
  v.appendChild(el('div','vsub','Weed / Neige : leurs vendeurs ouvriront avec leur labo (P3). La négo arrive ensuite.'));
}

/* ===================== LABO : atelier (proto en iframe, mode embed) ===================== */
function renderLabo(){
  const v=$('view-labo'); v.replaceChildren();
  v.appendChild(el('div','vtitle','⚗️ Le labo'));
  v.appendChild(el('div','vsub','Ouvre l’atelier, coupe ta matière à la main, puis renvoie le batch au stock. Tu peux bosser ton labo pendant que les clients te DM.'));
  for(const p of C.PRODUITS){
    if(!sim.state.debloques[p]) continue;
    const raw=sim.state.matiere[p];
    const card=el('div','card');
    const hd=el('div','hd'); hd.appendChild(el('div','nm',META[p].ic+' '+META[p].nm));
    const meta=el('div','meta'); const m=el('div'); m.append('matière '); m.appendChild(el('b',null,raw+'g')); meta.appendChild(m);
    hd.appendChild(meta); card.appendChild(hd);
    card.appendChild(el('div','vsub',raw>0?('jusqu’à 250g par fournée — tu coupes, le reste part en perte'):'pas de matière — passe par le Darkweb'));
    const row=el('div','row');
    const open=el('button','btn clean'); open.appendChild(el('span',null,'⚗️ Ouvrir l’atelier')); open.appendChild(el('span','es',raw>0?('couper '+Math.min(250,raw)+'g'):'—'));
    if(raw<=0) open.disabled=true; else open.addEventListener('click',()=>openLabo(p));
    row.appendChild(open); card.appendChild(row);
    v.appendChild(card);
  }
}
function openLabo(produit){
  const path=LABO_PROTO[produit]; if(!path){toast('atelier indisponible');return;}
  const g=sim.state.matiere[produit];
  if(g<=0){toast('pas de matière — passe au Darkweb');return;}
  $('labotitle').textContent='⚗️ Atelier — '+META[produit].nm;
  $('laboframe').src=path+'#embed=lab&produit='+encodeURIComponent(produit)+'&matiere='+Math.round(g);
  $('labov').classList.add('show');
}
function closeLabo(){ $('labov').classList.remove('show'); $('laboframe').src='about:blank'; renderLabo(); }
/* réception d'un batch depuis le proto embarqué (même origine seulement) */
window.addEventListener('message',e=>{
  if(e.origin!==location.origin) return;                       // même origine seulement
  if(e.source!==$('laboframe').contentWindow) return;          // …et seulement depuis NOTRE atelier
  const d=e.data;
  if(!d||d.type!=='crimworld-lab-batch') return;
  const produit=C.PRODUITS.includes(d.produit)?d.produit:null;
  const raw=Math.max(0,Math.round(+d.grammesRaw||0));
  const formats={}; let nSach=0;
  for(const f of C.FORMATS){ const k=Math.max(0,Math.round(+((d.formats||{})[f])||0)); formats[f]=k; nSach+=k; }
  try{
    if(produit&&raw>0&&nSach>0){
      sim.produireBatch({produit,grammesRaw:raw,qualite:d.qualite==='A'?'A':'C',formats});
      toast('📦 +'+nSach+' sachets '+META[produit].nm+' au stock');
    } else { toast('atelier fermé — rien produit'); }
  } finally { closeLabo(); updateHUD(); }
});
$('laboclose').addEventListener('click',closeLabo);

/* ===================== METRICS ===================== */
function mkLigne(l){
  const d=el('div','mline');
  const m=l.montant?(l.montant>0?' +'+l.montant+'€':' '+l.montant+'€'):'';
  d.textContent=(l.ic?l.ic+' ':'')+l.label+m;
  if(l.cause) d.appendChild(el('span','ca','↳ '+l.cause));
  return d;
}
function mkDay(s,label){
  const d=el('div','mday');
  const hd=el('div','hd'); hd.appendChild(el('span',null,label||('Jour '+s.jour)));
  hd.appendChild(el('span','net '+(s.net>=0?'pos':'neg'),(s.net>=0?'+':'')+s.net+'€')); d.appendChild(hd);
  const nums=el('div','nums');
  nums.textContent='ventes '+s.ventesEUR+'€ · achats '+s.achatsEUR+'€ · caisse '+s.cash+'€ · '+s.sachetsVendus+' sachets vendus · stock hash 2g·'+s.stock.hash[2]+' 5g·'+s.stock.hash[5]+' 10g·'+s.stock.hash[10]+' · réput '+s.reputOpaque;
  d.appendChild(nums);
  for(const l of s.lignes) d.appendChild(mkLigne(l));
  return d;
}
function renderMetrics(){
  const v=$('view-metrics'); v.replaceChildren();
  v.appendChild(el('div','vtitle','📊 Metrics — jour par jour'));
  v.appendChild(el('div','vsub','Pas de bilan qui interrompt : les données de chaque jour s’empilent ici.'));
  v.appendChild(mkDay(sim.metricsDuJour(),'Jour '+sim.state.jour+' (en cours)'));
  const past=sim.state.metrics.slice().reverse();
  if(!past.length) v.appendChild(el('div','empty','Aucun jour clos pour l’instant.'));
  for(const s of past) v.appendChild(mkDay(s));
}

function renderActive(){
  if(view==='snap') renderSnap();
  else if(view==='dark') renderDark();
  else if(view==='labo') renderLabo();
  else renderMetrics();
}

$('nav').addEventListener('click',e=>{
  const b=e.target.closest('[data-v]'); if(!b) return;
  view=b.dataset.v;
  for(const btn of $('nav').children) btn.classList.toggle('on',btn===b);
  for(const id of ['snap','dark','labo','metrics']) $('view-'+id).classList.toggle('show',id===view);
  renderActive();
});

/* ---- boucle TEMPS RÉEL (vitesse unique, pas de popup) ---- */
let lastTs=null;
function loop(ts){
  if(lastTs===null) lastTs=ts;
  const dt=Math.min(ts-lastTs,100); lastTs=ts;
  sim.tick(dt);
  if(sim.state.jour!==lastJour){ lastJour=sim.state.jour; dmProfile.clear(); toast('Jour '+sim.state.jour+' — bilan dans 📊 Metrics'); if(view==='snap'||view==='metrics') renderActive(); }
  // rafraîchir la liste de DM quand l'ensemble change (clients qui arrivent)
  if(view==='snap'){ const key=sim.dmEnAttente().map(c=>c.id).join(','); if(key!==lastDmKey){ lastDmKey=key; renderDMs(); } }
  updateHUD();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

renderActive();
updateHUD();
</script>
