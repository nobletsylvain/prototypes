<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Le Corner — la vente au DM</title>
<style>
  :root{
    --bg:#0c0e12; --panel:#151922; --card:#1a2030; --card2:#202839;
    --tx:#e8ecf4; --tx2:#8b95a8; --ac:#4cc2ff; --ok:#3ddc84; --warn:#ffb84c;
    --bad:#ff5d6c; --gold:#ffd66b; --chip:#232c40;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--tx); overflow:hidden;
    font:15px/1.35 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    user-select:none; -webkit-user-select:none;
  }
  #wrap{max-width:520px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative}

  /* ---- HUD ---- */
  #hud{
    padding:calc(env(safe-area-inset-top) + 10px) 12px 8px;
    background:var(--panel); border-bottom:1px solid #232a3a; z-index:5;
  }
  #hudTop{display:flex;align-items:center;gap:8px}
  #brand{font-weight:800;letter-spacing:.5px}
  #brand small{color:var(--ac);font-weight:600}
  #chips{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end}
  .chip{background:var(--chip);border-radius:20px;padding:3px 9px;font-size:12.5px;color:var(--tx);white-space:nowrap}
  .chip b{font-weight:700}
  #comboChip{background:#3a2f14;color:var(--gold);display:none}
  #comboChip.pulse{animation:pulse .35s ease}
  @keyframes pulse{50%{transform:scale(1.25)}}
  #phaseRow{display:flex;align-items:center;gap:8px;margin-top:8px}
  #phaseLbl{font-size:12px;font-weight:700;color:var(--tx2);min-width:52px}
  #phaseLbl.rush{color:var(--warn)}
  #tbar{flex:1;height:6px;background:#232a3a;border-radius:4px;overflow:hidden}
  #tfill{height:100%;width:0%;background:var(--ac);transition:width .3s linear}
  #tfill.rush{background:var(--warn)}

  /* ---- feed ---- */
  #feed{flex:1;overflow-y:auto;padding:10px 10px calc(env(safe-area-inset-bottom) + 90px);position:relative}
  .dm{
    background:var(--card);border:1px solid #26304a;border-radius:14px;
    padding:10px 10px 8px;margin-bottom:10px;position:relative;overflow:hidden;
    animation:slideIn .3s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes slideIn{from{transform:translateX(60px) rotate(1deg);opacity:0}}
  .dm.out{transition:all .35s ease;transform:translateX(-110%);opacity:0}
  .dm.done{border-color:#2b4d38;background:#16241c}
  .dm.dead{border-color:#4d2b31;background:#241619}
  .dmHead{display:flex;align-items:center;gap:8px}
  .av{width:34px;height:34px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;position:relative}
  .av .ring{position:absolute;inset:-3px;border-radius:50%;border:2px solid transparent}
  .nm{font-weight:700;font-size:14px}
  .tag{font-size:10px;font-weight:800;letter-spacing:.5px;border-radius:4px;padding:1.5px 5px;margin-left:6px;vertical-align:1px}
  .tag.CLIENT{background:#173a52;color:#6fd0ff}.tag.ACCRO{background:#4a2440;color:#ff8fd0}
  .tag.RADIN{background:#3d3517;color:#ffd66b}.tag.GROS{background:#1d3d2a;color:#71e6a4}
  .tag.HESIT{background:#2c2c46;color:#b0aaff}.tag.INCONNU{background:#42262a;color:#ff9aa5}
  .exig{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--tx2);margin-top:1px}
  .exig .bar{width:52px;height:4px;background:#232a3a;border-radius:3px;overflow:hidden}
  .exig .bar i{display:block;height:100%;background:var(--ac)}
  .rel{margin-left:auto;font-size:10.5px;color:var(--tx2);text-align:right}
  .rel b{color:var(--tx)}
  .bulle{background:var(--card2);border-radius:4px 12px 12px 12px;padding:8px 10px;margin:8px 0 6px;font-size:14px}
  .bulle .offer{color:var(--gold);font-weight:700}
  .pat{height:4px;background:#232a3a;border-radius:3px;overflow:hidden;margin:2px 0 8px}
  .pat i{display:block;height:100%;background:var(--ok);transition:none}
  .acts{display:flex;gap:6px}
  .b{
    flex:1;border:0;border-radius:9px;padding:9px 2px;font:inherit;font-size:12.5px;font-weight:700;
    background:var(--card2);color:var(--tx);cursor:pointer;transition:transform .08s;
  }
  .b:active{transform:scale(.94)}
  .b.ok{background:#1d4732;color:#7dffb5}.b.ct{background:#173a52;color:#6fd0ff}
  .b.wt{background:#3a3320;color:#ffd66b}.b.no{background:#42262a;color:#ff9aa5}
  .react{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(12,14,18,.82);backdrop-filter:blur(2px);animation:popIn .25s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes popIn{from{transform:scale(.6);opacity:0}}
  .react .emo{font-size:38px;animation:emoPop .4s cubic-bezier(.2,1.6,.4,1)}
  @keyframes emoPop{0%{transform:scale(.2)}60%{transform:scale(1.3)}}
  .react .rtx{font-size:13px;font-weight:700;margin-top:4px}
  .react .rsub{font-size:11.5px;color:var(--tx2);margin-top:2px}
  .fly{
    position:fixed;font-weight:800;color:var(--ok);z-index:60;pointer-events:none;
    animation:flyUp 1s ease forwards;font-size:17px;text-shadow:0 2px 8px #000;
  }
  .fly.tip{color:var(--gold)}
  @keyframes flyUp{to{transform:translateY(-70px);opacity:0}}
  #empty{color:var(--tx2);text-align:center;padding:36px 20px;font-size:13.5px;display:none}

  /* ---- bottom sheet (contre-offre / composer) ---- */
  #sheet{
    position:absolute;left:0;right:0;bottom:0;z-index:20;background:var(--panel);
    border-radius:18px 18px 0 0;border-top:1px solid #2a3450;
    padding:14px 14px calc(env(safe-area-inset-bottom) + 14px);
    transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.9,.25,1);
  }
  #sheet.show{transform:translateY(0)}
  #shTitle{font-weight:800;font-size:14px;margin-bottom:2px}
  #shSub{font-size:12px;color:var(--tx2);margin-bottom:10px}
  .shRow{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .schip{
    border:0;border-radius:10px;background:var(--chip);color:var(--tx);
    font:inherit;font-weight:700;font-size:14px;padding:9px 13px;cursor:pointer;
  }
  .schip:active{transform:scale(.93)}
  .schip small{color:var(--tx2);font-weight:600;font-size:10.5px;display:block}
  .schip.offq{background:#173a52}
  .schip[disabled]{opacity:.35}
  #compo{min-height:24px;font-size:13px;color:var(--tx2)}
  #compo .sac{background:var(--chip);border-radius:7px;padding:3px 8px;margin-right:5px;color:var(--tx);cursor:pointer;display:inline-block;margin-bottom:4px}
  #priceRow{display:flex;align-items:center;gap:7px;margin:8px 0 4px}
  .pb{border:0;border-radius:9px;background:var(--chip);color:var(--tx);font:inherit;font-weight:800;padding:9px 0;width:46px;cursor:pointer}
  .pb:active{transform:scale(.93)}
  #price{flex:1;text-align:center;font-size:23px;font-weight:800}
  #fairHint{text-align:center;font-size:12px;color:var(--tx2);margin-bottom:10px}
  #fairHint b{color:var(--gold)}
  #shActs{display:flex;gap:8px}
  .big{flex:1;border:0;border-radius:11px;padding:13px;font:inherit;font-weight:800;font-size:15px;cursor:pointer}
  .big.send{background:var(--ac);color:#06263a}
  .big.cancel{background:var(--chip);color:var(--tx2)}
  .big:active{transform:scale(.96)}

  /* ---- overlays (home / report / contacts) ---- */
  .ov{
    position:absolute;inset:0;z-index:30;background:var(--bg);
    display:none;flex-direction:column;overflow-y:auto;
    padding:calc(env(safe-area-inset-top) + 20px) 18px calc(env(safe-area-inset-bottom) + 20px);
  }
  .ov.show{display:flex}
  .ovTitle{font-size:24px;font-weight:900;letter-spacing:.5px}
  .ovSub{color:var(--tx2);font-size:13px;margin:4px 0 16px}
  .panel{background:var(--panel);border:1px solid #232a3a;border-radius:14px;padding:12px;margin-bottom:12px}
  .panel h3{font-size:12px;color:var(--tx2);font-weight:800;letter-spacing:.8px;margin-bottom:8px}
  .stockRow{display:flex;gap:8px}
  .stockRow .sc{flex:1;background:var(--card2);border-radius:10px;padding:9px;text-align:center}
  .stockRow .sc b{font-size:17px}
  .stockRow .sc small{display:block;color:var(--tx2);font-size:10.5px;margin-top:2px}
  #ctGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .ct{text-align:center;position:relative}
  .ct .cav{width:46px;height:46px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:23px;margin:0 auto;position:relative}
  .ct .cav svg{position:absolute;inset:-4px;transform:rotate(-90deg)}
  .ct .cnm{font-size:11px;margin-top:5px;font-weight:700}
  .ct .ck{font-size:9.5px;color:var(--tx2)}
  .ct.lock{opacity:.32;filter:grayscale(1)}
  .cta{
    border:0;border-radius:14px;background:var(--ac);color:#06263a;font:inherit;
    font-weight:900;font-size:17px;padding:16px;cursor:pointer;width:100%;margin-top:4px;
  }
  .cta:active{transform:scale(.97)}
  .ghost{border:0;background:none;color:var(--tx2);font:inherit;font-size:12.5px;padding:10px;cursor:pointer;width:100%}
  .repLine{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #202839;font-size:14px}
  .repLine:last-child{border:0}
  .repLine b{font-weight:800}
  .repLine .pos{color:var(--ok)}.repLine .neg{color:var(--bad)}.repLine .gold{color:var(--gold)}
  .noteLine{font-size:12.5px;color:var(--tx2);padding:5px 0}
  .noteLine.warn{color:var(--warn)}
  #toast{
    position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom) + 96px);transform:translateX(-50%);z-index:50;
    background:#000c;border-radius:12px;padding:10px 16px;font-size:13.5px;font-weight:700;
    opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:92%;text-overflow:ellipsis;overflow:hidden;
  }
  #toast.show{opacity:1}
  #rushFlash{position:absolute;inset:0;z-index:8;pointer-events:none;box-shadow:inset 0 0 60px 8px #ffb84c00;transition:box-shadow .5s}
  #rushFlash.on{box-shadow:inset 0 0 60px 8px #ffb84c55}
  .shake{animation:shake .4s}
  @keyframes shake{20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div id="hudTop">
      <div id="brand">LE CORNER <small>· SnapShit DM</small></div>
      <div id="chips">
        <span class="chip">💸 <b id="cCash">0</b></span>
        <span class="chip">⭐ <b id="cRep">0</b></span>
        <span class="chip">🔥 <b id="cHeat">0</b></span>
        <span class="chip" id="comboChip">⚡ x<b id="cCombo">1</b></span>
      </div>
    </div>
    <div id="phaseRow">
      <span id="phaseLbl">—</span>
      <div id="tbar"><div id="tfill"></div></div>
      <span class="chip" id="cStock">🎒 0 g</span>
    </div>
  </div>

  <div id="feed">
    <div id="empty">Personne pour l'instant… la story tourne.</div>
  </div>
  <div id="rushFlash"></div>

  <div id="sheet">
    <div id="shTitle">Contre-offre</div>
    <div id="shSub">—</div>
    <div class="shRow" id="chipRow"></div>
    <div id="compo"></div>
    <div id="priceRow">
      <button class="pb" data-d="-5">−5</button>
      <button class="pb" data-d="-1">−1</button>
      <div id="price">0</div>
      <button class="pb" data-d="1">+1</button>
      <button class="pb" data-d="5">+5</button>
    </div>
    <div id="fairHint">Prix fair ≈ <b>0</b></div>
    <div id="shActs">
      <button class="big cancel" id="shCancel">Annuler</button>
      <button class="big send" id="shSend">Envoyer</button>
    </div>
  </div>

  <div class="ov show" id="home"></div>
  <div class="ov" id="report"></div>
  <div id="toast"></div>
</div>

<script type="module">
/* =========================================================================
   LE CORNER — banc d'essai de la VENTE AU DM, avant intégration La Loupe.
   Mécaniques testées (sources : analyse concurrentielle, session 2026-07-23) :
   - contre-offre à la Schedule I (qty/prix, "fair price" affiché, budget caché)
   - "Je te dis" = différer sans refuser (TCG Card Shop Sim "Let Me Think")
   - réactions emoji à paliers + règle "2 abus d'affilée → il part" (Moonlighter)
   - prix JUSTE dans la fenêtre fair ±10 % → pourboire + combo (Recettear)
   - demandes ambiguës à interpréter (Good Pizza) — prix auto, skill = lecture
   - client hésitant "?" à traiter à la main → convertit toujours (Moonlighter)
   - DM louche à flairer via indices déterministes (Papers, Please)
   - clients persistants : relation → budget/fréquence, fidèle → présente un
     pote (Schedule I, graphe social) ; exigence visible en tête de DM (DDS1)
   Règles projet : R1 rater ≠ malus sec (récompense réduite) ; R4 zéro hasard
   d'état (hash déterministe jour/index, Math.random interdit sur l'état).
   ========================================================================= */

const SAVE_VERSION = 1;
const LS = "corner_";

/* ------------------------------ TUNING ---------------------------------- */
const CFG = {
  SOIREE_S: 120,            // durée d'une soirée (s réelles)
  PHASES: [                 // découpage : calme → rush → fin
    { nm: "CALME", t0: 0.00, t1: 0.22 },
    { nm: "RUSH",  t0: 0.22, t1: 0.80 },
    { nm: "FIN",   t0: 0.80, t1: 1.00 },
  ],
  PRIX_FAIR: 10,            // base €/g fictif (argent neutre)
  FAIR_BAND: 0.10,          // fenêtre "prix juste" : fair ±10 % (Moonlighter)
  TIP_JUSTE: 0.18,          // pourboire de base sur un deal JUSTE (× combo)
  TIP_LU: 0.22,             // pourboire "bien lu" (demande ambiguë)
  COMBO_STEP: 0.5,          // ⚡ +0.5 par JUSTE
  COMBO_MAX: 3,
  STOCK: { 2: 6, 5: 5, 8: 4 },  // sachets dispo par soirée (69 g)
  DM_BASE: 5,               // nb de DM à J1 (hors louche)
  DM_PER_REP: 30,           // +1 DM par palier de réput
  DM_MAX: 9,
  PATIENCE: { regulier: 26, lowball: 30, accro: 15, grossiste: 40, hesitant: 32, louche: 30 },
  WAIT_FREEZE_S: 8,         // "Je te dis" : gel de la patience…
  WAIT_MELT: 1.6,           // …puis fonte accélérée
  TOL: {                    // tolérance €/g en multiple du fair (avant relation)
    regulier: 1.12, lowball: 0.82, accro: 1.25, grossiste: 0.78, hesitant: 1.05, louche: 99,
  },
  TOL_PER_REL: 1 / 600,     // + relation/600 sur la tolérance
  BUDGET: { regulier: 70, lowball: 110, accro: 50, grossiste: 260, hesitant: 60, louche: 999 },
  BUDGET_PER_REL: 1 / 100,  // budget × (1 + relation/100)
  OFFER: {                  // offre spontanée du client, en multiple du fair
    regulier: [0.92, 1.0], lowball: [0.55, 0.62], accro: [1.0, 1.05], grossiste: [0.68, 0.74],
  },
  REL_DEAL: 2, REL_JUSTE: 2, REL_PERSO: 3, REL_GOUGE: -2, REL_WALK: -2,
  UNLOCK_REL: 40,           // relation pour "présenter un pote"
  GOUGE_STREAK_QUIT: 2,     // 2 moues d'affilée (même client) → il part (Moonlighter)
  HEAT_LOUCHE: 20, HEAT_DECAY: 8, HEAT_WARN: 50,
  FLAIR_BONUS: 25,          // cash bonus / louche flairé (refusé)
  LOUCHE_FROM_DAY: 2, LOUCHE_EVERY: 2,
  REP_DEAL: 1, REP_JUSTE: 1, REP_GOUGE: -2, REP_WALK: -1,
};

const FORMATS = [2, 5, 8];

/* ------------------------------ CLIENTS --------------------------------- */
const PERSONAS = [
  { id: "momo",   nm: "Momo",   av: "🧢", kind: "regulier",  usual: 5,  exig: 55, start: true },
  { id: "ines",   nm: "Inès",   av: "🎧", kind: "regulier",  usual: 2,  exig: 70, start: true },
  { id: "riton",  nm: "Riton",  av: "🥀", kind: "accro",     usual: 2,  exig: 20, start: true },
  { id: "yaz",    nm: "Yaz",    av: "🛵", kind: "lowball",   usual: 8,  exig: 40, start: true },
  { id: "sofia",  nm: "Sofia",  av: "💅", kind: "hesitant",  usual: 5,  exig: 65, start: true },
  { id: "diego",  nm: "Diego",  av: "🏗️", kind: "grossiste", usual: 16, exig: 45, unlockedBy: "momo" },
  { id: "lina",   nm: "Lina",   av: "🌙", kind: "regulier",  usual: 5,  exig: 80, unlockedBy: "ines" },
  { id: "nassim", nm: "Nassim", av: "🎲", kind: "accro",     usual: 8,  exig: 25, unlockedBy: "riton" },
];
const KIND_TAG = { regulier: "CLIENT", lowball: "RADIN", accro: "ACCRO", grossiste: "GROS", hesitant: "HESIT", louche: "INCONNU" };

const TXT = {
  regulier: [
    "J'ai vu ta story. {q} g, je te mets {t} ?",
    "Propre et rapide comme d'hab. {q} g pour {t}.",
    "Tu m'avances {q} g ? J'ai {t} sur moi.",
  ],
  lowball: [
    "{q} g à {t}, à prendre ou à laisser.",
    "Tout le monde brade. {q} g, {t}, dernier mot.",
  ],
  accro: [
    "Là maintenant. {q} g. J'ai {t}. Réponds.",
    "Je tiens plus, {q} g direct, {t} cash.",
  ],
  grossiste: [
    "On parle volume : {q} g d'un coup, {t}. Je reviens chaque semaine si t'es carré.",
    "{q} g, {t}, et je vide ton bac tous les soirs.",
  ],
  ambig: [
    { tx: "Faut que je tienne le week-end là…", g: 10 },
    { tx: "Un petit truc léger pour ce soir 🙏", g: 2 },
    { tx: "Comme d'hab.", g: "usual" },
    { tx: "On est deux ce soir 👀", g: 4 },
    { tx: "Grosse soirée, toute la bande débarque.", g: 16 },
  ],
  hesit: "Je sais pas trop ce qu'il me faut… 🫤",
  louche: [
    { nm: "Numéro inconnu", av: "🕶️", g: 20, tx: "Bonjour. Auriez-vous de la marchandise disponible ? Je souhaiterais 20 grammes, le prix importe peu." },
    { nm: "Kevin B.",       av: "🧔", g: 16, tx: "slt, on se connaît pas. tu te poses où exactement ? je prends 16 g direct, peu importe le prix" },
    { nm: "Profil sans tof", av: "👤", g: 12, tx: "Bonsoir, votre contact m'a été transmis. Il me faudrait 12 grammes. Quel que soit votre tarif, je paierai." },
  ],
  reactOk: ["Carré.", "T'es fiable toi.", "Nickel, je reviens."],
  reactRavi: ["Frérot le prix 😍 t'es sûr ?", "À ce prix je ramène tout le tieks !"],
  reactMoue: ["Abusé… mais bon, vas-y.", "Tu t'es cru où ? Allez, donne."],
  reactWalk: ["C'est mort. Je passe ailleurs.", "Tu me reverras pas."],
  reactLu: ["C'est EXACTEMENT ça. Tiens.", "Tu lis dans les pensées toi."],
  reactMouais: ["Mouais, ça fera l'affaire.", "Bon, ok, si tu le dis."],
};

/* --------------------------- ÉTAT + SAVE -------------------------------- */
let S = null;
function defaults() {
  const clients = {};
  for (const p of PERSONAS) clients[p.id] = { rel: 10, unlocked: !!p.start, missed: 0, gougeStreak: 0, quit: false };
  return { day: 1, cash: 0, reput: 20, heat: 0, flair: 0, clients };
}
function save() { try { localStorage.setItem(LS + "ver", String(SAVE_VERSION)); localStorage.setItem(LS + "save", JSON.stringify(S)); } catch (e) {} }
function load() {
  try {
    if (Number(localStorage.getItem(LS + "ver")) !== SAVE_VERSION) return defaults();
    const s = JSON.parse(localStorage.getItem(LS + "save"));
    return s && s.clients ? s : defaults();
  } catch (e) { return defaults(); }
}
S = load();

/* hash déterministe (R4 : pas de Math.random sur l'état) */
function hh(a, b) {
  let x = (a * 73856093) ^ (b * 19349663);
  x = ((x ^ (x >> 13)) * 1274126177) | 0;
  return (((x ^ (x >> 16)) >>> 0) % 100000) / 100000;
}
const pick = (arr, i) => arr[((i % arr.length) + arr.length) % arr.length];
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const R = Math.round;

function fairPpu() { return Math.max(4, R(CFG.PRIX_FAIR * (0.6 + S.reput / 120))); }
function tolPpu(kind, rel) { return fairPpu() * (CFG.TOL[kind] + rel * CFG.TOL_PER_REL); }
function budget(kind, rel) { return CFG.BUDGET[kind] * (1 + rel * CFG.BUDGET_PER_REL); }

/* stock : composition exacte en sachets (DP, comme qtyToSachets La Loupe) */
function compose(g, stock) {
  const memo = {};
  function go(rest, st) {
    if (rest === 0) return [];
    const key = rest + "|" + FORMATS.map(f => st[f]).join(",");
    if (key in memo) return memo[key];
    for (const f of [...FORMATS].sort((a, b) => b - a)) {
      if (f <= rest && st[f] > 0) {
        const st2 = { ...st }; st2[f]--;
        const sub = go(rest - f, st2);
        if (sub) return (memo[key] = [f, ...sub]);
      }
    }
    return (memo[key] = null);
  }
  return go(g, { ...stock });
}

/* ----------------------------- AUDIO ------------------------------------ */
let AC = null;
function ac() { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return AC; }
function tone(f, t0, dur, type = "sine", vol = 0.16) {
  const c = ac(); if (!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type; o.frequency.value = f;
  g.gain.setValueAtTime(vol, c.currentTime + t0);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + t0 + dur);
  o.connect(g); g.connect(c.destination);
  o.start(c.currentTime + t0); o.stop(c.currentTime + t0 + dur + 0.02);
}
const sfx = {
  dm() { tone(880, 0, .07, "square", .10); tone(1320, .09, .09, "square", .08); },
  ching() { tone(1240, 0, .16); tone(1860, .05, .22); },
  juste() { tone(880, 0, .1); tone(1100, .08, .1); tone(1470, .16, .2); tone(2200, .26, .25, "sine", .1); },
  moue() { tone(220, 0, .18, "sawtooth", .07); },
  walk() { tone(330, 0, .12, "sawtooth", .08); tone(196, .12, .25, "sawtooth", .08); },
  rush() { for (let i = 0; i < 6; i++) tone(300 + i * 120, i * .05, .08, "triangle", .07); },
};
function buzz(ms) { try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {} }

/* ------------------------------ DOM ------------------------------------- */
const $ = (id) => document.getElementById(id);
const feed = $("feed"), sheet = $("sheet");
function toast(msg, ms = 2200) {
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("show"), ms);
}
function fly(x, y, txt, tip) {
  const el = document.createElement("div");
  el.className = "fly" + (tip ? " tip" : ""); el.textContent = txt;
  el.style.left = x + "px"; el.style.top = y + "px";
  document.body.appendChild(el); setTimeout(() => el.remove(), 1000);
}
function hud() {
  $("cCash").textContent = S.cash;
  $("cRep").textContent = R(S.reput);
  $("cHeat").textContent = R(S.heat);
  const cc = $("comboChip");

  if (G) $("cCombo").textContent = G.combo.toFixed(1).replace(".0", "");
  $("cStock").textContent = "🎒 " + (G ? FORMATS.reduce((s, f) => s + f * G.stock[f], 0) : 0) + " g";
}

/* --------------------------- SOIRÉE (run) -------------------------------- */
let G = null;          // état de la soirée en cours
let rafId = 0, lastT = 0;

function buildSchedule() {
  const day = S.day;
  const avail = PERSONAS.filter(p => S.clients[p.id].unlocked && !S.clients[p.id].quit);
  const n = clamp(CFG.DM_BASE + Math.floor(S.reput / CFG.DM_PER_REP) + Math.floor((day - 1) / 2), 3, CFG.DM_MAX);
  const evs = [];
  let amb = 0;
  for (let i = 0; i < n; i++) {
    const p = pick(avail, day * 3 + i);
    const frac = 0.04 + (i / n) * 0.72 + hh(day, i) * 0.08;   // étalés calme→rush
    let mode = "explicit";
    if (p.kind === "hesitant") mode = "hesit";
    else if (p.kind === "regulier" && amb < 2 && hh(day * 7, i) > 0.5) { mode = "ambig"; amb++; }
    evs.push({ t: frac * CFG.SOIREE_S, pid: p.id, mode });
  }
  if (day >= CFG.LOUCHE_FROM_DAY && (day - CFG.LOUCHE_FROM_DAY) % CFG.LOUCHE_EVERY === 0) {
    evs.push({ t: (0.35 + hh(day, 99) * 0.3) * CFG.SOIREE_S, pid: null, mode: "louche" });
  }
  evs.sort((a, b) => a.t - b.t);
  return evs;
}

function startSoiree() {
  ac();
  G = {
    t: 0, over: false, seq: 1, combo: 1,
    stock: { ...CFG.STOCK },
    sched: buildSchedule(), si: 0,
    dms: [],                       // DMs vivants (DOM + état)
    tally: { deals: 0, juste: 0, cash0: S.cash, tips: 0, missed: 0, walks: 0, gouges: 0, bestCombo: 1, flair: 0, louche: 0, lu: 0, notes: [] },
  };
  feed.querySelectorAll(".dm").forEach(e => e.remove());
  $("home").classList.remove("show"); $("report").classList.remove("show");
  $("empty").style.display = "block";
  hud();
  lastT = performance.now();
  rafId = requestAnimationFrame(tick);
}

function phaseAt(frac) {
  for (const ph of CFG.PHASES) if (frac >= ph.t0 && frac < ph.t1) return ph;
  return CFG.PHASES[CFG.PHASES.length - 1];
}

let curPhase = "";
function tick(now) {
  const dt = Math.min(0.1, (now - lastT) / 1000); lastT = now;   // temps réel (leçon La Loupe)
  if (!G || G.over) return;
  G.t += dt;
  const frac = G.t / CFG.SOIREE_S;

  // phase + UI temps
  const ph = phaseAt(frac);
  if (ph.nm !== curPhase) {
    curPhase = ph.nm;
    $("phaseLbl").textContent = ph.nm;
    $("phaseLbl").classList.toggle("rush", ph.nm === "RUSH");
    $("tfill").classList.toggle("rush", ph.nm === "RUSH");
    $("rushFlash").classList.toggle("on", ph.nm === "RUSH");
    if (ph.nm === "RUSH") { toast("🔥 Rush — ça texte de partout"); sfx.rush(); buzz(60); }
  }
  $("tfill").style.width = clamp(frac * 100, 0, 100) + "%";

  // spawn
  while (G.si < G.sched.length && G.sched[G.si].t <= G.t) spawnDM(G.sched[G.si++]);

  // patience
  for (const dm of G.dms) {
    if (dm.state !== "pending") continue;
    if (dm.frozen) continue;
    let melt = 1;
    if (dm.waited) {
      if (G.t < dm.waitUntil) melt = 0; else melt = CFG.WAIT_MELT;
    }
    dm.pat -= dt * melt;
    const el = dm.el.querySelector(".pat i");
    const r = clamp(dm.pat / dm.pat0, 0, 1);
    el.style.width = (r * 100) + "%";
    el.style.background = r > 0.5 ? "var(--ok)" : r > 0.22 ? "var(--warn)" : "var(--bad)";
    if (dm.pat <= 0) expireDM(dm);
  }

  if (frac >= 1) {
    const pend = G.dms.some(d => d.state === "pending");
    if (!pend) { endSoiree(); return; }
  }
  if (frac >= 1.25) { endSoiree(); return; }    // filet : on ne bloque jamais
  rafId = requestAnimationFrame(tick);
}

/* ------------------------------ DMs ------------------------------------- */
function spawnDM(ev) {
  $("empty").style.display = "none";
  const day = S.day, i = G.seq++;
  let dm;
  if (ev.mode === "louche") {
    const L = pick(TXT.louche, day + i);
    // il surpaie d'entrée (×1.3 fair) — la facilité elle-même est un indice
    dm = { kind: "louche", nm: L.nm, av: L.av, tx: L.tx, mode: "louche",
           qty: L.g, offer: R(L.g * fairPpu() * 1.3) };
  } else {
    const p = PERSONAS.find(x => x.id === ev.pid);
    const c = S.clients[p.id];
    dm = { kind: p.kind, pid: p.id, nm: p.nm, av: p.av, exig: p.exig, rel: c.rel, mode: ev.mode };
    if (ev.mode === "explicit") {
      dm.qty = p.kind === "grossiste" ? (16 + (hh(day, i) > 0.6 ? 8 : 0)) : p.usual;
      const off = CFG.OFFER[p.kind];
      const m = off[0] + (off.length > 1 ? hh(day * 5, i) * (off[1] - off[0]) : 0);
      dm.offer = Math.max(1, R(dm.qty * fairPpu() * m));
      dm.tx = pick(TXT[p.kind], day + i).replace("{q}", dm.qty).replace("{t}", dm.offer);
    } else if (ev.mode === "ambig") {
      const A = pick(TXT.ambig, day * 2 + i);
      dm.expect = A.g === "usual" ? p.usual : A.g;
      dm.tx = A.tx; dm.qty = 0; dm.offer = 0;
    } else { // hesit
      dm.tx = TXT.hesit; dm.usual = p.usual; dm.qty = 0; dm.offer = 0;
    }
  }
  dm.id = "dm" + i;
  dm.pat0 = dm.pat = CFG.PATIENCE[dm.kind];
  dm.state = "pending"; dm.countered = false; dm.waited = false; dm.frozen = false;

  const el = document.createElement("div");
  el.className = "dm"; el.id = dm.id;
  const tag = KIND_TAG[dm.kind];
  const exigHtml = dm.kind === "louche" ? "" :
    `<div class="exig">exigence <span class="bar"><i style="width:${dm.exig}%"></i></span></div>`;
  const relHtml = dm.kind === "louche" ? `<div class="rel">contact<br><b>inconnu</b></div>` :
    `<div class="rel">relation<br><b>${dm.rel}</b></div>`;
  let acts;
  if (dm.mode === "hesit") {
    acts = `<button class="b ct" data-a="perso">💬 Ton ${dm.usual} g habituel ?</button>
            <button class="b wt" data-a="generic">💬 Mate la story</button>
            <button class="b no" data-a="refuse">❌</button>`;
  } else if (dm.mode === "ambig") {
    acts = `<button class="b ok" data-a="compose">🤔 Tu lui mets quoi ?</button>
            <button class="b wt" data-a="wait">⏱️ Je te dis</button>
            <button class="b no" data-a="refuse">❌ Nan</button>`;
  } else {
    acts = `<button class="b ok" data-a="accept">✅ OK</button>
            <button class="b ct" data-a="counter">↔️ Contre</button>
            <button class="b wt" data-a="wait">⏱️ Je te dis</button>
            <button class="b no" data-a="refuse">❌ Nan</button>`;
  }
  el.innerHTML = `
    <div class="dmHead">
      <div class="av">${dm.av}</div>
      <div><span class="nm">${dm.nm}</span><span class="tag ${tag}">${tag}</span>${exigHtml}</div>
      ${relHtml}
    </div>
    <div class="bulle">${dm.tx}${dm.offer ? ` <span class="offer">[${dm.qty} g → ${dm.offer}]</span>` : ""}</div>
    <div class="pat"><i style="width:100%"></i></div>
    <div class="acts">${acts}</div>`;
  el.addEventListener("click", (e) => {
    const b = e.target.closest("button"); if (!b) return;
    onAction(dm, b.dataset.a);
  });
  dm.el = el;
  feed.prepend(el);
  el.classList.add("shake");
  G.dms.push(dm);
  sfx.dm(); buzz(30);
}

function removeDM(dm, cls) {
  dm.el.classList.add(cls || "");
  setTimeout(() => { dm.el.classList.add("out"); setTimeout(() => dm.el.remove(), 380); }, 1400);
}

function expireDM(dm) {
  dm.state = "expired";
  G.tally.missed++;
  if (dm.pid) S.clients[dm.pid].missed++;
  G.combo = 1; hud();
  dm.el.querySelector(".acts").innerHTML = `<div style="color:var(--tx2);font-size:12.5px;padding:4px">💨 Parti sans réponse.</div>`;
  removeDM(dm, "dead");
}

/* ------------------------- décisions joueur ------------------------------ */
function onAction(dm, a) {
  if (dm.state !== "pending") return;
  if (a === "accept") resolveOffer(dm, dm.qty, dm.offer, true, true);
  else if (a === "counter" || a === "compose") openSheet(dm);
  else if (a === "wait") {
    if (dm.waited) { toast("Il attend déjà…"); return; }
    dm.waited = true; dm.waitUntil = G.t + CFG.WAIT_FREEZE_S;
    dm.el.querySelector('[data-a="wait"]').disabled = true;
    dm.el.querySelector('[data-a="wait"]').style.opacity = .4;
    toast("⏱️ Mis en attente — il patiente un peu, puis s'agace");
  }
  else if (a === "refuse") refuseDM(dm);
  else if (a === "perso" || a === "generic") hesitDeal(dm, a === "perso");
}

function refuseDM(dm) {
  dm.state = "refused";
  if (dm.kind === "louche") {
    S.flair++; G.tally.flair++; S.cash += CFG.FLAIR_BONUS;
    G.tally.notes.push("🕵️ Tu as flairé un profil cramé — bonus discrétion +" + CFG.FLAIR_BONUS);
    react(dm, "🕶️", "Vu. Bloqué.", "+" + CFG.FLAIR_BONUS + " discrétion");
    sfx.ching();
  } else {
    react(dm, "😐", "Ok, une autre fois.", "aucune vente — pas de malus");
  }
  hud(); removeDM(dm, "done");
}

/* réaction visuelle du client (emoji à paliers, Moonlighter) */
function react(dm, emo, tx, sub) {
  const r = document.createElement("div");
  r.className = "react";
  r.innerHTML = `<div class="emo">${emo}</div><div class="rtx">${tx}</div>${sub ? `<div class="rsub">${sub}</div>` : ""}`;
  dm.el.appendChild(r);
}

function payDeal(dm, g, total, tip, emo, tx, sub) {
  dm.state = "done";
  const comp = compose(g, G.stock);
  if (comp) for (const f of comp) G.stock[f]--;
  S.cash += total + tip;
  G.tally.deals++; G.tally.tips += tip;
  const rc = dm.el.getBoundingClientRect();
  fly(rc.left + rc.width * 0.7, rc.top + 10, "+" + total, false);
  if (tip) setTimeout(() => fly(rc.left + rc.width * 0.55, rc.top + 4, "+" + tip + " 💝", true), 260);
  react(dm, emo, tx, sub);
  hud(); removeDM(dm, "done");
}

/* cœur du système : résolution d'une offre (g, total) — déterministe */
function resolveOffer(dm, g, total, firstTry, isClientOffer) {
  const fair = fairPpu();
  if (dm.kind !== "louche" && !compose(g, G.stock)) {
    toast("🎒 Pas le stock pour " + g + " g — contre-offre en dessous");
    if (!isClientOffer) return;           // depuis le sheet : on laisse composer
    openSheet(dm); return;
  }
  const day = S.day;
  const ppu = total / g;

  if (dm.kind === "louche") {             // il accepte TOUT — c'est un indice
    if (!compose(g, G.stock)) { toast("🎒 Pas le stock pour " + g + " g"); return; }
    dm.state = "done";
    const comp = compose(g, G.stock);
    for (const f of comp) G.stock[f]--;
    S.cash += total; S.heat += CFG.HEAT_LOUCHE;
    G.tally.deals++; G.tally.louche++;
    G.tally.notes.push("🚨 Vente à un profil cramé (+" + total + ") — chaleur +" + CFG.HEAT_LOUCHE);
    react(dm, "🕶️", "Aucun souci pour le prix.", "chaleur +" + CFG.HEAT_LOUCHE + " …trop facile, non ?");
    sfx.moue(); hud(); removeDM(dm, "done");
    return;
  }

  const c = S.clients[dm.pid];
  const tol = tolPpu(dm.kind, c.rel);
  const bud = budget(dm.kind, c.rel);
  const accepted = ppu <= tol && total <= bud;

  if (accepted) {
    const band = ppu >= fair * (1 - CFG.FAIR_BAND) && ppu <= fair * (1 + CFG.FAIR_BAND);
    if (ppu < fair * (1 - CFG.FAIR_BAND)) {
      // ravi : tu laisses de la marge (Moonlighter "cheap sell") — relation++
      c.rel = clamp(c.rel + CFG.REL_DEAL + 2, 0, 100); c.gougeStreak = 0;
      S.reput = clamp(S.reput + CFG.REP_DEAL, 0, 100);
      payDeal(dm, g, total, 0, "😍", pick(TXT.reactRavi, day + G.seq), "marge laissée — relation +");
      sfx.ching();
    } else if (band) {
      const juste = firstTry && !isClientOffer;
      let tip = 0;
      if (juste) {
        tip = R(total * CFG.TIP_JUSTE * G.combo);
        G.combo = Math.min(CFG.COMBO_MAX, G.combo + CFG.COMBO_STEP);
        G.tally.bestCombo = Math.max(G.tally.bestCombo, G.combo);
        G.tally.juste++;
        $("comboChip").classList.remove("pulse"); void $("comboChip").offsetWidth;
        $("comboChip").classList.add("pulse");
        S.reput = clamp(S.reput + CFG.REP_DEAL + CFG.REP_JUSTE, 0, 100);
        c.rel = clamp(c.rel + CFG.REL_DEAL + CFG.REL_JUSTE, 0, 100);
        sfx.juste(); buzz([30, 40, 30]);
      } else {
        S.reput = clamp(S.reput + CFG.REP_DEAL, 0, 100);
        c.rel = clamp(c.rel + CFG.REL_DEAL, 0, 100);
        sfx.ching();
      }
      c.gougeStreak = 0;
      payDeal(dm, g, total, tip, juste ? "🤝" : "😊", juste ? "PRIX JUSTE." : pick(TXT.reactOk, day + G.seq),
        juste ? "pourboire ⚡x" + (G.combo - CFG.COMBO_STEP).toFixed(1).replace(".0", "") : null);
    } else {
      // moue : il paie mais relation-- ; 2 d'affilée → il part (Moonlighter)
      c.rel = clamp(c.rel + CFG.REL_GOUGE, 0, 100);
      c.gougeStreak++;
      S.reput = clamp(S.reput + CFG.REP_GOUGE, 0, 100);
      G.tally.gouges++;
      let sub = "il paie, mais relation −";
      if (c.gougeStreak >= CFG.GOUGE_STREAK_QUIT) {
        c.quit = true;
        sub = "trop d'abus — il ne reviendra plus";
        G.tally.notes.push("💔 " + dm.nm + " ne reviendra plus (2 abus d'affilée)");
      }
      payDeal(dm, g, total, 0, "😒", pick(TXT.reactMoue, day + G.seq), sub);
      sfx.moue();
    }
    return;
  }

  // refusé
  if (!dm.countered && !isClientOffer) {
    // dernier prix du client, déterministe : 97 % de sa tolérance
    dm.countered = true;
    const t2 = Math.max(1, Math.min(R(g * tol * 0.97), Math.floor(bud)));
    dm.tx2 = t2; dm.qty2 = g;
    dm.el.querySelector(".bulle").innerHTML =
      `Trop cher pour moi. <span class="offer">Dernier prix : ${g} g → ${t2}.</span> À prendre ou à laisser.`;
    dm.el.querySelector(".acts").innerHTML =
      `<button class="b ok" data-a="accept2">✅ Vendu</button>
       <button class="b no" data-a="refuse2">❌ Laisse tomber</button>`;
    dm.el.querySelector(".acts").addEventListener("click", (e) => {
      const b = e.target.closest("button"); if (!b) return;
      if (b.dataset.a === "accept2") resolveOffer(dm, dm.qty2, dm.tx2, false, true);
      else refuseDM(dm);
    }, { once: true });
    closeSheet();
    toast("Il contre — dernier prix");
    sfx.moue();
    return;
  }
  // il part
  dm.state = "walked";
  const c2 = S.clients[dm.pid];
  c2.rel = clamp(c2.rel + CFG.REL_WALK, 0, 100);
  S.reput = clamp(S.reput + CFG.REP_WALK, 0, 100);
  G.tally.walks++; G.combo = 1;
  react(dm, "🤬", pick(TXT.reactWalk, S.day + G.seq), "vente perdue");
  sfx.walk(); hud(); removeDM(dm, "dead");
  closeSheet();
}

/* hésitant : toute attention convertit (Moonlighter "Indecisive") */
function hesitDeal(dm, perso) {
  const fair = fairPpu();
  const c = S.clients[dm.pid];
  const g = perso ? dm.usual : 2;
  if (!compose(g, G.stock)) { toast("🎒 Pas le stock…"); return; }
  const total = R(g * fair);
  if (perso) {
    const tip = R(total * CFG.TIP_LU);
    c.rel = clamp(c.rel + CFG.REL_PERSO, 0, 100);
    payDeal(dm, g, total, tip, "🥰", "Tu me connais par cœur.", "attention personnelle — relation +");
    sfx.juste();
  } else {
    payDeal(dm, g, total, 0, "🙂", "Bon… vas-y pour un petit.", null);
    sfx.ching();
  }
}

/* --------------------- sheet contre-offre / composer --------------------- */
let SH = null;   // { dm, sachets:[], total }
function openSheet(dm) {
  SH = { dm, sachets: [], total: 0 };
  dm.frozen = true;
  const amb = dm.mode === "ambig";
  $("shTitle").textContent = amb ? "Tu lui mets quoi ?" : "Contre-offre → " + dm.nm;
  $("shSub").textContent = amb
    ? "« " + dm.tx + " » — compose, le prix suit le fair."
    : "Il propose " + dm.qty + " g → " + dm.offer + ". Monte le prix, la quantité, ou les deux.";
  $("priceRow").style.display = amb ? "none" : "";
  renderChips(); renderCompo();
  if (!amb && dm.qty) {         // pré-remplit la demande du client
    const comp = compose(dm.qty, G.stock);
    if (comp) { SH.sachets = comp.slice(); }
    SH.total = dm.offer;
  }
  renderCompo(); renderPrice();
  sheet.classList.add("show");
}
function closeSheet() {
  if (SH) SH.dm.frozen = false;
  SH = null; sheet.classList.remove("show");
}
function grams() { return SH ? SH.sachets.reduce((s, f) => s + f, 0) : 0; }
function renderChips() {
  const row = $("chipRow"); row.innerHTML = "";
  for (const f of FORMATS) {
    const used = SH.sachets.filter(x => x === f).length;
    const left = G.stock[f] - used;
    const b = document.createElement("button");
    b.className = "schip"; b.disabled = left <= 0;
    b.innerHTML = `+${f} g<small>reste ${left}</small>`;
    b.onclick = () => { SH.sachets.push(f); autoPrice(); renderChips(); renderCompo(); renderPrice(); };
    row.appendChild(b);
  }
}
function renderCompo() {
  const g = grams();
  const el = $("compo");
  if (!SH.sachets.length) { el.innerHTML = "Ajoute des sachets…"; return; }
  el.innerHTML = SH.sachets.map((f, i) => `<span class="sac" data-i="${i}">${f} g ✕</span>`).join("") +
    ` <b style="color:var(--tx)">= ${g} g</b>`;
  el.querySelectorAll(".sac").forEach(s => s.onclick = () => {
    SH.sachets.splice(Number(s.dataset.i), 1); autoPrice(); renderChips(); renderCompo(); renderPrice();
  });
}
function autoPrice() { if (SH && SH.dm.mode !== "ambig") SH.total = R(grams() * fairPpu()); }
function renderPrice() {
  if (!SH) return;
  const g = grams(), fair = fairPpu();
  $("price").textContent = SH.dm.mode === "ambig" ? R(g * fair) : SH.total;
  $("fairHint").innerHTML = g
    ? `Prix fair ≈ <b>${R(g * fair)}</b> (${fair}/g) — tap pour caler, la zone juste paie un pourboire`
    : `Prix fair : <b>${fair}/g</b>`;
}
$("fairHint").onclick = () => {           // QoL : caler le total sur le fair
  if (!SH || SH.dm.mode === "ambig") return;
  const g = grams(); if (!g) return;
  SH.total = R(g * fairPpu()); renderPrice();
};
document.querySelectorAll(".pb").forEach(b => b.onclick = () => {
  if (!SH || SH.dm.mode === "ambig") return;
  SH.total = Math.max(1, SH.total + Number(b.dataset.d));
  renderPrice();
});
$("shCancel").onclick = closeSheet;
$("shSend").onclick = () => {
  if (!SH) return;
  const dm = SH.dm, g = grams();
  if (!g) { toast("Mets au moins un sachet"); return; }
  if (dm.mode === "ambig") {
    const fair = fairPpu(), total = R(g * fair);
    const lu = g === dm.expect;
    const c = S.clients[dm.pid];
    dm.state = "done";
    closeSheet();
    if (lu) {
      const tip = R(total * CFG.TIP_LU * G.combo);
      G.combo = Math.min(CFG.COMBO_MAX, G.combo + CFG.COMBO_STEP);
      G.tally.bestCombo = Math.max(G.tally.bestCombo, G.combo);
      G.tally.lu++; c.rel = clamp(c.rel + CFG.REL_JUSTE + 1, 0, 100);
      S.reput = clamp(S.reput + CFG.REP_DEAL + CFG.REP_JUSTE, 0, 100);
      dm.state = "pending"; payDeal(dm, g, total, tip, "🎯", pick(TXT.reactLu, S.day + G.seq), "bien lu — pourboire");
      sfx.juste(); buzz([30, 40, 30]);
    } else {
      c.rel = clamp(c.rel + 1, 0, 100);
      S.reput = clamp(S.reput + CFG.REP_DEAL, 0, 100);
      dm.state = "pending"; payDeal(dm, g, total, 0, "😶", pick(TXT.reactMouais, S.day + G.seq),
        "il voulait autre chose — vendu quand même");
      sfx.ching();
    }
    return;
  }
  const total = SH.total;
  closeSheet();
  resolveOffer(dm, g, total, !dm.countered, false);
};

/* ------------------------------ rapport ---------------------------------- */
function endSoiree() {
  cancelAnimationFrame(rafId);
  if (!G || G.over) return;
  G.over = true;
  for (const dm of G.dms) if (dm.state === "pending") expireDM(dm);

  // décrue chaleur + déblocages sociaux (client fidèle → présente un pote)
  S.heat = Math.max(0, S.heat - CFG.HEAT_DECAY);
  const unlocks = [];
  for (const p of PERSONAS) {
    if (p.unlockedBy && !S.clients[p.id].unlocked && S.clients[p.unlockedBy].rel >= CFG.UNLOCK_REL) {
      S.clients[p.id].unlocked = true;
      const par = PERSONAS.find(x => x.id === p.unlockedBy);
      unlocks.push("🤝 " + par.nm + " t'a présenté " + p.nm + " (" + KIND_TAG[p.kind] + ")");
    }
  }
  const T = G.tally;
  const gained = S.cash - T.cash0;
  const rep = $("report");
  rep.innerHTML = `
    <div class="ovTitle">Fin de soirée ${S.day}</div>
    <div class="ovSub">Le corner ferme. Bilan.</div>
    <div class="panel">
      <div class="repLine"><span>Cash de la soirée</span><b class="pos">+${gained}</b></div>
      <div class="repLine"><span>dont pourboires</span><b class="gold">+${T.tips}</b></div>
      <div class="repLine"><span>Ventes conclues</span><b>${T.deals}</b></div>
      <div class="repLine"><span>Prix JUSTE</span><b class="gold">${T.juste}</b></div>
      <div class="repLine"><span>Demandes bien lues</span><b class="gold">${T.lu}</b></div>
      <div class="repLine"><span>Meilleur combo</span><b>⚡ x${T.bestCombo.toFixed(1).replace(".0", "")}</b></div>
      <div class="repLine"><span>Partis sans réponse</span><b class="${T.missed ? "neg" : ""}">${T.missed}</b></div>
      <div class="repLine"><span>Clients fâchés</span><b class="${T.walks ? "neg" : ""}">${T.walks}</b></div>
      <div class="repLine"><span>Réputation</span><b>⭐ ${R(S.reput)}</b></div>
      <div class="repLine"><span>Chaleur</span><b class="${S.heat >= CFG.HEAT_WARN ? "neg" : ""}">🔥 ${R(S.heat)}</b></div>
    </div>
    ${(T.notes.length || unlocks.length) ? `<div class="panel">
      ${unlocks.map(u => `<div class="noteLine" style="color:var(--ok)">${u}</div>`).join("")}
      ${T.notes.map(n => `<div class="noteLine${n.startsWith("🚨") || n.startsWith("💔") ? " warn" : ""}">${n}</div>`).join("")}
      ${S.heat >= CFG.HEAT_WARN ? `<div class="noteLine warn">🚔 Ça parle de toi au commissariat — lève le pied sur les inconnus.</div>` : ""}
    </div>` : ""}
    <button class="cta" id="nextDay">Soirée suivante ▸</button>
    <button class="ghost" id="toHome">Retour au corner</button>`;
  rep.classList.add("show");
  $("nextDay").onclick = () => { S.day++; save(); startSoiree(); };
  $("toHome").onclick = () => { S.day++; save(); renderHome(); };
  save();
}

/* ------------------------------- home ------------------------------------ */
function ringSvg(rel) {
  const rr = 24, c2 = 2 * Math.PI * rr, off = c2 * (1 - rel / 100);
  return `<svg width="54" height="54"><circle cx="27" cy="27" r="${rr}" fill="none" stroke="#232a3a" stroke-width="3"/>
    <circle cx="27" cy="27" r="${rr}" fill="none" stroke="var(--ac)" stroke-width="3"
      stroke-dasharray="${c2}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg>`;
}
function renderHome() {
  const home = $("home");
  $("report").classList.remove("show");
  const g = FORMATS.reduce((s, f) => s + f * CFG.STOCK[f], 0);
  home.innerHTML = `
    <div class="ovTitle">LE CORNER</div>
    <div class="ovSub">Soirée ${S.day} · banc d'essai vente au DM (pré-intégration La Loupe)</div>
    <div class="panel">
      <h3>CE SOIR DANS LE BAC</h3>
      <div class="stockRow">
        ${FORMATS.map(f => `<div class="sc"><b>${CFG.STOCK[f]}×</b><small>sachets ${f} g</small></div>`).join("")}
        <div class="sc"><b>${g} g</b><small>total</small></div>
      </div>
    </div>
    <div class="panel">
      <h3>CONTACTS — relation = budget & fréquence · fidèle → te présente un pote</h3>
      <div id="ctGrid">
        ${PERSONAS.map(p => {
          const c = S.clients[p.id];
          const lock = !c.unlocked || c.quit;
          return `<div class="ct${lock ? " lock" : ""}">
            <div class="cav">${ringSvg(lock ? 0 : c.rel)}${p.av}</div>
            <div class="cnm">${c.quit ? "💔 " : ""}${p.nm}</div>
            <div class="ck">${KIND_TAG[p.kind]} · ${p.usual} g${c.unlocked && !c.quit ? " · rel " + c.rel : ""}</div>
          </div>`;
        }).join("")}
      </div>
    </div>
    <div class="panel">
      <h3>RAPPEL</h3>
      <div class="noteLine">🤝 Prix dans la zone <b style="color:var(--gold)">fair ±10 %</b> du premier coup → pourboire + combo ⚡</div>
      <div class="noteLine">😒 Deux abus d'affilée sur le même client → il ne revient plus</div>
      <div class="noteLine">🕶️ Les profils cramés se flairent : trop poli, trop gros, trop curieux… refuse-les</div>
    </div>
    <button class="cta" id="go">Lancer la soirée ▸</button>
    <button class="ghost" id="reset">↺ Reset du proto (efface la save)</button>`;
  home.classList.add("show");
  $("go").onclick = startSoiree;
  $("reset").onclick = () => {
    if (!confirm("Effacer la sauvegarde du proto ?")) return;
    S = defaults(); save(); renderHome();
  };
  hud();
}

window.addEventListener("beforeunload", save);
/* hooks debug / captures headless */
window.__corner = {
  start: startSoiree, end: endSoiree,
  state: () => ({ S, G }),
  warp: (t) => { if (G) G.t = t; },
};
renderHome();
</script>
</body>
</html>
