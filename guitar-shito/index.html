<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>GuitarShito</title>
<style>
  /* --- Plein ecran, pense mobile (pas de scroll, pas de zoom) --- */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; touch-action:none;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 120% at 50% 0%, #241a3a 0%, #160d22 58%, #0a0712 100%); }
  #app { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  /* --- HUD (overlay HTML par dessus la scene 3D) --- */
  .hud { position:fixed; pointer-events:none; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  #cash { top:max(12px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-weight:800; font-size:19px; color:#9be37d; }
  #heatwrap { top:max(12px,env(safe-area-inset-top)); left:14px; display:flex; flex-direction:column; gap:3px; }
  #heatlbl { font-size:11px; font-weight:800; color:#ffb4a0; letter-spacing:.3px; }
  #heatbar { width:104px; height:7px; background:rgba(255,255,255,.14); border-radius:999px; overflow:hidden; }
  #heatfill { height:100%; width:0%; background:linear-gradient(90deg,#7ad17a,#ffd166 55%,#ff5e5e); transition:width .3s; }
  #xpwrap { top:max(12px,env(safe-area-inset-top)); right:62px; display:flex; align-items:center; gap:6px; }
  #level { background:rgba(155,227,125,.18); border:1px solid rgba(155,227,125,.55); color:#bdf0a3;
    font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  #xpbar { width:54px; height:7px; background:rgba(255,255,255,.14); border-radius:999px; overflow:hidden; }
  #xpfill { height:100%; width:0%; background:linear-gradient(90deg,#7ad17a,#bdf0a3); border-radius:999px; transition:width .25s; }

  /* --- Stepper : les 3 stations du core loop --- */
  #stepper { top:calc(max(12px,env(safe-area-inset-top)) + 46px); left:50%; transform:translateX(-50%);
    display:flex; gap:5px; pointer-events:auto; }
  .step { font-size:10px; font-weight:800; letter-spacing:.2px; padding:3px 8px; border-radius:999px;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); color:rgba(255,255,255,.5); white-space:nowrap; }
  .step.on { background:rgba(180,150,255,.24); border-color:rgba(180,150,255,.6); color:#e4d6ff; }
  .step.done { color:rgba(155,227,125,.8); }

  #hint { position:fixed; left:0; right:0; bottom:max(150px,calc(env(safe-area-inset-bottom) + 144px));
    text-align:center; font-size:13px; color:rgba(255,255,255,.72); padding:0 24px; transition:opacity .4s;
    pointer-events:none; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  #toast { position:fixed; left:0; right:0; top:40%; text-align:center; font-size:24px; font-weight:800; opacity:0;
    transition:opacity .25s, transform .25s; transform:translateY(8px); pointer-events:none;
    color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.6); padding:0 20px; }
  #toast.show { opacity:1; transform:translateY(0); }

  /* --- Rythme : combo geant + jugement (PARFAIT / BIEN / RATE) --- */
  #combo { position:fixed; left:0; right:0; top:30%; text-align:center; pointer-events:none;
    font-weight:900; font-size:46px; color:#ffd166; text-shadow:0 3px 16px rgba(0,0,0,.7);
    opacity:0; transition:opacity .2s; letter-spacing:1px; }
  #combo.show { opacity:1; }
  #judge { position:fixed; left:0; right:0; top:44%; text-align:center; pointer-events:none;
    font-weight:900; font-size:26px; opacity:0; transform:translateY(6px); transition:opacity .12s, transform .12s; }
  #judge.show { opacity:1; transform:translateY(0); }

  #labels { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
  .blabel { position:absolute; transform:translate(-50%,-50%); white-space:nowrap;
    font-weight:800; font-size:12px; padding:2px 7px; border-radius:8px;
    background:rgba(0,0,0,.5); text-shadow:0 1px 3px rgba(0,0,0,.6); }

  /* --- Barre d'action basse commune aux phases --- */
  .panel { position:fixed; left:0; right:0; bottom:0; display:none; flex-direction:column; align-items:center;
    gap:9px; padding:12px 14px max(14px,calc(env(safe-area-inset-bottom) + 10px)); pointer-events:none; }
  .panel.show { display:flex; }
  .card { pointer-events:none; background:rgba(14,9,26,.66); border:1px solid rgba(255,255,255,.12);
    border-radius:14px; padding:9px 14px; color:#fff; font-size:13px; font-weight:600; text-align:center;
    backdrop-filter:blur(6px); max-width:430px; line-height:1.45; }
  .card b { color:#cdb6ff; }
  .card .g { color:#bdf0a3; }
  .card .q { color:#ffd166; }
  .btn { pointer-events:auto; border:none; border-radius:13px; font-weight:800; font-size:15px;
    padding:11px 18px; color:#1a1030; background:#b496ff; box-shadow:0 4px 14px rgba(180,150,255,.35); }
  .btn:active { transform:scale(.98); }
  .btn.alt { background:rgba(255,255,255,.14); color:#fff; border:1px solid rgba(255,255,255,.25); box-shadow:none; }
  .btn.go { background:#7ad17a; color:#10210f; box-shadow:0 4px 14px rgba(122,209,122,.35); }
  .btn.warn { background:#ff7a3c; color:#fff; box-shadow:0 4px 14px rgba(255,122,60,.35); }
  .btn:disabled { background:rgba(255,255,255,.1); color:rgba(255,255,255,.35); box-shadow:none; }
  .row { display:flex; gap:9px; align-items:center; justify-content:center; flex-wrap:wrap; pointer-events:none; }
  .row .btn, .row .toggle { pointer-events:auto; }
  .lbl { color:rgba(255,255,255,.55); font-size:12px; font-weight:700; pointer-events:none; }

  /* --- Sélecteurs (format de barrette) --- */
  .toggle { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    font-weight:700; font-size:13px; padding:8px 12px; border-radius:11px; }
  .toggle.on { background:#7aa0ff; border-color:#7aa0ff; color:#0c142a; }

  /* --- Emballage : statut de pliage + jauge de presse (scellage) --- */
  #sealstatus { pointer-events:none; font-weight:800; font-size:14px; padding:5px 12px; border-radius:999px;
    border:1px solid rgba(255,255,255,.2); background:rgba(255,138,60,.16); color:#ffc89a; }
  #meltgaugewrap { position:relative; width:70%; max-width:340px; height:16px; background:rgba(255,255,255,.15);
    border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.4); }
  #meltband { position:absolute; top:0; bottom:0; left:39%; width:32%; background:rgba(122,209,122,.45);
    border-left:1px solid rgba(122,209,122,.8); border-right:1px solid rgba(122,209,122,.8); }
  #meltgauge { position:relative; height:100%; width:0%; background:#ffd166; transition:width .04s, background .08s; }

  /* --- Conditionnement : grille de formats --- */
  #packgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; width:94%; max-width:430px; pointer-events:auto; }
  .fmt { pointer-events:auto; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16);
    border-radius:12px; padding:8px 4px; color:#fff; text-align:center; }
  .fmt.on { background:rgba(122,160,255,.26); border-color:#7aa0ff; }
  .fmt:disabled { opacity:.4; }
  .fmt .fn { font-weight:800; font-size:14px; }
  .fmt .fp { font-size:11px; color:#9be37d; margin-top:2px; }

  /* --- Boutique --- */
  #shopbtn { position:fixed; right:14px; top:max(10px,env(safe-area-inset-top)); pointer-events:auto;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff; font-size:18px;
    width:44px; height:40px; border-radius:12px; }
  #shopbtn:active { background:rgba(255,255,255,.25); }
  #shop { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.5); z-index:6; }
  #shop.show { display:flex; }
  #shopinner { width:88%; max-width:400px; max-height:76vh; overflow:auto; background:#1a1130;
    border:1px solid rgba(255,255,255,.15); border-radius:16px; padding:16px; color:#fff; }
  #shophead { font-weight:800; font-size:18px; margin-bottom:12px; display:flex; justify-content:space-between; }
  #shopcash { color:#9be37d; }
  .shopitem { display:flex; align-items:center; gap:10px; padding:10px; margin-bottom:10px;
    border:1px solid rgba(255,255,255,.12); border-radius:12px; background:rgba(255,255,255,.04); }
  .shopitem .ic { font-size:24px; }
  .shopitem .info { flex:1; }
  .shopitem .nm { font-weight:700; }
  .shopitem .ds { font-size:12px; color:rgba(255,255,255,.6); }
  .shopitem button { background:#5a3a8a; border:none; color:#fff; font-weight:700; padding:9px 12px; border-radius:10px; min-width:64px; }
  .shopitem button:disabled { background:rgba(255,255,255,.12); color:rgba(255,255,255,.4); }
  #shopclose { width:100%; background:rgba(255,255,255,.12); border:none; color:#fff; font-weight:700; padding:11px; border-radius:12px; }
</style>

<body>
<div id="app"></div>

<!-- HUD haut -->
<div class="hud" id="cash">💶 0 €</div>
<div class="hud" id="xpwrap"><span id="level">Niv. 1</span><div id="xpbar"><div id="xpfill"></div></div></div>
<div class="hud" id="stepper">
  <span class="step" data-step="cut">1·Découpe</span>
  <span class="step" data-step="wrap">2·Emballage</span>
</div>
<button id="shopbtn">🛒</button>

<div class="hud" id="hint"></div>
<div id="toast"></div>
<div id="combo"></div>
<div id="judge"></div>
<div id="labels"></div>

<!-- Phase 1 : Découpe Précise (rythme + swipe) -->
<div class="panel" id="cutui">
  <div class="card" id="cutcard"></div>
  <div class="row">
    <span class="lbl">Barrette</span>
    <button class="toggle" data-fmt="5">5 g</button>
    <button class="toggle on" data-fmt="10">10 g</button>
    <button class="btn go" id="cutNext">Emballer ▸</button>
  </div>
</div>

<!-- Phase 2 : Emballage Cellophane scellée au briquet -->
<div class="panel" id="wrapui">
  <div class="card" id="wrapcard"></div>
  <div id="sealstatus">🔥 Maintiens le briquet</div>
  <div id="meltgaugewrap" style="display:none"><div id="meltband"></div><div id="meltgauge"></div></div>
  <div id="packgrid"></div>
  <div class="row">
    <button class="btn warn" id="seal" style="display:none">🔥 Briquet (maintenir)</button>
    <button class="btn go" id="wrapNext">Découpe ▸</button>
  </div>
</div>

<!-- Boutique -->
<div id="shop">
  <div id="shopinner">
    <div id="shophead"><span>🛒 Boutique</span><span id="shopcash"></span></div>
    <div id="shopitems"></div>
    <button id="shopclose">Fermer</button>
  </div>
</div>

<script type="module">
"use strict";
import * as THREE from "three";

/* =========================================================================
   GUITARSHITO — core loop "Guitar Hero du hasch" (proto mobile 3D)
   -------------------------------------------------------------------------
   Deux stations chainees, dans l'esprit rythme/precision :
     1) DECOUPE PRECISE (rythme + swipe) : des lignes de coupe defilent sur
        un manche facon Guitar Hero. Swipe/tap PILE quand la ligne passe la
        barre -> barrette nette + COMBO. Raté -> miettes (perte de quantite).
        Les barrettes filent dans le bac STOCK.
     2) EMBALLAGE CELLOPHANE (scellage au briquet) : une barrette du STOCK est
        sous film, 2 bouts torsadés dépassent. On MAINTIENT le briquet sur
        chaque bout et on lâche DANS LE VERT (fondu juste ce qu'il faut) ->
        scellé propre ; trop tenu -> cramé (un peu moins cher). Vente par format.
   Formats : barrettes 5 g / 10 g (re-decoupables), + semi-gros 50/100 g.
   Economie : on achete une PLAQUE (gros), on coupe, on emballe, on vend. XP/niv.
   Persistance localStorage "gs_".
   Tout est commente en francais, brique par brique.
   ========================================================================= */

/* -------------------------------------------------------------------------
   0) ECONOMIE (constantes de jeu)
   ------------------------------------------------------------------------- */
// Plaque de hasch (matiere premiere, achat en gros). €/g baisse avec le volume.
const PLAQUE_PRICES = { 100: 470, 250: 1020 };      // € (~4.7 / ~4.1 €/g)

// Formats de barrette a la decoupe (g par coupe reussie).
const CUT_FORMATS = [5, 10];

// Conditionnement (phase 3) : petit = €/g plus eleve (retail), gros = semi-gros.
const PACK_FORMATS = [
  { id: "b5",   g: 5,   eur: 11,  name: "5 g",   emoji: "🍫" },
  { id: "b10",  g: 10,  eur: 9,   name: "10 g",  emoji: "🍫" },
  { id: "b50",  g: 50,  eur: 6.5, name: "50 g",  emoji: "📦" },
  { id: "b100", g: 100, eur: 5.5, name: "100 g", emoji: "📦" },
];

const SCHLAG_RATE = 2.5;   // revente bas de gamme (miettes) — reserve

/* -------------------------------------------------------------------------
   1) SCENE, CAMERA, RENDU
   ------------------------------------------------------------------------- */
const app = document.getElementById("app");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(52, 1, 0.1, 200);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setClearColor(0x000000, 0);                 // fond transparent -> degrade CSS visible
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

// Cadrage auto : la scene (manche + bacs) rentre toujours a l'ecran.
const VIEW_DIR    = new THREE.Vector3(0.0, 0.60, 0.80).normalize();  // 3/4 plongeant (le manche fuit vers le haut)
const VIEW_TARGET = new THREE.Vector3(0, 0.25, -0.2);
const VIEW_RADIUS = Math.hypot(2.6, 1.1, 3.0);
const baseCamPos  = new THREE.Vector3();
let zoom = +(localStorage.getItem("gs_zoom")) || 1;
zoom = Math.max(0.6, Math.min(2.2, zoom));

function fitView() {
  const vFov = camera.fov * Math.PI / 180;
  const hFov = 2 * Math.atan(Math.tan(vFov / 2) * camera.aspect);
  const fov = Math.min(vFov, hFov);
  const dist = (VIEW_RADIUS / Math.sin(fov / 2)) * 1.05 / zoom;
  baseCamPos.copy(VIEW_TARGET).addScaledVector(VIEW_DIR, dist);
  camera.position.copy(baseCamPos);
  camera.lookAt(VIEW_TARGET);
}
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  fitView();
}
window.addEventListener("resize", resize);

/* -------------------------------------------------------------------------
   2) LUMIERES
   ------------------------------------------------------------------------- */
scene.add(new THREE.HemisphereLight(0xf0e8ff, 0x39305a, 0.9));
const sun = new THREE.DirectionalLight(0xfff0dc, 1.55);
sun.position.set(4, 11, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.bias = -0.0004;
const sc = sun.shadow.camera;
sc.left = -7; sc.right = 7; sc.top = 7; sc.bottom = -7; sc.near = 1; sc.far = 28;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xb9a0ff, 0.4);
fill.position.set(-5, 3, 6);
scene.add(fill);

/* -------------------------------------------------------------------------
   3) TEXTURES PROCEDURALES (résine pressée) — aucun fichier externe
   Grain multi-échelle (marbrures douces + grain fin + impuretés) + un bump map
   partagé pour donner du relief à la résine (elle accroche la lumière).
   ------------------------------------------------------------------------- */
const _cl = (v) => Math.max(0, Math.min(255, v | 0));
function grainTex(r, g, b, contrast, spots) {
  const S = 256;
  const c = document.createElement("canvas"); c.width = c.height = S;
  const x = c.getContext("2d");
  x.fillStyle = "rgb(" + r + "," + g + "," + b + ")"; x.fillRect(0, 0, S, S);
  // Marbrures : taches douces plus claires/sombres (pressage irrégulier).
  for (let i = 0; i < 24; i++) {
    const rx = Math.random() * S, ry = Math.random() * S, rad = S * (0.06 + Math.random() * 0.16);
    const d = (Math.random() - 0.5) * contrast * 1.05;
    const rgb = _cl(r + d) + "," + _cl(g + d) + "," + _cl(b + d * 0.9);
    const grd = x.createRadialGradient(rx, ry, 0, rx, ry, rad);
    grd.addColorStop(0, "rgba(" + rgb + ",0.42)");
    grd.addColorStop(1, "rgba(" + rgb + ",0)");
    x.fillStyle = grd; x.fillRect(0, 0, S, S);
  }
  // Grain fin : bruit par pixel (résine sablée).
  const img = x.getImageData(0, 0, S, S), d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * contrast;
    d[i] = _cl(d[i] + n); d[i+1] = _cl(d[i+1] + n); d[i+2] = _cl(d[i+2] + n);
  }
  x.putImageData(img, 0, 0);
  // Impuretés : petits points sombres pressés.
  for (let k = 0; k < spots; k++) {
    x.fillStyle = "rgba(20,12,6," + (Math.random() * 0.22) + ")";
    x.beginPath(); x.arc(Math.random() * S, Math.random() * S, Math.random() * 1.6 + 0.5, 0, 6.283); x.fill();
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(1.6, 1.6);
  t.anisotropy = 4;
  return t;
}
// Bump map partagé : micro-relief de la résine pressée (gris 128 = niveau moyen).
const resinBump = (() => {
  const S = 256;
  const c = document.createElement("canvas"); c.width = c.height = S;
  const x = c.getContext("2d");
  x.fillStyle = "#808080"; x.fillRect(0, 0, S, S);
  for (let i = 0; i < 50; i++) {                       // bosses/creux pressés
    const rx = Math.random() * S, ry = Math.random() * S, rad = S * (0.03 + Math.random() * 0.1);
    const v = Math.random() < 0.5 ? 0 : 255, a = 0.1 + Math.random() * 0.22;
    const grd = x.createRadialGradient(rx, ry, 0, rx, ry, rad);
    grd.addColorStop(0, "rgba(" + v + "," + v + "," + v + "," + a + ")");
    grd.addColorStop(1, "rgba(" + v + "," + v + "," + v + ",0)");
    x.fillStyle = grd; x.fillRect(0, 0, S, S);
  }
  const img = x.getImageData(0, 0, S, S), d = img.data; // grain fin
  for (let i = 0; i < d.length; i += 4) { const n = (Math.random() - 0.5) * 60; d[i] = d[i+1] = d[i+2] = _cl(d[i] + n); }
  x.putImageData(img, 0, 0);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(1.6, 1.6);
  return t;
})();
// Résine pressée (look Hash Slicer) : peau brun très foncé lustrée + face coupée
// blonde mate (mie). Bump map -> micro-relief qui accroche la lumière.
const matCrust  = new THREE.MeshStandardMaterial({ map: grainTex(46, 31, 18, 36, 220),
  bumpMap: resinBump, bumpScale: 0.45, roughness: 0.46, metalness: 0.26 });
const matSponge = new THREE.MeshStandardMaterial({ map: grainTex(192, 164, 112, 34, 80),
  bumpMap: resinBump, bumpScale: 0.6, roughness: 0.95 });

// --- Barrette à coins arrondis (résine pressée) : rectangle arrondi extrudé +
// léger biseau. 2 groupes de matériaux -> [face coupée (blonde), flancs (croûte)]. ---
function roundedRect(w, h, r) {
  const s = new THREE.Shape(); const x = -w / 2, y = -h / 2;
  s.moveTo(x + r, y);
  s.lineTo(x + w - r, y); s.quadraticCurveTo(x + w, y, x + w, y + r);
  s.lineTo(x + w, y + h - r); s.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  s.lineTo(x + r, y + h); s.quadraticCurveTo(x, y + h, x, y + h - r);
  s.lineTo(x, y + r); s.quadraticCurveTo(x, y, x + r, y);
  return s;
}
function roundedBar(length, w, h, r, alongX) {
  const b = r * 0.7;
  const geo = new THREE.ExtrudeGeometry(roundedRect(w, h, r),
    { depth: Math.max(0.02, length - 2 * b), bevelEnabled: true, bevelThickness: b, bevelSize: b, bevelSegments: 2, steps: 1 });
  geo.translate(0, 0, -(length - 2 * b) / 2 - b);   // centre sur l'axe d'extrusion
  if (alongX) geo.rotateY(Math.PI / 2);             // longueur Z -> X (bouts = faces coupées)
  geo.computeVertexNormals();
  return geo;
}

/* -------------------------------------------------------------------------
   4) PLAN DE TRAVAIL (recoit ombres)
   ------------------------------------------------------------------------- */
const board = new THREE.Mesh(
  new THREE.BoxGeometry(8.2, 0.3, 7.4),
  new THREE.MeshStandardMaterial({ color: 0x5a5572, roughness: 0.6, metalness: 0.25 })
);
board.position.set(0, -0.15, -0.4);
board.receiveShadow = true;
scene.add(board);

/* -------------------------------------------------------------------------
   5) BAC STOCK (commun a toutes les phases) + pile + label flottant
   Les barrettes coupees y atterrissent ; l'emballage y puise.
   ------------------------------------------------------------------------- */
const STOCK_POS = new THREE.Vector3(2.45, 0, 1.7);
function makeBin(pos, col) {
  const grp = new THREE.Group(); grp.position.copy(pos);
  const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.7, metalness: 0.1, side: THREE.DoubleSide });
  const w = 1.5, d = 1.15, h = 0.4, th = 0.07;
  const floor = new THREE.Mesh(new THREE.BoxGeometry(w, th, d), mat); floor.position.y = th / 2; floor.receiveShadow = true; grp.add(floor);

   9) JUICE : audio synthetise (zero fichier), secousse, miettes
   ------------------------------------------------------------------------- */
let shake = 0;
function addShake(a) { shake = Math.min(0.6, shake + a); }

let actx = null;
function ensureAudio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === "suspended") actx.resume();
  return actx;
}
function beep(freq, t0, dur, vol, type) {
  const ac = ensureAudio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || "square"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t0); o.stop(t0 + dur);
}
function noiseBurst(dur, f0, f1, vol, type, q) {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime, len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate), ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.5);
  const src = ac.createBufferSource(); src.buffer = buf;
  const filt = ac.createBiquadFilter(); filt.type = type || "bandpass"; filt.Q.value = q || 0.8;
  filt.frequency.setValueAtTime(f0, t);
  filt.frequency.exponentialRampToValueAtTime(Math.max(60, f1), t + dur);
  const g = ac.createGain(); g.gain.value = vol;
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(t); src.stop(t + dur);
}
// "Note" de guitare : corde pincee (twang) dont la hauteur monte avec le combo.
function playNote(combo, good) {
  const ac = ensureAudio(); if (!ac) return; const t = ac.currentTime;
  const base = good ? 330 : 196;
  const semi = Math.min(combo, 16);
  const f = base * Math.pow(2, semi / 12);
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = "sawtooth"; o.frequency.setValueAtTime(f, t);
  o.frequency.exponentialRampToValueAtTime(f * 0.98, t + 0.18);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(good ? 0.22 : 0.14, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
  const lp = ac.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 2200;
  o.connect(lp); lp.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t + 0.22);
}
function playMiss()  { noiseBurst(0.14, 320, 90, 0.22, "lowpass", 0.7); }
function playSeal()  { noiseBurst(0.22, 600, 1700, 0.22, "lowpass", 0.6); }
function playSizzle(){ noiseBurst(0.05, 1600, 3200, 0.05, "highpass", 0.7); }    // grésillement du briquet
function playTss()   { noiseBurst(0.13, 3200, 500, 0.18, "bandpass", 0.8); }      // "tss" : bout qui se scelle

const crumbs = [];
const crumbGeo = new THREE.BoxGeometry(0.07, 0.07, 0.07);
const crumbMat = new THREE.MeshStandardMaterial({ color: 0x6e562f, roughness: 1 });
function burstCrumbs(x, y, z, n) {
  for (let i = 0; i < n; i++) {
    const m = new THREE.Mesh(crumbGeo, crumbMat);
    m.position.set(x + (Math.random() - 0.5) * 0.8, y, z + (Math.random() - 0.5) * 0.5);
    scene.add(m);
    crumbs.push({ mesh: m, vx: (Math.random() - 0.5) * 2.4, vy: 2.0 + Math.random() * 1.4,
      vz: 0.8 + Math.random() * 1.0, settled: false });
  }
  while (crumbs.length > 60) { const c = crumbs.shift(); scene.remove(c.mesh); }
}
function updateCrumbs(dt) {
  for (const c of crumbs) {
    if (c.settled) continue;
    c.vy -= 11 * dt;
    c.mesh.position.x += c.vx * dt; c.mesh.position.y += c.vy * dt; c.mesh.position.z += c.vz * dt;
    c.mesh.rotation.x += dt * 7; c.mesh.rotation.y += dt * 5;
    if (c.mesh.position.y <= 0.12) { c.mesh.position.y = 0.12; c.settled = true; }
  }
}

  scene.add(m);
  flyers.push({ mesh: m, grams, q, t: 0 });
  while (flyers.length > 30) { const f = flyers.shift(); scene.remove(f.mesh); }
}
const _ft = new THREE.Vector3();
function updateFlyers(dt) {
  for (let i = flyers.length - 1; i >= 0; i--) {
    const f = flyers[i];
    f.t += dt;
    _ft.set(STOCK_POS.x, 0.5, STOCK_POS.z);
    f.mesh.position.lerp(_ft, Math.min(1, dt * 6));
    f.mesh.rotation.x += dt * 10; f.mesh.rotation.y += dt * 7;
    f.mesh.scale.multiplyScalar(1 - Math.min(0.8, dt * 2.4));
    if (f.mesh.position.distanceTo(_ft) < 0.16 || f.t > 1.0) {
      addToStock(f.grams, f.q);
      scene.remove(f.mesh); flyers.splice(i, 1);

}

// Le joueur "strum" (tap/swipe) : on resout la note la plus proche de la barre.
function strum(swipeRight) {
  if (phase !== "cut") return;
  // Cherche la note non resolue la plus proche de la barre, dans la fenetre.
  let best = null, bd = 1e9;
  for (const n of notes) {
    if (n.hit) continue;
    const d = Math.abs(n.z - HIT_Z);
    if (d < bd) { bd = d; best = n; }
  }
  if (!best || bd > 0.7) return;                  // strum a vide : rien (pas de penalite)
  if (plaque.g < cutFmt) { showToast("Plaque finie — rachète (🛒)", "#ffd166"); return; }

  best.hit = true;
  const ac = ensureAudio();
  // Qualite de coupe selon le timing (et bonus combo : plus facile de rester net).
  let q, keep, txt, col;
  if (bd <= 0.16)      { q = 0.95; keep = 1.0;  txt = "PARFAIT ✦"; col = "#9be37d"; }
  else if (bd <= 0.34) { q = 0.74; keep = 0.9;  txt = "BIEN";      col = "#ffd166"; }
  else                 { q = 0.55; keep = 0.72; txt = "JUSTE";     col = "#ff9f6b"; }
  // Combo : chaque cran ajoute un petit bonus de conservation (moins de perte).
  rhythm.combo++;
  rhythm.best = Math.max(rhythm.best, rhythm.combo);
  keep = Math.min(1, keep + Math.min(rhythm.combo, 12) * 0.012);

  const totalG = Math.min(cutFmt, plaque.g);
  const keptG  = totalG * keep;
  const lostG  = totalG - keptG;
  plaque.g = Math.max(0, plaque.g - totalG); savePlaque(); refreshPlaque();

  flyBarrette(0, HIT_Z, keptG, q);
  if (lostG > 0.05) burstCrumbs(0, 0.4, HIT_Z + 0.2, Math.round(4 + lostG * 4));
  playNote(rhythm.combo, bd <= 0.34);
  judge(txt, col);
  showCombo();
  // Flash de la barre + secousse douce (plus marquee si parfait).
  hitBar.material.opacity = 1; hitBar.scale.set(1.18, 1, 1.5);
  addShake(bd <= 0.16 ? 0.16 : 0.08);
  refreshCutCard();
  if (plaque.g < cutFmt) setHint("Plaque épuisée. Passe à l'emballage ▸ ou rachète une plaque (🛒).");
}

function missNote(n) {
  n.hit = true; n.dead = true;
  rhythm.combo = 0; showCombo();
  judge("RATÉ", "#ff5e5e");
  burstCrumbs(0, 0.4, HIT_Z, 6);     // miettes (cosmetique) ; la plaque n'est entamee qu'aux coupes reussies
  playMiss();
  refreshCutCard();
}

function updateCut(dt) {
  if (phase !== "cut") return;
  // Pulse de la barre de strum (retour visuel au repos).
  hitBar.material.opacity += (0.85 - hitBar.material.opacity) * Math.min(1, dt * 8);
  hitBar.scale.x += (1 - hitBar.scale.x) * Math.min(1, dt * 10);
  hitBar.scale.z += (1 - hitBar.scale.z) * Math.min(1, dt * 10);

  // Spawn rythme : un par temps selon le pattern, si la plaque a de quoi.
  rhythm.spawnT += dt;
  if (rhythm.spawnT >= BEAT) {
    rhythm.spawnT -= BEAT;
    if (PATTERN[rhythm.beat % PATTERN.length]) spawnNote();
    rhythm.beat++;
  }
  // Metronome auto (upgrade) : strum parfait automatique a cadence reglee.
  if (owned.metro > 0 && plaque.g >= cutFmt) {
    rhythm.metroT += dt;
    const period = 1.1 * Math.pow(0.82, owned.metro - 1);
    if (rhythm.metroT >= period) {
      rhythm.metroT = 0;
      // amene une note pile sur la barre si aucune n'y est, sinon strum.
      let near = null, nd = 1e9;
      for (const n of notes) { if (n.hit) continue; const d = Math.abs(n.z - HIT_Z); if (d < nd) { nd = d; near = n; } }
      if (!near) near = spawnNote();
      if (near) { near.z = HIT_Z; near.mesh.position.z = HIT_Z; strum(true); }
    }
  }

  // Avance des notes + detection de rate (passe la barre sans frappe).
  for (let i = notes.length - 1; i >= 0; i--) {
    const n = notes[i];
    n.z += NOTE_SPEED * dt;
    n.mesh.position.z = n.z;
    if (!n.hit && n.z > HIT_Z + 0.34) missNote(n);
    if (n.z > LANE_END || n.dead || (n.hit && n.z > HIT_Z + 0.2)) {
      n.mesh.visible = false; notePool.push(n.mesh); notes.splice(i, 1);
    }
  }
}

function setFmt(f) {
  cutFmt = f; localStorage.setItem("gs_fmt", String(f));
  setFmtButtons(); refreshCutCard();
}

/* -------------------------------------------------------------------------
   14) PHASE 2 — EMBALLAGE CELLOPHANE SCELLÉE AU BRIQUET
   La barrette (puisée dans le STOCK) est sous film, 2 bouts torsadés dépassent.
   On MAINTIENT le briquet sur le bout courant (il rougit/fond, grésille) et on
   LÂCHE dans la zone verte = bout scellé propre ; trop tenu = cramé (un peu moins
   cher). 2 bouts -> pochon vendu au format.
   ------------------------------------------------------------------------- */
const ENDS = 2;
const wrapS = { i: 0, melt: 0, holding: false, sealed: false, seals: [], sizzleT: 0 };
// Taille du pochon selon le format : volume ∝ grammage -> dimension ∝ ∛g (réf 10 g = 1).
// L'épaisseur grossit un peu plus que la longueur (gros format = barre trapue, pas un long bâton).
function applyPackSize() {
  const f = PACK_FORMATS.find(x => x.id === packFmt) || { g: 10 };
  const s = Math.max(0.72, Math.min(1.95, Math.cbrt(f.g / 10)));
  packSlab.scale.set(1 + (s - 1) * 0.7, s * 1.08, s * 1.08);
}
function gotoWrap() {
  setPhase("wrap");
  wrapS.i = 0; wrapS.melt = 0; wrapS.holding = false; wrapS.sealed = false; wrapS.seals = []; wrapS.sizzleT = 0;
  packSlab.rotation.set(0, 0, 0); packSlab.position.y = 0.5; applyPackSize();
  briquetFlame.visible = false;
  for (const e of ends) {                              // bouts de cellophane "neufs"
    e.sealing = false; e.sealT = 0; e.mesh.visible = true; e.mesh.scale.set(1, 1, 1);
    e.mesh.material.emissiveIntensity = 0; e.mesh.material.color.setHex(0xdff3ff); e.mesh.material.opacity = 0.55;
  }
  ui.meltgauge.style.width = "0%";
  ui.meltgaugewrap.style.display = "block";
  ui.seal.style.display = "block";
  setPackButtons(); renderPackGrid();
  refreshWrapCard(); setSealStatus();
  ui.hint.style.opacity = "0";
}
function setSealStatus() {
  if (wrapS.sealed) { ui.sealstatus.textContent = "Pochon scellé ✓"; return; }
  ui.sealstatus.textContent = "🔥 Briquet sur le bout " + Math.min(wrapS.i + 1, ENDS) + "/" + ENDS +
    " — lâche dans le vert";
}
function refreshWrapCard() {
  const a = stockAvg();
  ui.wrapcard.innerHTML =
    "📦 Stock <b>" + Math.round(stock.g) + " g</b> · grade <b>" + gradeWord(a) + "</b><br>" +
    "Format <b>" + (PACK_FORMATS.find(f => f.id === packFmt) || {}).name + "</b>";
}
function setPackButtons() {
  document.querySelectorAll(".fmt").forEach(b => b.classList.toggle("on", b.dataset.fmt === packFmt));
}
function renderPackGrid() {
  ui.packgrid.innerHTML = "";
  for (const f of PACK_FORMATS) {
    const unit = Math.round(f.g * f.eur * qualMult(stockAvg()) * (1 + owned.guet * 0.06) * levelMult());
    const b = document.createElement("button");
    b.className = "fmt" + (f.id === packFmt ? " on" : "");
    b.dataset.fmt = f.id;
    b.disabled = stock.g < f.g;
    b.innerHTML = '<div class="fn">' + f.emoji + " " + f.name + '</div><div class="fp">~' + unit + " €</div>";
    b.addEventListener("click", () => { packFmt = f.id; localStorage.setItem("gs_packfmt", f.id); setPackButtons(); refreshWrapCard(); applyPackSize(); });
    ui.packgrid.appendChild(b);
  }
}
// Relâcher le briquet : verrouille le bout selon la fonte atteinte.
// < 0.2 = rien (on reprend) ; 0.2-0.55 = bâclé ; 0.55-1.0 = propre ; > 1.0 = cramé.
function lockEnd() {
  if (phase !== "wrap" || wrapS.sealed || wrapS.i >= ENDS) return;
  if (wrapS.melt < 0.2) { wrapS.melt = 0; return; }   // simple effleurement -> rien (on reprend)
  // 3 paliers : bâclé (pas assez chaud) / propre (zone verte) / cramé (trop tenu).
  const q = wrapS.melt < 0.55 ? 0.7 : wrapS.melt <= 1.0 ? 1.12 : 0.82;
  wrapS.seals.push(q);
  const e = ends[wrapS.i];
  e.sealing = true; e.sealT = 0;
  e.mesh.material.color.setHex(q >= 1.12 ? 0x9a8a6a : q === 0.82 ? 0x3a2a18 : 0x70707e); // propre / cramé / bâclé
  e.mesh.material.emissiveIntensity = 0;
  playTss(); addShake(q === 0.82 ? 0.14 : 0.08);
  briquetFlame.visible = false;
  wrapS.i++; wrapS.melt = 0;
  if (wrapS.i >= ENDS) finishSeal(); else setSealStatus();
}
// Les 2 bouts scellés -> pochon fini, puisé dans le STOCK et vendu au format.
function finishSeal() {
  const f = PACK_FORMATS.find(x => x.id === packFmt);
  wrapS.sealed = true; wrapS.holding = false;
  ui.seal.style.display = "none"; ui.meltgaugewrap.style.display = "none"; briquetFlame.visible = false;
  if (!f || stock.g < f.g) { showToast("Pas assez de stock", "#ffd166"); setSealStatus(); return; }
  const a = stockAvg();
  takeFromStock(f.g); updateStockPile();             // consomme le pochon dans le stock
  const sealAvg = wrapS.seals.reduce((s, v) => s + v, 0) / Math.max(1, wrapS.seals.length);  // 0.82..1.12
  const price = f.g * f.eur * qualMult(a) * sealAvg * (1 + owned.guet * 0.06) * levelMult();
  setCash(cash + price);
  addXP(Math.max(1, Math.round(price * 0.05)));
  playSeal(); playSale(); flame(); addShake(0.16);
  const nickel = wrapS.seals.every(v => v > 1);
  showToast((nickel ? "Pochon nickel +" : "Vendu +") + Math.round(price) + " € · " + f.name, nickel ? "#9be37d" : "#bdf0a3");
  setSealStatus();
  setTimeout(() => {
    refreshWrapCard(); renderPackGrid();
    if (stock.g >= f.g) gotoWrap();                  // enchaine un autre pochon
    else ui.sealstatus.textContent = "Stock écoulé — retourne à la découpe ▸";
  }, 800);
}
function updateWrap(dt) {
  if (phase !== "wrap") return;
  // Retraction des bouts scellés (le bout fond en petit nub vitrifié).
  for (const e of ends) {
    if (e.sealing) {
      e.sealT = Math.min(1, e.sealT + dt * 3);
      e.mesh.scale.setScalar(0.25 + (1 - e.sealT) * 0.75);
      if (e.sealT >= 1) e.sealing = false;
    }
  }
  if (!wrapS.sealed && wrapS.i < ENDS) {
    const e = ends[wrapS.i];
    if (wrapS.holding) {
      const meltT = 0.55 * Math.pow(0.85, owned.scelle);         // briquet turbo = fond plus vite
      wrapS.melt = Math.min(1.4, wrapS.melt + dt / meltT);
      e.mesh.getWorldPosition(_ft);                              // flamme posée sur le bout, qui vacille
      wrapStage.worldToLocal(_ft);                               // -> coords locales (flamme enfant de wrapStage)
      briquetFlame.visible = true;
      briquetFlame.position.copy(_ft); briquetFlame.position.y += 0.14;
      briquetFlame.scale.setScalar(0.8 + Math.sin(performance.now() * 0.04) * 0.22 + wrapS.melt * 0.3);
      e.mesh.material.emissiveIntensity = Math.min(2.4, wrapS.melt * 2.2);  // le bout rougit fort
      e.mesh.scale.y = 1 - Math.min(0.45, Math.max(0, wrapS.melt - 0.3) * 0.45);
      wrapS.sizzleT += dt; if (wrapS.sizzleT > 0.08) { wrapS.sizzleT = 0; playSizzle(); }
      if (wrapS.melt >= 1.4) lockEnd();                          // trop tenu -> auto-cramé
    } else {
      briquetFlame.visible = false;
      wrapS.melt = Math.max(0, wrapS.melt - dt * 1.2);            // le bout refroidit si on lâche tôt
      e.mesh.material.emissiveIntensity = Math.max(0, e.mesh.material.emissiveIntensity - dt * 3);
      e.mesh.scale.y += (1 - e.mesh.scale.y) * Math.min(1, dt * 4);
    }
    ui.meltgauge.style.width = Math.min(100, wrapS.melt / 1.4 * 100) + "%";
    ui.meltgauge.style.background = wrapS.melt > 1.0 ? "#ff5e5e" : wrapS.melt >= 0.55 ? "#7ad17a" : "#ffd166";
  }
  if (!wrapS.sealed) packSlab.position.y = 0.5 + Math.sin(performance.now() * 0.002) * 0.02;
}
// Flammeche du briquet (effet HTML ephemere).
function flame() {
  const f = document.createElement("div");
  f.textContent = "🔥";
  f.style.cssText = "position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);font-size:60px;pointer-events:none;z-index:5;transition:opacity .5s ease,transform .5s ease;";
  document.body.appendChild(f);
  requestAnimationFrame(() => { f.style.opacity = "0"; f.style.transform = "translate(-50%,-92%) scale(1.6)"; });
  setTimeout(() => f.remove(), 520);
}

/* -------------------------------------------------------------------------
   16) BOUTIQUE (data-driven) + achat de plaque
   ------------------------------------------------------------------------- */
function buyPlaque(sizeG) {
  const cost = PLAQUE_PRICES[sizeG];
  if (cash < cost) { showToast("Pas assez : " + cost + " €", "#ff5e5e"); return; }
  setCash(cash - cost);
  plaque.size = sizeG; plaque.g = sizeG; savePlaque(); refreshPlaque(); refreshCutCard();
  showToast("Plaque " + sizeG + " g  −" + cost + " €", "#cdb6ff");
  const ac = ensureAudio(); if (ac) { const t = ac.currentTime; beep(520, t, 0.1, 0.2); beep(780, t + 0.07, 0.12, 0.2); }
}
const SHOP = [
  { id: "plaque100", icon: "🟫", name: "Plaque 100 g",
    desc: () => "Matière première (gros). " + PLAQUE_PRICES[100] + " € · ~4.7 €/g.",
    cost: () => PLAQUE_PRICES[100], can: () => true, maxed: () => false, buy: () => buyPlaque(100) },
  { id: "plaque250", icon: "🧱", name: "Plaque 250 g",
    desc: () => "Matière première (gros, moins cher au g).",
    cost: () => PLAQUE_PRICES[250], can: () => true, maxed: () => false, buy: () => buyPlaque(250) },
  { id: "metro", icon: "🎚️", name: "Métronome auto",
    desc: () => owned.metro ? "Auto-coupe parfaite, cadence " + (1.1 * Math.pow(0.82, owned.metro)).toFixed(2) + " s." : "Coupe au rythme tout seul (parfait).",
    cost: () => Math.round(2200 * Math.pow(1.7, owned.metro)),
    can: () => owned.metro < 6, maxed: () => owned.metro >= 6, buy: () => { owned.metro++; } },
  { id: "guet", icon: "🤝", name: "Réseau de revente",
    desc: () => "Meilleurs débouchés : +" + (owned.guet * 6) + " % sur les pochons (+6 %/niv).",
    cost: () => Math.round(1200 * Math.pow(1.6, owned.guet)),
    can: () => owned.guet < 5, maxed: () => owned.guet >= 5, buy: () => { owned.guet++; } },
  { id: "scelle", icon: "🔥", name: "Briquet turbo",
    desc: () => "Flamme plus chaude : les bouts de cellophane fondent plus vite.",
    cost: () => Math.round(1000 * Math.pow(1.6, owned.scelle)),
    can: () => owned.scelle < 5, maxed: () => owned.scelle >= 5, buy: () => { owned.scelle++; } },
];
function renderShop() {
  ui.shopcash.textContent = "💶 " + Math.round(cash) + " €";
  ui.shopitems.innerHTML = "";
  for (const it of SHOP) {
    const cost = it.cost(), maxed = it.maxed(), can = !maxed && it.can() && cash >= cost;
    const row = document.createElement("div"); row.className = "shopitem";
    row.innerHTML = '<div class="ic">' + it.icon + '</div><div class="info"><div class="nm">' +
      it.name + '</div><div class="ds">' + it.desc() + '</div></div>';
    const b = document.createElement("button");
    b.textContent = maxed ? "✓" : (cost + " €");
    b.disabled = !can;
    b.addEventListener("click", () => buy(it));
    row.appendChild(b);
    ui.shopitems.appendChild(row);
  }
}
function buy(it) {
  const cost = it.cost();
  if (it.maxed() || !it.can() || cash < cost) return;
  if (it.id !== "plaque100" && it.id !== "plaque250") setCash(cash - cost);
  it.buy(); saveShop();
  const ac = ensureAudio(); if (ac) { const t = ac.currentTime; beep(660, t, 0.1, 0.2); beep(990, t + 0.07, 0.14, 0.2); }
  renderShop();
  if (phase === "wrap") { refreshWrapCard(); renderPackGrid(); }   // garde la grille à jour (plaque/format)
}

/* -------------------------------------------------------------------------
   17) ENTREES (pointer) : selon la phase + pinch zoom
   ------------------------------------------------------------------------- */
const el = renderer.domElement;
const pointers = new Map();
let pinching = false, pinchStartDist = 0, pinchStartZoom = 1;
let tapDown = null, tapMoved = false;
function pinchDist() { const a = [...pointers.values()]; return Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y); }

el.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size >= 2) { pinching = true; pinchStartDist = pinchDist() || 1; pinchStartZoom = zoom; tapDown = null; return; }
  ensureAudio();
  tapDown = { x: e.clientX, y: e.clientY }; tapMoved = false;   // cut = strum ; wrap = replier (au relacher)
}, { passive: false });

el.addEventListener("pointermove", (e) => {
  if (pointers.has(e.pointerId)) pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pinching && pointers.size >= 2) {
    e.preventDefault();
    zoom = Math.max(0.6, Math.min(2.2, pinchStartZoom * (pinchDist() / pinchStartDist)));
    localStorage.setItem("gs_zoom", zoom.toFixed(3)); fitView();
    return;
  }
  if (tapDown && Math.hypot(e.clientX - tapDown.x, e.clientY - tapDown.y) > 14) tapMoved = true;
}, { passive: false });

function onUp(e) {
  if (e) e.preventDefault();
  pointers.delete(e.pointerId);
  if (pinching) { if (pointers.size < 2) pinching = false; tapDown = null; return; }
  // Phase 1 : tap OU swipe = strum. (le swipe droit garde l'esprit "découpe".)
  if (phase === "cut" && tapDown) {
    const swipeRight = (e.clientX - tapDown.x) > 18;
    strum(swipeRight);
  }
  tapDown = null;
}
el.addEventListener("pointerup", onUp, { passive: false });
el.addEventListener("pointercancel", onUp, { passive: false });

// Boutons des panneaux + boutique.
document.querySelectorAll(".toggle[data-fmt]").forEach(b => b.addEventListener("click", () => setFmt(+b.dataset.fmt)));
document.getElementById("cutNext").addEventListener("click", () => { if (stock.g < 1) showToast("Coupe d'abord des barrettes", "#ffd166"); else gotoWrap(); });
document.getElementById("wrapNext").addEventListener("click", () => gotoCut());
// Bouton "Briquet" (maintien) : chauffe le bout courant ; relâcher dans le vert = scellé propre.
ui.seal.addEventListener("pointerdown", (e) => { e.preventDefault(); wrapS.holding = true; ensureAudio(); });
ui.seal.addEventListener("pointerup", (e) => { e.preventDefault(); wrapS.holding = false; lockEnd(); });
ui.seal.addEventListener("pointerleave", () => { wrapS.holding = false; lockEnd(); });
ui.seal.addEventListener("pointercancel", () => { wrapS.holding = false; lockEnd(); });
// Stepper cliquable (navigation libre, pratique pour le proto).
document.querySelectorAll(".step").forEach(s => s.addEventListener("click", () => {
  const p = s.dataset.step;
  if (p === "cut") gotoCut();
  else if (p === "wrap") gotoWrap();
}));
document.getElementById("shopbtn").addEventListener("click", () => { renderShop(); ui.shop.classList.add("show"); });
document.getElementById("shopclose").addEventListener("click", () => ui.shop.classList.remove("show"));
ui.shop.addEventListener("click", (e) => { if (e.target === ui.shop) ui.shop.classList.remove("show"); });

/* -------------------------------------------------------------------------
   18) ETIQUETTE FLOTTANTE DU BAC STOCK (HTML projete)
   ------------------------------------------------------------------------- */
const labelsEl = document.getElementById("labels");
function makeLabel(text, color) {
  const d = document.createElement("div"); d.className = "blabel";
  d.textContent = text; d.style.color = color; labelsEl.appendChild(d); return d;
}
const stockLabel = makeLabel("📦 STOCK", "#cdb6ff");
const _lv = new THREE.Vector3();
function updateLabels() {
  stockLabel.textContent = "📦 STOCK " + Math.round(stock.g) + " g";
  _lv.set(STOCK_POS.x, 0.6, STOCK_POS.z).project(camera);
  if (_lv.z > 1) { stockLabel.style.display = "none"; return; }
  stockLabel.style.display = "block";
  stockLabel.style.left = ((_lv.x * 0.5 + 0.5) * window.innerWidth) + "px";
  stockLabel.style.top  = ((-_lv.y * 0.5 + 0.5) * window.innerHeight) + "px";
}

/* -------------------------------------------------------------------------
   19) BOUCLE PRINCIPALE
   ------------------------------------------------------------------------- */
let last = 0;
function loop(t) {
  const dt = Math.min((t - last) / 1000 || 0, 0.05);
  last = t;
  updateCut(dt);
  updateWrap(dt);
  updateCrumbs(dt);
  updateFlyers(dt);
  // Secousse de camera (amortie).
  if (shake > 0) { shake *= Math.pow(0.0008, dt); if (shake < 0.002) shake = 0; }
  camera.position.copy(baseCamPos);
  if (shake > 0) {
    camera.position.x += (Math.random() - 0.5) * shake;
    camera.position.y += (Math.random() - 0.5) * shake;
    camera.position.z += (Math.random() - 0.5) * shake;
  }
  camera.lookAt(VIEW_TARGET);
  updateLabels();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

/* -------------------------------------------------------------------------
   20) INIT
   ------------------------------------------------------------------------- */
resize();
setCash(cash);
updateXpUI();
updateStockPile();
refreshPlaque();
gotoCut();
requestAnimationFrame(loop);
</script>
