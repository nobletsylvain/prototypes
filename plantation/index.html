<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Plantation</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; touch-action:none;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 120% at 50% 0%, #22301f 0%, #131d12 60%, #0a110a 100%); }
  #app { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  .hud { position:fixed; left:0; right:0; pointer-events:none; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  #count { top:max(14px,env(safe-area-inset-top)); left:16px; font-weight:800; font-size:16px; color:#cdeec2; }
  #reset { position:fixed; top:max(10px,env(safe-area-inset-top)); right:14px; pointer-events:auto;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    padding:9px 13px; border-radius:12px; font-size:14px; font-weight:700; backdrop-filter:blur(6px); }
  #reset:active { background:rgba(255,255,255,.25); }
  #toast { top:32%; text-align:center; font-size:24px; font-weight:800; opacity:0;
    transition:opacity .25s, transform .25s; transform:translateY(8px); padding:0 18px; }
  #toast.show { opacity:1; transform:translateY(0); }
  #title { top:max(46px,calc(env(safe-area-inset-top) + 30px)); left:16px; font-size:12px;
    color:rgba(255,255,255,.55); font-weight:700; letter-spacing:.3px; }
  #remain { top:max(62px,calc(env(safe-area-inset-top) + 46px)); left:16px; font-size:12px;
    color:rgba(220,230,180,.85); font-weight:700; letter-spacing:.3px; }

  #cash { position:fixed; top:max(14px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-weight:800; font-size:18px; color:#9be37d; text-shadow:0 2px 8px rgba(0,0,0,.5); pointer-events:none; }

  #xpwrap { position:fixed; top:calc(max(14px,env(safe-area-inset-top)) + 50px); left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:6px; pointer-events:none; z-index:4; }
  #level { background:rgba(155,227,125,.18); border:1px solid rgba(155,227,125,.55); color:#bdf0a3;
    font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  #xpbar { width:120px; height:7px; background:rgba(255,255,255,.14); border-radius:999px; overflow:hidden; }
  #xpfill { height:100%; width:0%; background:linear-gradient(90deg,#7ad17a,#bdf0a3); border-radius:999px; transition:width .25s; }

  /* Indicateur de scènes : le SWIPE horizontal navigue, les pastilles ne font
     qu'indiquer (elles restent tappables en secours). */
  #scenes { position:fixed; top:calc(max(14px,env(safe-area-inset-top)) + 76px); left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:8px; z-index:4; pointer-events:auto; }
  #scenes .arr { color:rgba(255,255,255,.35); font-size:15px; font-weight:800; pointer-events:none; }
  .scbtn { background:transparent; border:none; color:rgba(255,255,255,.45);
    font-weight:800; font-size:13px; padding:5px 8px; border-radius:999px; }
  .scbtn.on { color:#dfffce; background:rgba(155,227,125,.16); }
  .scbtn.pulse { animation:pulsebtn 1.1s ease-in-out infinite; }

  /* Indicateur de pots (étagères) : points verticaux à droite, SWIPE vertical
     pour changer d'étage. Tappables en secours. */
  #potdots { position:fixed; right:12px; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column-reverse; gap:10px; z-index:4; pointer-events:auto; }
  .potdot { width:14px; height:14px; border-radius:50%; border:1px solid rgba(255,255,255,.4);
    background:rgba(255,255,255,.12); padding:0; }
  .potdot.on { background:#9be37d; border-color:#9be37d; }
  .potdot.pulse { animation:pulsebtn 1.1s ease-in-out infinite; }

  #labels { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
  .blabel { position:absolute; transform:translate(-50%,-50%); white-space:nowrap;
    font-weight:800; font-size:13px; padding:2px 7px; border-radius:8px;
    background:rgba(0,0,0,.5); text-shadow:0 1px 3px rgba(0,0,0,.6); }

  #prompt { bottom:max(88px,calc(env(safe-area-inset-bottom) + 82px)); text-align:center; pointer-events:none; }
  #prompt span { display:inline-block; background:rgba(10,20,10,.6); border:1px solid rgba(155,227,125,.35);
    color:#eaffe6; font-size:14px; font-weight:700; padding:8px 16px; border-radius:999px;
    backdrop-filter:blur(6px); box-shadow:0 4px 14px rgba(0,0,0,.4); max-width:92vw; }

  /* Deux barres : Boost (levier cupidité) au-dessus, Sachet (format) en bas. */
  .selbar { position:fixed; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:6px; pointer-events:auto; z-index:4; }
  #boostbar { bottom:max(48px,calc(env(safe-area-inset-bottom) + 44px)); }
  #fmtbar { bottom:max(12px,calc(env(safe-area-inset-bottom) + 8px)); }
  .selbar .lbl { color:rgba(255,255,255,.6); font-size:11px; font-weight:700; margin-right:2px; }
  .selbtn { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    font-weight:800; font-size:13px; padding:6px 9px; border-radius:10px; }
  .fmtbtn.on { background:#7ad17a; color:#0e2a16; border-color:#7ad17a; }
  .boostbtn.on { background:#e3c05f; color:#20180a; border-color:#e3c05f; }
  .varbtn { white-space:nowrap; }                                           /* sélecteur de variété (mode embed) */
  .varbtn.on { background:#7ad17a; color:#0e2a16; border-color:#7ad17a; }
  .selbtn:disabled { opacity:.4; }
  .boostbtn.empty { opacity:.5; }

  /* Panneau DEBUG (outil de test : temps, cash, reset) */
  #dbgbtn { position:fixed; left:12px; bottom:max(12px,env(safe-area-inset-bottom)); pointer-events:auto; z-index:5;
    width:38px; height:38px; border-radius:12px; font-size:17px;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); color:#fff; opacity:.55; }
  #dbgbtn:active { background:rgba(255,255,255,.2); }
  #dbg { position:fixed; left:12px; bottom:max(58px,calc(env(safe-area-inset-bottom) + 46px)); z-index:5;
    display:none; flex-direction:column; gap:6px; padding:10px; border-radius:14px;
    background:rgba(8,14,8,.88); border:1px solid rgba(255,255,255,.18); backdrop-filter:blur(8px); }
  #dbg.show { display:flex; }
  #dbg .dhead { color:rgba(255,255,255,.5); font-size:11px; font-weight:800; letter-spacing:.5px; }
  #dbg .drow { display:flex; gap:6px; }
  .dbtn { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.22); color:#fff;
    font-weight:700; font-size:12px; padding:7px 10px; border-radius:9px; }
  .dbtn:active { background:rgba(255,255,255,.25); }
  .dbtn.on { background:#e3c05f; color:#20180a; border-color:#e3c05f; }
  .dbtn.danger { background:rgba(255,80,80,.15); border-color:rgba(255,110,110,.5); color:#ffb3b3; }

  #shopbtn { position:fixed; right:14px; top:calc(max(10px,env(safe-area-inset-top)) + 46px); pointer-events:auto;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff; font-size:18px;
    width:46px; height:42px; border-radius:12px; }
  #shopbtn:active { background:rgba(255,255,255,.25); }
  #shopbtn.pulse { animation:pulsebtn 1.1s ease-in-out infinite; }
  @keyframes pulsebtn { 0%,100%{ box-shadow:0 0 0 0 rgba(155,227,125,.0);} 50%{ box-shadow:0 0 0 6px rgba(155,227,125,.35);} }
  #shop { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.5); z-index:6; }
  #shop.show { display:flex; }
  #shopinner { width:88%; max-width:380px; max-height:74vh; overflow:auto; background:#16241a;
    border:1px solid rgba(255,255,255,.15); border-radius:16px; padding:16px; color:#fff; }
  #shophead { font-weight:800; font-size:18px; margin-bottom:12px; display:flex; justify-content:space-between; }
  #shopcash { color:#9be37d; }
  .shopitem { display:flex; align-items:center; gap:10px; padding:10px; margin-bottom:10px;
    border:1px solid rgba(255,255,255,.12); border-radius:12px; background:rgba(255,255,255,.04); }
  .shopitem .ic { font-size:26px; }
  .shopitem .info { flex:1; }
  .shopitem .nm { font-weight:700; }
  .shopitem .ds { font-size:12px; color:rgba(255,255,255,.6); }
  .shopitem button { background:#2f8a4e; border:none; color:#fff; font-weight:700; padding:9px 12px; border-radius:10px; min-width:64px; }
  .shopitem button:disabled { background:rgba(255,255,255,.12); color:rgba(255,255,255,.4); }
  #shopclose { width:100%; background:rgba(255,255,255,.12); border:none; color:#fff; font-weight:700; padding:11px; border-radius:12px; }
</style>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<body>
<div id="app"></div>
<div class="hud" id="count">Stock : 0 g</div>
<div id="cash">💶 0 €</div>
<div id="xpwrap"><span id="level">Niv. 1</span><div id="xpbar"><div id="xpfill"></div></div></div>
<div id="scenes">
  <span class="arr">‹</span>
  <button id="sc-culture" class="scbtn on">🌱 Culture</button>
  <button id="sc-sechoir" class="scbtn">🌬️ Séchoir</button>
  <span class="arr">›</span>
</div>
<div id="potdots"></div>
<div class="hud" id="title">GRAINES</div>
<div class="hud" id="remain">Trim</div>
<button id="reset">🔄 Graine</button>
<button id="shopbtn">🛒</button>
<div class="hud" id="prompt"><span>Verse le terreau…</span></div>
<div class="hud" id="toast"></div>
<div id="labels"></div>

<div id="boostbar" class="selbar">
  <span class="lbl">Boost</span>
  <button class="selbtn boostbtn on" data-boost="none">✋ Aucun</button>
  <button class="selbtn boostbtn" data-boost="fert">🌼 Engrais</button>
  <button class="selbtn boostbtn" data-boost="pgr">🧪 PGR</button>
</div>
<div id="fmtbar" class="selbar">
  <span class="lbl">Sachet</span>
  <button class="selbtn fmtbtn on" data-fmt="1">1g</button>
  <button class="selbtn fmtbtn" data-fmt="3.5">3.5g</button>
  <button class="selbtn fmtbtn" data-fmt="7">7g</button>
  <button class="selbtn fmtbtn" data-fmt="28">28g</button>
</div>

<button id="dbgbtn" title="Debug">🐛</button>
<div id="dbg">
  <span class="dhead">🐛 DEBUG</span>
  <div class="drow">
    <span class="dhead" style="align-self:center">⏩</span>
    <button class="dbtn tsbtn on" data-ts="1">×1</button>
    <button class="dbtn tsbtn" data-ts="5">×5</button>
    <button class="dbtn tsbtn" data-ts="20">×20</button>
  </div>
  <div class="drow">
    <button class="dbtn" id="dbg-cash">💶 +1 000 €</button>
    <button class="dbtn" id="dbg-stuff">🌱 +5 graines/doses</button>
  </div>
  <div class="drow">
    <button class="dbtn" id="dbg-grow">⏭️ Finir la pousse</button>
    <button class="dbtn" id="dbg-dry">🌬️ Finir le séchage</button>
  </div>
  <div class="drow">
    <button class="dbtn danger" id="dbg-reset">🔄 RESET total</button>
  </div>
</div>

<div id="shop">
  <div id="shopinner">
    <div id="shophead"><span>🛒 Boutique</span><span id="shopcash"></span></div>
    <div id="shopitems"></div>
    <button id="shopclose">Fermer</button>
  </div>
</div>

<script type="module">
"use strict";
import * as THREE from "three";

/* --- Mode EMBED "bigo" : le téléphone-OS « Le Bigo » (le-bigo/index.html) ouvre
   CE proto en iframe comme app 🌱 Plantation. Contrat postMessage figé : le-bigo/BUS.md.
   Slug "plantation". Activé par #embed=bigo. SANS ce flag, le standalone est
   strictement inchangé. Chaîne : graines OnionMarket (bigo-state.seeds) → semis
   (bigo-txn seedsTake) → culture → coupe → séchage → frotté → bigo-txn branchesAdd
   vers l'app Récolte (PAS de vente locale ; le trim part en miettes). --- */
const EMBED = /[?#&]embed=bigo/.test(location.href);
// En mode embed, on n'écrit JAMAIS dans le save du proto autonome (plant_*) :
// toutes les lectures/écritures passent par un shim mémoire (perdu à la fermeture).
const memStore = (() => { const m = {}; return {
  getItem: (k) => (k in m ? m[k] : null),
  setItem: (k, v) => { m[k] = String(v); },
  removeItem: (k) => { delete m[k]; },
}; })();
const STORE = EMBED ? memStore : localStorage;

// Variétés de l'enum partagée (BUS.md / recolte). yield = placeholder déterministe
// par variété (le soin d'eau/taille module ensuite rendement ET qualité — R4).
const EMB_SEEDS = {
  "Skunk":       { variety: "Skunk",       name: "Skunk",       icon: "🦨", yield: 40 },
  "White Widow": { variety: "White Widow", name: "White Widow", icon: "❄️", yield: 48 },
  "Lemon":       { variety: "Lemon",       name: "Lemon",       icon: "🍋", yield: 34 },
  "Purple":      { variety: "Purple",      name: "Purple",      icon: "🍇", yield: 55 },
};
let BIGO = null;        // dernier {type:"bigo-state", cash, seeds:{Variete:n}, …} reçu du parent
let bigoSeeds = {};     // miroir local des graines partagées (le bigo-state fait foi)
let embVariety = null;  // variété sélectionnée pour le prochain semis
let embSentG = 0, embTrimG = 0;   // cumuls de session : envoyé à la Récolte / parti en miettes
let varbar = null;      // sélecteur de variété (créé à l'init embed)
const NO_SEED_MSG = EMBED ? "Achète des graines sur 🧅 OnionMarket" : "Plus de graines — boutique 🛒";

function seedAvail() { return EMBED ? (embVariety ? (bigoSeeds[embVariety] || 0) : 0) : (seeds[curSeed] || 0); }
function takeSeed() {   // consomme UNE graine ; null si aucune. Embed : graine PARTAGÉE (seedsTake).
  if (EMBED) {
    if (seedAvail() <= 0) return null;
    bigoSeeds[embVariety]--;   // décrément optimiste — le prochain bigo-state fait foi
    try { parent.postMessage({ type: "bigo-txn", app: "plantation", seedsTake: { variety: embVariety, n: 1 } }, "*"); } catch (e) {}
    return EMB_SEEDS[embVariety];
  }
  if ((seeds[curSeed] || 0) <= 0) return null;
  seeds[curSeed]--; saveSeeds();
  return SEED_BY[curSeed];
}
// Fin d'une branche frottée (embed) : le séché part à l'app Récolte, le trim en
// miettes. UNE txn par branche, cause obligatoire (contrat CrimWorld / BUS.md).
function embSendBranch(hook) {
  const g = Math.round(hook.sentG * 10) / 10;
  const trim = Math.round(hook.trimSent * 10) / 10;
  const variety = hook.variety || "Skunk";
  const msg = { type: "bigo-txn", app: "plantation" };
  if (g > 0) {
    const q = Math.max(1, Math.min(100, Math.round((hook.sentQsum / hook.sentG) * 100)));
    msg.branchesAdd = { variety, g, q };
    msg.journal = { icon: "🌱", txt: "Branchage séché prêt : " + g + " g de " + variety + " → Récolte",
                    cause: "↩ ta culture (semis, arrosage, taille)", cls: "good" };
  }
  if (trim > 0) {
    msg.miettes = trim;
    if (!msg.journal) msg.journal = { icon: "🍂", txt: "Branche partie en trim : " + trim + " g de miettes",
                                      cause: "↩ ton frotté trop vif (lent = têtes A)", cls: "warn" };
  }
  if (g > 0 || trim > 0) { try { parent.postMessage(msg, "*"); } catch (e) {} }
  embSentG += g; embTrimG += trim;
  updateCount();
}

/* =========================================================================
   PLANTATION — core loop "culture de weed" (proto mobile WebGL)
   -------------------------------------------------------------------------
   L'étape AMONT des autres protos : faire pousser la matière première.
   Design issu de plantation/DESIGN.md (étude Schedule I / Weedcraft /
   Weed Firm / Hempire + étalons tactiles Hay Day, Viridi, Prune).

     1) SEMER    : MAINTENIR le sac de TERREAU -> il se déverse dans le pot ;
                   puis GLISSER une graine de la caisse jusqu'au pot.
     2) ARROSER  : MAINTENIR l'ARROSOIR -> le débit s'emballe, la terre fonce
                   (on lit la matière, pas une jauge). Trop = flaque, pousse
                   ralentie un temps. La plante boit vite : y revenir.
     3) TAILLER  : des FEUILLES GOURMANDES poussent sur la tige -> SWIPE vif
                   pour les trancher : chaque coupe redirige la vigueur (les
                   têtes gonflent). Tailler assoiffe la plante.
     4) COUPER   : à maturité, SWIPE VIF sur le plant -> chaque coupe détache
                   une BRANCHE qui part pendre au SÉCHOIR. Le pot se libère
                   aussitôt : on peut resemer pendant que ça sèche.
     5) RÉCOLTER : une fois la branche SÈCHE, FROTTER ses têtes -> geste LENT
                   = têtes A, geste VIF = trim (bradé). Frotter humide coûte
                   de la qualité. Vente en sachets 1 / 3.5 / 7 / 28 g.

   NAVIGATION MOBILE-NATIVE, tout au SWIPE (les pastilles n'indiquent que la
   position, tappables en secours) :
     - SWIPE HORIZONTAL : Culture <-> Séchoir (travelling caméra le long de
       la cave). Un swipe qui touche quelque chose (feuille, plant, tête) est
       consommé par le jeu ; sinon, ample et horizontal = navigation.
     - SWIPE VERTICAL : changer d'ÉTAGE de culture (pots multiples débloqués
       en boutique, empilés en étagères de grow-op ; la caméra grimpe).
   Chaque étage est une station complète (pot, sac, graines, arrosoir,
   booster) qui vit en continu, même hors écran.

   Le levier cupidité est PHYSIQUE : on verse un booster dans le pot —
   🌼 Engrais (+qualité, cher) ou 🧪 PGR (+rendement, qualité plafonnée bas).
   Timers uniquement diégétiques (pousse, séchage), jamais sur les gestes.
   Persistance localStorage sous le préfixe `plant_*`.
   ========================================================================= */

/* -------------------------------------------------------------------------
   0) ÉCONOMIE & CONSTANTES DE RÉGLAGE (réglage humain : tout est ici)
   ------------------------------------------------------------------------- */
const FMT_PRICE  = { 1: 12, 3.5: 10, 7: 9, 28: 7 };  // €/g à qualité 100 % (prix réel = × qualité)
const TRIM_PRICE = 2.5;                               // €/g, forfaitaire (les schlags)
const SEEDS = [
  { key:"lemon",   name:"Lemon Skunk",  icon:"🍋", cost:12, yield:32, lvl:1 },
  { key:"amnesia", name:"Amnesia Haze", icon:"🌪️", cost:28, yield:48, lvl:3 },
  { key:"purple",  name:"Purple Kush",  icon:"🟣", cost:55, yield:65, lvl:5 },
];
const SEED_BY = Object.fromEntries(SEEDS.map(s => [s.key, s]));
const BOOSTS = {
  none: { name:"Aucun",   icon:"✋" },
  fert: { name:"Engrais", icon:"🌼", cost:8, qualBonus:0.15 },
  pgr:  { name:"PGR",     icon:"🧪", cost:4, yieldMult:1.7, qualCap:0.55 },
};
const FAST_MODE    = new URLSearchParams(location.search).has("fast");   // ?fast = mode test
const GROW_TIME    = FAST_MODE ? 12 : 150;   // s de pousse de base (2 min 30) — timer diégétique
const SOIL_TIME    = 1.2;    // s de versage de terreau
const MOIST_START  = 0.55;   // humidité au semis
const MOIST_DRAIN  = 0.016;  // /s — la plante boit (~2 arrosages par pousse)
const WATER_RATE   = 0.55;   // /s au débit max (le débit s'emballe : rampe)
const WATER_RAMP   = 1.8;    // /s d'accélération du débit (l'inertie qui piège)
const MOIST_BAND   = [0.35, 0.95];  // la bande "heureuse"
const MOIST_MAX    = 1.30;   // au-delà de 1.05 : flaque visible
const SOGGY_UNTIL  = 1.05;   // détrempé au-dessus -> pousse ralentie
const CUT_THIRST   = 0.07;   // tailler assoiffe (l'ordre eau -> taille se découvre)
const LEAF_EVERY   = [13, 21];      // s entre deux feuilles gourmandes (min, max)
const LEAF_HARDEN  = 15;     // s avant que la feuille "durcisse" (draine double)
const LEAF_DRAIN   = 0.006;  // qualité de taille perdue /s et /feuille présente
const LEAF_SLOW    = 0.10;   // ralentissement de pousse par feuille présente
const LEAF_MAX     = 3;
const SWIPE_CUT    = 650;    // px/s mini pour trancher (feuille ou branche — l'intention compte)
const HARVEST_FAST = 1150;   // px/s au-delà : le bud part en trim
const N_BUDS       = 8;
const N_BRANCH     = 4;      // le plant se coupe en 4 branches (2 têtes visibles chacune)
const BUDS_PER_BRANCH = 2;
const LINE_HOOKS   = 4;      // places sur le fil de séchage
const DRY_TIME     = FAST_MODE ? 8 : 55;   // s de séchage par branche — timer diégétique
const DRY_QUAL_BONUS = 0.12; // sécher jusqu'au bout monte la qualité
const WET_MALUS    = 0.15;   // frotter humide la dégrade (l'impatience se paie)
const CUT_COOLDOWN = 0.3;    // s entre deux coupes de branche (un swipe = une branche)
const BAG_HOLD     = 0.28;   // s entre deux sachets en maintien
const QUAL_BASE    = 0.30, QUAL_WATER = 0.45, QUAL_TRIM = 0.25;   // qualité = base + eau + taille
const YIELD_FLOOR  = 0.75;   // rendement mini (le reste vient du soin d'eau)
const MAX_POTS     = 3;      // étages de culture (pot 1 offert, 2-3 en boutique)
const POT_COSTS    = [0, 800, 2500];
const LEVEL_H      = 5.6;    // hauteur d'un étage d'étagère (assez pour cadrer un étage
                             // sans que le voisin déborde — on n'en voit qu'un liseré)
const NAV_DIST     = 70;     // px de swipe mini pour naviguer
const NAV_RATIO    = 1.5;    // dominance d'axe requise (|dx| vs |dy|)

/* -------------------------------------------------------------------------

function fitView() {
  const vFov = camera.fov * Math.PI / 180;
  const hFov = 2 * Math.atan(Math.tan(vFov / 2) * camera.aspect);
  const fov  = Math.min(vFov, hFov);
  const dist = (VIEW_RADIUS / Math.sin(fov / 2)) * 1.03 / zoom;
  baseCamPos.copy(VIEW_TARGET).addScaledVector(VIEW_DIR, dist);
  camera.position.copy(baseCamPos);
  camera.lookAt(VIEW_TARGET);
}
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  fitView();
}

function leafBlade(len, wid, mat) {
  const shp = new THREE.Shape();
  shp.moveTo(0, 0); shp.lineTo(wid * 0.5, len * 0.45); shp.lineTo(0, len); shp.lineTo(-wid * 0.5, len * 0.45); shp.closePath();
  const m = new THREE.Mesh(new THREE.ShapeGeometry(shp), mat);
  m.rotation.x = -Math.PI / 3; return m;
}

function makeStation(lvl) {
  const Y = lvl * LEVEL_H;

  // (réalisme du rack : rien ne flotte), ou file vers le plafond au dernier étage.

  const potBody = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.38, 0.62, 22, 1, true), potMat);

  bottleCap.position.y = 0.76; st.boostBottle.add(bottleCap);
  scene.add(st.boostBottle);

  // LA PLANTE
  st.plantGroup = new THREE.Group();
  st.plantGroup.position.set(POT_POS.x, Y + 0.62, POT_POS.z);
  scene.add(st.plantGroup);
  st.stem = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.06, 1, 8), stemMat);
  st.stem.castShadow = true; st.plantGroup.add(st.stem);

  // on tranche « à travers la plante », pas une tige fine).
  st.plantHit = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 1, 8),
    new THREE.MeshBasicMaterial({ visible: false }));
  st.plantGroup.add(st.plantHit);
  st.branches = [];
  for (let i = 0; i < 5; i++) {
    const lvlG = new THREE.Group();
    const t = 0.18 + i * 0.17;
    for (let k = 0; k < 4; k++) {
      const s = k % 2 === 0 ? 1 : -1;
      const blade = leafBlade(0.62 - i * 0.07, 0.3 - i * 0.035, leafDecoMat);
      blade.position.x = s * 0.05;
      blade.rotation.z = s * (1.05 + (k > 1 ? 0.45 : 0));
      const holder = new THREE.Group();
      holder.rotation.y = k * Math.PI / 2 + i * 0.6;
      holder.add(blade);
      lvlG.add(holder);
    }
    lvlG.userData.t = t;
    st.branches.push(lvlG); st.plantGroup.add(lvlG);
  }
  st.buds = [];
  for (let i = 0; i < N_BUDS; i++) {
    const isCola = i === N_BUDS - 1;
    const grp = new THREE.Group();
    const size = isCola ? 0.27 : 0.16;
    const m = new THREE.Mesh(new THREE.ConeGeometry(size, size * 2.4, 9),
      new THREE.MeshStandardMaterial({ color: 0x93c25a, roughness: 0.8, emissive: 0x2a4d0e, emissiveIntensity: 0.0 }));
    m.castShadow = true; grp.add(m);
    for (let p = 0; p < 3; p++) {
      const h = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.006, size * 1.4, 4),
        new THREE.MeshStandardMaterial({ color: 0xead9a0, roughness: 0.9 }));
      h.position.set((p - 1) * size * 0.4, size * 0.6, 0); h.rotation.z = (p - 1) * 0.5;
      grp.add(h);
    }
    const t = isCola ? 1.0 : 0.42 + (i / (N_BUDS - 1)) * 0.52;
    grp.userData = { t, ang: i * 2.4, off: isCola ? 0 : 0.15, taken: false, g: 0 };
    grp.visible = false;
    st.buds.push(grp); st.plantGroup.add(grp);
  }
  st.gLeaves = [];
  for (let i = 0; i < LEAF_MAX; i++) {
    const grp = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x8ecf4a, roughness: 0.8, side: THREE.DoubleSide });
    grp.add(leafBlade(0.55, 0.3, mat));
    const hit = new THREE.Mesh(new THREE.SphereGeometry(0.26, 8, 6),
      new THREE.MeshBasicMaterial({ visible: false }));
    hit.position.y = 0.3; grp.add(hit);
    grp.visible = false;
    st.gLeaves.push({ grp, mat, hit, active: false, age: 0, t: 0, ang: 0 });
    st.plantGroup.add(grp);
  }

  st.potLabel = makeLabel("🪴 POT " + (lvl + 1), "#f0c9a8");
  stations.push(st);
  return st;
}

const BUD_DRY_COL  = { from: new THREE.Color(0x93c25a), to: new THREE.Color(0xa08a48) };
const LEAF_DRY_COL = { from: new THREE.Color(0x27632c), to: new THREE.Color(0x6b5a2e) };
const hooks = [-1.5, -0.5, 0.5, 1.5].slice(0, LINE_HOOKS).map((dx) => SECHOIR_X + dx).map((x) => ({
  x, used: false, grp: null, g: 0, qual: 0, dry: 0, pop: 0, sway: x * 2.1,
  buds: [], budMats: [], leafMats: [], wetWarned: false, dryToasted: false,
}));
function attachBranch(hook) {
  const grp = new THREE.Group();
  grp.position.set(hook.x, LINE_Y, LINE_Z);
  const tie = new THREE.Mesh(new THREE.TorusGeometry(0.05, 0.015, 6, 10), wireMat);
  tie.position.y = -0.03; grp.add(tie);
  const stM = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.035, 0.75, 7), stemMat);
  stM.position.y = -0.42; stM.castShadow = true; grp.add(stM);
  hook.buds = []; hook.budMats = []; hook.leafMats = [];
  for (let i = 0; i < BUDS_PER_BRANCH; i++) {
    const mat = new THREE.MeshStandardMaterial({ color: 0x93c25a, roughness: 0.8 });
    const bud = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.34, 9), mat);
    bud.rotation.x = Math.PI;
    bud.position.set((i % 2 === 0 ? 0.09 : -0.09), -0.3 - i * 0.32, 0.02);
    bud.castShadow = true; grp.add(bud);
    const hit = new THREE.Mesh(new THREE.SphereGeometry(0.24, 8, 6),
      new THREE.MeshBasicMaterial({ visible: false }));
    hit.position.copy(bud.position); grp.add(hit);
    hit.userData.ref = { hook, idx: i };
    hook.buds.push({ mesh: bud, hit, taken: false });
    hook.budMats.push(mat);
  }
  for (let i = 0; i < 2; i++) {
    const mat = new THREE.MeshStandardMaterial({ color: 0x27632c, roughness: 0.85, side: THREE.DoubleSide });
    const blade = leafBlade(0.3, 0.14, mat);
    blade.position.set(i === 0 ? 0.1 : -0.1, -0.55 - i * 0.15, 0);
    blade.rotation.z = Math.PI + (i === 0 ? 0.5 : -0.5);
    grp.add(blade);
    hook.leafMats.push(mat);
  }
  grp.scale.setScalar(0.001);
  hook.grp = grp; hook.pop = 0; hook.dry = 0; hook.wetWarned = false; hook.dryToasted = false;
  scene.add(grp);
}
function removeBranch(hook) {
  if (hook.grp) scene.remove(hook.grp);
  hook.grp = null; hook.used = false; hook.buds = [];
}
function anyBranch()    { return hooks.some(h => h.used); }
function anyDryBranch() { return hooks.some(h => h.used && h.dry >= 0.99); }
function updateLine(dt) {
  for (const h of hooks) {
    if (!h.used || !h.grp) continue;
    h.pop = Math.min(1, h.pop + dt * 5);
    h.grp.scale.setScalar(0.2 + 0.8 * h.pop);
    const wasDry = h.dry >= 0.99;
    h.dry = Math.min(1, h.dry + dt / DRY_TIME);
    if (!wasDry && h.dry >= 0.99 && !h.dryToasted) {
      h.dryToasted = true;
      showToast("Une branche est sèche 🌿 frotte-la !", "#bdf0a3");
      sPop(880);
    }
    for (const m of h.budMats)  m.color.lerpColors(BUD_DRY_COL.from, BUD_DRY_COL.to, h.dry);
    for (const m of h.leafMats) m.color.lerpColors(LEAF_DRY_COL.from, LEAF_DRY_COL.to, h.dry);
    h.sway += dt * 1.4;
    h.grp.rotation.z = Math.sin(h.sway) * 0.06;
  }
}

function makeBin(pos, col) {
  const grp = new THREE.Group(); grp.position.copy(pos);
  const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.7, metalness: 0.1, side: THREE.DoubleSide });
  const w = 1.35, d = 1.0, h = 0.4, th = 0.07;
  const fl = new THREE.Mesh(new THREE.BoxGeometry(w, th, d), mat); fl.position.y = th / 2; fl.receiveShadow = true; grp.add(fl);
  const wLR = (x) => { const m = new THREE.Mesh(new THREE.BoxGeometry(th, h, d), mat); m.position.set(x, h / 2, 0); grp.add(m); };
  const wFB = (z) => { const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, th), mat); m.position.set(0, h / 2, z); grp.add(m); };
  wLR(-w / 2); wLR(w / 2); wFB(-d / 2); wFB(d / 2);
  scene.add(grp); return grp;
}
const stockBin = makeBin(STOCK_POS, 0x2f8a4e);

let actx = null;
function ensureAudio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === "suspended") actx.resume();
  return actx;
}
function noiseBurst(dur, f0, f1, vol, type, q) {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime, len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate), ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.4);
  const src = ac.createBufferSource(); src.buffer = buf;
  const filt = ac.createBiquadFilter(); filt.type = type || "bandpass"; filt.Q.value = q || 0.8;
  filt.frequency.setValueAtTime(f0, t);
  filt.frequency.exponentialRampToValueAtTime(Math.max(60, f1), t + dur);
  const g = ac.createGain(); g.gain.value = vol;
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(t); src.stop(t + dur);
}
function beep(freq, t0, dur, vol) {
  const ac = ensureAudio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = "square"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t0); o.stop(t0 + dur);
}
const sWater = () => noiseBurst(0.11, 900 + Math.random() * 300, 350, 0.13, "lowpass", 0.7);
const sSoil  = () => noiseBurst(0.1, 500, 180, 0.16, "lowpass", 0.6);
const sSnip  = () => { noiseBurst(0.06, 2600, 1200, 0.3, "bandpass", 1.4); const ac = ensureAudio(); if (ac) beep(520 + Math.random() * 60, ac.currentTime, 0.05, 0.12); };
const sPop   = (f) => { const ac = ensureAudio(); if (ac) beep(f || (620 + Math.random() * 120), ac.currentTime, 0.06, 0.16); };
const sErr   = () => { const ac = ensureAudio(); if (ac) beep(150, ac.currentTime, 0.12, 0.2); };
function sSale() { const ac = ensureAudio(); if (!ac) return; const t = ac.currentTime; beep(880, t, 0.12, 0.24); beep(1320, t + 0.08, 0.16, 0.22); }
function sSeve() { const ac = ensureAudio(); if (!ac) return; const t = ac.currentTime; beep(340, t, 0.08, 0.1); beep(480, t + 0.06, 0.1, 0.12); }
function sWhoosh() { noiseBurst(0.25, 300, 1400, 0.18, "bandpass", 0.6); }

const parts = [];
const partGeo = new THREE.BoxGeometry(0.05, 0.05, 0.05);
const dropMat = new THREE.MeshStandardMaterial({ color: 0x7fc4ef, roughness: 0.2 });
const dirtMat = new THREE.MeshStandardMaterial({ color: 0x6b4f35, roughness: 1 });
const leafMatP = new THREE.MeshStandardMaterial({ color: 0x8ecf4a, roughness: 1 });
function spawnPart(pos, vx, vy, vz, mat, floorY) {
  const m = new THREE.Mesh(partGeo, mat || dropMat);
  m.position.copy(pos); scene.add(m);
  parts.push({ mesh: m, vx, vy, vz, dead: false, floorY: floorY || 0.06 });
  while (parts.length > 90) { const p = parts.shift(); scene.remove(p.mesh); }
}
function burstParts(pos, n, mat, floorY) {
  for (let i = 0; i < n; i++)
    spawnPart(new THREE.Vector3(pos.x + (Math.random()-0.5)*0.4, pos.y + 0.15, pos.z + (Math.random()-0.5)*0.4),
      (Math.random()-0.5)*1.4, 1.4 + Math.random()*1.0, (Math.random()-0.5)*1.4, mat, floorY);
}
function updateParts(dt) {
  for (const p of parts) {
    if (p.dead) continue;
    p.vy -= 9 * dt;
    p.mesh.position.x += p.vx * dt; p.mesh.position.y += p.vy * dt; p.mesh.position.z += p.vz * dt;
    p.mesh.rotation.x += dt * 6; p.mesh.rotation.y += dt * 4;
    if (p.mesh.position.y <= p.floorY) { scene.remove(p.mesh); p.dead = true; }
  }
  for (let i = parts.length - 1; i >= 0; i--) if (parts[i].dead) parts.splice(i, 1);
}
const fliers = [];
function spawnFlier(from, to, col, size) {
  const m = new THREE.Mesh(new THREE.ConeGeometry(size || 0.1, (size || 0.1) * 2.2, 8),
    new THREE.MeshStandardMaterial({ color: col, roughness: 0.85 }));
  m.position.copy(from); scene.add(m);
  fliers.push({ mesh: m, from: from.clone(), to: to.clone(), t: 0 });
}
function updateFliers(dt) {
  for (let i = fliers.length - 1; i >= 0; i--) {
    const f = fliers[i];
    f.t = Math.min(1, f.t + dt * 2.2);
    const k = f.t;
    f.mesh.position.lerpVectors(f.from, f.to, k);
    f.mesh.position.y += Math.sin(k * Math.PI) * 1.1;
    f.mesh.rotation.x += dt * 7; f.mesh.rotation.z += dt * 5;
    if (f.t >= 1) { scene.remove(f.mesh); fliers.splice(i, 1); }
  }
}
let shake = 0;
function addShake(a) { shake = Math.min(0.6, shake + a); }

function updateSoil(st, dt) {
  if (!st.pouringSoil || st.phase !== "empty") return;
  st.soil = Math.min(1, st.soil + dt / SOIL_TIME);
  st.soilDisc.visible = st.soil > 0.05;
  st.soilDisc.position.y = st.y + 0.12 + st.soil * 0.36;
  st.soilSack.rotation.z = -0.35;
  spawnPart(new THREE.Vector3(SOIL_POS.x + 0.4, st.y + 0.9, SOIL_POS.z + 0.2),
    (POT_POS.x - SOIL_POS.x) * 1.2, 0.6 + Math.random() * 0.4, (POT_POS.z - SOIL_POS.z) * 1.2, dirtMat, st.y + 0.06);
  st.soilSndT += dt;
  if (st.soilSndT > 0.1) { st.soilSndT = 0; sSoil(); }
  if (st.soil >= 1) {
    st.pouringSoil = false; st.soilSack.rotation.z = 0;
    st.phase = "soil"; sPop(420); addShake(0.06);
    showToast("Terreau prêt — sème une graine 🌱", "#d8c79a");

}

let dragSeed = false, dragSt = null;

function moveSeedGhost(cx, cy) {

function updateWater(st, dt) {
  if (st.watering && (st.phase === "growing" || st.phase === "soil")) {
    st.waterFlow = Math.min(1, st.waterFlow + dt * WATER_RAMP);
    st.moisture = Math.min(MOIST_MAX, st.moisture + WATER_RATE * st.waterFlow * dt);
    st.can.rotation.z = -0.5 - 0.25 * st.waterFlow;
    st.can.position.set(CAN_POS.x - 0.55, st.y + 0.55, CAN_POS.z - 0.1);
    const n = 1 + Math.round(st.waterFlow * 2);
    for (let i = 0; i < n; i++)
      spawnPart(new THREE.Vector3(CAN_POS.x - 1.0, st.y + 0.95, CAN_POS.z - 0.1),
        (POT_POS.x - CAN_POS.x + 0.8) * 1.6 + (Math.random()-0.5)*0.3, 0.4 + Math.random()*0.5,
        (POT_POS.z - CAN_POS.z) * 1.6 + (Math.random()-0.5)*0.3, dropMat, st.y + 0.06);
    st.waterSndT += dt;
    if (st.waterSndT > 0.09) { st.waterSndT = 0; sWater(); }
    if (st.moisture >= MOIST_MAX) { st.watering = false; }
  } else {
    st.waterFlow = Math.max(0, st.waterFlow - dt * 4);
    st.can.rotation.z *= 0.8;
    st.can.position.lerp(st.canHome, 0.2);
  }
}

function updateBoost(st, dt) {
  if (!st.pouringBoost) { st.boostBottle.rotation.z *= 0.8; return; }
  if (st.phase !== "growing" || curBoost === "none") { st.pouringBoost = false; return; }
  if (st[curBoost === "fert" ? "fert" : "pgr"]) { st.pouringBoost = false; showToast("Déjà versé sur cette plante", "#e6c896"); return; }
  if ((doses[curBoost] || 0) <= 0) { st.pouringBoost = false; showToast("Plus de doses — boutique 🛒", "#ff6b6b"); sErr(); return; }
  st.boostBottle.rotation.z = -0.6;
  st.boostT += dt;
  spawnPart(new THREE.Vector3(BOOST_POS.x - 0.3, st.y + 0.7, BOOST_POS.z),
    (POT_POS.x - BOOST_POS.x) * 1.5, 0.5 + Math.random() * 0.4, (POT_POS.z - BOOST_POS.z) * 1.5,
    new THREE.MeshStandardMaterial({ color: BOOST_COLS[curBoost], roughness: 0.6 }), st.y + 0.06);
  if (st.boostT >= 0.7) {
    st.pouringBoost = false; st.boostT = 0;
    doses[curBoost]--; saveDoses();
    if (curBoost === "fert") { st.fert = true; showToast("Engrais versé 🌼 +qualité", "#e3c05f"); }
    else { st.pgr = true; showToast("PGR versé 🧪 +rendement, qualité plafonnée", "#d06060"); }
    sPop(460); addShake(0.06); updateResources();
  }
}

/* -------------------------------------------------------------------------
   13) POUSSE : humidité, feuilles gourmandes, croissance, maturité (par étage)
   ------------------------------------------------------------------------- */
function activeLeaves(st) { let n = 0; for (const L of st.gLeaves) if (L.active) n++; return n; }
function spawnLeaf(st) {
  for (const L of st.gLeaves) {
    if (L.active) continue;
    L.active = true; L.age = 0;
    L.t = 0.3 + Math.random() * 0.55;
    L.ang = Math.random() * Math.PI * 2;
    L.grp.visible = true; L.mat.color.copy(LEAF_FRESH);
    sPop(300);
    return;
  }
}
function placeLeaf(st, L) {
  const y = L.t * PLANT_H * Math.max(0.25, st.growth);
  L.grp.position.set(Math.cos(L.ang) * 0.1, y, Math.sin(L.ang) * 0.1);
  L.grp.rotation.y = L.ang;
  L.grp.rotation.z = 0.9;
}
function cutLeaf(st, L) {
  L.active = false; L.grp.visible = false;
  st.moisture = Math.max(0, st.moisture - CUT_THIRST);       // tailler assoiffe
  for (const b of st.buds) if (!b.userData.taken) b.userData.g = Math.min(1, (b.userData.g || 0) + 0.15);
  const wp = new THREE.Vector3();
  L.grp.getWorldPosition(wp);
  burstParts(wp, 6, leafMatP, st.y + 0.06);
  sSnip(); sSeve(); addShake(0.1);
}
function updateGrow(st, dt) {
  if (st.phase !== "growing") return;
  st.moisture = Math.max(0, st.moisture - MOIST_DRAIN * dt);
  if (owned.drip && st.moisture < MOIST_BAND[0] + 0.05) st.moisture += (MOIST_DRAIN + 0.004) * dt * 2;
  if (st.moisture > SOGGY_UNTIL) st.soggyT = 4;
  else st.soggyT = Math.max(0, st.soggyT - dt);
  st.puddle.visible = st.moisture > SOGGY_UNTIL;

  const m = st.moisture;
  let mf;
  if (m < 0.1) mf = 0.15;
  else if (m < MOIST_BAND[0]) mf = 0.5;
  else if (m <= MOIST_BAND[1]) mf = 1;
  else mf = 0.6;
  if (st.soggyT > 0) mf = Math.min(mf, 0.5);
  st.careWater += ((m >= MOIST_BAND[0] && m <= MOIST_BAND[1]) ? 1 : (m < 0.1 ? 0 : 0.5)) * dt / GROW_TIME;

  st.leafTimer -= dt;
  const leafMult = owned.tuteur ? 1.8 : 1;
  if (st.leafTimer <= 0 && activeLeaves(st) < LEAF_MAX && st.growth > 0.15 && st.growth < 0.97) {
    spawnLeaf(st);
    st.leafTimer = (LEAF_EVERY[0] + Math.random() * (LEAF_EVERY[1] - LEAF_EVERY[0])) * leafMult;
  }
  let slow = 1;
  for (const L of st.gLeaves) {
    if (!L.active) continue;
    L.age += dt;
    const hard = L.age > LEAF_HARDEN;
    L.mat.color.lerpColors(LEAF_FRESH, LEAF_HARD, Math.min(1, L.age / LEAF_HARDEN));
    st.qualTrim = Math.max(0.4, st.qualTrim - LEAF_DRAIN * (hard ? 2 : 1) * dt);
    slow -= LEAF_SLOW;
    placeLeaf(st, L);
  }
  if (owned.secat) {
    st.secatT += dt;
    if (st.secatT > 1.5) {
      st.secatT = 0;
      for (const L of st.gLeaves) if (L.active && L.age > 7) { cutLeaf(st, L); break; }
    }
  }

  const lamp = owned.led ? 1.25 : 1;
  st.growth = Math.min(1, st.growth + (dt / GROW_TIME) * mf * Math.max(0.5, slow) * lamp);
  if (st.growth >= 1) {
    st.phase = "mature";
    st.branchesLeft = N_BRANCH;
    for (const L of st.gLeaves) { L.active = false; L.grp.visible = false; }
    sSale(); addShake(0.15);
    showToast("Pot " + (st.lvl + 1) + " mûr ! Coupe-le en branches ✂️", "#bdf0a3");
  }
}
function plantQuality(st) {
  let q = QUAL_BASE + QUAL_WATER * Math.min(1, st.careWater) + QUAL_TRIM * st.qualTrim;
  if (st.fert) q += BOOSTS.fert.qualBonus;
  if (st.pgr) q = Math.min(q, BOOSTS.pgr.qualCap);
  return Math.max(0.2, Math.min(1, q));
}
function plantYield(st) {
  let y = st.seed.yield * (YIELD_FLOOR + (1 - YIELD_FLOOR) * Math.min(1, st.careWater));
  if (st.pgr) y *= BOOSTS.pgr.yieldMult;
  return y;
}
function updatePlantVisual(st, dt) {
  const g = st.growth;
  const show = st.phase === "growing" || st.phase === "mature";
  st.plantGroup.visible = show;
  if (!show) return;
  const h = Math.max(0.1, g) * PLANT_H;
  st.stem.scale.set(1, h, 1); st.stem.position.y = h / 2;
  st.plantHit.scale.set(1, h + 0.3, 1); st.plantHit.position.y = h / 2;
  for (const br of st.branches) {
    const t = br.userData.t;
    const k = Math.max(0, Math.min(1, (g - t * 0.6) * 3));
    br.position.y = t * h;
    br.scale.setScalar(0.15 + 0.85 * k * Math.max(0.3, g));
    br.visible = k > 0.02;
  }
  for (const b of st.buds) {
    const u = b.userData;
    if (u.taken) { b.visible = false; continue; }
    const appear = Math.max(0, Math.min(1, (g - 0.55) * 3.2));
    b.visible = appear > 0.02;
    b.position.set(Math.cos(u.ang) * u.off, u.t * h, Math.sin(u.ang) * u.off);
    const swell = 1 + (u.g || 0) * 0.5;
    const pulse = st.phase === "mature" ? 1 + 0.06 * Math.sin(performance.now() / 240 + u.ang) : 1;
    b.scale.setScalar(appear * swell * pulse);
    b.children[0].material.emissiveIntensity = st.phase === "mature" ? 0.5 : 0.0;
  }
  const droop = st.phase === "growing" && st.moisture < MOIST_BAND[0] ? 0.14 : 0;
  st.plantGroup.rotation.z += (droop - st.plantGroup.rotation.z) * Math.min(1, dt * 3);
  st.soilMat.color.lerpColors(SOIL_DRY, SOIL_WET, Math.min(1, st.moisture));
}

/* -------------------------------------------------------------------------
   14) COUPER LE PLANT (swipe vif : une branche part sécher au séchoir)
   ------------------------------------------------------------------------- */
function tryCutdownAt(st, cx, cy, speed) {
  if (!st || st.phase !== "mature" || speed < SWIPE_CUT || st.cutCd > 0) return false;
  if (!rayHit(cx, cy, [st.plantHit])) return false;
  const hook = hooks.find(h => !h.used);
  if (!hook) { showToast("Le séchoir est plein — frotte les branches sèches 🪢", "#e6c896"); sErr(); st.cutCd = 0.6; return true; }
  st.cutCd = CUT_COOLDOWN;
  hook.used = true;
  hook.g = plantYield(st) / N_BRANCH;
  hook.qual = plantQuality(st);
  hook.variety = (st.seed && st.seed.variety) || null;   // embed : la branche hérite la variété
  hook.sentG = 0; hook.sentQsum = 0; hook.trimSent = 0;  // comptes par branche (embed → Récolte)
  attachBranch(hook);
  let hidden = 0;
  for (const b of st.buds) {
    if (hidden >= 2) break;
    if (b.visible && !b.userData.taken) { b.userData.taken = true; b.visible = false; hidden++; }
  }
  st.branchesLeft--;
  const wp = new THREE.Vector3(POT_POS.x, st.y + 1.4, POT_POS.z);
  spawnFlier(wp, new THREE.Vector3(hook.x, LINE_Y - 0.4, LINE_Z), 0x3f7a34, 0.12);
  burstParts(wp, 5, leafMatP, st.y + 0.06);
  sSnip(); addShake(0.1);
  if (st.branchesLeft <= 0) finishCutdown(st);
  return true;
}
function finishCutdown(st) {
  const q = plantQuality(st), y = Math.round(plantYield(st));
  addXP(Math.max(4, Math.round(y * 0.3)));
  showToast("Plant coupé : ~" + y + " g au séchage 🌬️ (qualité " + Math.round(q * 100) + "%" +
    (st.pgr ? ", PGR" : st.fert ? ", engrais" : "") + ")", "#bdf0a3");
  sSale(); addShake(0.2);
  st.phase = "empty"; st.soil = 0; st.growth = 0; st.moisture = 0;
  st.soilDisc.visible = false; st.puddle.visible = false;
  st.plantGroup.rotation.z = 0;
}

/* -------------------------------------------------------------------------
   15) RÉCOLTER AU SÉCHOIR (frotter : lent = têtes A, vif = trim ; humide = malus)
   ------------------------------------------------------------------------- */
function tryBuckAt(cx, cy, speed) {
  const hitObjs = [];
  for (const h of hooks) if (h.used) for (const b of h.buds) if (!b.taken) hitObjs.push(b.hit);
  if (!hitObjs.length) return false;
  const hits = rayHits(cx, cy, hitObjs);
  if (!hits.length) return false;
  const { hook, idx } = hits[0].object.userData.ref;
  const bud = hook.buds[idx];
  if (bud.taken) return false;
  bud.taken = true; bud.mesh.visible = false; bud.hit.position.set(0, 99, 0);
  const budG = hook.g / BUDS_PER_BRANCH;
  const wp = new THREE.Vector3(); bud.mesh.getWorldPosition(wp);
  if (speed > HARVEST_FAST) {
    if (EMBED) hook.trimSent += budG; else trimG += budG;   // embed : partira en miettes
    spawnFlier(wp, new THREE.Vector3(TRIM_POS.x, 0.4, TRIM_POS.z), 0x6f7a3a, 0.09);
    setHeap(trimHeap, trimG, 120);
    sPop(280); showToast("Trop vif ! → trim 🍂", "#d8cf9a");
  } else {
    const q = Math.max(0.2, Math.min(1, hook.qual + DRY_QUAL_BONUS * hook.dry - WET_MALUS * (1 - hook.dry)));
    if (hook.dry < 0.99 && !hook.wetWarned) { hook.wetWarned = true; showToast("Encore humide ! qualité en baisse 💧", "#e6c896"); }
    if (EMBED) { hook.sentG += budG; hook.sentQsum += budG * q; }   // part à la Récolte en fin de branche
    else { stock.g += budG; stock.qsum += budG * q; }
    spawnFlier(wp, new THREE.Vector3(STOCK_POS.x, 0.4, STOCK_POS.z), 0x3f7a34, 0.11);
    setHeap(stockHeap, stock.g, 200);
    sPop(700 + idx * 40);
  }
  burstParts(wp, 4, leafMatP); addShake(0.05);
  updateCount(); updateResources();
  if (hook.buds.every(b => b.taken)) {
    if (EMBED) embSendBranch(hook);   // branchage séché → app Récolte (bigo-txn branchesAdd)
    removeBranch(hook);
    burstParts(new THREE.Vector3(hook.x, LINE_Y - 0.5, LINE_Z), 5, leafMatP);
  }
  return true;
}

/* -------------------------------------------------------------------------
   16) VENDRE : STOCK par sachets (tap / maintenir), TRIM bradé
   ------------------------------------------------------------------------- */
let bagging = false, bagHoldT = 0;
function sellOnce() {
  if (EMBED) return false;   // pas de vente locale en embed : le séché part à la Récolte
  if (stock.g < 0.05) { showToast("Rien à vendre — récolte d'abord", "#e6c896"); sErr(); return false; }
  const take = Math.min(fmt, stock.g);
  const q = stockQual();
  const r = Math.min(1, take / stock.g);
  stock.qsum *= (1 - r); stock.g = Math.max(0, stock.g - take);
  if (stock.g < 0.05) { stock.g = 0; stock.qsum = 0; }
  const price = take * FMT_PRICE[fmt] * q * levelMult();
  setCash(cash + price); addXP(Math.max(1, Math.round(price * 0.06)));
  setHeap(stockHeap, stock.g, 200);
  sPop(760); burstParts(new THREE.Vector3(STOCK_POS.x, 0.3, STOCK_POS.z), 3, leafMatP);
  updateCount();
  return true;
}
function updateBagging(dt) {
  if (!bagging) return;
  bagHoldT += dt;
  if (bagHoldT >= BAG_HOLD) { bagHoldT = 0; if (!sellOnce()) bagging = false; }
}
function sellTrim() {
  if (EMBED) return;   // embed : le trim part en miettes au parent, jamais vendu ici
  if (trimG < 0.5) { showToast("Pas de trim à brader", "#e6c896"); sErr(); return; }
  const price = trimG * TRIM_PRICE * levelMult();
  setCash(cash + price); addXP(Math.max(1, Math.round(price * 0.06)));
  showToast("Trim bradé : " + Math.round(trimG) + " g → +" + Math.round(price) + " €", "#d8cf9a");
  trimG = 0; setHeap(trimHeap, 0, 120);
  sSale(); updateResources();
}

/* -------------------------------------------------------------------------
   17) NAVIGATION : scènes (swipe ←→) et étages (swipe ↑↓)
   ------------------------------------------------------------------------- */
let curScene = "culture", curPot = 0, wantX = 0, wantY = BASE_TY;
const scBtns = { culture: document.getElementById("sc-culture"), sechoir: document.getElementById("sc-sechoir") };
function goScene(k) {
  if (curScene === k) return;
  curScene = k;
  wantX = k === "sechoir" ? SECHOIR_X : 0;
  wantY = k === "sechoir" ? BASE_TY : BASE_TY + curPot * LEVEL_H;
  scBtns.culture.classList.toggle("on", k === "culture");
  scBtns.sechoir.classList.toggle("on", k === "sechoir");
  ensureAudio(); sWhoosh();
  renderPotDots();
}
function goPot(i) {
  i = Math.max(0, Math.min(stations.length - 1, i));
  if (curScene !== "culture") { curPot = i; goScene("culture"); return; }
  if (i === curPot) return;
  curPot = i;
  wantY = BASE_TY + curPot * LEVEL_H;
  ensureAudio(); sWhoosh();
  renderPotDots();
}
scBtns.culture.addEventListener("click", () => goScene("culture"));
scBtns.sechoir.addEventListener("click", () => goScene("sechoir"));
function renderPotDots() {
  ui.potdots.style.display = (curScene === "culture" && stations.length > 1) ? "flex" : "none";
  if (ui.potdots.childElementCount !== stations.length) {
    ui.potdots.innerHTML = "";
    stations.forEach((s, i) => {
      const b = document.createElement("button");
      b.className = "potdot"; b.dataset.pot = i;
      b.addEventListener("click", () => goPot(i));
      ui.potdots.appendChild(b);
    });
  }
  [...ui.potdots.children].forEach((b, i) => b.classList.toggle("on", i === curPot));
}
function activeStation() { return curScene === "culture" ? stations[curPot] : null; }

/* -------------------------------------------------------------------------
   18) GUIDAGE
   ------------------------------------------------------------------------- */
function stationStep(st) {
  if (st.phase === "mature") return "cutdown";
  if (st.phase === "growing") {
    if (st.gLeaves.some(L => L.active)) return "cut";
    if (st.moisture < MOIST_BAND[0]) return "water";
    return "grow";
  }
  if (st.phase === "soil") return seedAvail() > 0 ? "seed" : "buySeed";
  return "empty";
}
function currentStep() {
  const act = stationStep(stations[curPot]);
  if (act === "cutdown" || act === "cut" || act === "water" || act === "seed" || act === "buySeed")
    return { step: act, pot: curPot };
  for (let i = 0; i < stations.length; i++) {
    if (i === curPot) continue;
    const s2 = stationStep(stations[i]);
    if (s2 === "cutdown" || s2 === "cut" || s2 === "water") return { step: s2, pot: i };
  }
  if (anyDryBranch()) return { step: "buck" };
  if (act === "empty") return { step: "soilPour", pot: curPot };
  if (stock.g >= 0.05) return { step: "sell" };
  if (anyBranch()) return { step: "dryWait", pot: curPot };
  return { step: "grow", pot: curPot };
}
const PROMPTS = {
  soilPour: "🟤 Maintiens le SAC DE TERREAU pour remplir le pot",
  seed:     "🌱 Glisse une GRAINE de la caisse jusqu'au pot",
  buySeed:  "🛒 Plus de graines — achète-en à la boutique",
  water:    "💧 Maintiens l'ARROSOIR — lâche quand la terre est sombre",
  cut:      "✂️ SWIPE VIF sur la feuille gourmande (sans toucher les têtes)",
  grow:     "🌱 Ça pousse… surveille la soif et les feuilles gourmandes",
  cutdown:  "✂️ SWIPE VIF sur le plant — chaque coupe part au séchoir",
  buck:     "🌿 FROTTE une branche SÈCHE — LENT = têtes A, vif = trim",
  dryWait:  "🌬️ Ça sèche à côté… resème en attendant (frotter humide = −qualité)",
  sell:     "📦 Tape (ou maintiens) le bac STOCK pour vendre",
};
const STEP_POS = { soilPour: SOIL_POS, seed: SEED_POS, water: CAN_POS, cut: POT_POS,
  cutdown: POT_POS, buck: LINE_POS, dryWait: SOIL_POS, sell: STOCK_POS };
const STEP_SCENE = { buck: "sechoir", sell: "sechoir" };
const STEP_SHORT = { water: "💧 soif", cut: "✂️ feuille", cutdown: "✂️ mûr !" };
let glowPhase = 0;
function updateGuide(dt) {
  const cur = currentStep();
  const step = cur.step;
  const scn = STEP_SCENE[step] || "culture";
  let text = PROMPTS[step];
  let here = true;
  if (scn !== curScene) {
    here = false;
    text = scn === "sechoir" ? "⬅️ SWIPE vers le SÉCHOIR — " + (step === "sell" ? "vends le stock" : "branches sèches")
                             : "➡️ SWIPE vers la CULTURE";
  } else if (cur.pot !== undefined && cur.pot !== curPot && curScene === "culture") {
    here = false;
    const dir = cur.pot > curPot ? "⬆️" : "⬇️";
    text = dir + " SWIPE — Pot " + (cur.pot + 1) + " : " + (STEP_SHORT[step] || step);
  }
  if (ui.prompt.textContent !== text) ui.prompt.textContent = text;
  scBtns.sechoir.classList.toggle("pulse", curScene === "culture" && scn === "sechoir");
  scBtns.culture.classList.toggle("pulse", curScene === "sechoir" && scn === "culture");
  const nBr = hooks.filter(h => h.used).length;
  const sechLabel = "🌬️ Séchoir" + (nBr ? " · " + nBr : "");
  if (scBtns.sechoir.textContent !== sechLabel) scBtns.sechoir.textContent = sechLabel;
  [...ui.potdots.children].forEach((b, i) =>
    b.classList.toggle("pulse", i !== curPot && cur.pot === i && curScene === "culture"));
  ui.shopbtn.classList.toggle("pulse", !EMBED && step === "buySeed");   // embed : graines sur OnionMarket, pas ici
  const pos = here ? STEP_POS[step] : null;
  glow.visible = !!pos;
  if (pos) {
    glowPhase += dt * 3.5;
    const p = 0.5 + 0.5 * Math.sin(glowPhase);
    glow.position.x = pos.x; glow.position.z = pos.z;
    glow.position.y = (scn === "culture" && cur.pot !== undefined ? stations[cur.pot].y : 0) + 0.04;
    glow.material.opacity = 0.12 + 0.16 * p;
    const s = 0.85 + 0.18 * p; glow.scale.set(s, s, s);
  }
}

/* -------------------------------------------------------------------------
   19) ENTRÉES : stations raycastées, swipes de jeu, swipes de NAVIGATION
   ------------------------------------------------------------------------- */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const el = renderer.domElement;
function rayHits(cx, cy, objs, recursive) {
  const r = el.getBoundingClientRect();
  ndc.x = ((cx - r.left) / r.width) * 2 - 1;
  ndc.y = -((cy - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  return raycaster.intersectObjects(objs, !!recursive);
}
function rayHit(cx, cy, objs, recursive) { return rayHits(cx, cy, objs, recursive).length > 0; }

const pointers = new Map();
let pinching = false, pinchStartDist = 0, pinchStartZoom = 1;
let gesture = null, lastX = 0, lastY = 0, lastT = 0;
let navX0 = 0, navY0 = 0, navConsumed = false;   // le swipe libre : jeu d'abord, navigation sinon
function pinchDist() { const a = [...pointers.values()]; return Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y); }
function stopAllGestures() {
  for (const st of stations) { st.pouringSoil = false; st.watering = false; st.pouringBoost = false; }
  bagging = false; dragSeed = false; dragSt = null; seedGhost.visible = false;
}
function startPinch() {
  pinching = true; gesture = null; stopAllGestures();
  pinchStartDist = pinchDist() || 1; pinchStartZoom = zoom;
}
function updatePinch() {
  zoom = Math.max(0.6, Math.min(2.6, pinchStartZoom * (pinchDist() / pinchStartDist)));
  STORE.setItem("plant_zoom", zoom.toFixed(3)); fitView();
}

el.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size >= 2) { startPinch(); return; }
  ensureAudio();
  lastX = e.clientX; lastY = e.clientY; lastT = performance.now();

  if (rayHit(e.clientX, e.clientY, stockBin.children.concat([stockHeap]))) {
    if (EMBED) { showToast("Le branchage séché part à l'app 🌿 Récolte", "#bdf0a3"); return; }
    if (stock.g >= 0.05) { gesture = "bag"; bagging = true; bagHoldT = 0; sellOnce(); }
    else showToast("Récolte d'abord 🌿", "#e6c896");
    return;
  }
  if (rayHit(e.clientX, e.clientY, trimBin.children.concat([trimHeap]))) {
    if (EMBED) { showToast("Le trim part en miettes → planque", "#d8cf9a"); return; }
    sellTrim(); return;
  }

  const st = activeStation();
  if (st) {
    if (rayHit(e.clientX, e.clientY, st.sackPick)) {
      if (st.phase === "empty") { gesture = "soil"; st.pouringSoil = true; }
      else if (st.phase === "soil") showToast("Le pot est prêt — sème 🌱", "#e6c896");
      else showToast("Le pot est occupé", "#e6c896");
      return;
    }
    if (rayHit(e.clientX, e.clientY, st.seedCrate.children)) {
      if (st.phase !== "soil") { showToast(st.phase === "empty" ? "Verse d'abord le terreau 🟤" : "Le pot est occupé", "#e6c896"); return; }
      if (seedAvail() <= 0) { showToast(NO_SEED_MSG, "#ff6b6b"); sErr(); return; }
      gesture = "seed"; dragSeed = true; dragSt = st; seedGhost.visible = true;
      dragPlane.constant = -(0.7 + st.y);
      moveSeedGhost(e.clientX, e.clientY);
      return;
    }
    if (rayHit(e.clientX, e.clientY, st.can.children)) {
      if (st.phase === "growing" || st.phase === "soil") { gesture = "water"; st.watering = true; }
      else showToast("Rien à arroser", "#e6c896");
      return;
    }
    if (rayHit(e.clientX, e.clientY, st.boostBottle.children)) {
      if (curBoost === "none") showToast("Choisis un boost en bas (🌼 ou 🧪)", "#e6c896");
      else if (st.phase !== "growing") showToast("À verser pendant la pousse", "#e6c896");
      else { gesture = "boost"; st.pouringBoost = true; st.boostT = 0; }
      return;
    }
  }
  // Swipe libre : jeu (taille/coupe/frotté) s'il touche, sinon NAVIGATION au relâcher.
  gesture = "free"; navX0 = e.clientX; navY0 = e.clientY; navConsumed = false;
}, { passive:false });

el.addEventListener("pointermove", (e) => {
  if (pointers.has(e.pointerId)) pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pinching && pointers.size >= 2) { e.preventDefault(); updatePinch(); return; }
  const now = performance.now();
  const dtms = Math.max(1, now - lastT);
  const speed = Math.hypot(e.clientX - lastX, e.clientY - lastY) / dtms * 1000;   // px/s
  if (gesture === "seed") moveSeedGhost(e.clientX, e.clientY);
  if (gesture === "free") {
    const st = activeStation();
    // Tailler : il faut de l'intention (seuil de vélocité, façon Fruit Ninja)
    if (st && st.phase === "growing" && speed >= SWIPE_CUT) {
      const hits = rayHits(e.clientX, e.clientY, st.gLeaves.filter(L => L.active).map(L => L.hit));
      if (hits.length) {
        const L = st.gLeaves.find(x => x.hit === hits[0].object);
        if (L && L.active) { cutLeaf(st, L); navConsumed = true; }
      }
    }
    // Couper le plant mûr : chaque swipe vif détache une branche vers le séchoir
    if (tryCutdownAt(st, e.clientX, e.clientY, speed)) navConsumed = true;
    // Récolter au séchoir : frotter les branches, la vitesse fait le tri A/trim
    if (tryBuckAt(e.clientX, e.clientY, speed)) navConsumed = true;
  }
  lastX = e.clientX; lastY = e.clientY; lastT = now;
}, { passive:false });

function onUp(e) {
  if (e) e.preventDefault();
  pointers.delete(e.pointerId);
  if (pinching && pointers.size < 2) pinching = false;
  if (pointers.size === 0) {
    if (gesture === "seed") dropSeed();
    // Navigation au swipe : uniquement un geste libre qui n'a rien touché.
    if (gesture === "free" && !navConsumed && e) {
      const dx = e.clientX - navX0, dy = e.clientY - navY0;
      if (Math.abs(dx) > NAV_DIST && Math.abs(dx) > Math.abs(dy) * NAV_RATIO) {
        // Contenu tiré vers la gauche = on va voir ce qu'il y a à droite (séchoir).
        goScene(dx < 0 ? "sechoir" : "culture");
      } else if (Math.abs(dy) > NAV_DIST && Math.abs(dy) > Math.abs(dx) * NAV_RATIO && curScene === "culture") {
        // Swipe vers le haut = étage suivant (au-dessus), vers le bas = en dessous.
        goPot(dy < 0 ? curPot + 1 : curPot - 1);
      }
    }
    stopAllGestures();
    gesture = null;
  }
}
el.addEventListener("pointerup", onUp, { passive:false });
el.addEventListener("pointercancel", onUp, { passive:false });

/* -------------------------------------------------------------------------
   19bis) DEBUG (outil de test) : échelle de temps, cash, raccourcis, reset.
   L'échelle de temps n'accélère QUE les timers diégétiques (pousse, soif,

   ------------------------------------------------------------------------- */
let timeScale = 1;
const dbgPanel = document.getElementById("dbg");
document.getElementById("dbgbtn").addEventListener("click", () => dbgPanel.classList.toggle("show"));
for (const b of document.querySelectorAll(".tsbtn")) b.addEventListener("click", () => {

});
document.getElementById("dbg-stuff").addEventListener("click", () => {

document.getElementById("dbg-grow").addEventListener("click", () => {

  else showToast("Rien ne pousse", "#e6c896");
});
document.getElementById("dbg-dry").addEventListener("click", () => {
  let n = 0;
  for (const h of hooks) if (h.used && h.dry < 0.99) { h.dry = 0.995; n++; }
  if (n) { sPop(880); showToast(n + " branche(s) séchée(s) (debug)", "#bdf0a3"); }
  else showToast("Rien à sécher", "#e6c896");
});
document.getElementById("dbg-reset").addEventListener("click", () => {
  if (!confirm("RESET total : sauvegarde effacée. Sûr ?")) return;
  // Embed : le shim mémoire disparaît au reload — on ne touche JAMAIS au localStorage.
  if (!EMBED) for (const k of Object.keys(localStorage)) if (k.startsWith("plant_")) localStorage.removeItem(k);
  location.reload();
});

document.getElementById("reset").addEventListener("click", rescue);
function rescue() {
  if (EMBED) { showToast(NO_SEED_MSG, "#e6c896"); return; }   // embed : pas de graine gratuite
  const sd = SEED_BY[curSeed];
  if ((seeds[curSeed] || 0) > 0 || cash >= sd.cost) { renderShop(); ui.shop.classList.add("show"); return; }
  seeds.lemon = (seeds.lemon || 0) + 1; curSeed = "lemon";
  STORE.setItem("plant_seed", curSeed); saveSeeds(); updateResources();
  showToast("Graine de dépannage : +1 Lemon Skunk 🍋", "#bdf0a3");
}
ui.shopbtn.addEventListener("click", () => { renderShop(); ui.shop.classList.add("show"); });
document.getElementById("shopclose").addEventListener("click", () => ui.shop.classList.remove("show"));
ui.shop.addEventListener("click", (e) => { if (e.target === ui.shop) ui.shop.classList.remove("show"); });
for (const b of document.querySelectorAll(".fmtbtn")) b.addEventListener("click", () => setFmt(+b.dataset.fmt));
for (const b of document.querySelectorAll(".boostbtn")) b.addEventListener("click", () => setBoost(b.dataset.boost));

function setFmt(f) {
  fmt = f; STORE.setItem("plant_fmt", String(f));
  for (const b of document.querySelectorAll(".fmtbtn")) b.classList.toggle("on", +b.dataset.fmt === f);
}
function setBoost(key) {
  if (!BOOSTS[key]) return;
  curBoost = key; STORE.setItem("plant_boost", key);
  if (key !== "none") for (const st of stations) st.bottleMat.color.setHex(BOOST_COLS[key]);
  updateBoostBar();
}
function updateBoostBar() {
  for (const b of document.querySelectorAll(".boostbtn")) {
    const k = b.dataset.boost;
    b.classList.toggle("on", k === curBoost);
    b.classList.toggle("empty", k !== "none" && (doses[k] || 0) <= 0);
  }
}

/* -------------------------------------------------------------------------
   20) ÉTIQUETTES + état debug (captures de test)
   ------------------------------------------------------------------------- */
function updateLabels() {
  for (const st of stations) {
    if (st.phase === "growing" || st.phase === "mature") {
      const pct = Math.round(st.growth * 100);
      st.potLabel.textContent = st.phase === "mature" ? "✂️ MÛR — COUPE !" :
        "🌱 " + st.seed.name + " " + pct + "%" + (st.moisture < MOIST_BAND[0] ? " · 💧!" : "");
    } else st.potLabel.textContent = "🪴 POT " + (st.lvl + 1);
    placeLabel(st.potLabel, POT_POS.x, st.y + 2.15, POT_POS.z);
  }
  stockLabel.textContent = EMBED ? "📦 → RÉCOLTE " + Math.round(embSentG) + " g"
                                 : "📦 STOCK " + Math.round(stock.g) + " g";
  placeLabel(stockLabel, STOCK_POS.x, 0.55, STOCK_POS.z);
  trimLabel.textContent = EMBED ? "🍂 MIETTES " + Math.round(embTrimG) + " g"
                                : "🍂 TRIM " + Math.round(trimG) + " g";
  placeLabel(trimLabel, TRIM_POS.x, 0.55, TRIM_POS.z);
  const used = hooks.filter(h => h.used);
  if (used.length) {
    const minDry = Math.min(...used.map(h => h.dry));
    lineLabel.textContent = minDry >= 0.99 ? "🪢 SEC — frotte 🌿" :
      "🪢 SÉCHAGE " + Math.round(minDry * 100) + "%";
    placeLabel(lineLabel, SECHOIR_X, LINE_Y + 0.3, LINE_Z);
  } else lineLabel.style.display = "none";

  // État + positions écran pour les captures de test (tools/drive-plantation.mjs)
  const act = stations[curPot];
  const proj = (p, y) => { _lv.set(p.x, (y || 0.4), p.z).project(camera);
    return { x: (_lv.x * 0.5 + 0.5) * window.innerWidth, y: (-_lv.y * 0.5 + 0.5) * window.innerHeight }; };
  window.__pl = { phase: act.phase, growth: act.growth, moisture: act.moisture,
    stockG: stock.g, trimG, leaves: activeLeaves(act), gesture, soil: act.soil,
    scene: curScene, potIdx: curPot, pots: stations.map(s => ({ phase: s.phase, growth: +s.growth.toFixed(2) })),
    emb: EMBED ? { seeds: { ...bigoSeeds }, variety: embVariety, sentG: +embSentG.toFixed(1), trimG: +embTrimG.toFixed(1) } : null,
    plantTop: proj(POT_POS, act.y + 1.4),
    branches: hooks.map(h => h.used ? { dry: +h.dry.toFixed(2) } : null),
    sack: proj(SOIL_POS, act.y + 0.5), seed: proj(SEED_POS, act.y + 0.3), pot: proj(POT_POS, act.y + 0.4),
    can: proj(CAN_POS, act.y + 0.4), boost: proj(BOOST_POS, act.y + 0.4), stock: proj(STOCK_POS, 0.2),
    trim: proj(TRIM_POS, 0.2),
    leafPos: act.gLeaves.filter(L => L.active).map(L => { const wp = new THREE.Vector3(); L.hit.getWorldPosition(wp);
      _lv.copy(wp).project(camera);
      return { x: (_lv.x * 0.5 + 0.5) * window.innerWidth, y: (-_lv.y * 0.5 + 0.5) * window.innerHeight }; }),
    branchBuds: hooks.flatMap(h => h.used ? h.buds.filter(b => !b.taken).map(b => {
      const wp = new THREE.Vector3(); b.mesh.getWorldPosition(wp);
      _lv.copy(wp).project(camera);
      return { x: (_lv.x * 0.5 + 0.5) * window.innerWidth, y: (-_lv.y * 0.5 + 0.5) * window.innerHeight }; }) : []) };
}

/* -------------------------------------------------------------------------
   21) BOUCLE PRINCIPALE
   ------------------------------------------------------------------------- */
let last = 0;
function loop(t) {
  const dt = Math.min((t - last) / 1000 || 0, 0.05); last = t;
  const dts = dt * timeScale;          // temps diégétique (debug : accéléré)
  for (const st of stations) {
    updateSoil(st, dt);
    updateWater(st, dt);
    updateBoost(st, dt);
    updateGrow(st, dts);
    updatePlantVisual(st, dt);
    st.cutCd = Math.max(0, st.cutCd - dt);
  }
  updateLine(dts);
  updateBagging(dt);
  updateParts(dt);
  updateFliers(dt);
  updateGuide(dt);
  // Travelling entre scènes/étages (la caméra glisse le long de la cave)
  if (Math.abs(VIEW_TARGET.x - wantX) > 0.002 || Math.abs(VIEW_TARGET.y - wantY) > 0.002) {
    VIEW_TARGET.x += (wantX - VIEW_TARGET.x) * Math.min(1, dt * 5);
    VIEW_TARGET.y += (wantY - VIEW_TARGET.y) * Math.min(1, dt * 5);
    fitView();
  }
  if (shake > 0) { shake *= Math.pow(0.0008, dt); if (shake < 0.002) shake = 0; }
  camera.position.copy(baseCamPos);
  if (shake > 0) {
    camera.position.x += (Math.random() - 0.5) * shake;
    camera.position.y += (Math.random() - 0.5) * shake;
    camera.position.z += (Math.random() - 0.5) * shake;
  }
  camera.lookAt(VIEW_TARGET);
  updateLabels();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

   22) BOOTSTRAP

makeStation(0);
ensurePots();

/* -------------------------------------------------------------------------
   23) MODE EMBED "bigo" — init (contrat : le-bigo/BUS.md ; slug "plantation")
   Handshake bigo-ready → le parent répond bigo-state {cash, seeds:{Variete:n}…}.
   Le cash affiché est celui du PARENT ; les graines viennent d'OnionMarket ;
   le séché part à l'app Récolte (branchesAdd), le trim en miettes.
   ------------------------------------------------------------------------- */
function renderVarietyBar() {
  if (!varbar) return;
  const avail = Object.keys(EMB_SEEDS).filter(k => (bigoSeeds[k] || 0) > 0);
  if (embVariety && !avail.includes(embVariety)) embVariety = null;
  if (!embVariety && avail.length) embVariety = avail[0];   // défaut : première variété dispo
  varbar.innerHTML = "";
  const lbl = document.createElement("span"); lbl.className = "lbl";
  lbl.textContent = avail.length ? "Graine" : "🧅 Graines : achète sur OnionMarket";
  varbar.appendChild(lbl);
  for (const k of avail) {
    const b = document.createElement("button");
    b.className = "selbtn varbtn" + (k === embVariety ? " on" : "");
    b.textContent = EMB_SEEDS[k].icon + " " + k + " ×" + bigoSeeds[k];
    b.addEventListener("click", () => { embVariety = k; updateResources(); });
    varbar.appendChild(b);
  }
}
if (EMBED) {
  ui.cash.textContent = "💶 …";                               // en attendant le premier bigo-state
  const fb = document.getElementById("fmtbar");                // pas de vente locale : sachets masqués
  if (fb) fb.style.display = "none";
  const dc = document.getElementById("dbg-cash");              // debug : ni cash ni graines gratuits
  if (dc && dc.parentElement) dc.parentElement.style.display = "none";   // (masque aussi dbg-stuff)
  PROMPTS.buySeed = "🧅 Plus de graines — achète-en sur OnionMarket";
  PROMPTS.sell    = "🌿 Le séché part tout seul à l'app Récolte";
  varbar = document.createElement("div");
  varbar.id = "varbar"; varbar.className = "selbar";
  varbar.style.bottom = "max(12px,calc(env(safe-area-inset-bottom) + 8px))";   // à la place du fmtbar
  document.body.appendChild(varbar);
  renderVarietyBar();
  // Bus entrant : origine vérifiée (same-origin, ou "null" en file:// — cf. BUS.md).
  window.addEventListener("message", (e) => {
    if (e.origin !== location.origin && e.origin !== "null") return;
    const d = e.data;
    if (!d || d.type !== "bigo-state") return;
    BIGO = d;
    bigoSeeds = {};
    for (const k of Object.keys(EMB_SEEDS)) bigoSeeds[k] = Math.max(0, Math.round(+((d.seeds || {})[k]) || 0));
    setCash(+d.cash || 0);   // miroir : la caisse du PARENT fait foi (écrit le shim mémoire, jamais localStorage)
    updateResources();       // resynchronise titre + sélecteur de variété
  });
  try { parent.postMessage({ type: "bigo-ready", app: "plantation" }, "*"); } catch (e) {}
}

requestAnimationFrame(loop);
</script>
